<body>

        </nav>
        <div class="header-right" id="userSection"></div>

    <main class="container">

                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-palette" style="color: #f59e0b;"></i> Магазин тем</h2>

                <div style="margin-top:20px; padding:15px; background:rgba(0,0,0,0.2); border-radius:30px;">
                    <h3 style="color:#6366f1;">🎨 Текущая тема</h3>
                    <div id="currentTheme" style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                        <div id="currentThemeColor" style="width:35px; height:35px; border-radius:50%; background:#ff9a9e; border:2px solid white;"></div>

                    <h2 class="section-title"><i class="fas fa-store" style="color: #10b981;"></i> Премиум викторины</h2>
                    <div class="store-filters">
                        <button class="filter-btn active" onclick="filterStore('all')">Все</button>
                        <button class="filter-btn" onclick="filterStore('tokens')">💎 За токены</button>
                    </div>
                </div>
                <div id="storeQuizzesList" class="store-grid"></div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let userCoins = 100;
        let userTokens = 0;
        let userThemes = ['pink'];
        let storeFilter = 'all';

        const allThemes = [
            { id: 'pink', name: '🌸 Розовая', price: 0, color: '#ff9a9e' },
            { id: 'blue', name: '💙 Синяя', price: 50, color: '#a8edea' },
            { id: 'green', name: '💚 Зеленая', price: 100, color: '#d4fc79' },
            { id: 'purple', name: '💜 Фиолетовая', price: 150, color: '#e0c3fc' },
            { id: 'orange', name: '🧡 Оранжевая', price: 200, color: '#fddb92' },
            { id: 'candy', name: '🍭 Карамель', price: 200, color: '#fbc2eb' },
            { id: 'forest', name: '🌲 Лес', price: 225, color: '#a8e6cf' },
            { id: 'sunset', name: '🌅 Закат', price: 250, color: '#ffd89b' },
            { id: 'ocean', name: '🌊 Океан', price: 275, color: '#a1c4fd' },
            { id: 'dark', name: '🖤 Темная', price: 300, color: '#141e30' }
        ];

        async function sendToTG(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch (e) { console.error('Ошибка ТГ:', e); }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
            const theme = allThemes.find(t => t.id === themeId);
            if (theme) {
                document.getElementById('currentThemeColor').style.background = theme.color;
                document.getElementById('currentThemeName').textContent = theme.name;
            }
            loadThemes();
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s || !currentUser) return;
            
            const roleEmoji = {
                'owner': '👑',
                'mediacoord': '🎥',
                'chief': '⭐',
                'curator': '📚',
                'moderator': '🛡️',
                'user': '👤'
            }[currentUser.role_title] || '👤';
            
            const roleClass = {
                'owner': 'role-owner',
                'mediacoord': 'role-mediacoord',
                'chief': 'role-chief',
                'curator': 'role-curator',
                'moderator': 'role-moderator',
                'user': ''
            }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <span>${currentUser.username}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${currentUser.coins || 0}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
            document.getElementById('userCoins').textContent = currentUser?.coins || 0;
        }

        function logout() {
            sendToTG(`🚪 Выход из магазина: ${currentUser?.username}`);
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadUser() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }
            
            currentUser = user;
            userCoins = user.coins || 100;
            userThemes = user.themes || ['pink'];
            
            const { data: tokens } = await sb.from('user_tokens').select('balance').eq('user_id', user.id).single();
            userTokens = tokens?.balance || 0;
            
            updateUI();
            loadThemes();
            loadStore();
            
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);
            
            sendToTG(`🛒 ${currentUser.username} зашел в магазин`);
        }

        function loadThemes() {
            const container = document.getElementById('themesList');
            const currentTheme = localStorage.getItem('currentTheme') || 'pink';
            
            let html = '';
            for (let theme of allThemes) {
                const owned = userThemes.includes(theme.id);
                html += `
                    <div class="theme-card ${owned ? 'owned' : ''} ${currentTheme === theme.id ? 'active' : ''}">
                        <div class="theme-color" style="background: ${theme.color};"></div>
                        <div class="theme-name">${theme.name}</div>
                        <div class="theme-price">
                            ${owned ? '✓ В наличии' : `<span class="coins">${theme.price}</span> монет`}
                        </div>
                        ${owned ? `<button class="apply-theme-btn" onclick="applyTheme('${theme.id}')">Применить</button>` : ''}
                        ${!owned ? `<button class="buy-theme-btn" onclick="buyTheme('${theme.id}')">Купить</button>` : ''}
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        window.buyTheme = async function(themeId) {
            const theme = allThemes.find(t => t.id === themeId);
            if (!theme) return;
            
            if (userCoins < theme.price) {
                alert('Недостаточно монет!');
                return;
            }
            
            if (confirm(`Купить тему ${theme.name} за ${theme.price} монет?`)) {
                try {
                    userCoins -= theme.price;
                    userThemes.push(themeId);
                    
                    await sb.from('users').update({ coins: userCoins, themes: userThemes }).eq('id', currentUser.id);
                    
                    currentUser.coins = userCoins;
                    currentUser.themes = userThemes;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    sendToTG(`💰 ${currentUser.username} купил тему ${theme.name} за ${theme.price} монет`);
                    
                    updateUI();
                    loadThemes();
                    
                    alert('✅ Тема куплена!');
                } catch (error) {
                    console.error('Ошибка покупки:', error);
                    alert('Ошибка при покупке');
                }
            }
        };

        async function loadStore() {
            try {
                const { data: quizzes } = await sb
                    .from('quizzes')
                    .select('*, users!quizzes_created_by_fkey(username)')
                    .eq('published', true)
                    .eq('type', 'constructed');
                
                const container = document.getElementById('storeQuizzesList');
                
                if (!quizzes || quizzes.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>Премиум викторин пока нет</p></div>';
                    return;
                }

                let filtered = storeFilter === 'tokens' ? quizzes.filter(q => q.price_tokens > 0) : quizzes;

                let html = '';
                for (let q of filtered) {
                    html += `
                        <div class="store-quiz-card premium">
                            <div class="store-quiz-header">
                                <span class="store-quiz-author">👤 ${q.users?.username || 'Неизвестно'}</span>
                            </div>
                            <div class="store-quiz-title">${q.title}</div>
                            <div class="store-quiz-stats">
                                <span>${q.subject || ''} • ${q.class || ''} класс</span>
                                <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                            </div>
                            <div class="store-quiz-price">
                                <i class="fas fa-gem"></i> ${q.price_tokens} токенов
                            </div>
                            <button class="buy-quiz-btn" onclick="buyQuiz('${q.id}', ${q.price_tokens})">
                                💎 Купить за токены
                            </button>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки магазина:', error);
                document.getElementById('storeQuizzesList').innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
            }
        }

        window.buyQuiz = async function(quizId, price) {
            if (!currentUser) return;
            if (userTokens < price) {
                alert('Недостаточно токенов!');
                return;
            }
            
            if (confirm(`Купить викторину за ${price} токенов?`)) {
                try {
                    const { data, error } = await sb.rpc('buy_quiz_with_tokens', { 
                        p_user_id: currentUser.id, 
                        p_quiz_id: quizId 
                    });
                    
                    if (error) throw error;
                    
                    if (data) {
                        userTokens -= price;
                        updateUI();
                        alert('✅ Викторина куплена!');
                        sendToTG(`💎 ${currentUser.username} купил викторину за ${price} токенов`);
                        loadStore();
                    } else {
                        alert('❌ Ошибка при покупке');
                    }
                } catch (error) {
                    console.error('Ошибка покупки:', error);
                    alert('Ошибка: ' + error.message);
                }
            }
        };

        window.filterStore = function(filter) {
            storeFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadStore();
        };

        loadUser();
    </script>
</body>
</html>
