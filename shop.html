<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Магазин</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ТЕМЫ */
        body.pink-theme { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); color: white; }
        body.blue-theme { background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%); color: white; }
        body.green-theme { background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); color: white; }
        body.purple-theme { background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%); color: white; }
        body.orange-theme { background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); color: white; }
        body.dark-theme { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); color: white; }
        body.sunset-theme { background: linear-gradient(135deg, #f83600 0%, #f9d423 100%); color: white; }
        body.ocean-theme { background: linear-gradient(135deg, #1c92d2 0%, #0f2027 100%); color: white; }
        body.forest-theme { background: linear-gradient(135deg, #134e5e 0%, #2c3e50 100%); color: white; }
        body.candy-theme { background: linear-gradient(135deg, #f43b47 0%, #6a3093 100%); color: white; }

        /* АДАПТИВ */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { flex-direction: column; gap: 15px; padding: 15px; }
            .nav-menu { width: 100%; justify-content: center; flex-wrap: wrap; }
            .nav-link { padding: 8px 12px; font-size: 0.85rem; }
            .user-card { width: 100%; justify-content: space-between; flex-wrap: wrap; }
            .shop-grid { grid-template-columns: 1fr; gap: 15px; }
            .themes-section, .store-section { padding: 20px; }
            .section-header { flex-direction: column; align-items: flex-start; gap: 10px; }
            .store-filters { width: 100%; justify-content: space-between; flex-wrap: wrap; }
            .filter-btn { flex: 1; text-align: center; padding: 8px 10px; font-size: 0.8rem; }
            .themes-grid { grid-template-columns: repeat(2, 1fr); }
            .store-grid { grid-template-columns: 1fr; max-height: none; }
            .theme-card { padding: 10px; }
            .theme-name { font-size: 0.85rem; }
        }

        @media (max-width: 480px) {
            .nav-link { width: calc(50% - 3px); text-align: center; padding: 8px 5px; font-size: 0.75rem; }
            .user-card { justify-content: center; }
            .avatar { width: 35px; height: 35px; }
            .logout-btn { width: 100%; text-align: center; }
            .themes-grid { grid-template-columns: 1fr; }
            .store-filters { flex-direction: column; gap: 5px; }
            .filter-btn { width: 100%; }
            .store-quiz-actions { flex-direction: column; }
            .save-to-mine-btn, .like-btn { width: 100%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.2); }
        .nav-link.active { background: #6366f1; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .logout-btn:hover { background: rgba(255, 255, 255, 0.3); }

        .coins { color: #ffd700; font-weight: 600; font-size: 1.1rem; }
        .tokens { color: #00ffff; font-weight: 600; font-size: 1.1rem; margin-left: 10px; }

        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }

        .themes-section, .store-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 25px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .theme-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .theme-card:hover { transform: scale(1.05); }
        .theme-card.owned { border-color: #10b981; }
        .theme-card.active { border-color: #6366f1; box-shadow: 0 0 20px #6366f1; }

        .theme-color {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            margin: 0 auto 10px;
            border: 2px solid white;
        }

        .theme-name { font-size: 0.95rem; margin-bottom: 5px; }
        .theme-price { font-size: 0.85rem; opacity: 0.8; }

        .apply-theme-btn, .buy-theme-btn {
            margin-top: 10px;
            padding: 8px 12px;
            background: #6366f1;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            width: 100%;
        }

        .apply-theme-btn:hover, .buy-theme-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 10px #6366f1;
        }

        .buy-theme-btn { background: #10b981; }

        .store-filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-family: 'Comfortaa', cursive;
        }

        .filter-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .filter-btn.active { background: #6366f1; }

        .store-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
        }

        .store-quiz-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px;
            transition: all 0.3s;
        }

        .store-quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .store-quiz-card.premium { border-left: 5px solid #f59e0b; }

        .store-quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .store-quiz-author { font-size: 0.9rem; opacity: 0.8; }
        .store-quiz-likes { color: #ff6b6b; font-size: 1.1rem; }

        .store-quiz-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .store-quiz-stats {
            display: flex;
            gap: 15px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .store-quiz-price {
            color: #ffd700;
            font-weight: 700;
            margin: 10px 0;
        }

        .store-quiz-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .buy-quiz-btn {
            background: #ffd700;
            color: #4a4a4a;
            border: none;
            padding: 10px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .buy-quiz-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #ffd700;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .empty-icon { font-size: 60px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-small" onclick="window.location='index.html'">
            <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="shop.html" class="nav-link active">Магазин</a>
            <a href="results.html" class="nav-link">Результаты</a>
            <a href="profile.html" class="nav-link">Профиль</a>
        </nav>
        <div class="header-right" id="userSection"></div>
    </header>

    <main class="container">
        <div class="shop-grid">
            <!-- ЛЕВАЯ КОЛОНКА - ТЕМЫ -->
            <div class="themes-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-palette" style="color: #f59e0b;"></i>
                        Магазин тем
                    </h2>
                    <div id="userCoins" class="coins">0</div>
                </div>
                
                <div id="themesList" class="themes-grid">
                    <div class="empty-state">Загрузка тем...</div>
                </div>
                
                <div style="margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 30px;">
                    <h3 style="color: #6366f1; margin-bottom: 10px;">🎨 Текущая тема</h3>
                    <div id="currentTheme" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                        <div id="currentThemeColor" style="width: 35px; height: 35px; border-radius: 50%; background: #ff0844; border: 2px solid white;"></div>
                        <span id="currentThemeName">Розовая</span>
                    </div>
                </div>
            </div>

            <!-- ПРАВАЯ КОЛОНКА - ПРЕМИУМ ВИКТОРИНЫ -->
            <div class="store-section">
                <div class="section-header">
                    <h2 class="section-title">
                        <i class="fas fa-store" style="color: #10b981;"></i>
                        Премиум викторины
                    </h2>
                    <div class="store-filters">
                        <button class="filter-btn active" onclick="filterStore('all')">Все</button>
                        <button class="filter-btn" onclick="filterStore('tokens')">💎 За токены</button>
                    </div>
                </div>
                
                <div id="storeQuizzesList" class="store-grid">
                    <div class="empty-state">
                        <div class="empty-icon">🛒</div>
                        <p>Загрузка викторин...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let userCoins = 100;
        let userTokens = 0;
        let userThemes = ['pink'];
        let storeFilter = 'all';

        const allThemes = [
            { id: 'pink', name: '🌸 Розовая', price: 0, color: '#ff0844' },
            { id: 'blue', name: '💙 Синяя', price: 50, color: '#00c6fb' },
            { id: 'green', name: '💚 Зеленая', price: 100, color: '#00b09b' },
            { id: 'purple', name: '💜 Фиолетовая', price: 150, color: '#8e2de2' },
            { id: 'orange', name: '🧡 Оранжевая', price: 200, color: '#f12711' },
            { id: 'candy', name: '🍭 Карамель', price: 200, color: '#f43b47' },
            { id: 'forest', name: '🌲 Лес', price: 225, color: '#134e5e' },
            { id: 'sunset', name: '🌅 Закат', price: 250, color: '#f83600' },
            { id: 'ocean', name: '🌊 Океан', price: 275, color: '#1c92d2' },
            { id: 'dark', name: '🖤 Темная', price: 300, color: '#141e30' }
        ];

        async function sendToTG(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch (e) { console.error('Ошибка ТГ:', e); }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
            const theme = allThemes.find(t => t.id === themeId);
            if (theme) {
                document.getElementById('currentThemeColor').style.background = theme.color;
                document.getElementById('currentThemeName').textContent = theme.name;
            }
            loadThemes();
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s || !currentUser) return;
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <span>${currentUser.username}</span>
                    <span class="coins"><i class="fas fa-coins"></i> ${currentUser.coins || 0}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
            document.getElementById('userCoins').textContent = currentUser?.coins || 0;
        }

        function logout() {
            sendToTG(`🚪 Выход из магазина: ${currentUser?.username}`);
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadUser() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }
            
            currentUser = user;
            userCoins = user.coins || 100;
            userThemes = user.themes || ['pink'];
            
            const { data: tokens } = await sb.from('user_tokens').select('balance').eq('user_id', user.id).single();
            userTokens = tokens?.balance || 0;
            
            updateUI();
            loadThemes();
            loadStore();
            
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);
            
            sendToTG(`🛒 ${currentUser.username} зашел в магазин`);
        }

        function loadThemes() {
            const container = document.getElementById('themesList');
            const currentTheme = localStorage.getItem('currentTheme') || 'pink';
            
            let html = '';
            for (let theme of allThemes) {
                const owned = userThemes.includes(theme.id);
                html += `
                    <div class="theme-card ${owned ? 'owned' : ''} ${currentTheme === theme.id ? 'active' : ''}">
                        <div class="theme-color" style="background: ${theme.color};"></div>
                        <div class="theme-name">${theme.name}</div>
                        <div class="theme-price">
                            ${owned ? '✓ В наличии' : `<span class="coins">${theme.price}</span> монет`}
                        </div>
                        ${owned ? `<button class="apply-theme-btn" onclick="applyTheme('${theme.id}')">Применить</button>` : ''}
                        ${!owned ? `<button class="buy-theme-btn" onclick="buyTheme('${theme.id}')">Купить</button>` : ''}
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        window.buyTheme = async function(themeId) {
            const theme = allThemes.find(t => t.id === themeId);
            if (!theme) return;
            
            if (userCoins < theme.price) {
                alert('Недостаточно монет!');
                return;
            }
            
            if (confirm(`Купить тему ${theme.name} за ${theme.price} монет?`)) {
                try {
                    userCoins -= theme.price;
                    userThemes.push(themeId);
                    
                    await sb.from('users').update({ coins: userCoins, themes: userThemes }).eq('id', currentUser.id);
                    
                    currentUser.coins = userCoins;
                    currentUser.themes = userThemes;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    sendToTG(`💰 ${currentUser.username} купил тему ${theme.name} за ${theme.price} монет`);
                    
                    updateUI();
                    loadThemes();
                    
                    alert('✅ Тема куплена!');
                } catch (error) {
                    console.error('Ошибка покупки:', error);
                    alert('Ошибка при покупке');
                }
            }
        };

        async function loadStore() {
            try {
                const { data: quizzes } = await sb
                    .from('quizzes')
                    .select('*, users!quizzes_created_by_fkey(username)')
                    .eq('published', true)
                    .eq('type', 'constructed');
                
                const container = document.getElementById('storeQuizzesList');
                
                if (!quizzes || quizzes.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>Премиум викторин пока нет</p></div>';
                    return;
                }

                let filtered = storeFilter === 'tokens' ? quizzes.filter(q => q.price_tokens > 0) : quizzes;

                let html = '';
                for (let q of filtered) {
                    html += `
                        <div class="store-quiz-card premium">
                            <div class="store-quiz-header">
                                <span class="store-quiz-author">👤 ${q.users?.username || 'Неизвестно'}</span>
                            </div>
                            <div class="store-quiz-title">${q.title}</div>
                            <div class="store-quiz-stats">
                                <span>${q.subject || ''} • ${q.class || ''} класс</span>
                                <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                            </div>
                            <div class="store-quiz-price">
                                <i class="fas fa-gem"></i> ${q.price_tokens} токенов
                            </div>
                            <button class="buy-quiz-btn" onclick="buyQuiz('${q.id}', ${q.price_tokens})">
                                💎 Купить за токены
                            </button>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки магазина:', error);
                document.getElementById('storeQuizzesList').innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
            }
        }

        window.buyQuiz = async function(quizId, price) {
            if (userTokens < price) {
                alert('Недостаточно токенов!');
                return;
            }
            
            if (confirm(`Купить викторину за ${price} токенов?`)) {
                try {
                    const { data, error } = await sb.rpc('buy_quiz_with_tokens', { 
                        p_user_id: currentUser.id, 
                        p_quiz_id: quizId 
                    });
                    
                    if (error) throw error;
                    
                    if (data) {
                        userTokens -= price;
                        updateUI();
                        alert('✅ Викторина куплена!');
                        sendToTG(`💎 ${currentUser.username} купил викторину за ${price} токенов`);
                    } else {
                        alert('❌ Ошибка при покупке');
                    }
                } catch (error) {
                    console.error('Ошибка покупки:', error);
                    alert('Ошибка: ' + error.message);
                }
            }
        };

        window.filterStore = function(filter) {
            storeFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadStore();
        };

        loadUser();
    </script>
</body>
</html>
