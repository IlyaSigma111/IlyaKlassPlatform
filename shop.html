            { id: 'purple', name: '💜 Фиолетовая', price: 150, color: '#8e2de2' },
            { id: 'orange', name: '🧡 Оранжевая', price: 200, color: '#f12711' },
            { id: 'candy', name: '🍭 Карамель', price: 200, color: '#f43b47' },
            { id: 'forest', name: '🌲 Лес', price: 250, color: '#134e5e' },
            { id: 'sunset', name: '🌅 Закат', price: 300, color: '#f83600' },
            { id: 'ocean', name: '🌊 Океан', price: 350, color: '#1c92d2' },
            { id: 'dark', name: '🖤 Темная', price: 400, color: '#141e30' },
            { id: 'gold', name: '👑 Золотая', price: 500, color: '#b8860b' },
            { id: 'diamond', name: '💎 Алмазная', price: 600, color: '#00ffff' },
            { id: 'ruby', name: '🔴 Рубиновая', price: 700, color: '#e0115f' },
            { id: 'emerald', name: '💚 Изумрудная', price: 800, color: '#50c878' },
            { id: 'sapphire', name: '💙 Сапфировая', price: 900, color: '#0f52ba' },
            { id: 'amethyst', name: '🟣 Аметистовая', price: 1000, color: '#9966cc' },
            { id: 'rose', name: '🌹 Розовая', price: 1200, color: '#ff66b2' },
            { id: 'neon', name: '⚡ Неоновая', price: 1500, color: '#39ff14' },
            { id: 'galaxy', name: '🌌 Галактика', price: 2000, color: '#000000' },
            { id: 'lava', name: '🌋 Лава', price: 2500, color: '#ff4500' }
        ];

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        async function sendToTG(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch (e) { console.error('Ошибка ТГ:', e); }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
            const theme = allThemes.find(t => t.id === themeId);
            if (theme) {
                document.getElementById('currentThemeColor').style.background = theme.color;
                document.getElementById('currentThemeName').textContent = theme.name;
            }
            loadThemes();
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s || !currentUser) return;
            
            const roleEmoji = { 
                'owner': '👑', 
                'mediacoord': '🎥', 
                'chief': '⭐', 
                'curator': '📚', 
                'moderator': '🛡️', 
                'user': '👤' 
            }[currentUser.role_title] || '👤';
            
            const roleClass = { 
                'owner': 'role-owner', 
                'mediacoord': 'role-mediacoord', 
                'chief': 'role-chief', 
                'curator': 'role-curator', 
                'moderator': 'role-moderator', 
                'user': '' 
            }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <span>${currentUser.username}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${currentUser.coins || 0}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
            
            document.getElementById('userCoins').textContent = currentUser?.coins || 0;
            document.getElementById('userCoinsExchange').textContent = currentUser?.coins || 0;
            document.getElementById('userTokensExchange').textContent = userTokens || 0;
        }

        function logout() {
            sendToTG(`🚪 Выход из магазина: ${currentUser?.username}`);
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadUser() {
            const user = getCurrentUser();
            if (!user) { 
                window.location.href = 'index.html'; 
                return; 
            }
            
            currentUser = user;
            
            try {
                const { data: userData, error } = await sb.from('users')
                    .select('*')
                    .eq('id', user.id)
                    .single();
                    
                if (error) {
                    console.error('Ошибка загрузки данных пользователя:', error);
                } else if (userData) {
                    currentUser = { ...currentUser, ...userData };
                    userCoins = userData.coins || 0;
                    userThemes = userData.themes || ['pink'];
                }
            } catch (e) {
                console.error('Ошибка загрузки пользователя:', e);
                userCoins = user.coins || 0;
                userThemes = user.themes || ['pink'];
            }
            
            try {
                const { data: tokens, error } = await sb.from('user_tokens')
                    .select('balance')
                    .eq('user_id', user.id)
                    .maybeSingle();
                    
                if (error && error.code !== 'PGRST116') {
                    console.error('Ошибка загрузки токенов:', error);
                }
                
                userTokens = tokens?.balance || 0;
            } catch (e) {
                console.error('Ошибка загрузки токенов:', e);
                userTokens = 0;
            }
            
            updateUI();
            loadThemes();
            loadStore();
            
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);
            
            sendToTG(`🛒 ${currentUser.username} зашел в магазин`);
        }

        function loadThemes() {
            const container = document.getElementById('themesList');
            const currentTheme = localStorage.getItem('currentTheme') || 'pink';
            
            let html = '';
            for (let theme of allThemes) {
                const owned = userThemes.includes(theme.id);
                html += `
                    <div class="theme-card ${owned ? 'owned' : ''} ${currentTheme === theme.id ? 'active' : ''}">
                        <div class="theme-color" style="background: ${theme.color};"></div>
                        <div class="theme-name">${theme.name}</div>
                        <div class="theme-price">
                            ${owned ? '✓ В наличии' : `<span class="coins">${theme.price}</span> монет`}
                        </div>
                        ${owned ? `<button class="apply-theme-btn" onclick="applyTheme('${theme.id}')">Применить</button>` : ''}
                        ${!owned ? `<button class="buy-theme-btn" onclick="buyTheme('${theme.id}')">Купить</button>` : ''}
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        window.buyTheme = async function(themeId) {
            const theme = allThemes.find(t => t.id === themeId);
            if (!theme) return;
            
            if (userCoins < theme.price) {
                alert('Недостаточно монет!');
                return;
            }
            
            if (confirm(`Купить тему ${theme.name} за ${theme.price} монет?`)) {
                try {
                    userCoins -= theme.price;
                    userThemes.push(themeId);
                    
                    const { error } = await sb.from('users')
                        .update({ coins: userCoins, themes: userThemes })
                        .eq('id', currentUser.id);
                        
                    if (error) throw error;
                    
                    currentUser.coins = userCoins;
                    currentUser.themes = userThemes;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    sendToTG(`💰 ${currentUser.username} купил тему ${theme.name} за ${theme.price} монет`);
                    
                    updateUI();
                    loadThemes();
                    
                    alert('✅ Тема куплена!');
                } catch (error) {
                    console.error('Ошибка покупки:', error);
                    alert('Ошибка при покупке: ' + error.message);
                }
            }
        };

        // Функция обмена монет на токены
        window.exchangeCoins = async function() {
            if (!currentUser) {
                alert('Сначала войдите в систему');
                return;
            }
            
            const amount = parseInt(document.getElementById('exchangeAmount').value);
            
            if (isNaN(amount) || amount < 100) {
                alert('Минимальная сумма обмена: 100 монет');
                return;
            }
            
            if (amount % 100 !== 0) {
                alert('Сумма должна быть кратна 100');
                return;
            }
            
            if (userCoins < amount) {
                alert(`Недостаточно монет! У вас ${userCoins} монет, нужно ${amount}`);
                return;
            }
            
            const tokensToAdd = amount / 100;
            
            if (confirm(`Обменять ${amount} монет на ${tokensToAdd} токенов?`)) {
                try {
                    const { data: freshUserData, error: fetchError } = await sb.from('users')
                        .select('*')
                        .eq('id', currentUser.id)
                        .single();
                        
                    if (fetchError) {
                        console.error('Ошибка получения данных пользователя:', fetchError);
                        throw new Error('Не удалось получить данные пользователя');
                    }
                    
                    console.log('Данные пользователя из БД перед обменом:', freshUserData);
                    
                    const currentBalance = freshUserData.coins || 0;
                    
                    if (currentBalance < amount) {
                        alert(`Недостаточно монет! По данным БД у вас ${currentBalance} монет, нужно ${amount}`);
                        return;
                    }
                    
                    const newBalance = currentBalance - amount;
                    
                    const { error: updateError } = await sb.from('users')
                        .update({ coins: newBalance })
                        .eq('id', currentUser.id);
                        
                    if (updateError) {
                        console.error('Ошибка при обновлении монет:', updateError);
                        throw new Error(`Не удалось обновить баланс монет: ${updateError.message}`);
                    }
                    
                    userCoins = newBalance;
                    currentUser.coins = newBalance;
                    
                    const { data: tokenData, error: tokenError } = await sb.from('user_tokens')
                        .select('balance')
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                        
                    if (tokenError && tokenError.code !== 'PGRST116') {
                        throw tokenError;
                    }
                    
                    const currentTokens = tokenData?.balance || 0;
                    const newTokens = currentTokens + tokensToAdd;
                    
                    if (tokenData) {
                        const { error: updateError } = await sb.from('user_tokens')
                            .update({ balance: newTokens })
                            .eq('user_id', currentUser.id);
                            
                        if (updateError) throw updateError;
                    } else {
                        const { error: insertError } = await sb.from('user_tokens')
                            .insert({
                                user_id: currentUser.id,
                                balance: newTokens,
                                referral_code: 'ref_' + currentUser.id + '_' + Math.floor(Math.random() * 1000000)
                            });
                            
                        if (insertError) throw insertError;
                    }
                    
                    userTokens = newTokens;
                    
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    updateUI();
                    showToast(`✅ Обменяно ${amount} монет на ${tokensToAdd} токенов!`);
                    sendToTG(`💱 ${currentUser.username} обменял ${amount} монет на ${tokensToAdd} токенов`);
                    
                    document.getElementById('exchangeAmount').value = '100';
                    
                } catch (error) {
                    console.error('Ошибка обмена:', error);
                    alert('Ошибка при обмене: ' + error.message);
                }
            }
        };

        async function loadStore() {
            try {
                const { data: quizzes, error } = await sb
                    .from('quizzes')
                    .select('*, users!quizzes_created_by_fkey(username)')
                    .eq('published', true)
                    .eq('type', 'constructed');
                
                if (error) throw error;
                
                const container = document.getElementById('storeQuizzesList');
                
                if (!quizzes || quizzes.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>Премиум викторин пока нет</p></div>';
                    return;
                }

                let filtered = storeFilter === 'tokens' ? quizzes.filter(q => q.price_tokens > 0) : quizzes;

                let html = '';
                for (let q of filtered) {
                    html += `
                        <div class="store-quiz-card premium">
                            <div class="store-quiz-header">
                                <span class="store-quiz-author">👤 ${q.users?.username || 'Неизвестно'}</span>
                            </div>
                            <div class="store-quiz-title">${q.title}</div>
                            <div class="store-quiz-stats">
                                <span>${q.subject || ''} • ${q.class || ''} класс</span>
                                <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                            </div>
                            <div class="store-quiz-price">
                                <i class="fas fa-gem"></i> ${q.price_tokens} токенов
                            </div>
                            <button class="buy-quiz-btn" onclick="buyQuiz('${q.id}', ${q.price_tokens})">
                                💎 Купить за токены
                            </button>
                        </div>
                    `;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки магазина:', error);
                document.getElementById('storeQuizzesList').innerHTML = '<div class="empty-state">❌ Ошибка загрузки</div>';
            }
        }

        window.buyQuiz = async function(quizId, price) {
            if (!currentUser) return;
            
            if (userTokens < price) {
                alert('Недостаточно токенов!');
                return;
            }
            
            if (confirm(`Купить викторину за ${price} токенов?`)) {
                try {
                    try {
                        const { data, error } = await sb.rpc('buy_quiz_with_tokens', { 
                            p_user_id: currentUser.id, 
                            p_quiz_id: quizId 
                        });
                        
                        if (error) throw error;
                        
                        if (data) {
                            userTokens -= price;
                            updateUI();
                            alert('✅ Викторина куплена!');
                            sendToTG(`💎 ${currentUser.username} купил викторину за ${price} токенов`);
                            loadStore();
                        } else {
                            alert('❌ Ошибка при покупке');
                        }
                    } catch (rpcError) {
                        console.log('RPC функция не найдена, обновляем вручную');
                        
                        const newTokens = userTokens - price;
                        
                        const { error: tokenError } = await sb.from('user_tokens')
                            .update({ balance: newTokens })
                            .eq('user_id', currentUser.id);
                            
                        if (tokenError) throw tokenError;
                        
                        userTokens = newTokens;
                        updateUI();
                        alert('✅ Викторина куплена!');
                        sendToTG(`💎 ${currentUser.username} купил викторину за ${price} токенов`);
                        loadStore();
                    }
                } catch (error) {
                    console.error('Ошибка покупки:', error);
                    alert('Ошибка: ' + error.message);
                }
            }
        };

        window.filterStore = function(filter) {
            storeFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadStore();
        };

        loadUser();
    </script>
