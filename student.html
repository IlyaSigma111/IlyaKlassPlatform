<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ученик - Викторины</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .quiz-card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .header { background: #4CAF50; color: white; padding: 15px; margin-bottom: 20px; display: flex; gap: 20px; }
        .header a { color: white; text-decoration: none; }
        input { padding: 8px; width: 100%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .category-filter { margin: 15px 0; }
        .filter-btn { background: #ddd; color: #333; margin-right: 5px; }
        .filter-btn.active { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍🎓 УЧЕНИК</h1>
            <div style="flex:1"></div>
            <a href="index.html">Главная</a>
            <a href="teacher.html">Учитель</a>
        </div>

        <input type="text" id="playerName" placeholder="Ваше имя" value="">
        
        <div class="category-filter" id="categories"></div>
        
        <div id="quizzesList"></div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let playerName = localStorage.getItem('playerName') || '';
        let currentCategory = 'all';

        document.getElementById('playerName').value = playerName;
        document.getElementById('playerName').onchange = function() {
            playerName = this.value.trim();
            if (playerName) localStorage.setItem('playerName', playerName);
        };

        async function loadCategories() {
            const { data: quizzes } = await sb.from('quizzes').select('category');
            const cats = ['Все', ...new Set(quizzes?.map(q => q.category).filter(c => c))];
            document.getElementById('categories').innerHTML = cats.map(cat => `
                <button class="filter-btn ${currentCategory === cat ? 'active' : ''}" onclick="filterByCategory('${cat}')">${cat}</button>
            `).join('');
        }

        window.filterByCategory = function(cat) {
            currentCategory = cat;
            loadCategories();
            loadQuizzes();
        };

        async function loadQuizzes() {
            let query = sb.from('quizzes').select('*').order('created_at', { ascending: false });
            if (currentCategory !== 'Все') query = query.eq('category', currentCategory);
            const { data: quizzes } = await query;
            
            if (!quizzes?.length) {
                document.getElementById('quizzesList').innerHTML = '<p>Нет викторин</p>';
                return;
            }
            document.getElementById('quizzesList').innerHTML = quizzes.map(q => `
                <div class="quiz-card">
                    <div>
                        <b>${escapeHtml(q.title)}</b><br>
                        <small>📁 ${escapeHtml(q.category)} | ${q.question_count} вопросов</small>
                    </div>
                    <button onclick="playQuiz('${q.id}')">▶ Играть</button>
                </div>
            `).join('');
        }

        window.playQuiz = function(quizId) {
            if (!playerName) {
                alert('Введите ваше имя');
                return;
            }
            localStorage.setItem('playerName', playerName);
            window.location.href = `play.html?quiz=${quizId}`;
        };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        loadCategories();
        loadQuizzes();
    </script>
</body>
</html>
