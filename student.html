<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>👤 Игра | ИЛЬЯКЛАСС</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        /* ===== 20 ТЕМ ===== */
        body.pink-theme { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
        body.blue-theme { background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%); }
        body.green-theme { background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); }
        body.purple-theme { background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%); }
        body.orange-theme { background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); }
        body.dark-theme { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); }
        body.sunset-theme { background: linear-gradient(135deg, #f83600 0%, #f9d423 100%); }
        body.ocean-theme { background: linear-gradient(135deg, #1c92d2 0%, #0f2027 100%); }
        body.forest-theme { background: linear-gradient(135deg, #134e5e 0%, #71b280 100%); }
        body.candy-theme { background: linear-gradient(135deg, #f43b47 0%, #6a3093 100%); }
        body.gold-theme { background: linear-gradient(135deg, #b8860b 0%, #ffd700 100%); color: #2d3436; }
        body.diamond-theme { background: linear-gradient(135deg, #00ffff 0%, #4169e1 100%); }
        body.ruby-theme { background: linear-gradient(135deg, #e0115f 0%, #8b0000 100%); }
        body.emerald-theme { background: linear-gradient(135deg, #50c878 0%, #006400 100%); }
        body.sapphire-theme { background: linear-gradient(135deg, #0f52ba 0%, #191970 100%); }
        body.amethyst-theme { background: linear-gradient(135deg, #9966cc 0%, #4b0082 100%); }
        body.rose-theme { background: linear-gradient(135deg, #ff66b2 0%, #8b008b 100%); }
        body.neon-theme { background: linear-gradient(135deg, #39ff14 0%, #00ffff 100%); color: #2d3436; }
        body.galaxy-theme { background: linear-gradient(135deg, #000000 0%, #4b0082 100%); }
        body.lava-theme { background: linear-gradient(135deg, #ff4500 0%, #8b0000 100%); }

        @media (max-width: 768px) {
            .student-container { padding: 25px; width: 100%; }
            .question-text { font-size: 1.4rem; }
            .options-grid { gap: 12px; }
            .option { padding: 15px; }
            .option-letter { width: 40px; height: 40px; font-size: 1.2rem; }
            .game-header { flex-direction: column; gap: 15px; }
            .player-info { width: 100%; justify-content: center; }
            .score { width: 100%; text-align: center; }
            .players-list { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .student-container { padding: 20px; }
            .back-btn { width: 100%; justify-content: center; }
            .player-info { flex-wrap: wrap; }
            .player-avatar { width: 40px; height: 40px; }
            .option { padding: 12px; }
            .option-letter { width: 35px; height: 35px; font-size: 1rem; }
            .final-score { font-size: 3rem; }
            .players-list { grid-template-columns: 1fr; }
        }

        .student-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .player-avatar {
            width: 45px;
            height: 45px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .score {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: 700;
        }

        .question-text {
            font-size: 1.8rem;
            margin: 30px 0;
            text-align: center;
            line-height: 1.5;
            word-break: break-word;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .options-grid {
            display: grid;
            gap: 15px;
            margin: 30px 0;
        }

        .option {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 18px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .option.selected {
            background: #10b981;
            border-color: white;
            color: white;
        }

        .option-letter {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .status-message {
            text-align: center;
            padding: 15px;
            border-radius: 40px;
            margin: 20px 0;
            font-weight: 600;
        }

        .status-correct {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
        }

        .status-wrong {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            color: #ff6b6b;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 20px;
            display: none;
        }

        .final-score {
            font-size: 4rem;
            font-weight: 700;
            color: #10b981;
            margin: 30px 0;
        }

        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .player-mini-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }

        .player-mini-avatar {
            width: 35px;
            height: 35px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: 700;
            color: white;
        }

        .waiting-text {
            font-size: 1.2rem;
            margin: 20px 0;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="student-container" id="mainContainer">
        <!-- Контент будет подгружаться динамически -->
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let currentLobby = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let myScore = 0;
        let playerName = null;
        let hasAnswered = false;
        let channel = null;

        const urlParams = new URLSearchParams(window.location.search);
        const lobbyId = urlParams.get('lobby');
        const quizId = urlParams.get('quiz');

        async function sendToTG(msg) {
            try { await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ chat_id:TG_CHAT_ID, text:msg, parse_mode:'HTML' }) }); } catch(e) { console.error(e); }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
        }

        async function init() {
            const saved = localStorage.getItem('currentUser');
            if (!saved) { window.location.href = 'index.html'; return; }
            
            currentUser = JSON.parse(saved);
            if (currentUser.role !== 'student') { window.location.href = 'teacher-menu.html'; return; }

            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            if (lobbyId) {
                await loadGame(lobbyId);
            } else if (quizId) {
                await quickPlay(quizId);
            } else {
                window.location.href = 'student-menu.html';
            }
        }

        async function quickPlay(quizId) {
            const { data: lobby } = await sb.from('lobbies')
                .select('*')
                .eq('quiz_id', quizId)
                .eq('status', 'waiting')
                .maybeSingle();

            if (lobby) {
                window.location.href = `student.html?lobby=${lobby.id}`;
                return;
            }

            showJoinScreen(quizId);
        }

        function showJoinScreen(quizId) {
            document.getElementById('mainContainer').innerHTML = `
                <div style="text-align:center;">
                    <h1 style="font-size:2rem; margin-bottom:20px;">🎮 Вход в игру</h1>
                    <div style="margin:20px 0;">
                        <label style="display:block; margin-bottom:8px;">👤 Твоё имя</label>
                        <input type="text" id="playerName" value="${currentUser.username}" style="width:100%; padding:15px; border-radius:40px; border:2px solid rgba(255,255,255,0.3); background:rgba(255,255,255,0.2); color:white; font-size:1.2rem; text-align:center; margin-bottom:20px;">
                    </div>
                    <button onclick="joinQuickGame('${quizId}')" style="width:100%; padding:18px; background:#10b981; border:none; border-radius:40px; color:white; font-weight:700; font-size:1.3rem; cursor:pointer;">ПОДКЛЮЧИТЬСЯ</button>
                    <div id="errorMsg" style="color:#ff6b6b; margin-top:15px;"></div>
                    <a href="student-menu.html" class="back-btn" style="display:inline-block; margin-top:20px;">← Назад</a>
                </div>
            `;
        }

        window.joinQuickGame = async (quizId) => {
            const name = document.getElementById('playerName').value.trim();
            if (!name) { showError('Введите имя'); return; }

            const { data: lobbies } = await sb.from('lobbies')
                .select('*')
                .eq('quiz_id', quizId)
                .eq('status', 'waiting');

            if (!lobbies || lobbies.length === 0) {
                showError('Нет активных игр для этой викторины');
                return;
            }

            const lobby = lobbies[0];
            const players = lobby.players || {};
            
            if (players[name]) {
                showError('Игрок с таким именем уже есть');
                return;
            }

            players[name] = { name, joined_at: Date.now(), score: 0 };
            await sb.from('lobbies').update({ players }).eq('id', lobby.id);

            window.location.href = `student.html?lobby=${lobby.id}`;
        };

        async function loadGame(lobbyId) {
            const { data: lobby } = await sb.from('lobbies').select('*').eq('id', lobbyId).single();
            if (!lobby) { window.location.href = 'student-menu.html'; return; }

            currentLobby = lobby;
            const { data: qs } = await sb.from('questions').select('*').eq('quiz_id', lobby.quiz_id).order('question_index');
            questions = qs || [];

            showGameUI();
            listenToLobby(lobbyId);
            sendToTG(`🎯 ${currentUser.username} начал игру (код: ${lobby.code})`);
        }

        function showGameUI() {
            document.getElementById('mainContainer').innerHTML = `
                <div class="header">
                    <a href="student-menu.html" class="back-btn">← В меню</a>
                </div>
                <div class="game-header">
                    <div class="player-info">
                        <div class="player-avatar">${currentUser.username[0].toUpperCase()}</div>
                        <span>${currentUser.username}</span>
                    </div>
                    <div class="score" id="playerScore">0</div>
                </div>

                <div id="waitingScreen" style="text-align:center; padding:30px;">
                    <div class="loader"></div>
                    <h3>Ожидание начала...</h3>
                    <div id="playersList" class="players-list"></div>
                </div>

                <div id="questionScreen" style="display:none;">
                    <div class="question-text" id="questionText"></div>
                    <div class="options-grid" id="optionsContainer"></div>
                    <div id="statusMessage" class="status-message"></div>
                </div>

                <div id="resultsScreen" style="display:none; text-align:center;">
                    <h2>🎉 Викторина завершена!</h2>
                    <div class="final-score" id="finalScore">0</div>
                    <div id="finalPlayersList" class="players-list"></div>
                    <a href="student-menu.html" class="back-btn">🏠 На главную</a>
                </div>
            `;
        }

        function listenToLobby(lobbyId) {
            if (channel) sb.removeChannel(channel);

            channel = sb
                .channel('lobby-student-' + lobbyId)
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'lobbies', filter: `id=eq.${lobbyId}` },
                    payload => { if (payload.new) handleLobbyUpdate(payload.new); })
                .subscribe();

            sb.from('lobbies').select('*').eq('id', lobbyId).then(({ data }) => {
                if (data?.[0]) handleLobbyUpdate(data[0]);
            });
        }

        function handleLobbyUpdate(lobby) {
            currentLobby = lobby;
            updatePlayersList(lobby.players);

            if (lobby.status === 'active') {
                const idx = lobby.current_question || 0;
                if (idx < questions.length) showQuestion(questions[idx], idx);
            } else if (lobby.status === 'waiting') {
                document.getElementById('waitingScreen').style.display = 'block';
                document.getElementById('questionScreen').style.display = 'none';
                document.getElementById('resultsScreen').style.display = 'none';
            } else if (lobby.status === 'finished') {
                document.getElementById('waitingScreen').style.display = 'none';
                document.getElementById('questionScreen').style.display = 'none';
                document.getElementById('resultsScreen').style.display = 'block';
                showFinalResults(lobby.players);
                sendToTG(`🏁 ${currentUser.username} закончил игру: ${myScore} очков`);
            }
        }

        function updatePlayersList(players) {
            if (!players) return;
            const list = document.getElementById('playersList');
            if (!list) return;
            
            list.innerHTML = Object.entries(players).map(([n,d]) => `
                <div class="player-mini-card">
                    <div class="player-mini-avatar">${n[0].toUpperCase()}</div>
                    <div>${n}</div>
                    <div>🎯 ${d.score||0}</div>
                </div>
            `).join('');
        }

        function showFinalResults(players) {
            const list = document.getElementById('finalPlayersList');
            if (!list) return;
            
            const sorted = Object.entries(players).sort((a,b) => (b[1].score||0) - (a[1].score||0));
            list.innerHTML = sorted.map(([n,d]) => `
                <div class="player-mini-card">
                    <div class="player-mini-avatar">${n[0].toUpperCase()}</div>
                    <div>${n}</div>
                    <div style="color:#10b981;">${d.score||0}</div>
                </div>
            `).join('');
            document.getElementById('finalScore').textContent = myScore;
        }

        function showQuestion(q, idx) {
            document.getElementById('waitingScreen').style.display = 'none';
            document.getElementById('questionScreen').style.display = 'block';
            document.getElementById('resultsScreen').style.display = 'none';
            
            currentQuestionIndex = idx;
            hasAnswered = false;
            
            document.getElementById('questionText').textContent = q.question;
            
            const opts = [...q.answers];
            for (let i = opts.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            const correctIdx = opts.indexOf(q.answers[q.correct]);
            
            document.getElementById('optionsContainer').innerHTML = opts.map((opt,i) => `
                <div class="option" onclick="selectAnswer(${i}, ${correctIdx})">
                    <div class="option-letter">${String.fromCharCode(65+i)}</div>
                    <div>${opt}</div>
                </div>
            `).join('');
            
            document.getElementById('statusMessage').textContent = '⏳ Выберите ответ';
        }

        window.selectAnswer = async (selected, correct) => {
            if (hasAnswered) return;
            hasAnswered = true;

            document.querySelectorAll('.option').forEach((o,i) => {
                o.classList.toggle('selected', i === selected);
            });

            const isCorrect = selected === correct;
            const status = document.getElementById('statusMessage');
            status.className = isCorrect ? 'status-message status-correct' : 'status-message status-wrong';
            status.textContent = isCorrect ? '✅ Правильно!' : '❌ Неправильно';

            if (isCorrect) {
                myScore++;
                document.getElementById('playerScore').textContent = myScore;

                const players = currentLobby.players || {};
                if (players[currentUser.username]) {
                    players[currentUser.username].score = myScore;
                    players[currentUser.username].last_answer = currentQuestionIndex;
                    players[currentUser.username].last_correct = currentQuestionIndex;
                    await sb.from('lobbies').update({ players }).eq('id', currentLobby.id);
                }
            }
        };

        function showError(msg) {
            const e = document.getElementById('errorMsg');
            if (e) {
                e.textContent = msg;
                e.style.display = 'block';
                setTimeout(() => e.style.display = 'none', 3000);
            }
        }

        init();
    </script>
</body>
</html>
