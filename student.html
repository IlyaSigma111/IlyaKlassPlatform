<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>👤 Ученик | ИЛЬЯКЛАСС</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        /* ===== ТЕМЫ С ЧЕТКИМИ ГРАНИЦАМИ ===== */
        body.pink-theme { 
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); 
            color: #2d3436; 
        }
        body.pink-theme .student-container,
        body.pink-theme .option,
        body.pink-theme .back-btn,
        body.pink-theme .join-btn,
        body.pink-theme .player-info,
        body.pink-theme .score,
        body.pink-theme .status-message,
        body.pink-theme .player-mini-card,
        body.pink-theme .question-text { 
            background: rgba(255, 255, 255, 0.9);
            color: #2d3436;
            border: 2px solid rgba(45, 52, 54, 0.2);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        body.pink-theme .join-btn { background: #10b981; color: white; border: none; }
        body.pink-theme .option.selected { background: #10b981; color: white; }
        
        body.blue-theme { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            color: #1e3799; 
        }
        body.blue-theme .student-container,
        body.blue-theme .option,
        body.blue-theme .back-btn,
        body.blue-theme .player-info,
        body.blue-theme .score,
        body.blue-theme .status-message,
        body.blue-theme .player-mini-card { 
            background: rgba(255, 255, 255, 0.9);
            color: #1e3799;
            border: 2px solid rgba(30, 55, 153, 0.2);
        }
        
        body.green-theme { 
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); 
            color: #145a32; 
        }
        body.green-theme .student-container,
        body.green-theme .option,
        body.green-theme .back-btn,
        body.green-theme .player-info,
        body.green-theme .score,
        body.green-theme .status-message,
        body.green-theme .player-mini-card { 
            background: rgba(255, 255, 255, 0.9);
            color: #145a32;
            border: 2px solid rgba(20, 90, 50, 0.2);
        }
        
        body.dark-theme { 
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); 
            color: white; 
        }
        body.dark-theme .student-container,
        body.dark-theme .option,
        body.dark-theme .back-btn,
        body.dark-theme .player-info,
        body.dark-theme .score,
        body.dark-theme .status-message,
        body.dark-theme .player-mini-card { 
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* ===== АДАПТИВ ДЛЯ МОБИЛОК ===== */
        @media (max-width: 768px) {
            .student-container {
                padding: 20px;
                width: 100%;
                border-radius: 40px;
            }
            
            .question-text {
                font-size: 1.3rem;
                margin: 20px 0;
            }
            
            .options-grid {
                gap: 10px;
            }
            
            .option {
                padding: 12px 15px;
                gap: 12px;
            }
            
            .option-letter {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }
            
            .game-header {
                flex-direction: column;
                gap: 10px;
                margin-bottom: 20px;
            }
            
            .player-info {
                width: 100%;
                justify-content: center;
                padding: 8px 15px;
            }
            
            .player-avatar {
                width: 35px;
                height: 35px;
                font-size: 1rem;
            }
            
            .score {
                width: 100%;
                text-align: center;
                padding: 8px;
            }
            
            .join-card h1 {
                font-size: 1.8rem;
                margin-bottom: 20px;
            }
            
            .input-group {
                margin-bottom: 15px;
            }
            
            input {
                padding: 12px;
                font-size: 1rem;
            }
            
            .join-btn {
                padding: 14px;
                font-size: 1.1rem;
                margin: 15px 0;
            }
            
            .players-list {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            
            .player-mini-card {
                padding: 8px;
            }
            
            .player-mini-avatar {
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }
            
            .waiting-text {
                font-size: 1rem;
            }
            
            .loader {
                width: 40px;
                height: 40px;
            }
            
            .final-score {
                font-size: 3rem;
                margin: 20px 0;
            }
        }

        @media (max-width: 480px) {
            .student-container {
                padding: 15px;
            }
            
            .question-text {
                font-size: 1.1rem;
            }
            
            .option {
                padding: 10px;
                font-size: 0.9rem;
            }
            
            .option-letter {
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }
            
            .players-list {
                grid-template-columns: 1fr;
            }
            
            .join-card h1 {
                font-size: 1.5rem;
            }
            
            .back-btn {
                width: 100%;
                justify-content: center;
            }
            
            .player-info {
                flex-wrap: wrap;
            }
        }

        .student-container {
            width: 100%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-5px);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .player-avatar {
            width: 45px;
            height: 45px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
        }

        .score {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
            padding: 8px 15px;
            border-radius: 30px;
            font-weight: 700;
        }

        .join-card {
            text-align: center;
        }

        .join-card h1 {
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-family: 'Comfortaa', cursive;
            text-align: center;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.5); }

        input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 20px #10b981;
        }

        .join-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .join-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #10b981;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 1.8rem;
            margin: 30px 0;
            text-align: center;
            line-height: 1.5;
            word-break: break-word;
            background: rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .options-grid {
            display: grid;
            gap: 15px;
            margin: 30px 0;
        }

        .option {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 18px 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
            font-weight: 600;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .option.selected {
            background: #10b981;
            border-color: white;
            color: white;
        }

        .option-letter {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .status-message {
            text-align: center;
            padding: 15px;
            border-radius: 40px;
            margin: 20px 0;
            font-weight: 600;
        }

        .status-correct {
            background: rgba(16, 185, 129, 0.2);
            border: 2px solid #10b981;
        }

        .status-wrong {
            background: rgba(239, 68, 68, 0.2);
            border: 2px solid #ef4444;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-msg {
            color: #ff6b6b;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255, 107, 107, 0.1);
            border-radius: 20px;
            display: none;
        }

        .results-screen {
            text-align: center;
        }

        .final-score {
            font-size: 4rem;
            font-weight: 700;
            color: #10b981;
            margin: 30px 0;
        }

        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .player-mini-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
        }

        .player-mini-avatar {
            width: 35px;
            height: 35px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            font-weight: 700;
            color: white;
        }

        .waiting-text {
            font-size: 1.2rem;
            margin: 20px 0;
            opacity: 0.8;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            z-index: 3000;
            display: none;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 100px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">Ссылка скопирована! 🔗</div>
    
    <div class="student-container" id="mainContainer">
        <!-- Контент будет подгружаться динамически -->
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let currentLobby = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let myScore = 0;
        let playerName = null;
        let hasAnswered = false;
        let channel = null;

        const urlParams = new URLSearchParams(window.location.search);
        const lobbyId = urlParams.get('lobby');
        const playerParam = urlParams.get('player');

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        async function sendToTG(message) {
            try { await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ chat_id:TG_CHAT_ID, text:message, parse_mode:'HTML' }) }); } catch(e) { console.error(e); }
        }

        function checkAuth() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                if (currentUser.role !== 'student') {
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'index.html';
            }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
        }

        async function init() {
            checkAuth();
            
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            if (lobbyId && playerParam) {
                playerName = decodeURIComponent(playerParam);
                await loadGame(lobbyId);
            } else {
                showJoinScreen();
            }
        }

        function showJoinScreen() {
            document.getElementById('mainContainer').innerHTML = `
                <div class="join-card">
                    <h1>🎮 Вход в игру</h1>
                    
                    <div class="input-group">
                        <label>👤 Твоё имя</label>
                        <input type="text" id="playerName" placeholder="Например: Иван" value="${currentUser.username}">
                    </div>

                    <div class="input-group">
                        <label>🔑 Код игры</label>
                        <input type="text" id="gameCode" placeholder="8 цифр" maxlength="8" inputmode="numeric">
                    </div>

                    <div id="errorMsg" class="error-msg"></div>

                    <button class="join-btn" onclick="joinGame()">
                        <i class="fas fa-sign-in-alt"></i> ПОДКЛЮЧИТЬСЯ
                    </button>

                    <a href="index.html" class="back-btn" style="display: inline-block; margin-top: 20px;">
                        <i class="fas fa-arrow-left"></i> На главную
                    </a>
                </div>
            `;

            document.getElementById('gameCode').addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '').substring(0, 8);
            });
        }

        window.joinGame = async function() {
            const name = document.getElementById('playerName').value.trim();
            const code = document.getElementById('gameCode').value.trim();

            if (!name || name.length < 2) {
                showError('Введите имя (минимум 2 символа)');
                return;
            }

            if (!code || code.length !== 8) {
                showError('Введите 8-значный код');
                return;
            }

            try {
                const { data: lobbies } = await sb.from('lobbies').select('*').eq('code', code).eq('status', 'waiting');
                
                if (!lobbies || lobbies.length === 0) {
                    showError('Игра с таким кодом не найдена или уже началась');
                    return;
                }

                const lobby = lobbies[0];
                const players = lobby.players || {};
                
                if (players[name]) {
                    showError('Игрок с таким именем уже есть');
                    return;
                }

                players[name] = { name: name, joined_at: Date.now(), score: 0 };

                await sb.from('lobbies').update({ players: players }).eq('id', lobby.id);

                sendToTG(`🎮 ${currentUser.username} подключился к игре с кодом ${code}`);

                window.location.href = `student.html?lobby=${lobby.id}&player=${encodeURIComponent(name)}`;
            } catch (error) {
                console.error('Ошибка подключения:', error);
                showError('Ошибка подключения к игре');
            }
        };

        async function loadGame(lobbyId) {
            try {
                const { data: lobby } = await sb.from('lobbies').select('*').eq('id', lobbyId).single();
                if (!lobby) {
                    showError('Игра не найдена');
                    return;
                }

                currentLobby = lobby;

                const { data: questionsData } = await sb.from('questions').select('*').eq('quiz_id', lobby.quiz_id).order('question_index');
                questions = questionsData || [];

                if (lobby.players && lobby.players[playerName]) {
                    myScore = lobby.players[playerName].score || 0;
                }

                showGameUI();
                listenToLobby(lobbyId);
                
                sendToTG(`🎯 ${currentUser.username} начал игру (код: ${lobby.code})`);
            } catch (error) {
                console.error('Ошибка загрузки игры:', error);
                showError('Ошибка загрузки игры');
            }
        }

        function showGameUI() {
            document.getElementById('mainContainer').innerHTML = `
                <div class="game-header">
                    <div class="player-info">
                        <div class="player-avatar">${playerName.charAt(0).toUpperCase()}</div>
                        <span>${playerName}</span>
                    </div>
                    <div class="score" id="playerScore">${myScore}</div>
                </div>

                <div id="waitingScreen" style="text-align: center; padding: 30px;">
                    <div class="loader"></div>
                    <h3>Ожидание начала...</h3>
                    <div id="playersCount" class="waiting-text">Игроков: 0</div>
                    <div id="playersList" class="players-list"></div>
                </div>

                <div id="questionScreen" style="display: none;">
                    <div id="questionHeader" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <span id="questionCounter">Вопрос 1/0</span>
                    </div>

                    <div class="question-text" id="questionText"></div>

                    <div class="options-grid" id="optionsContainer"></div>

                    <div id="statusMessage" class="status-message"></div>
                </div>

                <div id="resultsScreen" style="display: none; text-align: center;">
                    <h2>🎉 Викторина завершена!</h2>
                    <div class="final-score" id="finalScore">${myScore}</div>
                    
                    <div style="margin: 30px 0;">
                        <h3>Итоговая таблица</h3>
                        <div id="finalPlayersList" class="players-list"></div>
                    </div>
                    
                    <a href="index.html" class="back-btn" style="display: inline-block;">
                        <i class="fas fa-home"></i> На главную
                    </a>
                </div>
            `;
        }

        function listenToLobby(lobbyId) {
            if (channel) {
                sb.removeChannel(channel);
            }

            channel = sb
                .channel('lobby-student-' + lobbyId)
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'lobbies', filter: `id=eq.${lobbyId}` },
                    payload => {
                        if (payload.new) {
                            handleLobbyUpdate(payload.new);
                        }
                    })
                .subscribe();

            sb.from('lobbies').select('*').eq('id', lobbyId).then(({ data }) => {
                if (data && data[0]) {
                    handleLobbyUpdate(data[0]);
                }
            });
        }

        function handleLobbyUpdate(lobby) {
            currentLobby = lobby;

            updatePlayersList(lobby.players);

            if (lobby.status === 'active') {
                const qIndex = lobby.current_question || 0;
                if (qIndex < questions.length) {
                    showQuestion(questions[qIndex], qIndex);
                }
            } else if (lobby.status === 'waiting') {
                document.getElementById('waitingScreen').style.display = 'block';
                document.getElementById('questionScreen').style.display = 'none';
                document.getElementById('resultsScreen').style.display = 'none';
            } else if (lobby.status === 'finished') {
                document.getElementById('waitingScreen').style.display = 'none';
                document.getElementById('questionScreen').style.display = 'none';
                document.getElementById('resultsScreen').style.display = 'block';
                showFinalResults(lobby.players);
                
                sendToTG(`🏁 ${currentUser.username} завершил игру с результатом ${myScore} очков`);
            }
        }

        function updatePlayersList(players) {
            if (!players) return;

            const playersCount = document.getElementById('playersCount');
            const playersList = document.getElementById('playersList');
            
            if (playersCount) {
                playersCount.textContent = `Игроков: ${Object.keys(players).length}`;
            }

            if (playersList) {
                let html = '';
                for (let [name, data] of Object.entries(players)) {
                    html += `
                        <div class="player-mini-card">
                            <div class="player-mini-avatar">${name.charAt(0).toUpperCase()}</div>
                            <div>${name}</div>
                            <div style="font-size: 0.8rem;">🎯 ${data.score || 0}</div>
                        </div>
                    `;
                }
                playersList.innerHTML = html;
            }
        }

        function showFinalResults(players) {
            const finalList = document.getElementById('finalPlayersList');
            if (!finalList) return;

            const sorted = Object.entries(players).sort((a, b) => (b[1].score || 0) - (a[1].score || 0));
            
            let html = '';
            for (let [name, data] of sorted) {
                const isMe = name === playerName;
                html += `
                    <div class="player-mini-card" style="${isMe ? 'border-color: #10b981; border-width: 3px;' : ''}">
                        <div class="player-mini-avatar">${name.charAt(0).toUpperCase()}</div>
                        <div>${name} ${isMe ? '⭐' : ''}</div>
                        <div style="font-size: 0.9rem; color: #10b981;">${data.score || 0}</div>
                    </div>
                `;
            }
            finalList.innerHTML = html;
            
            document.getElementById('finalScore').textContent = myScore;
        }

        function showQuestion(question, index) {
            document.getElementById('waitingScreen').style.display = 'none';
            document.getElementById('questionScreen').style.display = 'block';
            document.getElementById('resultsScreen').style.display = 'none';

            currentQuestionIndex = index;
            hasAnswered = false;

            document.getElementById('questionCounter').textContent = `Вопрос ${index + 1}/${questions.length}`;
            document.getElementById('questionText').textContent = question.question;

            // Перемешиваем варианты
            const shuffled = shuffleOptions(question);
            
            let html = '';
            shuffled.options.forEach((opt, i) => {
                html += `
                    <div class="option" onclick="selectAnswer(${i}, ${shuffled.correctIndex})">
                        <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                        <div>${opt}</div>
                    </div>
                `;
            });
            document.getElementById('optionsContainer').innerHTML = html;

            const statusEl = document.getElementById('statusMessage');
            statusEl.className = 'status-message';
            statusEl.textContent = '⏳ Выберите ответ';
        }

        function shuffleOptions(question) {
            const options = [...question.answers];
            const correctIndex = question.correct;
            const correctValue = options[correctIndex];
            
            for (let i = options.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [options[i], options[j]] = [options[j], options[i]];
            }
            
            const newCorrectIndex = options.indexOf(correctValue);
            
            return {
                options: options,
                correctIndex: newCorrectIndex
            };
        }

        window.selectAnswer = async function(selectedIndex, correctIndex) {
            if (hasAnswered) return;
            hasAnswered = true;

            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            document.querySelectorAll('.option')[selectedIndex].classList.add('selected');

            const isCorrect = (selectedIndex === correctIndex);

            const statusEl = document.getElementById('statusMessage');
            statusEl.className = isCorrect ? 'status-message status-correct' : 'status-message status-wrong';
            statusEl.textContent = isCorrect ? '✅ Правильно!' : '❌ Неправильно';

            if (isCorrect) {
                myScore += 1;
                document.getElementById('playerScore').textContent = myScore;

                try {
                    const players = currentLobby.players || {};
                    if (players[playerName]) {
                        players[playerName].score = myScore;
                        players[playerName].last_answer = currentQuestionIndex;
                        players[playerName].last_correct = isCorrect ? currentQuestionIndex : null;
                        await sb.from('lobbies').update({ players: players }).eq('id', currentLobby.id);
                    }
                } catch (error) {
                    console.error('Ошибка обновления счета:', error);
                }
            }
        };

        function showError(msg) {
            const errorEl = document.getElementById('errorMsg');
            if (errorEl) {
                errorEl.textContent = msg;
                errorEl.style.display = 'block';
                setTimeout(() => {
                    errorEl.style.display = 'none';
                }, 3000);
            } else {
                alert(msg);
            }
        }

        init();
    </script>
</body>
</html>
