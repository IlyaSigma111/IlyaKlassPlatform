<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Результаты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* ТЕМЫ */
        body.pink-theme { background: linear-gradient(135deg, #fbc7d1 0%, #f8cdda 100%); color: #4a4a4a; }
        body.pink-theme .stat-card { background: rgba(255, 240, 245, 0.7); }
        
        body.blue-theme { background: linear-gradient(135deg, #6dd5ed 0%, #2193b0 100%); color: white; }
        body.blue-theme .stat-card { background: rgba(255, 255, 255, 0.2); }
        
        body.green-theme { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); color: #2d4a1e; }
        body.green-theme .stat-card { background: rgba(255, 255, 255, 0.3); }
        
        body.purple-theme { background: linear-gradient(135deg, #b993d6 0%, #8ca6db 100%); color: #2d2d5a; }
        body.orange-theme { background: linear-gradient(135deg, #f9d423 0%, #f83600 100%); color: #4a2a1a; }
        body.dark-theme { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-link.active {
            background: #6366f1;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
        }

        .coins {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .results-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #6366f1;
        }

        .section-title {
            font-size: 1.8rem;
            color: #6366f1;
            margin: 30px 0 20px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 30px;
            overflow: hidden;
        }

        .results-table th {
            background: rgba(99, 102, 241, 0.3);
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .results-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .results-table tr:last-child td {
            border-bottom: none;
        }

        .results-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .score-cell {
            color: #10b981;
            font-weight: 700;
        }

        .glow-name {
            color: #6366f1;
            font-weight: 700;
            text-shadow: 0 0 10px #6366f1;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6366f1;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .filters {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .filter-btn.active {
            background: #6366f1;
        }

        @media (max-width: 768px) {
            .stats-cards {
                grid-template-columns: 1fr;
            }
            .results-table {
                font-size: 0.9rem;
            }
            .results-table th,
            .results-table td {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-small" onclick="window.location='index.html'">
            <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="shop.html" class="nav-link">Магазин</a>
            <a href="results.html" class="nav-link active">Результаты</a>
            <a href="profile.html" class="nav-link">Профиль</a>
        </nav>
        <div class="header-right" id="userSection"></div>
    </header>

    <main class="container">
        <div id="content" class="loading">Загрузка результатов...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let userName = '';
        let userCoins = 0;
        let allResults = [];
        let allUsers = [];
        let currentFilter = 'all';

        // ===== ТЕМА =====
        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
        }

        // ===== ПОЛЬЗОВАТЕЛЬ =====
        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            if (currentUser) {
                s.innerHTML = `
                    <div class="user-card">
                        <div class="avatar">${userName.charAt(0).toUpperCase()}</div>
                        <span>${userName}</span>
                        <span class="coins"><i class="fas fa-coins"></i> ${userCoins}</span>
                        <button onclick="logout()" class="logout-btn">Выйти</button>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // ===== ЗАГРУЗКА РЕЗУЛЬТАТОВ =====
        async function loadResults() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            userName = user.username;
            userCoins = user.coins || 0;

            // Применяем тему
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            updateUI();

            // Загружаем все результаты
            const { data: results } = await sb.from('results').select('*');
            const { data: users } = await sb.from('users').select('*');
            
            allResults = results || [];
            allUsers = users || [];

            renderContent();
        }

        function renderContent() {
            const c = document.getElementById('content');

            if (allResults.length === 0) {
                c.innerHTML = `
                    <div class="results-container">
                        <h2 style="color: #6366f1; margin-bottom: 30px;">📊 Результаты</h2>
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>Пока нет результатов</p>
                        </div>
                    </div>
                `;
                return;
            }

            // Общая статистика
            const totalResults = allResults.length;
            const totalScore = allResults.reduce((sum, r) => sum + (r.score || 0), 0);
            const avgScore = (totalScore / totalResults).toFixed(1);
            const uniqueQuizzes = new Set(allResults.map(r => r.quiz_id)).size;
            const uniqueStudents = new Set(allResults.map(r => r.student_id)).size;

            // Мои результаты
            const myResults = allResults.filter(r => r.student_id === currentUser.id);
            const myTotalScore = myResults.reduce((sum, r) => sum + (r.score || 0), 0);
            const myAvgScore = myResults.length ? (myTotalScore / myResults.length).toFixed(1) : 0;

            // Фильтруем результаты для таблицы
            let filteredResults = [...allResults];
            if (currentFilter === 'my') {
                filteredResults = myResults;
            } else if (currentFilter === 'best') {
                filteredResults = [...allResults].sort((a, b) => (b.score || 0) - (a.score || 0));
            }

            // Таблица результатов
            let tableRows = '';
            for (let r of filteredResults.slice(0, 50)) { // Показываем последние 50
                const date = r.date ? new Date(r.date).toLocaleString() : '';
                const student = allUsers.find(u => u.id === r.student_id);
                const studentName = student?.username || r.student_name || 'Неизвестно';
                const isMe = r.student_id === currentUser.id;
                
                tableRows += `
                    <tr>
                        <td class="${isMe ? 'glow-name' : ''}">${studentName} ${isMe ? '⭐' : ''}</td>
                        <td>${r.quiz_title || '?'}</td>
                        <td class="score-cell">${r.score || 0}/${r.max_score || 0}</td>
                        <td>${date}</td>
                    </tr>
                `;
            }

            c.innerHTML = `
                <div class="results-container">
                    <h2 style="color: #6366f1; margin-bottom: 30px;">📊 Статистика</h2>
                    
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="stat-value">${totalResults}</div>
                            <div>Всего результатов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${uniqueQuizzes}</div>
                            <div>Викторин</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${uniqueStudents}</div>
                            <div>Учеников</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${avgScore}</div>
                            <div>Средний балл</div>
                        </div>
                    </div>
                    
                    <h3 class="section-title">📋 Мои результаты</h3>
                    <div class="stats-cards" style="grid-template-columns: repeat(3, 1fr);">
                        <div class="stat-card">
                            <div class="stat-value">${myResults.length}</div>
                            <div>Пройдено</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${myTotalScore}</div>
                            <div>Мои баллы</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${myAvgScore}</div>
                            <div>Мой средний</div>
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px;">
                        <h3 class="section-title" style="margin:0;">📋 Все результаты</h3>
                        <div class="filters">
                            <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="filterResults('all')">Все</button>
                            <button class="filter-btn ${currentFilter === 'my' ? 'active' : ''}" onclick="filterResults('my')">Мои</button>
                            <button class="filter-btn ${currentFilter === 'best' ? 'active' : ''}" onclick="filterResults('best')">Лучшие</button>
                        </div>
                    </div>

                    <div style="overflow-x: auto;">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>Ученик</th>
                                    <th>Викторина</th>
                                    <th>Баллы</th>
                                    <th>Дата</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows || '<tr><td colspan="4" style="text-align:center;">Нет результатов</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        window.filterResults = function(filter) {
            currentFilter = filter;
            renderContent();
        };

        // Запуск
        loadResults();
    </script>
</body>
</html>
