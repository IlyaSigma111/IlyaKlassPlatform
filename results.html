<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Результаты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
        }

        body.light-theme {
            background: #f0f0f0;
            color: #333;
        }

        .header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.light-theme .header {
            background: #fff;
            border-bottom: 2px solid #6366f1;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .logo-il { color: #6366f1; }
        .logo-yaclass { color: #f59e0b; }

        .nav-menu {
            display: flex;
            gap: 10px;
        }

        .nav-link {
            padding: 8px 15px;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
        }

        body.light-theme .nav-link {
            background: #e0e0e0;
            color: #333;
        }

        .nav-link.active {
            background: #6366f1;
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 5px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #6366f1;
        }

        .logout-btn, .theme-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            background: #6366f1;
            color: white;
            cursor: pointer;
        }

        .main-container {
            max-width: 1300px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .results-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 20px;
        }

        body.light-theme .results-container {
            background: white;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 15px;
            text-align: center;
        }

        body.light-theme .stat-card {
            background: #f9f9f9;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #6366f1;
        }

        .results-filters {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px;
            border-radius: 3px;
            border: 1px solid #6366f1;
            background: rgba(0,0,0,0.2);
            color: white;
            min-width: 180px;
            flex: 1;
        }

        body.light-theme .filter-select {
            background: white;
            color: #333;
        }

        .export-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .results-table th {
            background: rgba(99,102,241,0.1);
            padding: 10px;
            text-align: left;
        }

        .results-table td {
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        body.light-theme .results-table td {
            border-bottom-color: #ddd;
        }

        .score-cell {
            color: #6366f1;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        @media (max-width: 768px) {
            .results-filters {
                flex-direction: column;
            }
            .filter-select {
                width: 100%;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link active">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка результатов...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function cleanDisplayName(name) {
            return name ? name.replace(/\s*\(\d+\)$/, '') : name;
        }

        function getCurrentSimpleUser() {
            const u = localStorage.getItem('currentSimpleUser');
            return u ? JSON.parse(u) : null;
        }

        const DEFAULT_AVATAR = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#6366f1"/></svg>';

        let currentUser = null;
        let userRole = null;
        let userFullName = null;
        let userIsModerator = false;
        let allResults = [];
        let allStudents = [];

        function toggleTheme() {
            const b = document.body;
            const t = document.getElementById('themeToggle');
            if (b.classList.contains('dark-theme')) {
                b.classList.replace('dark-theme', 'light-theme');
                t.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                b.classList.replace('light-theme', 'dark-theme');
                t.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        (async function init() {
            const simple = getCurrentSimpleUser();
            if (simple) {
                currentUser = { id: simple.id, email: simple.username+'@local', username: simple.username };
                userRole = simple.role;
                userFullName = simple.fullName || simple.username;
                userIsModerator = simple.isModerator || false;
                updateUI();
                loadResults();
            } else {
                window.location.href = 'index.html';
            }
        })();

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            const dn = cleanDisplayName(userFullName || currentUser.username);
            let rt = '';
            if (userRole === 'developer') rt = '👑 Разработчик';
            else if (userIsModerator) rt = '🛡️ Модератор';
            else rt = userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик';
            s.innerHTML = '<div class="user-card"><div class="avatar" style="background:#6366f1;"></div><span>' + dn + '</span><span>' + rt + '</span><button onclick="signOut()" class="logout-btn">Выйти</button></div>';
        }

        function signOut() {
            localStorage.removeItem('currentSimpleUser');
            window.location.href = 'index.html';
        }

        async function loadResults() {
            const c = document.getElementById('content');
            
            const { data: results } = await supabase.from('results').select('*');
            const { data: simpleUsers } = await supabase.from('simple_users').select('*');
            
            if (!results || !results.length) {
                c.innerHTML = '<div class="results-container"><h2 style="color:#6366f1;">📊 Результаты</h2><p>Пока нет результатов</p></div>';
                return;
            }

            allResults = results;
            allStudents = simpleUsers || [];

            if (userRole === 'teacher' || userRole === 'developer' || userIsModerator) {
                renderTeacherResults();
            } else {
                renderStudentResults();
            }
        }

        function renderTeacherResults() {
            const c = document.getElementById('content');
            
            let totalQuizzes = 0;
            let seen = {};
            for (let i = 0; i < allResults.length; i++) {
                let t = allResults[i].quiz_title;
                if (!seen[t]) {
                    seen[t] = true;
                    totalQuizzes++;
                }
            }
            
            let totalStudents = 0;
            seen = {};
            for (let i = 0; i < allResults.length; i++) {
                let sid = allResults[i].student_id;
                if (!seen[sid]) {
                    seen[sid] = true;
                    totalStudents++;
                }
            }
            
            let sum = 0;
            for (let i = 0; i < allResults.length; i++) {
                sum += allResults[i].score || 0;
            }
            let avg = (sum / allResults.length).toFixed(1);
            
            let subjects = [];
            let subjectsSeen = {};
            for (let i = 0; i < allResults.length; i++) {
                let s = allResults[i].quiz_subject;
                if (s && !subjectsSeen[s]) {
                    subjectsSeen[s] = true;
                    subjects.push(s);
                }
            }
            
            let quizTitles = [];
            let quizSeen = {};
            for (let i = 0; i < allResults.length; i++) {
                let t = allResults[i].quiz_title;
                if (t && !quizSeen[t]) {
                    quizSeen[t] = true;
                    quizTitles.push(t);
                }
            }
            
            let subjectOptions = '<option value="all">Все предметы</option>';
            for (let i = 0; i < subjects.length; i++) {
                subjectOptions += '<option value="' + subjects[i] + '">' + subjects[i] + '</option>';
            }
            
            let quizOptions = '<option value="all">Все викторины</option>';
            for (let i = 0; i < quizTitles.length; i++) {
                quizOptions += '<option value="' + quizTitles[i] + '">' + quizTitles[i] + '</option>';
            }
            
            let studentOptions = '<option value="all">Все ученики</option>';
            for (let i = 0; i < allStudents.length; i++) {
                let s = allStudents[i];
                let name = s.full_name || s.username;
                studentOptions += '<option value="' + s.id + '">' + name + '</option>';
            }
            
            c.innerHTML = '<div class="results-container"><h2 style="color:#6366f1;margin-bottom:20px;">📊 Все результаты</h2><div class="stats-cards"><div class="stat-card"><div class="stat-value">' + allResults.length + '</div><div>Всего</div></div><div class="stat-card"><div class="stat-value">' + totalQuizzes + '</div><div>Викторин</div></div><div class="stat-card"><div class="stat-value">' + totalStudents + '</div><div>Учеников</div></div><div class="stat-card"><div class="stat-value">' + avg + '</div><div>Средний</div></div></div><button class="export-btn" onclick="exportResults()">📥 Экспорт CSV</button><div class="results-filters"><select class="filter-select" id="subjectFilter" onchange="filterResults()">' + subjectOptions + '</select><select class="filter-select" id="quizFilter" onchange="filterResults()">' + quizOptions + '</select><select class="filter-select" id="studentFilter" onchange="filterResults()">' + studentOptions + '</select></div><div style="overflow-x:auto;"><table class="results-table"><thead><tr><th>Ученик</th><th>Предмет</th><th>Викторина</th><th>Баллы</th><th>Дата</th></tr></thead><tbody id="resultsBody">' + renderResultsRows(allResults) + '</tbody></table></div></div>';
        }

        function renderStudentResults() {
            const c = document.getElementById('content');
            let myResults = [];
            for (let i = 0; i < allResults.length; i++) {
                if (allResults[i].student_id === currentUser.id) {
                    myResults.push(allResults[i]);
                }
            }
            let totalScore = 0;
            for (let i = 0; i < myResults.length; i++) {
                totalScore += myResults[i].score || 0;
            }
            let avg = myResults.length ? (totalScore / myResults.length).toFixed(1) : 0;
            
            let rows = '';
            for (let i = 0; i < myResults.length; i++) {
                let r = myResults[i];
                let d = r.date ? new Date(r.date).toLocaleString() : '';
                rows += '<tr><td>' + (r.quiz_subject || '?') + '</td><td>' + (r.quiz_title || '?') + '</td><td class="score-cell">' + (r.score || 0) + '/' + (r.max_score || 0) + '</td><td>' + d + '</td></tr>';
            }
            
            c.innerHTML = '<div class="results-container"><h2 style="color:#6366f1;margin-bottom:20px;">📊 Мои результаты</h2><div class="stats-cards"><div class="stat-card"><div class="stat-value">' + myResults.length + '</div><div>Пройдено</div></div><div class="stat-card"><div class="stat-value">' + totalScore + '</div><div>Баллов</div></div><div class="stat-card"><div class="stat-value">' + avg + '</div><div>Средний</div></div></div><div style="overflow-x:auto;"><table class="results-table"><thead><tr><th>Предмет</th><th>Викторина</th><th>Баллы</th><th>Дата</th></tr></thead><tbody>' + rows + '</tbody></table></div>' + (myResults.length === 0 ? '<p style="margin-top:20px;">У вас пока нет результатов</p>' : '') + '</div>';
        }

        function renderResultsRows(results) {
            let html = '';
            for (let i = 0; i < results.length; i++) {
                let r = results[i];
                let student = null;
                for (let j = 0; j < allStudents.length; j++) {
                    if (allStudents[j].id === r.student_id) {
                        student = allStudents[j];
                        break;
                    }
                }
                let studentName = student ? (student.full_name || student.username) : 'Неизвестно';
                let d = r.date ? new Date(r.date).toLocaleString() : '';
                html += '<tr><td>' + studentName + '</td><td>' + (r.quiz_subject || '?') + '</td><td>' + (r.quiz_title || '?') + '</td><td class="score-cell">' + (r.score || 0) + '/' + (r.max_score || 0) + '</td><td>' + d + '</td></tr>';
            }
            return html;
        }

        window.filterResults = function() {
            let subject = document.getElementById('subjectFilter').value;
            let quiz = document.getElementById('quizFilter').value;
            let student = document.getElementById('studentFilter').value;
            
            let filtered = [];
            for (let i = 0; i < allResults.length; i++) {
                let r = allResults[i];
                if (subject !== 'all' && r.quiz_subject !== subject) continue;
                if (quiz !== 'all' && r.quiz_title !== quiz) continue;
                if (student !== 'all' && r.student_id !== student) continue;
                filtered.push(r);
            }
            document.getElementById('resultsBody').innerHTML = renderResultsRows(filtered);
        };

        window.exportResults = function() {
            let headers = ['Ученик','Предмет','Викторина','Баллы','Макс','Дата'];
            let rows = [];
            for (let i = 0; i < allResults.length; i++) {
                let r = allResults[i];
                let student = null;
                for (let j = 0; j < allStudents.length; j++) {
                    if (allStudents[j].id === r.student_id) {
                        student = allStudents[j];
                        break;
                    }
                }
                let studentName = student ? (student.full_name || student.username) : 'Неизвестно';
                let d = r.date ? new Date(r.date).toLocaleString() : '';
                rows.push([studentName, r.quiz_subject || '', r.quiz_title || '', r.score || 0, r.max_score || 0, d]);
            }
            let csv = headers.join(',') + '\n';
            for (let i = 0; i < rows.length; i++) {
                let row = rows[i];
                csv += '"' + row.join('","') + '"\n';
            }
            let blob = new Blob(['\uFEFF' + csv], {type: 'text/csv'});
            let a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'results.csv';
            a.click();
        };
    </script>
</body>
</html>
