<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Результаты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.pink-theme { background: linear-gradient(135deg, #fbc7d1 0%, #f8cdda 100%); color: #4a4a4a; }
        body.blue-theme { background: linear-gradient(135deg, #6dd5ed 0%, #2193b0 100%); color: white; }
        body.green-theme { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); color: #2d4a1e; }
        body.purple-theme { background: linear-gradient(135deg, #b993d6 0%, #8ca6db 100%); color: #2d2d5a; }
        body.orange-theme { background: linear-gradient(135deg, #f9d423 0%, #f83600 100%); color: #4a2a1a; }
        body.dark-theme { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-link.active {
            background: #6366f1;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
        }

        .results-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #6366f1;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .results-table th {
            background: rgba(99, 102, 241, 0.3);
            padding: 15px;
            text-align: left;
            border-radius: 20px 20px 0 0;
        }

        .results-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .score-cell {
            color: #10b981;
            font-weight: 700;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6366f1;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-small" onclick="window.location='index.html'">
            <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="results.html" class="nav-link active">Результаты</a>
            <a href="profile.html" class="nav-link">Профиль</a>
        </nav>
        <div class="header-right" id="userSection"></div>
    </header>

    <main class="container">
        <div id="content" class="loading">Загрузка результатов...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let userName = '';

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            if (currentUser) {
                s.innerHTML = `
                    <div class="user-card">
                        <div class="avatar">${userName.charAt(0).toUpperCase()}</div>
                        <span>${userName}</span>
                        <button onclick="logout()" class="logout-btn">Выйти</button>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadResults() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            userName = user.username;

            // Применяем тему
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            updateUI();

            const { data: results } = await sb.from('results').select('*');
            const { data: users } = await sb.from('users').select('*');
            
            const c = document.getElementById('content');

            if (!results || results.length === 0) {
                c.innerHTML = `
                    <div class="results-container">
                        <h2 style="color: #6366f1;">📊 Результаты</h2>
                        <p style="text-align: center; margin-top: 30px;">Пока нет результатов</p>
                    </div>
                `;
                return;
            }

            // Общая статистика
            let totalScore = 0;
            let totalQuizzes = new Set();
            for (let r of results) {
                totalScore += r.score || 0;
                totalQuizzes.add(r.quiz_id);
            }
            let avgScore = (totalScore / results.length).toFixed(1);

            // Мои результаты
            let myResults = results.filter(r => r.student_id === currentUser.id);
            let myTotal = 0;
            for (let r of myResults) myTotal += r.score || 0;
            let myAvg = myResults.length ? (myTotal / myResults.length).toFixed(1) : 0;

            // Таблица результатов
            let tableRows = '';
            for (let r of results) {
                let date = r.date ? new Date(r.date).toLocaleString() : '';
                let studentName = r.student_name || 'Неизвестно';
                tableRows += `
                    <tr>
                        <td>${studentName}</td>
                        <td>${r.quiz_title || '?'}</td>
                        <td class="score-cell">${r.score || 0}/${r.max_score || 0}</td>
                        <td>${date}</td>
                    </tr>
                `;
            }

            c.innerHTML = `
                <div class="results-container">
                    <h2 style="color: #6366f1; margin-bottom: 30px;">📊 Статистика</h2>
                    
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="stat-value">${results.length}</div>
                            <div>Всего результатов</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${totalQuizzes.size}</div>
                            <div>Всего викторин</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${avgScore}</div>
                            <div>Средний балл</div>
                        </div>
                    </div>
                    
                    <h3 style="color: #6366f1; margin: 30px 0 20px;">📋 Мои результаты</h3>
                    <div class="stats-cards">
                        <div class="stat-card">
                            <div class="stat-value">${myResults.length}</div>
                            <div>Пройдено</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${myTotal}</div>
                            <div>Мои баллы</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${myAvg}</div>
                            <div>Мой средний</div>
                        </div>
                    </div>

                    <h3 style="color: #6366f1; margin: 30px 0 20px;">📋 Все результаты</h3>
                    <div style="overflow-x: auto;">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>Ученик</th>
                                    <th>Викторина</th>
                                    <th>Баллы</th>
                                    <th>Дата</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
        }

        loadResults();
    </script>
</body>
</html>
