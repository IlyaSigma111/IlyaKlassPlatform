<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .header { background: #4CAF50; color: white; padding: 15px; margin-bottom: 20px; display: flex; gap: 20px; }
        .header a { color: white; text-decoration: none; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #4CAF50; color: white; }
        .filter-btn { background: #ddd; border: none; padding: 8px 16px; margin: 5px; cursor: pointer; border-radius: 5px; }
        .filter-btn.active { background: #4CAF50; color: white; }
        .top3 { display: flex; gap: 20px; margin-bottom: 30px; }
        .top-card { flex: 1; background: #f9f9f9; padding: 15px; text-align: center; border-radius: 10px; }
        .medal { font-size: 40px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 РЕЗУЛЬТАТЫ</h1>
            <div style="flex:1"></div>
            <a href="index.html">Главная</a>
            <a href="profile.html">Профиль</a>
        </div>

        <div id="top3" class="top3"></div>

        <div>
            <button class="filter-btn active" onclick="filterResults('all')">Все</button>
            <button class="filter-btn" onclick="filterResults('today')">Сегодня</button>
            <button class="filter-btn" onclick="filterResults('week')">Неделя</button>
            <button class="filter-btn" onclick="filterResults('month')">Месяц</button>
        </div>

        <div id="resultsTable"></div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        async function loadTop3() {
            const { data: results } = await sb.from('results').select('*');
            if (!results?.length) return;
            const players = {};
            results.forEach(r => {
                if (!players[r.player_name]) players[r.player_name] = { total: 0, games: 0 };
                players[r.player_name].total += r.score;
                players[r.player_name].games++;
            });
            const top = Object.entries(players).sort((a,b) => b[1].total - a[1].total).slice(0,3);
            const medals = ['🥇', '🥈', '🥉'];
            document.getElementById('top3').innerHTML = top.map(([name, data], i) => `
                <div class="top-card">
                    <div class="medal">${medals[i]}</div>
                    <div><b>${escapeHtml(name)}</b></div>
                    <div style="font-size:24px; color:#4CAF50">${data.total}</div>
                    <div>очков</div>
                    <div style="font-size:12px">${data.games} игр</div>
                </div>
            `).join('');
        }

        async function filterResults(filter) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            let query = sb.from('results').select('*, quizzes(title)').order('played_at', { ascending: false });
            const now = new Date();
            if (filter === 'today') {
                const start = new Date(now.setHours(0,0,0,0)).toISOString();
                query = query.gte('played_at', start);
            } else if (filter === 'week') {
                const start = new Date(now.setDate(now.getDate() - 7)).toISOString();
                query = query.gte('played_at', start);
            } else if (filter === 'month') {
                const start = new Date(now.setMonth(now.getMonth() - 1)).toISOString();
                query = query.gte('played_at', start);
            }
            
            const { data: results } = await query;
            const container = document.getElementById('resultsTable');
            if (!results?.length) {
                container.innerHTML = '<p>Нет результатов</p>';
                return;
            }
            container.innerHTML = `
                <table>
                    <tr><th>Игрок</th><th>Викторина</th><th>Результат</th><th>Дата</th></tr>
                    ${results.map(r => `
                        <tr>
                            <td>${escapeHtml(r.player_name)}</td>
                            <td>${escapeHtml(r.quizzes?.title)}</td>
                            <td><b>${r.score}/${r.max_score}</b></td>
                            <td>${new Date(r.played_at).toLocaleString()}</td>
                        </tr>
                    `).join('')}
                </table>
            `;
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        loadTop3();
        filterResults('all');
    </script>
</body>
</html>
