<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Результаты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== ТЕМЫ С ЧЕТКИМИ ГРАНИЦАМИ ===== */
        body.pink-theme { 
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); 
            color: #2d3436; 
        }
        body.pink-theme .nav-link,
        body.pink-theme .results-container,
        body.pink-theme .stat-card,
        body.pink-theme .user-card,
        body.pink-theme .filter-btn,
        body.pink-theme .results-table th,
        body.pink-theme .results-table td { 
            background: rgba(255, 255, 255, 0.9);
            color: #2d3436;
            border: 2px solid rgba(45, 52, 54, 0.2);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body.blue-theme { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            color: #1e3799; 
        }
        body.blue-theme .nav-link,
        body.blue-theme .results-container,
        body.blue-theme .stat-card,
        body.blue-theme .user-card,
        body.blue-theme .filter-btn { 
            background: rgba(255, 255, 255, 0.9);
            color: #1e3799;
            border: 2px solid rgba(30, 55, 153, 0.2);
        }
        
        body.green-theme { 
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); 
            color: #145a32; 
        }
        body.green-theme .nav-link,
        body.green-theme .results-container,
        body.green-theme .stat-card,
        body.green-theme .user-card,
        body.green-theme .filter-btn { 
            background: rgba(255, 255, 255, 0.9);
            color: #145a32;
            border: 2px solid rgba(20, 90, 50, 0.2);
        }
        
        body.dark-theme { 
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); 
            color: white; 
        }
        body.dark-theme .nav-link,
        body.dark-theme .results-container,
        body.dark-theme .stat-card,
        body.dark-theme .user-card,
        body.dark-theme .filter-btn { 
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* ===== АДАПТИВ ДЛЯ МОБИЛОК ===== */
        @media (max-width: 768px) {
            .container {
                padding: 8px;
                width: 100%;
            }
            
            .header {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                padding: 12px;
                margin-bottom: 15px;
            }
            
            .logo-small {
                font-size: 1.3rem;
                width: 100%;
                text-align: center;
                margin-bottom: 5px;
            }
            
            .nav-menu {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 4px;
            }
            
            .nav-link {
                padding: 8px 4px;
                font-size: 0.7rem;
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            .header-right {
                width: 100%;
            }
            
            .user-card {
                width: 100%;
                display: grid;
                grid-template-columns: auto 1fr auto auto;
                align-items: center;
                gap: 6px;
                padding: 6px 10px;
                font-size: 0.8rem;
            }
            
            .avatar {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
            
            .logout-btn {
                padding: 4px 8px;
                font-size: 0.7rem;
            }
            
            .results-container {
                padding: 20px;
                border-radius: 30px;
            }
            
            .stats-cards {
                grid-template-columns: 1fr;
                gap: 10px;
                margin: 20px 0;
            }
            
            .stat-card {
                padding: 15px;
            }
            
            .stat-value {
                font-size: 1.8rem;
            }
            
            .section-title {
                font-size: 1.3rem;
                margin: 20px 0 15px;
            }
            
            .filters {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                margin: 15px 0;
            }
            
            .filter-btn {
                padding: 8px 5px;
                font-size: 0.7rem;
                text-align: center;
            }
            
            .results-table {
                font-size: 0.7rem;
                display: block;
                overflow-x: auto;
                white-space: nowrap;
                border-radius: 20px;
            }
            
            .results-table th,
            .results-table td {
                padding: 8px 10px;
            }
        }

        @media (max-width: 480px) {
            .nav-menu {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .nav-link {
                font-size: 0.6rem;
                padding: 6px 2px;
            }
            
            .user-card {
                grid-template-columns: auto 1fr auto;
                gap: 4px;
            }
            
            .filters {
                grid-template-columns: 1fr;
            }
            
            .stats-cards {
                grid-template-columns: 1fr;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.3); }
        .nav-link.active { background: #6366f1; color: white; }

        .header-right { display: flex; align-items: center; gap: 20px; }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .logout-btn:hover { background: rgba(255, 255, 255, 0.3); }

        .coins { color: #ffd700; font-weight: 600; }

        .results-container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #6366f1;
        }

        .section-title {
            font-size: 1.8rem;
            color: #6366f1;
            margin: 30px 0 20px;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 30px;
            overflow: hidden;
        }

        .results-table th {
            background: rgba(99, 102, 241, 0.3);
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .results-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .results-table tr:last-child td { border-bottom: none; }
        .results-table tr:hover { background: rgba(255, 255, 255, 0.05); }

        .score-cell { color: #10b981; font-weight: 700; }
        .glow-name { color: #6366f1; font-weight: 700; text-shadow: 0 0 10px #6366f1; }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6366f1;
            font-size: 1.2rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        .empty-icon { font-size: 60px; margin-bottom: 20px; opacity: 0.5; }

        .filters {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .filter-btn.active { background: #6366f1; color: white; border-color: white; }

        .error-state {
            text-align: center;
            padding: 50px;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 40px;
        }

        .role-badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 16px;
            font-size: 0.6rem;
            margin-left: 4px;
        }
        .role-owner { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #2d3436; }
        .role-mediacoord { background: #c0c0c0; color: #2d3436; }
        .role-chief { background: #ffd700; color: #2d3436; }
        .role-curator { background: #cd7f32; color: white; }
        .role-moderator { background: #6366f1; color: white; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-small" onclick="window.location='index.html'">
            <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="shop.html" class="nav-link">Магазин</a>
            <a href="results.html" class="nav-link active">Результаты</a>
            <a href="profile.html" class="nav-link">Профиль</a>
        </nav>
        <div class="header-right" id="userSection"></div>
    </header>

    <main class="container">
        <div id="content" class="loading">Загрузка результатов...</div>
    </main>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let userName = '';
        let userCoins = 0;
        let userRole = '';
        let allResults = [];
        let allUsers = [];
        let allQuizzes = [];
        let currentFilter = 'all';

        async function sendToTG(message) {
            try { await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ chat_id:TG_CHAT_ID, text:message, parse_mode:'HTML' }) }); } catch(e) { console.error(e); }
        }

        function applyTheme(themeId) { document.body.className = themeId + '-theme'; }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s || !currentUser) return;
            
            const roleEmoji = { 'owner': '👑', 'mediacoord': '🎥', 'chief': '⭐', 'curator': '📚', 'moderator': '🛡️', 'user': '👤' }[currentUser.role_title] || '👤';
            const roleClass = { 'owner': 'role-owner', 'mediacoord': 'role-mediacoord', 'chief': 'role-chief', 'curator': 'role-curator', 'moderator': 'role-moderator', 'user': '' }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${userName.charAt(0).toUpperCase()}</div>
                    <span>${userName}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${userCoins}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
        }

        function logout() {
            sendToTG(`🚪 Выход из результатов: ${currentUser?.username}`);
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadResults() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }

            currentUser = user;
            userName = user.username;
            userCoins = user.coins || 0;
            userRole = user.role;

            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            updateUI();

            try {
                const { data: results } = await sb.from('results').select('*');
                const { data: users } = await sb.from('users').select('*');
                const { data: quizzes } = await sb.from('quizzes').select('*');
                
                allResults = results || [];
                allUsers = users || [];
                allQuizzes = quizzes || [];

                sendToTG(`📊 ${userName} просмотрел статистику (${allResults.length} результатов)`);

                renderContent();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('content').innerHTML = '<div class="error-state">❌ Ошибка загрузки результатов</div>';
            }
        }

        function renderContent() {
            const c = document.getElementById('content');

            if (allResults.length === 0) {
                c.innerHTML = `
                    <div class="results-container">
                        <h2 style="color: #6366f1; margin-bottom: 30px;">📊 Результаты</h2>
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>Пока нет результатов</p>
                            <p style="margin-top: 10px; opacity: 0.7;">Пройдите викторину, чтобы увидеть статистику</p>
                        </div>
                    </div>
                `;
                return;
            }

            const totalResults = allResults.length;
            const totalScore = allResults.reduce((sum, r) => sum + (r.score || 0), 0);
            const avgScore = (totalScore / totalResults).toFixed(1);
            const uniqueQuizzes = new Set(allResults.map(r => r.quiz_id)).size;
            const uniqueStudents = new Set(allResults.map(r => r.student_id)).size;

            const myResults = allResults.filter(r => r.student_id === currentUser.id);
            const myTotalScore = myResults.reduce((sum, r) => sum + (r.score || 0), 0);
            const myAvgScore = myResults.length ? (myTotalScore / myResults.length).toFixed(1) : 0;

            let filteredResults = [];
            if (userRole === 'teacher') {
                if (currentFilter === 'my') {
                    filteredResults = myResults;
                } else if (currentFilter === 'best') {
                    filteredResults = [...allResults].sort((a, b) => (b.score || 0) - (a.score || 0));
                } else {
                    filteredResults = [...allResults];
                }
            } else {
                filteredResults = myResults;
            }

            let tableRows = '';
            for (let r of filteredResults.slice(0, 50)) {
                const date = r.date ? new Date(r.date).toLocaleString() : '';
                const student = allUsers.find(u => u.id === r.student_id);
                const studentName = student?.username || r.student_name || 'Неизвестно';
                const isMe = r.student_id === currentUser.id;
                const quiz = allQuizzes.find(q => q.id === r.quiz_id);
                
                const roleEmoji = student?.role_title ? {
                    'owner': '👑', 'mediacoord': '🎥', 'chief': '⭐', 'curator': '📚', 'moderator': '🛡️', 'user': ''
                }[student.role_title] || '' : '';
                
                const roleClass = student?.role_title ? {
                    'owner': 'role-owner', 'mediacoord': 'role-mediacoord', 'chief': 'role-chief', 'curator': 'role-curator', 'moderator': 'role-moderator', 'user': ''
                }[student.role_title] || '' : '';
                
                tableRows += `
                    <tr>
                        <td class="${isMe ? 'glow-name' : ''}">
                            ${studentName} ${isMe ? '⭐' : ''}
                            ${student?.role_title && student.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${student.role_title}</span>` : ''}
                        </td>
                        <td>${quiz?.title || r.quiz_title || '?'}</td>
                        <td class="score-cell">${r.score || 0}/${r.max_score || 0}</td>
                        <td>${date}</td>
                    </tr>
                `;
            }

            let statsHtml = '';

            if (userRole === 'teacher') {
                statsHtml = `
                    <div class="stats-cards">
                        <div class="stat-card"><div class="stat-value">${totalResults}</div><div>Всего результатов</div></div>
                        <div class="stat-card"><div class="stat-value">${uniqueQuizzes}</div><div>Викторин</div></div>
                        <div class="stat-card"><div class="stat-value">${uniqueStudents}</div><div>Учеников</div></div>
                        <div class="stat-card"><div class="stat-value">${avgScore}</div><div>Средний балл</div></div>
                    </div>
                    
                    <h3 class="section-title">📋 Мои результаты</h3>
                    <div class="stats-cards" style="grid-template-columns: repeat(3, 1fr);">
                        <div class="stat-card"><div class="stat-value">${myResults.length}</div><div>Пройдено</div></div>
                        <div class="stat-card"><div class="stat-value">${myTotalScore}</div><div>Мои баллы</div></div>
                        <div class="stat-card"><div class="stat-value">${myAvgScore}</div><div>Мой средний</div></div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px; flex-wrap: wrap; gap: 15px;">
                        <h3 class="section-title" style="margin:0;">📋 Все результаты</h3>
                        <div class="filters">
                            <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="filterResults('all')">Все</button>
                            <button class="filter-btn ${currentFilter === 'my' ? 'active' : ''}" onclick="filterResults('my')">Мои</button>
                            <button class="filter-btn ${currentFilter === 'best' ? 'active' : ''}" onclick="filterResults('best')">Лучшие</button>
                        </div>
                    </div>
                `;
            } else {
                statsHtml = `
                    <div class="stats-cards" style="grid-template-columns: repeat(3, 1fr);">
                        <div class="stat-card"><div class="stat-value">${myResults.length}</div><div>Пройдено</div></div>
                        <div class="stat-card"><div class="stat-value">${myTotalScore}</div><div>Мои баллы</div></div>
                        <div class="stat-card"><div class="stat-value">${myAvgScore}</div><div>Средний балл</div></div>
                    </div>
                    
                    <h3 class="section-title" style="margin-top: 30px;">📋 Моя статистика</h3>
                `;
            }

            c.innerHTML = `
                <div class="results-container">
                    <h2 style="color: #6366f1; margin-bottom: 30px;">📊 Статистика</h2>
                    
                    ${statsHtml}

                    <div style="overflow-x: auto;">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>Ученик</th>
                                    <th>Викторина</th>
                                    <th>Баллы</th>
                                    <th>Дата</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows || '<tr><td colspan="4" style="text-align:center;">Нет результатов</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                    
                    ${filteredResults.length > 50 ? '<p style="text-align: center; margin-top: 15px; opacity: 0.7;">Показаны последние 50 результатов</p>' : ''}
                </div>
            `;
        }

        window.filterResults = function(filter) {
            currentFilter = filter;
            renderContent();
        };

        loadResults();
    </script>
</body>
</html>
