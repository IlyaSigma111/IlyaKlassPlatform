<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Результаты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* ТЕМЫ С ЧИТАЕМЫМ ТЕКСТОМ */
        body.pink-theme { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); 
            color: #2d3436; 
        }
        body.pink-theme .nav-link,
        body.pink-theme .results-container,
        body.pink-theme .stat-card,
        body.pink-theme .user-card,
        body.pink-theme .filter-btn,
        body.pink-theme .results-table th,
        body.pink-theme .results-table td,
        body.pink-theme .section-title,
        body.pink-theme .stat-value { 
            color: #2d3436; 
        }
        body.pink-theme .nav-link,
        body.pink-theme .results-container,
        body.pink-theme .stat-card,
        body.pink-theme .user-card,
        body.pink-theme .filter-btn,
        body.pink-theme .results-table th { 
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(45, 52, 54, 0.2);
        }
        body.pink-theme .results-table td { border-color: rgba(45, 52, 54, 0.1); }
        
        body.blue-theme { 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); 
            color: #1e3799; 
        }
        body.blue-theme .nav-link,
        body.blue-theme .results-container,
        body.blue-theme .stat-card,
        body.blue-theme .user-card,
        body.blue-theme .filter-btn { 
            color: #1e3799; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.green-theme { 
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); 
            color: #145a32; 
        }
        body.green-theme .nav-link,
        body.green-theme .results-container,
        body.green-theme .stat-card,
        body.green-theme .user-card,
        body.green-theme .filter-btn { 
            color: #145a32; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.purple-theme { 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); 
            color: #4a235a; 
        }
        body.purple-theme .nav-link,
        body.purple-theme .results-container,
        body.purple-theme .stat-card,
        body.purple-theme .user-card,
        body.purple-theme .filter-btn { 
            color: #4a235a; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.orange-theme { 
            background: linear-gradient(135deg, #fddb92 0%, #d1fdff 100%); 
            color: #b45f06; 
        }
        body.orange-theme .nav-link,
        body.orange-theme .results-container,
        body.orange-theme .stat-card,
        body.orange-theme .user-card,
        body.orange-theme .filter-btn { 
            color: #b45f06; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.dark-theme { 
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%); 
            color: white; 
        }
        body.dark-theme .nav-link,
        body.dark-theme .results-container,
        body.dark-theme .stat-card,
        body.dark-theme .user-card,
        body.dark-theme .filter-btn { 
            color: white; 
            background: rgba(255, 255, 255, 0.15);
        }
        
        body.sunset-theme { 
            background: linear-gradient(135deg, #ffd89b 0%, #ff9a9e 100%);

        }
        body.sunset-theme .nav-link,
        body.sunset-theme .results-container,
        body.sunset-theme .stat-card,
        body.sunset-theme .user-card,
        body.sunset-theme .filter-btn { 
            color: #b33939; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.ocean-theme { 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); 
            color: #0a3b5e; 
        }
        body.ocean-theme .nav-link,
        body.ocean-theme .results-container,
        body.ocean-theme .stat-card,
        body.ocean-theme .user-card,
        body.ocean-theme .filter-btn { 
            color: #0a3b5e;

        }
        
        body.forest-theme { 
            background: linear-gradient(135deg, #a8e6cf 0%, #d4edda 100%); 
            color: #1d5a3c; 
        }
        body.forest-theme .nav-link,
        body.forest-theme .results-container,
        body.forest-theme .stat-card,
        body.forest-theme .user-card,
        body.forest-theme .filter-btn { 
            color: #1d5a3c; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.candy-theme { 
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); 
            color: #6c3483; 
        }
        body.candy-theme .nav-link,
        body.candy-theme .results-container,
        body.candy-theme .stat-card,
        body.candy-theme .user-card,
        body.candy-theme .filter-btn { 
            color: #6c3483; 
            background: rgba(255, 255, 255, 0.4);
        }

        /* АДАПТИВ */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { flex-direction: column; gap: 15px; padding: 15px; }
            .nav-menu { width: 100%; justify-content: center; flex-wrap: wrap; }
            .nav-link { padding: 8px 12px; font-size: 0.85rem; }
            .user-card { width: 100%; justify-content: space-between; flex-wrap: wrap; }
            .stats-cards { grid-template-columns: 1fr; gap: 10px; }
            .results-container { padding: 20px; }
            .filters { width: 100%; justify-content: center; flex-wrap: wrap; }
            .filter-btn { flex: 1; text-align: center; padding: 8px 10px; font-size: 0.85rem; min-width: 80px; }
            .results-table { font-size: 0.8rem; display: block; overflow-x: auto; white-space: nowrap; }
            .results-table th, .results-table td { padding: 8px 10px; }
            .stat-card { padding: 15px; }
            .stat-value { font-size: 2rem; }
            .section-title { font-size: 1.3rem; }
        }

        @media (max-width: 480px) {
            .nav-link { width: calc(50% - 3px); text-align: center; padding: 8px 5px; font-size: 0.75rem; }
            .user-card { justify-content: center; }
            .avatar { width: 35px; height: 35px; }
            .logout-btn { width: 100%; text-align: center; }
            .stats-cards { grid-template-columns: 1fr; }
            .filters { flex-direction: column; gap: 5px; }
            .filter-btn { width: 100%; }
            .stat-value { font-size: 1.8rem; }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            width: 100%;
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.2); }
        .nav-link.active { background: #6366f1; color: white; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .logout-btn:hover { background: rgba(255, 255, 255, 0.3); }

        .coins { color: #ffd700; font-weight: 600; font-size: 1.1rem; }

        .results-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            width: 100%;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #6366f1;
        }

        .section-title {
            font-size: 1.8rem;
            color: #6366f1;
            margin: 30px 0 20px;
            word-break: break-word;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            border-radius: 30px;
            overflow: hidden;
        }

        .results-table th {
            background: rgba(99, 102, 241, 0.3);
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .results-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .results-table tr:last-child td { border-bottom: none; }
        .results-table tr:hover { background: rgba(255, 255, 255, 0.05); }

        .score-cell { color: #10b981; font-weight: 700; }
        .glow-name { color: #6366f1; font-weight: 700; text-shadow: 0 0 10px #6366f1; }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6366f1;
            font-size: 1.2rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 40px;
        }

        .empty-icon { font-size: 60px; margin-bottom: 20px; opacity: 0.5; }

        .filters {
            display: flex;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-family: 'Comfortaa', cursive;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .filter-btn.active { background: #6366f1; color: white; }

        .error-state {
            text-align: center;
            padding: 50px;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 40px;
        }

        .role-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-left: 5px;
        }
        .role-owner { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #2d3436; }
        .role-mediacoord { background: #c0c0c0; color: #2d3436; }
        .role-chief { background: #ffd700; color: #2d3436; }
        .role-curator { background: #cd7f32; color: white; }
        .role-moderator { background: #6366f1; color: white; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-small" onclick="window.location='index.html'">
            <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="shop.html" class="nav-link">Магазин</a>
            <a href="results.html" class="nav-link active">Результаты</a>
            <a href="profile.html" class="nav-link">Профиль</a>
        </nav>
        <div class="header-right" id="userSection"></div>
    </header>

    <main class="container">
        <div id="content" class="loading">Загрузка результатов...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let userName = '';
        let userCoins = 0;
        let userRole = '';
        let allResults = [];
        let allUsers = [];
        let allQuizzes = [];
        let currentFilter = 'all';

        async function sendToTG(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch (e) { console.error('Ошибка ТГ:', e); }
        }

        function applyTheme(themeId) { document.body.className = themeId + '-theme'; }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s || !currentUser) return;
            
            const roleEmoji = {
                'owner': '👑',
                'mediacoord': '🎥',
                'chief': '⭐',
                'curator': '📚',
                'moderator': '🛡️',
                'user': '👤'
            }[currentUser.role_title] || '👤';
            
            const roleClass = {
                'owner': 'role-owner',
                'mediacoord': 'role-mediacoord',
                'chief': 'role-chief',
                'curator': 'role-curator',
                'moderator': 'role-moderator',
                'user': ''
            }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${userName.charAt(0).toUpperCase()}</div>
                    <span>${userName}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${userCoins}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
        }

        function logout() {
            sendToTG(`🚪 Выход из результатов: ${currentUser?.username}`);
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadResults() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }

            currentUser = user;
            userName = user.username;
            userCoins = user.coins || 0;
            userRole = user.role;

            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            updateUI();

            try {
                const { data: results } = await sb.from('results').select('*');
                const { data: users } = await sb.from('users').select('*');
                const { data: quizzes } = await sb.from('quizzes').select('*');
                
                allResults = results || [];
                allUsers = users || [];
                allQuizzes = quizzes || [];

                sendToTG(`📊 ${userName} просмотрел статистику (${allResults.length} результатов)`);

                renderContent();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('content').innerHTML = '<div class="error-state">❌ Ошибка загрузки результатов</div>';
            }
        }

        function renderContent() {
            const c = document.getElementById('content');

            if (allResults.length === 0) {
                c.innerHTML = `
                    <div class="results-container">
                        <h2 style="color: #6366f1; margin-bottom: 30px;">📊 Результаты</h2>
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <p>Пока нет результатов</p>
                            <p style="margin-top: 10px; opacity: 0.7;">Пройдите викторину, чтобы увидеть статистику</p>
                        </div>
                    </div>
                `;
                return;
            }

            const totalResults = allResults.length;
            const totalScore = allResults.reduce((sum, r) => sum + (r.score || 0), 0);
            const avgScore = (totalScore / totalResults).toFixed(1);
            const uniqueQuizzes = new Set(allResults.map(r => r.quiz_id)).size;
            const uniqueStudents = new Set(allResults.map(r => r.student_id)).size;

            const myResults = allResults.filter(r => r.student_id === currentUser.id);
            const myTotalScore = myResults.reduce((sum, r) => sum + (r.score || 0), 0);
            const myAvgScore = myResults.length ? (myTotalScore / myResults.length).toFixed(1) : 0;

            let filteredResults = [];
            if (userRole === 'teacher') {
                if (currentFilter === 'my') {
                    filteredResults = myResults;
                } else if (currentFilter === 'best') {
                    filteredResults = [...allResults].sort((a, b) => (b.score || 0) - (a.score || 0));
                } else {
                    filteredResults = [...allResults];
                }
            } else {
                filteredResults = myResults;
            }

            let tableRows = '';
            for (let r of filteredResults.slice(0, 50)) {
                const date = r.date ? new Date(r.date).toLocaleString() : '';
                const student = allUsers.find(u => u.id === r.student_id);
                const studentName = student?.username || r.student_name || 'Неизвестно';
                const isMe = r.student_id === currentUser.id;
                const quiz = allQuizzes.find(q => q.id === r.quiz_id);
                
                const roleEmoji = student?.role_title ? {
                    'owner': '👑',
                    'mediacoord': '🎥',
                    'chief': '⭐',
                    'curator': '📚',
                    'moderator': '🛡️',
                    'user': ''
                }[student.role_title] || '' : '';
                
                const roleClass = student?.role_title ? {
                    'owner': 'role-owner',
                    'mediacoord': 'role-mediacoord',
                    'chief': 'role-chief',
                    'curator': 'role-curator',
                    'moderator': 'role-moderator',
                    'user': ''
                }[student.role_title] || '' : '';
                
                tableRows += `
                    <tr>
                        <td class="${isMe ? 'glow-name' : ''}">
                            ${studentName} ${isMe ? '⭐' : ''}
                            ${student?.role_title && student.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${student.role_title}</span>` : ''}
                        </td>
                        <td>${quiz?.title || r.quiz_title || '?'}</td>
                        <td class="score-cell">${r.score || 0}/${r.max_score || 0}</td>
                        <td>${date}</td>
                    </tr>
                `;
            }

            let statsHtml = '';

            if (userRole === 'teacher') {
                statsHtml = `
                    <div class="stats-cards">
                        <div class="stat-card"><div class="stat-value">${totalResults}</div><div>Всего результатов</div></div>
                        <div class="stat-card"><div class="stat-value">${uniqueQuizzes}</div><div>Викторин</div></div>
                        <div class="stat-card"><div class="stat-value">${uniqueStudents}</div><div>Учеников</div></div>
                        <div class="stat-card"><div class="stat-value">${avgScore}</div><div>Средний балл</div></div>
                    </div>
                    
                    <h3 class="section-title">📋 Мои результаты</h3>
                    <div class="stats-cards" style="grid-template-columns: repeat(3, 1fr);">
                        <div class="stat-card"><div class="stat-value">${myResults.length}</div><div>Пройдено</div></div>
                        <div class="stat-card"><div class="stat-value">${myTotalScore}</div><div>Мои баллы</div></div>
                        <div class="stat-card"><div class="stat-value">${myAvgScore}</div><div>Мой средний</div></div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0 20px; flex-wrap: wrap; gap: 15px;">
                        <h3 class="section-title" style="margin:0;">📋 Все результаты</h3>
                        <div class="filters">
                            <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" onclick="filterResults('all')">Все</button>
                            <button class="filter-btn ${currentFilter === 'my' ? 'active' : ''}" onclick="filterResults('my')">Мои</button>
                            <button class="filter-btn ${currentFilter === 'best' ? 'active' : ''}" onclick="filterResults('best')">Лучшие</button>
                        </div>
                    </div>
                `;
            } else {
                statsHtml = `
                    <div class="stats-cards" style="grid-template-columns: repeat(3, 1fr);">
                        <div class="stat-card"><div class="stat-value">${myResults.length}</div><div>Пройдено</div></div>
                        <div class="stat-card"><div class="stat-value">${myTotalScore}</div><div>Мои баллы</div></div>
                        <div class="stat-card"><div class="stat-value">${myAvgScore}</div><div>Средний балл</div></div>
                    </div>
                    
                    <h3 class="section-title" style="margin-top: 30px;">📋 Моя статистика</h3>
                `;
            }

            c.innerHTML = `
                <div class="results-container">
                    <h2 style="color: #6366f1; margin-bottom: 30px;">📊 Статистика</h2>
                    
                    ${statsHtml}

                    <div style="overflow-x: auto;">
                        <table class="results-table">
                            <thead>
                                <tr>
                                    <th>Ученик</th>
                                    <th>Викторина</th>
                                    <th>Баллы</th>
                                    <th>Дата</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows || '<tr><td colspan="4" style="text-align:center;">Нет результатов</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                    
                    ${filteredResults.length > 50 ? '<p style="text-align: center; margin-top: 15px; opacity: 0.7;">Показаны последние 50 результатов</p>' : ''}
                </div>
            `;
        }

        window.filterResults = function(filter) {
            currentFilter = filter;
            renderContent();
        };

        loadResults();
    </script>
</body>
</html>
