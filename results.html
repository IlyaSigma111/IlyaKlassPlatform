<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Результаты</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --dark-bg: #0a0c14;
            --dark-card: #151823;
            --light-bg: #f3f4f6;
            --light-card: #ffffff;
        }

        body {
            background: var(--dark-bg);
            color: white;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.light-theme {
            background: var(--light-bg);
            color: #1f2937;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px #6366f1, 0 0 10px #6366f1, 0 0 15px #6366f1; }
            50% { text-shadow: 0 0 10px #f59e0b, 0 0 20px #f59e0b, 0 0 30px #f59e0b; }
            100% { text-shadow: 0 0 5px #6366f1, 0 0 10px #6366f1, 0 0 15px #6366f1; }
        }

        .glow-name {
            animation: glow 3s infinite;
            background: linear-gradient(135deg, #6366f1, #f59e0b, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .header {
            background: rgba(21, 24, 35, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--primary);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        body.light-theme .header {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 2px solid var(--primary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            cursor: pointer;
        }

        .logo-il {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-yaclass {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 18px;
            border-radius: 30px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: inherit;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(99, 102, 241, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
            border: 1px solid var(--primary);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #f59e0b);
        }

        .logout-btn, .theme-btn {
            padding: 7px 16px;
            border-radius: 30px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary);
            color: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover, .theme-btn:hover {
            background: var(--primary);
            color: white;
        }

        .main-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .results-container {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 30px;
        }

        body.light-theme .results-container {
            background: rgba(255, 255, 255, 0.9);
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: rgba(99, 102, 241, 0.1);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: var(--primary);
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .results-table th {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }

        .results-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
        }

        .score-cell {
            color: var(--primary);
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--primary);
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="results.html" class="nav-link active">Результаты</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка результатов...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let userName = '';

        function toggleTheme() {
            const b = document.body;
            const t = document.getElementById('themeToggle');
            if (b.classList.contains('dark-theme')) {
                b.classList.replace('dark-theme', 'light-theme');
                t.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                b.classList.replace('light-theme', 'dark-theme');
                t.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            if (currentUser) {
                s.innerHTML = '<div class="user-card"><div class="avatar"></div><span class="' + (userName === 'Ильяблоко' ? 'glow-name' : '') + '">' + userName + '</span><button onclick="logout()" class="logout-btn">Выйти</button></div>';
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadResults() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            userName = user.name;
            updateUI();

            const c = document.getElementById('content');
            
            const { data: results } = await sb.from('results').select('*');
            
            if (!results || results.length === 0) {
                c.innerHTML = '<div class="results-container"><h2 style="color:var(--primary);">📊 Результаты</h2><p style="margin-top:20px;">Пока нет результатов</p></div>';
                return;
            }

            let totalScore = 0;
            let totalQuizzes = new Set();
            for (let r of results) {
                totalScore += r.score || 0;
                totalQuizzes.add(r.quiz_id);
            }
            let avgScore = (totalScore / results.length).toFixed(1);

            let myResults = results.filter(r => r.student_id === currentUser.id);
            let myTotal = 0;
            for (let r of myResults) myTotal += r.score || 0;
            let myAvg = myResults.length ? (myTotal / myResults.length).toFixed(1) : 0;

            c.innerHTML = `
                <div class="results-container">
                    <h2 style="color:var(--primary); margin-bottom:30px;">📊 Статистика</h2>
                    <div class="stats-cards">
                        <div class="stat-card"><div class="stat-value">${results.length}</div><div>Всего результатов</div></div>
                        <div class="stat-card"><div class="stat-value">${totalQuizzes.size}</div><div>Всего викторин</div></div>
                        <div class="stat-card"><div class="stat-value">${avgScore}</div><div>Средний балл</div></div>
                    </div>
                    
                    <h3 style="color:var(--primary); margin:30px 0 20px;">📋 Мои результаты</h3>
                    <div class="stats-cards">
                        <div class="stat-card"><div class="stat-value">${myResults.length}</div><div>Пройдено</div></div>
                        <div class="stat-card"><div class="stat-value">${myTotal}</div><div>Мои баллы</div></div>
                        <div class="stat-card"><div class="stat-value">${myAvg}</div><div>Мой средний</div></div>
                    </div>

                    <h3 style="color:var(--primary); margin:30px 0 20px;">📋 Все результаты</h3>
                    <table class="results-table">
                        <thead>
                            <tr><th>Ученик</th><th>Викторина</th><th>Баллы</th><th>Дата</th></tr>
                        </thead>
                        <tbody>
                            ${results.map(r => `<tr><td class="${r.student_name === 'Ильяблоко' ? 'glow-name' : ''}">${r.student_name}</td><td>${r.quiz_title || '?'}</td><td class="score-cell">${r.score || 0}/${r.max_score || 0}</td><td>${r.date ? new Date(r.date).toLocaleString() : ''}</td></tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        loadResults();
    </script>
</body>
</html>
