<body>
    <div class="toast" id="toast">✅ Операция выполнена!</div>

    <div class="container">
        <div class="header">
            <div class="logo-small" onclick="window.location='index.html'">
                <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="student-menu.html" class="nav-link active">Главная</a>
                <a href="student-shop.html" class="nav-link">Магазин</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
            <div class="header-right" id="userSection"></div>
        </div>

        <div class="join-section">
            <h2 class="join-title">🎮 Вход в игру</h2>
            <input type="text" id="gameCode" class="join-input" placeholder="Введите код игры" maxlength="8">
            <button class="join-btn" onclick="joinGame()">
                <i class="fas fa-sign-in-alt"></i> ПОДКЛЮЧИТЬСЯ
            </button>
            <div id="joinError" class="error-msg"></div>
        </div>

        <div class="quizzes-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-gamepad"></i> Доступные викторины</h2>
                <a href="student-shop.html"><button class="shop-btn"><i class="fas fa-store"></i> Магазин тем</button></a>
            </div>
            
            <div class="quiz-tabs">
                <button class="tab-btn active" onclick="loadQuizzes('free')">🎁 Бесплатные</button>
                <button class="tab-btn" onclick="loadQuizzes('premium')">💎 Премиум</button>
            </div>
            
            <div id="quizzesList" class="quizzes-grid">
                <div class="empty-state"><div class="empty-icon">🎮</div><p>Загрузка...</p></div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let userCoins = 100;
        let userTokens = 0;
        let userThemes = ['pink'];

        const allThemes = [
            { id: 'pink', name: '🌸 Розовая', price: 0, color: '#ff0844' },
            { id: 'blue', name: '💙 Синяя', price: 50, color: '#00c6fb' },
            { id: 'green', name: '💚 Зеленая', price: 100, color: '#00b09b' },
            { id: 'purple', name: '💜 Фиолетовая', price: 150, color: '#8e2de2' },
            { id: 'orange', name: '🧡 Оранжевая', price: 200, color: '#f12711' },
            { id: 'candy', name: '🍭 Карамель', price: 200, color: '#f43b47' },
            { id: 'forest', name: '🌲 Лес', price: 250, color: '#134e5e' },
            { id: 'sunset', name: '🌅 Закат', price: 300, color: '#f83600' },
            { id: 'ocean', name: '🌊 Океан', price: 350, color: '#1c92d2' },
            { id: 'dark', name: '🖤 Темная', price: 400, color: '#141e30' },
            { id: 'gold', name: '👑 Золотая', price: 500, color: '#b8860b' },
            { id: 'diamond', name: '💎 Алмазная', price: 600, color: '#00ffff' },
            { id: 'ruby', name: '🔴 Рубиновая', price: 700, color: '#e0115f' },
            { id: 'emerald', name: '💚 Изумрудная', price: 800, color: '#50c878' },
            { id: 'sapphire', name: '💙 Сапфировая', price: 900, color: '#0f52ba' },
            { id: 'amethyst', name: '🟣 Аметистовая', price: 1000, color: '#9966cc' },
            { id: 'rose', name: '🌹 Розовая', price: 1200, color: '#ff66b2' },
            { id: 'neon', name: '⚡ Неоновая', price: 1500, color: '#39ff14' },
            { id: 'galaxy', name: '🌌 Галактика', price: 2000, color: '#000000' },
            { id: 'lava', name: '🌋 Лава', price: 2500, color: '#ff4500' }
        ];

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        async function sendToTG(msg) {
            try { await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ chat_id:TG_CHAT_ID, text:msg, parse_mode:'HTML' }) }); } catch(e) { console.error(e); }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s || !currentUser) return;
            
            const roleEmoji = { 'owner': '👑', 'mediacoord': '🎥', 'chief': '⭐', 'curator': '📚', 'moderator': '🛡️', 'user': '👤' }[currentUser.role_title] || '👤';
            const roleClass = { 'owner': 'role-owner', 'mediacoord': 'role-mediacoord', 'chief': 'role-chief', 'curator': 'role-curator', 'moderator': 'role-moderator', 'user': '' }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <span>${currentUser.username}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${currentUser.coins || 0}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadUser() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }
            if (user.role !== 'student') { window.location.href = 'teacher-menu.html'; return; }
            
            currentUser = user;
            userCoins = user.coins || 100;
            userThemes = user.themes || ['pink'];
            
            const { data: tokens } = await sb.from('user_tokens').select('balance').eq('user_id', user.id).maybeSingle();
            userTokens = tokens?.balance || 0;
            
            updateUI();
            loadQuizzes('free');
            
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);
        }

        window.loadQuizzes = async function(type) {
            const container = document.getElementById('quizzesList');
            container.innerHTML = '<div class="empty-state">Загрузка...</div>';
            
            const { data: quizzes } = await sb.from('quizzes')
                .select('*')
                .eq('published', true)
                .eq('type', type === 'free' ? 'kahoot' : 'constructed');
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if (!quizzes || quizzes.length === 0) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">${type === 'free' ? '🎁' : '💎'}</div><p>${type === 'free' ? 'Бесплатных' : 'Премиум'} викторин пока нет</p></div>`;
                return;
            }

            let html = '';
            for (let q of quizzes) {
                const theme = allThemes.find(t => t.id === q.theme) || allThemes[0];
                html += `
                    <div class="quiz-card ${type === 'free' ? 'free' : 'premium'}">
                        <div class="quiz-card-header">
                            <div class="quiz-theme-badge" style="background: ${theme.color};"></div>
                            <div class="quiz-class">${q.class || ''}</div>
                        </div>
                        <div class="quiz-title">${q.title}</div>
                        <div class="quiz-subject">${q.subject || ''}</div>
                        <div class="quiz-stats">
                            <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                            ${type === 'premium' ? `<span class="quiz-price"><i class="fas fa-gem"></i> ${q.price_tokens || 0}</span>` : ''}
                        </div>
                        <div class="quiz-actions">
                            ${type === 'premium' ? 
                                `<div class="quiz-action-btn buy" onclick="buyQuiz('${q.id}', ${q.price_tokens})"><i class="fas fa-shopping-cart"></i> Купить</div>` :
                                `<div class="quiz-action-btn play" onclick="playQuiz('${q.id}')"><i class="fas fa-play"></i> Играть</div>`
                            }
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        };

        window.buyQuiz = async (quizId, price) => {
            if (userTokens < price) { alert('Недостаточно токенов!'); return; }
            if (confirm(`Купить викторину за ${price} токенов?`)) {
                try {
                    const newTokens = userTokens - price;
                    await sb.from('user_tokens').update({ balance: newTokens }).eq('user_id', currentUser.id);
                    userTokens = newTokens;
                    updateUI();
                    showToast('✅ Викторина куплена!');
                    sendToTG(`💎 ${currentUser.username} купил викторину за ${price} токенов`);
                } catch (e) {
                    alert('Ошибка: ' + e.message);
                }
            }
        };

        window.playQuiz = (quizId) => {
            window.location.href = `student.html?quiz=${quizId}`;
        };

        window.joinGame = async function() {
            const code = document.getElementById('gameCode').value.trim();
            
            if (!code || code.length !== 8) {
                document.getElementById('joinError').textContent = 'Введите 8-значный код';
                return;
            }

            try {
                const { data: lobbies } = await sb.from('lobbies')
                    .select('*')
                    .eq('code', code)
                    .in('status', ['waiting', 'active']);
                
                if (!lobbies || lobbies.length === 0) {
                    document.getElementById('joinError').textContent = 'Игра с таким кодом не найдена';
                    return;
                }

                window.location.href = `student.html?lobby=${lobbies[0].id}`;
                
            } catch (error) {
                console.error('Ошибка подключения:', error);
                document.getElementById('joinError').textContent = 'Ошибка подключения к игре';
            }
        };

        loadUser();
    </script>
</body>
</html>
