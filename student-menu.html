        let quizQuestions = [];
        let editingQuizId = null;
        let allQuizzes = [];
        let currentFilter = 'all';

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function sendToTG(msg) {
            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg, parse_mode: 'HTML' })
                });
            } catch(e) { console.error(e); }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s || !currentUser) return;
            
            const roleEmoji = {
                'owner': '👑', 'mediacoord': '🎥', 'chief': '⭐', 
                'curator': '📚', 'moderator': '🛡️', 'user': '👤'
            }[currentUser.role_title] || '👤';
            
            const roleClass = {
                'owner': 'role-owner', 'mediacoord': 'role-mediacoord', 
                'chief': 'role-chief', 'curator': 'role-curator', 
                'moderator': 'role-moderator', 'user': ''
            }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <span>${escapeHtml(currentUser.username)}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${userCoins}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
            document.getElementById('userCoinsExchange').textContent = userCoins;
            document.getElementById('userTokensExchange').textContent = userTokens;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // Показываем/скрываем поле цены в зависимости от типа
        document.getElementById('quizType').addEventListener('change', function() {
            const priceRow = document.getElementById('priceRow');
            if (this.value === 'constructed') {
                priceRow.style.display = 'grid';
            } else {
                priceRow.style.display = 'none';
            }
        });

        async function loadQuizzes() {
            try {
                const { data: quizzes, error } = await sb
                    .from('quizzes')
                    .select('*')
                    .eq('created_by', currentUser.id)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                allQuizzes = quizzes || [];
                renderQuizzes();
                updateDashboard();
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                document.getElementById('quizzesList').innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><p>Ошибка загрузки викторин</p></div>';
            }
        }

        function updateDashboard() {
            const totalQuizzes = allQuizzes.length;
            const totalQuestions = allQuizzes.reduce((sum, q) => sum + (q.question_count || 0), 0);
            document.getElementById('totalQuizzes').textContent = totalQuizzes;
            document.getElementById('totalQuestions').textContent = totalQuestions;
        }

        function renderQuizzes() {
            const container = document.getElementById('quizzesList');
            
            let filtered = allQuizzes;
            if (currentFilter === 'free') {
                filtered = allQuizzes.filter(q => q.type === 'kahoot');
            } else if (currentFilter === 'premium') {
                filtered = allQuizzes.filter(q => q.type === 'constructed');
            }
            
            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📚</div><p>У вас пока нет викторин. Создайте первую!</p><button class="create-btn" style="margin-top:16px;" onclick="openConstructor()">+ Создать викторину</button></div>';
                return;
            }
            
            container.innerHTML = filtered.map(quiz => `
                <div class="quiz-card ${quiz.type === 'kahoot' ? 'free' : 'premium'}">
                    <div class="quiz-title">${escapeHtml(quiz.title)}</div>
                    <div class="quiz-meta">
                        ${escapeHtml(quiz.class) || 'Любой класс'} • ${escapeHtml(quiz.subject) || 'Без предмета'}
                    </div>
                    <div class="quiz-stats">
                        <span><i class="far fa-question-circle"></i> ${quiz.question_count || 0} вопросов</span>
                        ${quiz.type === 'constructed' ? `<span class="quiz-price"><i class="fas fa-gem"></i> ${quiz.price_tokens || 0} токенов</span>` : '<span class="quiz-price"><i class="fas fa-gift"></i> Бесплатно</span>'}
                    </div>
                    <div class="quiz-actions">
                        <button class="quiz-action-btn play" onclick="playQuiz('${quiz.id}')"><i class="fas fa-play"></i> Играть</button>
                        <button class="quiz-action-btn edit" onclick="editQuiz('${quiz.id}')"><i class="fas fa-edit"></i> Редактировать</button>
                    </div>
                </div>
            `).join('');
        }

        window.filterQuizzes = function(type) {
            currentFilter = type;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderQuizzes();
        };

        window.playQuiz = function(quizId) {
            window.location.href = `teacher.html?quiz=${quizId}`;
        };

        window.editQuiz = async function(quizId) {
            editingQuizId = quizId;
            document.getElementById('constructorTitle').innerHTML = '✏️ Редактирование викторины';
            
            try {
                const { data: quiz, error: quizError } = await sb
                    .from('quizzes')
                    .select('*')
                    .eq('id', quizId)
                    .single();
                    
                if (quizError) throw quizError;
                
                const { data: questions, error: qError } = await sb
                    .from('questions')
                    .select('*')
                    .eq('quiz_id', quizId)
                    .order('question_index');
                    
                if (qError) throw qError;
                
                document.getElementById('quizTitle').value = quiz.title || '';
                document.getElementById('quizClass').value = quiz.class || '';
                document.getElementById('quizSubject').value = quiz.subject || '';
                document.getElementById('quizType').value = quiz.type || 'kahoot';
                document.getElementById('quizPriceTokens').value = quiz.price_tokens || 0;
                document.getElementById('publishToStore').checked = quiz.published || false;
                
                // Показываем/скрываем поле цены
                const priceRow = document.getElementById('priceRow');
                if (quiz.type === 'constructed') {
                    priceRow.style.display = 'grid';
                } else {
                    priceRow.style.display = 'none';
                }
                
                quizQuestions = (questions || []).map(q => ({
                    id: q.id,
                    question: q.question,
                    answers: q.answers || ['', '', '', ''],
                    correct: q.correct || 0
                }));
                
                renderQuestions();
                document.getElementById('constructorOverlay').classList.add('active');
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                alert('Ошибка загрузки викторины: ' + error.message);
            }
        };

        window.openConstructor = function() {
            editingQuizId = null;
            document.getElementById('constructorTitle').innerHTML = '🛠️ Создание викторины';
            document.getElementById('quizTitle').value = '';
            document.getElementById('quizClass').value = '';
            document.getElementById('quizSubject').value = '';
            document.getElementById('quizType').value = 'kahoot';
            document.getElementById('quizPriceTokens').value = '0';
            document.getElementById('publishToStore').checked = false;
            document.getElementById('priceRow').style.display = 'none';
            quizQuestions = [];
            renderQuestions();
            document.getElementById('constructorOverlay').classList.add('active');
        };

        window.closeConstructor = function() {
            document.getElementById('constructorOverlay').classList.remove('active');
            editingQuizId = null;
        };

        window.addQuestion = function() {
            quizQuestions.push({
                id: Date.now(),
                question: '',
                answers: ['', '', '', ''],
                correct: 0
            });
            renderQuestions();
        };

        window.removeQuestion = function(index) {
            if (quizQuestions.length <= 1) {
                alert('Должен быть хотя бы один вопрос');
                return;
            }
            quizQuestions.splice(index, 1);
            renderQuestions();
        };

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            
            if (quizQuestions.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8;"><i class="fas fa-plus-circle"></i> Нажмите "Добавить вопрос" чтобы начать</div>';
                return;
            }
            
            container.innerHTML = quizQuestions.map((q, idx) => `
                <div class="question-card">
                    <div class="question-header">
                        <span class="question-number">Вопрос ${idx + 1}</span>
                        <span class="remove-question" onclick="removeQuestion(${idx})"><i class="fas fa-trash"></i> Удалить</span>
                    </div>
                    <div class="form-group" style="margin-bottom: 16px;">
                        <input type="text" style="width:100%; padding:12px; border:2px solid #e2e8f0; border-radius:12px;" 
                               placeholder="Текст вопроса" value="${escapeHtml(q.question)}" 
                               onchange="updateQuestion(${idx}, 'question', this.value)">
                    </div>
                    <div class="answers-grid">
                        ${[0, 1, 2, 3].map(opt => `
                            <div class="answer-option">
                                <input type="radio" name="correct_${idx}" ${q.correct === opt ? 'checked' : ''} 
                                       onchange="updateQuestion(${idx}, 'correct', ${opt})">
                                <input type="text" placeholder="Вариант ${opt + 1}" 
                                       value="${escapeHtml(q.answers[opt])}" 
                                       onchange="updateQuestion(${idx}, 'answer${opt}', this.value)">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        window.updateQuestion = function(index, field, value) {
            if (field === 'question') {
                quizQuestions[index].question = value;
            } else if (field.startsWith('answer')) {
                const answerIndex = parseInt(field.replace('answer', ''));
                quizQuestions[index].answers[answerIndex] = value;
            } else if (field === 'correct') {
                quizQuestions[index].correct = parseInt(value);
            }
        };

        async function addCoins(amount) {
            try {
                const newCoins = (currentUser.coins || 0) + amount;
                await sb.from('users').update({ coins: newCoins }).eq('id', currentUser.id);
                currentUser.coins = newCoins;
                userCoins = newCoins;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                updateUI();
                return true;
            } catch (error) {
                console.error('Ошибка добавления монет:', error);
                return false;
            }
        }

        window.saveQuiz = async function() {
            if (!currentUser) {
                alert('Ошибка: пользователь не найден');
                return;
            }

            const title = document.getElementById('quizTitle').value.trim();
            const quizClass = document.getElementById('quizClass').value.trim();
            const subject = document.getElementById('quizSubject').value.trim();
            const type = document.getElementById('quizType').value;
            const priceTokens = parseInt(document.getElementById('quizPriceTokens').value) || 0;
            const publish = document.getElementById('publishToStore').checked;

            if (!title) {
                alert('Введите название викторины');
                return;
            }
            
            if (quizQuestions.length === 0) {
                alert('Добавьте хотя бы один вопрос');
                return;
            }

            for (let i = 0; i < quizQuestions.length; i++) {
                const q = quizQuestions[i];
                if (!q.question || q.question.trim() === '') {
                    alert(`Заполните текст вопроса ${i + 1}`);
                    return;
                }
                for (let j = 0; j < 4; j++) {
                    if (!q.answers[j] || q.answers[j].trim() === '') {
                        alert(`Заполните вариант ${j + 1} в вопросе ${i + 1}`);
                        return;
                    }
                }
            }

            try {
                if (editingQuizId) {
                    // Обновление существующей викторины
                    const { error: updateError } = await sb
                        .from('quizzes')
                        .update({
                            title: title,
                            class: quizClass,
                            subject: subject,
                            type: type,
                            price_tokens: priceTokens,
                            question_count: quizQuestions.length,
                            max_score: quizQuestions.length,
                            published: publish,
                            updated_at: new Date().toISOString()
                        })
                        .eq('id', editingQuizId);
                        
                    if (updateError) throw updateError;
                    
                    await sb.from('questions').delete().eq('quiz_id', editingQuizId);
                    
                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: editingQuizId,
                            question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct
                        });
                    }
                    
                    sendToTG(`✏️ ${currentUser.username} отредактировал викторину: ${title}`);
                    showToast('✅ Викторина обновлена!');
                    
                } else {
                    // Создание новой викторины
                    const quizId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                    
                    const { error: quizError } = await sb.from('quizzes').insert({
                        id: quizId,
                        title: title,
                        class: quizClass,
                        subject: subject,
                        type: type,
                        price_tokens: priceTokens,
                        question_count: quizQuestions.length,
                        max_score: quizQuestions.length,
                        created_by: currentUser.id,
                        published: publish,
                        created_at: new Date().toISOString()
                    });
                    
                    if (quizError) {
                        console.error('Ошибка при вставке викторины:', quizError);
                        alert('Ошибка БД: ' + quizError.message);
                        return;
                    }
                    
                    for (let i = 0; i < quizQuestions.length; i++) {
                        const { error: qError } = await sb.from('questions').insert({
                            quiz_id: quizId,
                            question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct
                        });
                        
                        if (qError) {
                            console.error('Ошибка при вставке вопроса:', qError);
                            alert('Ошибка при сохранении вопроса: ' + qError.message);
                            return;
                        }
                    }
                    
                    if (publish) {
                        await addCoins(50);
                        sendToTG(`📢 ${currentUser.username} опубликовал викторину: ${title} (+50 монет)`);
                        showToast('✅ Викторина опубликована! +50 монет');
                    } else {
                        await addCoins(30);
                        sendToTG(`📝 ${currentUser.username} создал викторину: ${title} (+30 монет)`);
                        showToast('✅ Викторина сохранена! +30 монет');
                    }
                }
                
                closeConstructor();
                await loadQuizzes();
                
            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('Ошибка: ' + error.message);
            }
        };

        window.exchangeCoins = async function() {
            if (!currentUser) {
                alert('Сначала войдите в систему');
                return;
            }
            
            const amount = parseInt(document.getElementById('exchangeAmount').value);
            
            if (isNaN(amount) || amount < 100) {
                alert('Минимальная сумма обмена: 100 монет');
                return;
            }
            
            if (amount % 100 !== 0) {
                alert('Сумма должна быть кратна 100');
                return;
            }
            
            if (userCoins < amount) {
                alert(`Недостаточно монет! У вас ${userCoins} монет, нужно ${amount}`);
                return;
            }
            
            const tokensToAdd = amount / 100;
            
            if (confirm(`Обменять ${amount} монет на ${tokensToAdd} токенов?`)) {
                try {
                    const { data: freshUser, error: fetchError } = await sb
                        .from('users')
                        .select('coins')
                        .eq('id', currentUser.id)
                        .single();
                        
                    if (fetchError) throw fetchError;
                    
                    const currentBalance = freshUser.coins || 0;
                    
                    if (currentBalance < amount) {
                        alert(`Недостаточно монет! По данным БД у вас ${currentBalance} монет, нужно ${amount}`);
                        return;
                    }
                    
                    const newBalance = currentBalance - amount;
                    
                    await sb.from('users').update({ coins: newBalance }).eq('id', currentUser.id);
                    
                    const { data: tokenData, error: tokenError } = await sb
                        .from('user_tokens')
                        .select('balance')
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                        
                    if (tokenError && tokenError.code !== 'PGRST116') throw tokenError;
                    
                    const currentTokens = tokenData?.balance || 0;
                    const newTokens = currentTokens + tokensToAdd;
                    
                    if (tokenData) {
                        await sb.from('user_tokens').update({ balance: newTokens }).eq('user_id', currentUser.id);
                    } else {
                        await sb.from('user_tokens').insert({
                            user_id: currentUser.id,
                            balance: newTokens,
                            referral_code: 'ref_' + currentUser.id + '_' + Math.floor(Math.random() * 1000000)
                        });
                    }
                    
                    userCoins = newBalance;
                    userTokens = newTokens;
                    currentUser.coins = newBalance;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateUI();
                    showToast(`✅ Обменяно ${amount} монет на ${tokensToAdd} токенов!`);
                    sendToTG(`💱 ${currentUser.username} обменял ${amount} монет на ${tokensToAdd} токенов`);
                    document.getElementById('exchangeAmount').value = '100';
                    
                } catch (error) {
                    console.error('Ошибка обмена:', error);
                    alert('Ошибка при обмене: ' + error.message);
                }
            }
        };

        async function loadUser() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            if (user.role !== 'teacher') {
                window.location.href = 'student-menu.html';
                return;
            }
            
            currentUser = user;
            userCoins = user.coins || 100;
            
            const { data: tokens } = await sb
                .from('user_tokens')
                .select('balance')
                .eq('user_id', user.id)
                .maybeSingle();
            userTokens = tokens?.balance || 0;
            
            updateUI();
            await loadQuizzes();
            
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);
        }

        loadUser();
    </script>
</body>
</html>
