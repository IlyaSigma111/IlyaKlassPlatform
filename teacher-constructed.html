<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Проведение</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(145deg, #0a0c14, #151823);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            font-size: 24px;
            color: var(--primary);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(21, 24, 35, 0.7);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            color: var(--primary);
        }

        .question-card {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 3px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .answers {
            display: grid;
            gap: 10px;
        }

        .answer {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--success);
            border-radius: 15px;
            padding: 12px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .answer:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px var(--success);
        }

        .students-list {
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
        }

        .student-item:last-child {
            border-bottom: none;
        }

        .finish-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 40px;
            width: 100%;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .finish-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title" id="quizTitle">Загрузка...</h1>
            <span id="questionCounter" style="color:var(--primary);">0/0</span>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="studentsCount">0</div>
                <div>Учеников</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="answeredCount">0</div>
                <div>Ответили</div>
            </div>
        </div>

        <div class="question-card">
            <div class="question" id="questionText">Загрузка...</div>
            <div class="answers" id="answersList"></div>
        </div>

        <div class="students-list">
            <h3 style="color:var(--primary); margin-bottom:10px;">👥 Подключились:</h3>
            <div id="studentsContainer"></div>
        </div>

        <button class="finish-btn" onclick="finishQuiz()">🏁 Завершить викторину</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const quizId = urlParams.get('quiz');

        let currentQuestion = 0;
        let questions = [];

        async function loadQuiz() {
            const { data: quiz } = await sb.from('quizzes').select('title').eq('id', quizId).single();
            document.getElementById('quizTitle').textContent = quiz?.title || 'Викторина';

            const { data: qs } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            questions = qs || [];
            
            if (questions.length === 0) {
                document.getElementById('questionText').textContent = 'Нет вопросов';
                return;
            }
            
            loadSession();
        }

        function loadSession() {
            sb.channel('session-changes')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'sessions', 
                    filter: `id=eq.${sessionId}` 
                }, payload => { 
                    if (payload.new) updateUI(payload.new); 
                })
                .subscribe();

            sb.from('sessions').select('*').eq('id', sessionId).then(({ data }) => {
                if (data?.[0]) updateUI(data[0]);
            });
        }

        function updateUI(session) {
            let students = session.students || {};
            let count = Object.keys(students).length;
            document.getElementById('studentsCount').textContent = count;

            let answered = 0;
            let studentsHtml = '';
            for (let id in students) {
                let s = students[id];
                let hasAnswered = s.answers && s.answers[currentQuestion] !== undefined;
                if (hasAnswered) answered++;
                studentsHtml += `<div class="student-item"><span>${s.name}</span><span>${hasAnswered ? '✓' : '⏳'}</span></div>`;
            }
            document.getElementById('answeredCount').textContent = answered;
            document.getElementById('studentsContainer').innerHTML = studentsHtml || '<p style="text-align:center; opacity:0.7;">Пока никого нет</p>';

            if (questions.length) {
                document.getElementById('questionCounter').textContent = `Вопрос ${currentQuestion + 1}/${questions.length}`;
                displayQuestion(questions[currentQuestion]);
            }
        }

        function displayQuestion(q) {
            document.getElementById('questionText').textContent = q.question;
            let html = '';
            for (let i = 0; i < q.answers.length; i++) {
                html += `<div class="answer" onclick="selectAnswer(${i})">${q.answers[i]}</div>`;
            }
            document.getElementById('answersList').innerHTML = html;
        }

        window.selectAnswer = function(index) {
            let correct = questions[currentQuestion].correct;
            alert(index === correct ? '✅ Правильно' : '❌ Неправильно');
        };

        window.finishQuiz = async function() {
            if (confirm('Завершить викторину?')) {
                await sb.from('sessions').update({ status: 'finished' }).eq('id', sessionId);
                window.close();
            }
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight' && currentQuestion < questions.length - 1) { 
                currentQuestion++; 
                sb.from('sessions').select('*').eq('id', sessionId).then(({ data }) => {
                    if (data?.[0]) updateUI(data[0]);
                });
            }
            else if (e.key === 'ArrowLeft' && currentQuestion > 0) { 
                currentQuestion--; 
                sb.from('sessions').select('*').eq('id', sessionId).then(({ data }) => {
                    if (data?.[0]) updateUI(data[0]);
                });
            }
        });

        loadQuiz();
    </script>
</body>
</html>
