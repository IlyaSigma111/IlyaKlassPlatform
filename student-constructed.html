<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Участие в викторине</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 24px;
            color: #6366f1;
        }

        .question-card {
            background: rgba(255,255,255,0.03);
            border: 2px solid #6366f1;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question {
            font-size: 20px;
            margin-bottom: 20px;
            color: #818cf8;
        }

        .answers {
            display: grid;
            gap: 10px;
        }

        .answer {
            background: rgba(255,255,255,0.05);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .answer:hover {
            background: rgba(16,185,129,0.1);
        }

        .answer.selected {
            background: #10b981;
        }

        .counter {
            text-align: center;
            color: #818cf8;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title" id="quizTitle">Участие в викторине</h1>
        </div>

        <div class="question-card">
            <div class="question" id="questionText">Ожидание следующего вопроса...</div>
            <div class="answers" id="answersList"></div>
        </div>

        <div class="counter" id="counter">Вопрос 1/0</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== ТВОЙ SUPABASE КОНФИГ =====
        const SUPABASE_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const quizId = urlParams.get('quiz');
        const studentId = urlParams.get('student');
        const studentName = decodeURIComponent(urlParams.get('name') || '');

        let currentQuestion = 0;
        let questions = [];
        let myAnswers = {};

        async function loadQuiz() {
            const { data: qs } = await supabase
                .from('questions')
                .select('*')
                .eq('quiz_id', quizId)
                .order('question_index');
            questions = qs || [];
            
            loadSession();
        }

        function loadSession() {
            // Подписка на изменения сессии
            const subscription = supabase
                .channel('session-changes')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'sessions', filter: `id=eq.${sessionId}` }, 
                    payload => { 
                        if (payload.new) updateQuestion(payload.new); 
                    })
                .subscribe();

            // Первая загрузка
            supabase.from('sessions').select('*').eq('id', sessionId).then(({ data }) => {
                if (data?.[0]) updateQuestion(data[0]);
            });
        }

        function updateQuestion(session) {
            if (!questions.length) return;
            
            document.getElementById('counter').textContent = `Вопрос ${currentQuestion+1}/${questions.length}`;
            
            const q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            
            let answersHtml = '';
            q.answers.forEach((a, i) => {
                const selected = myAnswers[currentQuestion] === i ? 'selected' : '';
                answersHtml += `<div class="answer ${selected}" onclick="selectAnswer(${i})">${a}</div>`;
            });
            document.getElementById('answersList').innerHTML = answersHtml;
        }

        window.selectAnswer = async (index) => {
            myAnswers[currentQuestion] = index;
            
            // Получаем текущую сессию
            const { data: session } = await supabase
                .from('sessions')
                .select('students')
                .eq('id', sessionId)
                .single();
            
            if (session) {
                // Обновляем студента
                if (!session.students[studentId]) {
                    session.students[studentId] = { name: studentName };
                }
                if (!session.students[studentId].answers) {
                    session.students[studentId].answers = {};
                }
                session.students[studentId].answers[currentQuestion] = index;
                
                // Сохраняем
                await supabase
                    .from('sessions')
                    .update({ students: session.students })
                    .eq('id', sessionId);
            }
            
            // Обновляем отображение
            updateQuestion(session);
        };

        document.addEventListener('keydown', (e) => {
            if (e.key>='1' && e.key<='4') {
                selectAnswer(parseInt(e.key)-1);
            }
        });

        loadQuiz();
    </script>
</body>
</html>
