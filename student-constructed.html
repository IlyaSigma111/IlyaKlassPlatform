<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Участие</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --success: #10b981;
        }

        body {
            background: linear-gradient(145deg, #0a0c14, #151823);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 28px;
            color: var(--primary);
        }

        .question-card {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 3px solid var(--primary);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .question {
            font-size: 20px;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .answers {
            display: grid;
            gap: 10px;
        }

        .answer {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--success);
            border-radius: 15px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .answer:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--success);
        }

        .answer.selected {
            background: var(--success);
        }

        .counter {
            text-align: center;
            color: var(--primary);
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Участие в викторине</h1>
        </div>

        <div class="question-card">
            <div class="question" id="questionText">Ожидание следующего вопроса...</div>
            <div class="answers" id="answersList"></div>
        </div>

        <div class="counter" id="counter">Вопрос 1/0</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session');
        const quizId = urlParams.get('quiz');
        const studentId = urlParams.get('student');
        const studentName = decodeURIComponent(urlParams.get('name') || '');

        let currentQuestion = 0;
        let questions = [];
        let myAnswers = {};

        async function loadQuiz() {
            const { data: qs } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            questions = qs || [];
            
            if (questions.length === 0) {
                document.getElementById('questionText').textContent = 'Викторина还没开始';
                return;
            }
            
            loadSession();
        }

        function loadSession() {
            sb.channel('session-changes')
                .on('postgres_changes', { 
                    event: '*', 
                    schema: 'public', 
                    table: 'sessions', 
                    filter: `id=eq.${sessionId}` 
                }, payload => { 
                    if (payload.new) updateQuestion(payload.new); 
                })
                .subscribe();

            sb.from('sessions').select('*').eq('id', sessionId).then(({ data }) => {
                if (data?.[0]) updateQuestion(data[0]);
            });
        }

        function updateQuestion(session) {
            if (!questions.length) return;
            
            document.getElementById('counter').textContent = `Вопрос ${currentQuestion + 1}/${questions.length}`;
            
            let q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            
            let html = '';
            for (let i = 0; i < q.answers.length; i++) {
                let selected = myAnswers[currentQuestion] === i ? 'selected' : '';
                html += `<div class="answer ${selected}" onclick="selectAnswer(${i})">${q.answers[i]}</div>`;
            }
            document.getElementById('answersList').innerHTML = html;
        }

        window.selectAnswer = async function(index) {
            myAnswers[currentQuestion] = index;
            
            const { data: session } = await sb.from('sessions').select('students').eq('id', sessionId).single();
            
            if (session) {
                if (!session.students[studentId]) {
                    session.students[studentId] = { name: studentName };
                }
                if (!session.students[studentId].answers) {
                    session.students[studentId].answers = {};
                }
                session.students[studentId].answers[currentQuestion] = index;
                
                await sb.from('sessions').update({ students: session.students }).eq('id', sessionId);
            }
            
            updateQuestion(session);
        };

        document.addEventListener('keydown', function(e) {
            if (e.key >= '1' && e.key <= '4') {
                selectAnswer(parseInt(e.key) - 1);
            }
        });

        loadQuiz();
    </script>
</body>
</html>
