<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
        }

        body.pink-theme { background: linear-gradient(135deg, #fbc7d1 0%, #f8cdda 100%); color: #4a4a4a; }
        body.blue-theme { background: linear-gradient(135deg, #6dd5ed 0%, #2193b0 100%); color: white; }
        body.green-theme { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); color: #2d4a1e; }
        body.purple-theme { background: linear-gradient(135deg, #b993d6 0%, #8ca6db 100%); color: #2d2d5a; }
        body.orange-theme { background: linear-gradient(135deg, #f9d423 0%, #f83600 100%); color: #4a2a1a; }
        body.dark-theme { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ЛОГИН */
        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 50px;
            width: 500px;
            max-width: 90%;
            text-align: center;
        }

        .login-title {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: #6366f1;
            border-color: white;
            box-shadow: 0 0 20px #6366f1;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-family: 'Comfortaa', cursive;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #6366f1;
        }

        .register-link {
            margin-top: 20px;
            color: white;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.8;
        }

        /* ОСНОВНОЙ ИНТЕРФЕЙС */
        .main-screen {
            display: none;
        }

        .main-screen.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
            border: 2px solid white;
        }

        .user-info {
            text-align: right;
        }

        .user-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .user-role {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        /* МОИ ВИКТОРИНЫ */
        .quizzes-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 25px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .create-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
        }

        .quizzes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .quiz-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .quiz-theme-tag {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .quiz-class {
            background: rgba(255, 255, 255, 0.3);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .quiz-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .quiz-subject {
            opacity: 0.8;
            margin-bottom: 15px;
        }

        .quiz-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .quiz-actions {
            display: flex;
            gap: 10px;
        }

        .quiz-action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quiz-action-btn.play {
            background: #10b981;
        }

        .quiz-action-btn.edit {
            background: #6366f1;
        }

        .quiz-action-btn.publish {
            background: #f59e0b;
        }

        /* МАГАЗИН ТЕМ */
        .shop-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 25px;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .theme-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-card:hover {
            transform: scale(1.05);
        }

        .theme-card.owned {
            border-color: #10b981;
        }

        .theme-color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 auto 10px;
        }

        .theme-name {
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .theme-price {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .coins {
            color: #ffd700;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        /* КОНСТРУКТОР */
        .constructor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .constructor-overlay.active {
            display: flex;
        }

        .constructor-window {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 3px solid #6366f1;
            border-radius: 50px;
            width: 1000px;
            max-width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .constructor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .constructor-title {
            font-size: 2rem;
            color: #6366f1;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ef4444;
            color: #ef4444;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .constructor-form {
            display: grid;
            gap: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #6366f1;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            color: white;
            font-family: 'Comfortaa', cursive;
        }

        .themes-selector {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .theme-option {
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
        }

        .theme-option.selected {
            background: #6366f1;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-number {
            color: #6366f1;
            font-weight: 600;
        }

        .remove-question {
            color: #ef4444;
            cursor: pointer;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 10px;
        }

        .answer-option input[type="radio"] {
            accent-color: #10b981;
        }

        .add-question-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }

        .save-quiz-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .answers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="pink-theme">
    <!-- ЭКРАН ЛОГИНА -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-title">ИЛЬЯКЛАСС</div>
            <div class="login-subtitle">Войдите или зарегистрируйтесь</div>
            
            <div class="role-selector">
                <button class="role-btn active" onclick="selectRole('teacher')">👨‍🏫 Учитель</button>
                <button class="role-btn" onclick="selectRole('student')">👨‍🎓 Ученик</button>
            </div>
            
            <input type="text" id="loginName" class="login-input" placeholder="Имя">
            <input type="password" id="loginPass" class="login-input" placeholder="Пароль">
            
            <button class="login-btn" onclick="doLogin()">🚀 Войти</button>
            <div class="register-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
            <div id="errorMsg" style="color: #ff6b6b; margin-top: 15px;"></div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div class="main-screen" id="mainScreen">
        <div class="container">
            <div class="header">
                <div class="logo-small" onclick="window.location.reload()">
                    <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
                </div>
                <div class="user-menu">
                    <div class="user-info">
                        <div class="user-name" id="headerUserName">Загрузка...</div>
                        <div class="user-role" id="headerUserRole"></div>
                    </div>
                    <div class="user-avatar" id="headerAvatar">👤</div>
                    <div class="logout-btn" onclick="logout()">Выйти</div>
                </div>
            </div>

            <div class="content-grid">
                <!-- ЛЕВАЯ КОЛОНКА - МОИ ВИКТОРИНЫ -->
                <div class="quizzes-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            <i class="fas fa-gamepad" style="color: #6366f1;"></i>
                            Мои викторины
                        </h2>
                        <button class="create-btn" onclick="openConstructor()">
                            <i class="fas fa-plus"></i> Создать
                        </button>
                    </div>
                    
                    <div id="myQuizzesList" class="quizzes-grid">
                        <div class="empty-state">
                            <div class="empty-icon">🎮</div>
                            <p>У вас пока нет викторин</p>
                            <button class="create-btn" style="margin-top: 15px;" onclick="openConstructor()">Создать первую</button>
                        </div>
                    </div>
                </div>

                <!-- ПРАВАЯ КОЛОНКА - МАГАЗИН ТЕМ -->
                <div class="shop-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            <i class="fas fa-store" style="color: #f59e0b;"></i>
                            Магазин тем
                        </h2>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-coins" style="color: #ffd700;"></i>
                            <span id="userCoins">100</span>
                        </div>
                    </div>
                    
                    <div class="themes-grid" id="themesList">
                        <!-- Сюда загрузятся темы -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- КОНСТРУКТОР -->
    <div class="constructor-overlay" id="constructorOverlay">
        <div class="constructor-window">
            <div class="constructor-header">
                <h2 class="constructor-title">🛠️ Создание викторины</h2>
                <div class="close-btn" onclick="closeConstructor()">✕</div>
            </div>
            
            <div class="constructor-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Название викторины</label>
                        <input type="text" id="quizTitle" placeholder="Например: 8 Марта">
                    </div>
                    <div class="form-group">
                        <label>Класс / Уровень</label>
                        <input type="text" id="quizClass" placeholder="5 класс">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Предмет</label>
                        <input type="text" id="quizSubject" placeholder="Математика">
                    </div>
                    <div class="form-group">
                        <label>Тема викторины</label>
                        <select id="quizTheme">
                            <option value="pink">🌸 Розовая (по умолчанию)</option>
                            <option value="blue">💙 Синяя</option>
                            <option value="green">💚 Зеленая</option>
                            <option value="purple">💜 Фиолетовая</option>
                            <option value="orange">🧡 Оранжевая</option>
                            <option value="dark">🖤 Темная</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Вопросы</label>
                    <div id="questionsContainer"></div>
                    <button class="add-question-btn" onclick="addQuestion()">
                        <i class="fas fa-plus"></i> Добавить вопрос
                    </button>
                </div>
                
                <button class="save-quiz-btn" onclick="saveQuiz()">
                    <i class="fas fa-save"></i> Сохранить викторину
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== SUPABASE КОНФИГ =====
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let currentUser = null;
        let selectedRole = 'teacher';
        let allThemes = [
            { id: 'pink', name: '🌸 Розовая', price: 0, color: '#fbc7d1' },
            { id: 'blue', name: '💙 Синяя', price: 50, color: '#6dd5ed' },
            { id: 'green', name: '💚 Зеленая', price: 50, color: '#a8e063' },
            { id: 'purple', name: '💜 Фиолетовая', price: 100, color: '#b993d6' },
            { id: 'orange', name: '🧡 Оранжевая', price: 100, color: '#f9d423' },
            { id: 'dark', name: '🖤 Темная', price: 200, color: '#2c3e50' }
        ];
        let userThemes = ['pink']; // По умолчанию есть розовая
        let userCoins = 100;
        let quizQuestions = [];

        // ===== ХЕШ ПАРОЛЯ =====
        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        // ===== ВЫБОР РОЛИ =====
        window.selectRole = function(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            if (role === 'teacher') {
                document.querySelector('.role-btn:first-child').classList.add('active');
            } else {
                document.querySelector('.role-btn:last-child').classList.add('active');
            }
        };

        // ===== РЕГИСТРАЦИЯ =====
        window.showRegister = function() {
            const name = prompt('Введите имя:');
            if (!name) return;
            const pass = prompt('Введите пароль (мин. 3 символа):');
            if (!pass || pass.length < 3) {
                alert('Пароль должен быть минимум 3 символа');
                return;
            }
            registerUser(name, pass);
        };

        async function registerUser(name, pass) {
            try {
                // Проверяем, не занято ли имя
                const { data: existing } = await sb.from('users').select('*').eq('username', name);
                if (existing && existing.length > 0) {
                    document.getElementById('errorMsg').textContent = 'Это имя уже занято';
                    return;
                }

                const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                const { error } = await sb.from('users').insert({
                    id: userId,
                    username: name,
                    password: hashPassword(pass),
                    role: selectedRole,
                    coins: 100,
                    themes: ['pink'],
                    created_at: new Date().toISOString()
                });

                if (error) throw error;

                // Автоматически входим
                const user = { id: userId, username: name, role: selectedRole, coins: 100, themes: ['pink'] };
                localStorage.setItem('currentUser', JSON.stringify(user));
                currentUser = user;
                userCoins = 100;
                userThemes = ['pink'];
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI();
                loadMyQuizzes();
                loadThemesShop();

            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message;
            }
        }

        // ===== ЛОГИН =====
        window.doLogin = async function() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!name || !pass) {
                document.getElementById('errorMsg').textContent = 'Введите имя и пароль';
                return;
            }

            // Специальный админ
            if (name === 'Ильяблоко' && pass === 'JojoTop1') {
                currentUser = { id: 'admin', username: 'Ильяблоко', role: 'teacher', coins: 9999, themes: allThemes.map(t => t.id) };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                userCoins = 9999;
                userThemes = allThemes.map(t => t.id);
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI();
                loadMyQuizzes();
                loadThemesShop();
                return;
            }

            // Обычные пользователи
            try {
                const { data: users } = await sb.from('users').select('*').eq('username', name);
                const user = users && users[0];

                if (user && user.password === hashPassword(pass)) {
                    currentUser = { 
                        id: user.id, 
                        username: user.username, 
                        role: user.role,
                        coins: user.coins || 100,
                        themes: user.themes || ['pink']
                    };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    userCoins = currentUser.coins;
                    userThemes = currentUser.themes;
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainScreen').classList.add('active');
                    updateUI();
                    loadMyQuizzes();
                    loadThemesShop();
                } else {
                    document.getElementById('errorMsg').textContent = 'Неверное имя или пароль';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message;
            }
        };

        // ===== ВЫХОД =====
        window.logout = function() {
            localStorage.removeItem('currentUser');
            window.location.reload();
        };

        // ===== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА =====
        function updateUI() {
            if (!currentUser) return;
            document.getElementById('headerUserName').textContent = currentUser.username;
            document.getElementById('headerUserRole').textContent = currentUser.role === 'teacher' ? 'Учитель' : 'Ученик';
            document.getElementById('headerAvatar').textContent = currentUser.username.charAt(0).toUpperCase();
            document.getElementById('userCoins').textContent = userCoins;
        }

        // ===== ЗАГРУЗКА МОИХ ВИКТОРИН =====
        async function loadMyQuizzes() {
            if (!currentUser) return;
            
            const { data: quizzes } = await sb.from('quizzes').select('*').eq('created_by', currentUser.id);
            const container = document.getElementById('myQuizzesList');
            
            if (!quizzes || quizzes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🎮</div>
                        <p>У вас пока нет викторин</p>
                        <button class="create-btn" style="margin-top: 15px;" onclick="openConstructor()">Создать первую</button>
                    </div>
                `;
                return;
            }

            let html = '';
            for (let q of quizzes) {
                html += `
                    <div class="quiz-card" style="border-color: var(--${q.theme || 'pink'});">
                        <div class="quiz-card-header">
                            <div class="quiz-theme-tag" style="background: ${getThemeColor(q.theme)};"></div>
                            <div class="quiz-class">${q.class || ''}</div>
                        </div>
                        <div class="quiz-title">${q.title}</div>
                        <div class="quiz-subject">${q.subject || ''}</div>
                        <div class="quiz-stats">
                            <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                            <span><i class="far fa-star"></i> ${q.max_score || 0}</span>
                        </div>
                        <div class="quiz-actions">
                            <div class="quiz-action-btn play" onclick="playQuiz('${q.id}')">
                                <i class="fas fa-play"></i> Играть
                            </div>
                            ${currentUser.role === 'teacher' ? `
                                <div class="quiz-action-btn edit" onclick="editQuiz('${q.id}')">
                                    <i class="fas fa-edit"></i>
                                </div>
                                <div class="quiz-action-btn publish" onclick="publishQuiz('${q.id}')">
                                    <i class="fas fa-globe"></i>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        function getThemeColor(themeId) {
            const theme = allThemes.find(t => t.id === themeId);
            return theme ? theme.color : '#fbc7d1';
        }

        // ===== ЗАГРУЗКА МАГАЗИНА ТЕМ =====
        function loadThemesShop() {
            const container = document.getElementById('themesList');
            let html = '';
            
            for (let theme of allThemes) {
                const owned = userThemes.includes(theme.id);
                html += `
                    <div class="theme-card ${owned ? 'owned' : ''}" onclick="${owned ? '' : 'buyTheme(\'' + theme.id + '\')'}">
                        <div class="theme-color" style="background: ${theme.color};"></div>
                        <div class="theme-name">${theme.name}</div>
                        <div class="theme-price">
                            ${owned ? '✓ В наличии' : `<span class="coins">${theme.price}</span> монет`}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        window.buyTheme = async function(themeId) {
            const theme = allThemes.find(t => t.id === themeId);
            if (!theme) return;
            
            if (userCoins < theme.price) {
                alert('Недостаточно монет!');
                return;
            }
            
            if (confirm(`Купить тему ${theme.name} за ${theme.price} монет?`)) {
                userCoins -= theme.price;
                userThemes.push(themeId);
                
                // Обновляем в базе
                await sb.from('users').update({ 
                    coins: userCoins, 
                    themes: userThemes 
                }).eq('id', currentUser.id);
                
                document.getElementById('userCoins').textContent = userCoins;
                loadThemesShop();
            }
        };

        // ===== КОНСТРУКТОР =====
        window.openConstructor = function() {
            if (currentUser.role !== 'teacher') {
                alert('Только учителя могут создавать викторины');
                return;
            }
            quizQuestions = [];
            document.getElementById('constructorOverlay').classList.add('active');
            renderQuestions();
        };

        window.closeConstructor = function() {
            document.getElementById('constructorOverlay').classList.remove('active');
        };

        window.addQuestion = function() {
            quizQuestions.push({
                id: Date.now() + Math.random(),
                question: '',
                answers: ['', '', '', ''],
                correct: 0,
                points: 1
            });
            renderQuestions();
        };

        window.removeQuestion = function(index) {
            quizQuestions.splice(index, 1);
            renderQuestions();
        };

        window.updateQuestion = function(index, field, value) {
            if (field === 'question') {
                quizQuestions[index].question = value;
            } else if (field.startsWith('answer')) {
                let ai = parseInt(field.replace('answer', ''));
                quizQuestions[index].answers[ai] = value;
            } else if (field === 'correct') {
                quizQuestions[index].correct = parseInt(value);
            }
        };

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            if (!container) return;
            
            if (quizQuestions.length === 0) {
                container.innerHTML = '<p style="text-align: center; opacity: 0.7;">Добавьте первый вопрос</p>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < quizQuestions.length; i++) {
                let q = quizQuestions[i];
                html += `
                    <div class="question-card">
                        <div class="question-header">
                            <span class="question-number">Вопрос ${i+1}</span>
                            <span class="remove-question" onclick="removeQuestion(${i})">✕</span>
                        </div>
                        <input type="text" placeholder="Текст вопроса" value="${q.question.replace(/"/g, '&quot;')}" 
                               onchange="updateQuestion(${i}, 'question', this.value)" style="width:100%; padding:10px; margin-bottom:10px;">
                        <div class="answers-grid">
                            ${[0,1,2,3].map(j => `
                                <div class="answer-option">
                                    <input type="radio" name="correct-${q.id}" value="${j}" ${q.correct === j ? 'checked' : ''} 
                                           onchange="updateQuestion(${i}, 'correct', this.value)">
                                    <input type="text" placeholder="Ответ ${j+1}" value="${q.answers[j] || ''}" 
                                           onchange="updateQuestion(${i}, 'answer${j}', this.value)">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        window.saveQuiz = async function() {
            const title = document.getElementById('quizTitle').value;
            const quizClass = document.getElementById('quizClass').value;
            const subject = document.getElementById('quizSubject').value;
            const theme = document.getElementById('quizTheme').value;

            if (!title) {
                alert('Введите название викторины');
                return;
            }

            if (quizQuestions.length === 0) {
                alert('Добавьте хотя бы один вопрос');
                return;
            }

            // Проверяем заполненность вопросов
            for (let i = 0; i < quizQuestions.length; i++) {
                if (!quizQuestions[i].question) {
                    alert(`Заполните вопрос ${i+1}`);
                    return;
                }
                if (!quizQuestions[i].answers.every(a => a)) {
                    alert(`Заполните все ответы в вопросе ${i+1}`);
                    return;
                }
            }

            const quizId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
            
            try {
                await sb.from('quizzes').insert({
                    id: quizId,
                    title: title,
                    class: quizClass,
                    subject: subject,
                    theme: theme,
                    question_count: quizQuestions.length,
                    max_score: quizQuestions.reduce((sum, q) => sum + (q.points || 1), 0),
                    created_by: currentUser.id,
                    is_published: false,
                    created_at: Date.now()
                });

                for (let i = 0; i < quizQuestions.length; i++) {
                    await sb.from('questions').insert({
                        quiz_id: quizId,
                        question_index: i,
                        question: quizQuestions[i].question,
                        answers: quizQuestions[i].answers,
                        correct: quizQuestions[i].correct,
                        points: quizQuestions[i].points || 1
                    });
                }

                alert('✅ Викторина создана!');
                closeConstructor();
                loadMyQuizzes();

            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        };

        // ===== ЗАПУСК ВИКТОРИНЫ =====
        window.playQuiz = function(quizId) {
            window.location.href = `teacher-lobby.html?quiz=${quizId}`;
        };

        window.editQuiz = function(quizId) {
            alert('Редактирование пока в разработке');
        };

        window.publishQuiz = async function(quizId) {
            if (confirm('Опубликовать викторину для всех?')) {
                await sb.from('quizzes').update({ is_published: true }).eq('id', quizId);
                alert('✅ Викторина опубликована! Теперь её могут видеть другие учителя');
            }
        };

        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        (function checkAuth() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                userCoins = currentUser.coins || 100;
                userThemes = currentUser.themes || ['pink'];
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI();
                loadMyQuizzes();
                loadThemesShop();
            }
        })();
    </script>
</body>
</html>
