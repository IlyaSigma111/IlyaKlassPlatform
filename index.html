<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ===== ПОЛНЫЙ CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== ЯРКИЕ ТЕМЫ ===== */
        body.pink-theme { 
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); 
            color: white; 
        }
        body.pink-theme .nav-link,
        body.pink-theme .quiz-card,
        body.pink-theme .create-btn,
        body.pink-theme .shop-btn,
        body.pink-theme .user-card,
        body.pink-theme .logout-btn { 
            color: white; 
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }
        
        body.blue-theme { 
            background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%); 
            color: white; 
        }
        body.blue-theme .nav-link,
        body.blue-theme .quiz-card,
        body.blue-theme .user-card { 
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        body.green-theme { 
            background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); 
            color: white; 
        }
        body.green-theme .nav-link,
        body.green-theme .quiz-card,
        body.green-theme .user-card { 
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        body.purple-theme { 
            background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%); 
            color: white; 
        }
        body.purple-theme .nav-link,
        body.purple-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        body.orange-theme { 
            background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); 
            color: white; 
        }
        body.orange-theme .nav-link,
        body.orange-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        body.dark-theme { 
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%); 
            color: white; 
        }
        body.dark-theme .nav-link,
        body.dark-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        body.sunset-theme { 
            background: linear-gradient(135deg, #f83600 0%, #f9d423 100%); 
            color: white; 
        }
        body.sunset-theme .nav-link,
        body.sunset-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        body.ocean-theme { 
            background: linear-gradient(135deg, #1c92d2 0%, #0f2027 100%); 
            color: white; 
        }
        body.ocean-theme .nav-link,
        body.ocean-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        body.forest-theme { 
            background: linear-gradient(135deg, #134e5e 0%, #2c3e50 100%); 
            color: white; 
        }
        body.forest-theme .nav-link,
        body.forest-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }
        
        body.candy-theme { 
            background: linear-gradient(135deg, #f43b47 0%, #6a3093 100%); 
            color: white; 
        }
        body.candy-theme .nav-link,
        body.candy-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.15);
            color: white;
        }

        /* ===== АДАПТИВ ДЛЯ МОБИЛОК ===== */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            
            .logo-small {
                font-size: 1.5rem;
                text-align: center;
            }
            
            .nav-menu {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .nav-link {
                padding: 8px 12px;
                font-size: 0.85rem;
                white-space: nowrap;
            }
            
            .header-right {
                width: 100%;
            }
            
            .user-card {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                padding: 8px;
            }
            
            .avatar {
                width: 35px;
                height: 35px;
                font-size: 0.9rem;
            }
            
            .logout-btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            .quizzes-section {
                padding: 15px;
            }
            
            .section-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            
            .section-header div {
                display: flex;
                gap: 8px;
                width: 100%;
            }
            
            .section-title {
                font-size: 1.3rem;
            }
            
            .create-btn, .shop-btn {
                flex: 1;
                padding: 10px;
                font-size: 0.9rem;
                white-space: nowrap;
            }
            
            .quiz-tabs {
                flex-wrap: wrap;
            }
            
            .tab-btn {
                flex: 1;
                min-width: 100px;
                padding: 10px;
                font-size: 0.9rem;
            }
            
            .quizzes-grid {
                grid-template-columns: 1fr;
                max-height: none;
                overflow-y: visible;
            }
            
            .quiz-card {
                width: 100%;
            }
            
            .login-card {
                padding: 30px 20px;
                width: 95%;
            }
            
            .login-title {
                font-size: 2rem;
            }
            
            .role-selector {
                flex-direction: column;
                gap: 10px;
            }
            
            .role-btn {
                width: 100%;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .answers-grid {
                grid-template-columns: 1fr;
            }
            
            .constructor-window {
                padding: 15px;
                max-height: 95vh;
                width: 98%;
            }
            
            .quiz-stats {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .quiz-actions {
                flex-direction: column;
            }
            
            .quiz-action-btn {
                width: 100%;
            }
            
            .theme-color {
                width: 30px;
                height: 30px;
            }
        }

        @media (max-width: 480px) {
            .nav-menu {
                gap: 5px;
            }
            
            .nav-link {
                width: calc(50% - 3px);
                text-align: center;
                padding: 8px 5px;
                font-size: 0.75rem;
            }
            
            .user-card {
                justify-content: center;
                gap: 8px;
            }
            
            .avatar {
                width: 30px;
                height: 30px;
            }
            
            .coins, .tokens {
                font-size: 0.9rem;
            }
            
            .logout-btn {
                width: 100%;
                text-align: center;
            }
            
            .section-title {
                font-size: 1.1rem;
            }
            
            .quiz-title {
                font-size: 1.1rem;
            }
            
            .quiz-stats {
                font-size: 0.8rem;
            }
            
            .quiz-tabs {
                gap: 5px;
            }
            
            .tab-btn {
                font-size: 0.8rem;
                padding: 8px 5px;
            }
            
            .constructor-title {
                font-size: 1.3rem;
            }
            
            .form-group label {
                font-size: 0.9rem;
            }
            
            .question-card {
                padding: 12px;
            }
            
            .answer-option {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .answer-option input[type="radio"] {
                margin-bottom: 5px;
            }
        }

        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            overflow-x: hidden;
        }

        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 50px;
            width: 500px;
            max-width: 100%;
            text-align: center;
        }

        .login-title {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: #6366f1;
            border-color: white;
            box-shadow: 0 0 20px #6366f1;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-family: 'Comfortaa', cursive;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #6366f1;
        }

        .register-link {
            margin-top: 20px;
            color: white;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.8;
        }

        .main-screen {
            display: none;
        }

        .main-screen.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            width: 100%;
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-link.active {
            background: #6366f1;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .coins {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .tokens {
            color: #00ffff;
            font-weight: 600;
            font-size: 1.1rem;
            margin-left: 10px;
        }

        .quizzes-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            word-break: break-word;
        }

        .quiz-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Comfortaa', cursive;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #6366f1;
            border-color: white;
            box-shadow: 0 0 15px #6366f1;
        }

        .create-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .create-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #10b981;
        }

        .shop-btn {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .shop-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #f59e0b;
        }

        .quizzes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
            width: 100%;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
            width: 100%;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .quiz-card.free {
            border-left: 5px solid #10b981;
        }

        .quiz-card.premium {
            border-left: 5px solid #f59e0b;
        }

        .quiz-card.private {
            border-left: 5px solid #6366f1;
        }

        .quiz-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .quiz-theme-badge {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .quiz-class {
            background: rgba(255, 255, 255, 0.3);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .quiz-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .quiz-subject {
            opacity: 0.8;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .quiz-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .quiz-price {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .quiz-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .quiz-action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .quiz-action-btn.play {
            background: #10b981;
            color: white;
        }

        .quiz-action-btn.edit {
            background: #f59e0b;
            color: white;
        }

        .quiz-action-btn.buy {
            background: #ffd700;
            color: #4a4a4a;
        }

        .constructor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .constructor-overlay.active {
            display: flex;
        }

        .constructor-window {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 3px solid #6366f1;
            border-radius: 50px;
            width: 1000px;
            max-width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .constructor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .constructor-title {
            font-size: 2rem;
            color: #6366f1;
            word-break: break-word;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ef4444;
            color: #ef4444;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #6366f1;
            font-weight: 600;
            word-break: break-word;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            color: white;
            font-family: 'Comfortaa', cursive;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 15px #6366f1;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-number {
            color: #6366f1;
            font-weight: 600;
        }

        .remove-question {
            color: #ef4444;
            cursor: pointer;
            font-weight: 600;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 10px;
        }

        .answer-option input[type="radio"] {
            accent-color: #10b981;
            flex-shrink: 0;
            width: 18px;
            height: 18px;
        }

        .answer-option input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-family: 'Comfortaa', cursive;
            padding: 5px;
        }

        .answer-option input[type="text"]:focus {
            outline: none;
            border-bottom: 1px solid #10b981;
        }

        .add-question-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin: 20px 0;
            transition: all 0.3s;
        }

        .add-question-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #10b981;
        }

        .save-quiz-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .save-quiz-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #6366f1;
        }

        .publish-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== SUPABASE КОНФИГ =====
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        // ===== ТГ БОТ =====
        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let currentUser = null;
        let selectedRole = 'teacher';
        let userCoins = 100;
        let userTokens = 0;
        let userThemes = ['pink'];
        let quizQuestions = [];
        let editingQuizId = null;
        let isModerator = false;
        let currentTab = 'free';

        // ===== РАСШИРЕННЫЙ СПИСОК ТЕМ =====
        const allThemes = [
            { id: 'pink', name: '🌸 Розовая', price: 0, color: '#ff0844' },
            { id: 'blue', name: '💙 Синяя', price: 50, color: '#00c6fb' },
            { id: 'green', name: '💚 Зеленая', price: 100, color: '#00b09b' },
            { id: 'purple', name: '💜 Фиолетовая', price: 150, color: '#8e2de2' },
            { id: 'orange', name: '🧡 Оранжевая', price: 200, color: '#f12711' },
            { id: 'dark', name: '🖤 Темная', price: 300, color: '#141e30' },
            { id: 'sunset', name: '🌅 Закат', price: 250, color: '#f83600' },
            { id: 'ocean', name: '🌊 Океан', price: 275, color: '#1c92d2' },
            { id: 'forest', name: '🌲 Лес', price: 225, color: '#134e5e' },
            { id: 'candy', name: '🍭 Карамель', price: 200, color: '#f43b47' }
        ];

        // ===== ФУНКЦИЯ ОТПРАВКИ В ТГ =====
        async function sendToTG(message) {
            try {
                const url = `https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TG_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.error('Ошибка отправки в ТГ:', e);
            }
        }

        // ===== ХЕШ ПАРОЛЯ =====
        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        // ===== ФУНКЦИИ ТЕМЫ =====
        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
        }

        // ===== ФУНКЦИИ ЛОГИНА =====
        window.selectRole = function(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        };

        window.showRegister = function() {
            const name = prompt('Введите имя:');
            if (!name) return;
            const pass = prompt('Введите пароль (мин. 3 символа):');
            if (!pass || pass.length < 3) {
                alert('Пароль должен быть минимум 3 символа');
                return;
            }
            registerUser(name, pass);
        };

        async function registerUser(name, pass) {
            try {
                const { data: existing } = await sb.from('users').select('*').eq('username', name);
                if (existing && existing.length > 0) {
                    document.getElementById('errorMsg').textContent = 'Это имя уже занято';
                    return;
                }

                const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                
                await sb.from('users').insert({
                    id: userId,
                    username: name,
                    password: hashPassword(pass),
                    role: selectedRole,
                    coins: 100,
                    themes: ['pink'],
                    liked_quizzes: [],
                    role_title: 'user',
                    created_at: new Date().toISOString()
                });

                await sb.from('user_tokens').insert({
                    user_id: userId,
                    balance: 0,
                    referral_code: 'ref_' + userId + '_' + Math.floor(Math.random() * 1000000)
                });

                currentUser = { 
                    id: userId, 
                    username: name, 
                    role: selectedRole, 
                    coins: 100, 
                    themes: ['pink'],
                    liked_quizzes: [],
                    role_title: 'user'
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                sendToTG(`🆕 Новый пользователь:\nИмя: ${name}\nРоль: ${selectedRole}`);
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI();
                loadQuizzes();

                const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                applyTheme(savedTheme);

            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message;
            }
        }

        window.doLogin = async function() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!name || !pass) {
                document.getElementById('errorMsg').textContent = 'Введите имя и пароль';
                return;
            }

            if (name === 'Ильяблоко' && pass === 'JojoTop1') {
                currentUser = { 
                    id: 'admin', 
                    username: 'Ильяблоко', 
                    role: 'teacher', 
                    coins: 9999, 
                    themes: allThemes.map(t => t.id),
                    liked_quizzes: [],
                    role_title: 'chief'
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                userCoins = 9999;
                userTokens = 9999;
                userThemes = allThemes.map(t => t.id);
                isModerator = true;
                
                sendToTG(`👑 Вход разработчика: Ильяблоко`);
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI();
                loadQuizzes();
                
                const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                applyTheme(savedTheme);
                return;
            }

            try {
                const { data: users } = await sb.from('users').select('*').eq('username', name);
                const user = users && users[0];

                if (user && user.password === hashPassword(pass)) {
                    const { data: tokens } = await sb.from('user_tokens').select('balance').eq('user_id', user.id).single();
                    
                    currentUser = { 
                        id: user.id, 
                        username: user.username, 
                        role: user.role,
                        coins: user.coins || 100,
                        themes: user.themes || ['pink'],
                        liked_quizzes: user.liked_quizzes || [],
                        role_title: user.role_title || 'user'
                    };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    userCoins = currentUser.coins;
                    userTokens = tokens?.balance || 0;
                    userThemes = currentUser.themes;
                    isModerator = ['chief', 'curator', 'moderator'].includes(user.role_title);
                    
                    sendToTG(`🔑 Вход: ${name} (${user.role_title})`);
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainScreen').classList.add('active');
                    updateUI();
                    loadQuizzes();
                    
                    const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                    applyTheme(savedTheme);
                } else {
                    document.getElementById('errorMsg').textContent = 'Неверное имя или пароль';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message;
            }
        };

        window.logout = function() {
            if (currentUser) {
                sendToTG(`🚪 Выход: ${currentUser.username}`);
            }
            localStorage.removeItem('currentUser');
            window.location.reload();
        };

        function updateUI() {
            const s = document.getElementById('userSection');
            const actionDiv = document.getElementById('actionButtons');
            
            if (!s) return;
            
            if (currentUser) {
                const roleEmoji = {
                    'chief': '👑',
                    'curator': '⭐',
                    'moderator': '🛡️',
                    'user': '👤'
                }[currentUser.role_title] || '👤';
                
                s.innerHTML = `
                    <div class="user-card">
                        <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                        <span>${currentUser.username}</span>
                        <span class="role-badge role-${currentUser.role_title}">${roleEmoji} ${currentUser.role_title}</span>
                        <span class="coins"><i class="fas fa-coins"></i> ${currentUser.coins || 0}</span>
                        <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                        <button onclick="logout()" class="logout-btn">Выйти</button>
                    </div>
                `;
                
                if (currentUser.role === 'teacher') {
                    document.getElementById('quizzesTitle').textContent = 'Мои викторины';
                    actionDiv.innerHTML = `
                        <a href="shop.html">
                            <button class="shop-btn">
                                <i class="fas fa-store"></i> Магазин
                            </button>
                        </a>
                        <button class="create-btn" onclick="openConstructor()">
                            <i class="fas fa-plus"></i> Создать
                        </button>
                    `;
                } else {
                    document.getElementById('quizzesTitle').textContent = 'Доступные викторины';
                    actionDiv.innerHTML = `
                        <a href="shop.html">
                            <button class="shop-btn">
                                <i class="fas fa-store"></i> Магазин тем
                            </button>
                        </a>
                    `;
                }
            }
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadQuizzes();
        };

        async function loadQuizzes() {
            if (!currentUser) return;
            
            try {
                let query = sb.from('quizzes').select('*');
                
                if (currentTab === 'free') {
                    query = query.eq('type', 'kahoot').eq('published', true);
                } else if (currentTab === 'premium') {
                    query = query.eq('type', 'constructed').eq('published', true);
                } else if (currentTab === 'my') {
                    if (currentUser.role === 'teacher') {
                        query = query.eq('created_by', currentUser.id);
                    } else {
                        // Здесь можно добавить логику для купленных викторин
                        query = query.eq('created_by', 'admin').limit(0); // Временно пусто
                    }
                }
                
                const { data: quizzes, error } = await query;
                
                if (error) {
                    console.error('Ошибка загрузки:', error);
                }
                
                const container = document.getElementById('myQuizzesList');
                
                if (!quizzes || quizzes.length === 0) {
                    if (currentTab === 'free') {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-icon">🎁</div>
                                <p>Бесплатных викторин пока нет</p>
                            </div>
                        `;
                    } else if (currentTab === 'premium') {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-icon">💎</div>
                                <p>Премиум викторин пока нет</p>
                                <a href="shop.html"><button class="shop-btn">Перейти в магазин</button></a>
                            </div>
                        `;
                    } else {
                        if (currentUser.role === 'teacher') {
                            container.innerHTML = `
                                <div class="empty-state">
                                    <div class="empty-icon">📚</div>
                                    <p>У вас пока нет викторин</p>
                                    <button class="create-btn" style="margin-top: 15px;" onclick="openConstructor()">Создать первую</button>
                                </div>
                            `;
                        } else {
                            container.innerHTML = `
                                <div class="empty-state">
                                    <div class="empty-icon">📚</div>
                                    <p>У вас пока нет купленных викторин</p>
                                </div>
                            `;
                        }
                    }
                    return;
                }

                let html = '';
                for (let q of quizzes) {
                    const theme = allThemes.find(t => t.id === q.theme) || allThemes[0];
                    
                    const cardClass = q.type === 'kahoot' ? 'free' : 'premium';
                    
                    html += `
                        <div class="quiz-card ${cardClass}">
                            <div class="quiz-card-header">
                                <div class="quiz-theme-badge" style="background: ${theme.color};"></div>
                                <div class="quiz-class">${q.class || ''}</div>
                            </div>
                            <div class="quiz-title">${q.title}</div>
                            <div class="quiz-subject">${q.subject || ''}</div>
                            <div class="quiz-stats">
                                <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                                ${q.type === 'constructed' ? `<span class="quiz-price"><i class="fas fa-gem"></i> ${q.price_tokens || 0}</span>` : ''}
                            </div>
                    `;
                    
                    if (currentTab === 'premium' && currentUser.role === 'student') {
                        html += `
                            <div class="quiz-actions">
                                <div class="quiz-action-btn buy" onclick="buyQuiz('${q.id}', ${q.price_tokens})">
                                    <i class="fas fa-shopping-cart"></i> Купить
                                </div>
                            </div>
                        `;
                    } else if (currentUser.role === 'teacher' && currentTab === 'my') {
                        html += `
                            <div class="quiz-actions">
                                <div class="quiz-action-btn play" onclick="playQuiz('${q.id}')">
                                    <i class="fas fa-play"></i> Играть
                                </div>
                                <div class="quiz-action-btn edit" onclick="editQuiz('${q.id}')">
                                    <i class="fas fa-edit"></i>
                                </div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="quiz-actions">
                                <div class="quiz-action-btn play" onclick="playQuiz('${q.id}')">
                                    <i class="fas fa-play"></i> Играть
                                </div>
                            </div>
                        `;
                    }
                    
                    html += `</div>`;
                }
                container.innerHTML = html;
            } catch (error) {
                console.error('Ошибка загрузки викторин:', error);
            }
        }

        window.buyQuiz = async function(quizId, price) {
            if (!currentUser) return;
            
            if (userTokens < price) {
                alert('Недостаточно токенов!');
                return;
            }
            
            if (confirm(`Купить викторину за ${price} токенов?`)) {
                try {
                    const { data, error } = await sb.rpc('buy_quiz_with_tokens', { 
                        p_user_id: currentUser.id, 
                        p_quiz_id: quizId 
                    });
                    
                    if (error) throw error;
                    
                    if (data) {
                        userTokens -= price;
                        updateUI();
                        alert('✅ Викторина куплена!');
                        sendToTG(`💎 ${currentUser.username} купил викторину за ${price} токенов`);
                    } else {
                        alert('❌ Ошибка при покупке');
                    }
                } catch (error) {
                    console.error('Ошибка покупки:', error);
                    alert('Ошибка: ' + error.message);
                }
            }
        };

        window.playQuiz = function(quizId) {
            if (!quizId) return;
            
            if (currentUser.role === 'teacher') {
                window.location.href = `teacher.html?quiz=${quizId}`;
            } else {
                window.location.href = `student.html?quiz=${quizId}`;
            }
        };

        window.editQuiz = function(quizId) {
            openConstructor(quizId);
        };

        // ===== КОНСТРУКТОР =====
        window.openConstructor = function(editId = null) {
            if (!currentUser) {
                alert('Сначала войдите в систему');
                return;
            }
            if (currentUser.role !== 'teacher') {
                alert('Только учителя могут создавать викторины');
                return;
            }
            
            editingQuizId = editId;
            
            if (editId) {
                document.getElementById('constructorTitle').textContent = '✏️ Редактирование викторины';
                loadQuizForEdit(editId);
            } else {
                document.getElementById('constructorTitle').textContent = '🛠️ Создание викторины';
                quizQuestions = [];
                document.getElementById('quizTitle').value = '';
                document.getElementById('quizClass').value = '';
                document.getElementById('quizSubject').value = '';
                document.getElementById('quizTheme').value = 'pink';
                document.getElementById('quizType').value = 'kahoot';
                document.getElementById('quizPriceTokens').value = '0';
                document.getElementById('publishToStore').checked = false;
                renderQuestions();
            }
            
            document.getElementById('constructorOverlay').classList.add('active');
        };

        async function loadQuizForEdit(quizId) {
            try {
                const { data: quiz } = await sb.from('quizzes').select('*').eq('id', quizId).single();
                const { data: questions } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
                
                if (quiz) {
                    document.getElementById('quizTitle').value = quiz.title || '';
                    document.getElementById('quizClass').value = quiz.class || '';
                    document.getElementById('quizSubject').value = quiz.subject || '';
                    document.getElementById('quizTheme').value = quiz.theme || 'pink';
                    document.getElementById('quizType').value = quiz.type || 'kahoot';
                    document.getElementById('quizPriceTokens').value = quiz.price_tokens || 0;
                    document.getElementById('publishToStore').checked = false;
                }
                
                quizQuestions = (questions || []).map(q => ({
                    id: q.id || Date.now() + Math.random(),
                    question: q.question,
                    answers: q.answers || ['', '', '', ''],
                    correct: q.correct || 0
                }));
                
                renderQuestions();
            } catch (error) {
                console.error('Ошибка загрузки викторины для редактирования:', error);
                alert('Не удалось загрузить викторину');
            }
        }

        window.closeConstructor = function() {
            document.getElementById('constructorOverlay').classList.remove('active');
            editingQuizId = null;
        };

        window.addQuestion = function() {
            quizQuestions.push({
                id: Date.now() + Math.random(),
                question: '',
                answers: ['', '', '', ''],
                correct: 0
            });
            renderQuestions();
        };

        window.removeQuestion = function(index) {
            if (quizQuestions.length <= 1) {
                alert('Должен быть хотя бы один вопрос');
                return;
            }
            quizQuestions.splice(index, 1);
            renderQuestions();
        };

        window.updateQuestion = function(index, field, value) {
            if (field === 'question') {
                quizQuestions[index].question = value;
            } else if (field.startsWith('answer')) {
                let ai = parseInt(field.replace('answer', ''));
                quizQuestions[index].answers[ai] = value;
            } else if (field === 'correct') {
                quizQuestions[index].correct = parseInt(value);
            }
        };

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            if (!container) return;
            
            if (quizQuestions.length === 0) {
                container.innerHTML = '<p style="text-align: center; opacity: 0.7;">Добавьте первый вопрос</p>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < quizQuestions.length; i++) {
                let q = quizQuestions[i];
                html += `
                    <div class="question-card">
                        <div class="question-header">
                            <span class="question-number">Вопрос ${i+1}</span>
                            <span class="remove-question" onclick="removeQuestion(${i})">✕</span>
                        </div>
                        <input type="text" placeholder="Текст вопроса" value="${(q.question || '').replace(/"/g, '&quot;')}" 
                               onchange="updateQuestion(${i}, 'question', this.value)" style="width:100%; padding:10px; margin-bottom:10px;">
                        <div class="answers-grid">
                            ${[0,1,2,3].map(j => `
                                <div class="answer-option">
                                    <input type="radio" name="correct-${q.id || i}" value="${j}" ${q.correct === j ? 'checked' : ''} 
                                           onchange="updateQuestion(${i}, 'correct', this.value)">
                                    <input type="text" placeholder="Ответ ${j+1}" value="${(q.answers[j] || '').replace(/"/g, '&quot;')}" 
                                           onchange="updateQuestion(${i}, 'answer${j}', this.value)">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        async function addCoins(userId, amount, reason) {
            if (!userId) return null;
            
            try {
                const { data: user } = await sb.from('users').select('coins').eq('id', userId).single();
                if (!user) return null;
                
                const newCoins = (user.coins || 0) + amount;
                await sb.from('users').update({ coins: newCoins }).eq('id', userId);
                
                if (currentUser && currentUser.id === userId) {
                    currentUser.coins = newCoins;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateUI();
                }
                
                sendToTG(`💰 ${currentUser?.username} получил ${amount} монет (${reason})`);
                
                return newCoins;
            } catch (error) {
                console.error('Ошибка добавления монет:', error);
                return null;
            }
        }

        window.saveQuiz = async function() {
            if (!currentUser) {
                alert('Ошибка: пользователь не найден');
                return;
            }

            const title = document.getElementById('quizTitle').value.trim();
            const quizClass = document.getElementById('quizClass').value.trim();
            const subject = document.getElementById('quizSubject').value.trim();
            const theme = document.getElementById('quizTheme').value;
            const type = document.getElementById('quizType').value;
            const price = parseInt(document.getElementById('quizPriceTokens').value) || 0;
            const publish = document.getElementById('publishToStore').checked;

            if (!title) {
                alert('Введите название викторины');
                return;
            }

            if (quizQuestions.length === 0) {
                alert('Добавьте хотя бы один вопрос');
                return;
            }

            for (let i = 0; i < quizQuestions.length; i++) {
                const q = quizQuestions[i];
                
                if (!q.question || q.question.trim() === '') {
                    alert(`Заполните текст вопроса ${i+1}`);
                    return;
                }
                
                for (let j = 0; j < 4; j++) {
                    if (!q.answers[j] || q.answers[j].trim() === '') {
                        alert(`Заполните ответ ${j+1} в вопросе ${i+1}`);
                        return;
                    }
                }
                
                if (q.correct === undefined || q.correct === null) {
                    alert(`Выберите правильный ответ в вопросе ${i+1}`);
                    return;
                }
            }

            try {
                if (editingQuizId) {
                    await sb.from('quizzes').update({
                        title: title,
                        class: quizClass,
                        subject: subject,
                        theme: theme,
                        type: type,
                        price_tokens: price,
                        question_count: quizQuestions.length,
                        max_score: quizQuestions.length,
                        published: publish
                    }).eq('id', editingQuizId);

                    await sb.from('questions').delete().eq('quiz_id', editingQuizId);

                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: editingQuizId,
                            question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct
                        });
                    }

                    sendToTG(`✏️ ${currentUser.username} отредактировал викторину: ${title}`);
                    alert('✅ Викторина обновлена!');
                    
                } else {
                    const quizId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                    
                    const { error } = await sb.from('quizzes').insert({
                        id: quizId,
                        title: title,
                        class: quizClass,
                        subject: subject,
                        theme: theme,
                        type: type,
                        price_tokens: price,
                        question_count: quizQuestions.length,
                        max_score: quizQuestions.length,
                        created_by: currentUser.id,
                        published: publish,
                        likes: 0,
                        created_at: Date.now()
                    });

                    if (error) {
                        console.error('Ошибка при вставке викторины:', error);
                        alert('Ошибка базы данных: ' + error.message);
                        return;
                    }

                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: quizId,
                            question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct
                        });
                    }

                    await addCoins(currentUser.id, 50, 'created_quiz');
                    
                    if (publish) {
                        await addCoins(currentUser.id, 100, 'published_quiz');
                        sendToTG(`📢 ${currentUser.username} опубликовал викторину в магазине: ${title} (+100 монет)`);
                    } else {
                        sendToTG(`📝 ${currentUser.username} создал викторину: ${title} (+50 монет)`);
                    }

                    alert(publish ? '✅ Викторина опубликована! +150 монет' : '✅ Викторина сохранена! +50 монет');
                }

                closeConstructor();
                await loadQuizzes();

            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('Ошибка: ' + error.message);
            }
        };

        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        (function checkAuth() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    userCoins = currentUser.coins || 100;
                    userThemes = currentUser.themes || ['pink'];
                    isModerator = currentUser.is_moderator || false;
                    
                    // Загружаем токены
                    sb.from('user_tokens').select('balance').eq('user_id', currentUser.id).single().then(({ data }) => {
                        userTokens = data?.balance || 0;
                        updateUI();
                    });
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainScreen').classList.add('active');
                    updateUI();
                    loadQuizzes();
                    
                    const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                    applyTheme(savedTheme);
                } catch (e) {
                    console.error('Ошибка парсинга пользователя:', e);
                    localStorage.removeItem('currentUser');
                }
            }
        })();
    </script>
</body>
