<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
        }

        body.light-theme {
            background: #f0f0f0;
            color: #333;
        }

        .header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.light-theme .header {
            background: #fff;
            border-bottom: 2px solid #6366f1;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .logo-il { color: #6366f1; }
        .logo-yaclass { color: #f59e0b; }

        .nav-menu {
            display: flex;
            gap: 10px;
        }

        .nav-link {
            padding: 8px 15px;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
        }

        body.light-theme .nav-link {
            background: #e0e0e0;
            color: #333;
        }

        .nav-link.active {
            background: #6366f1;
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 5px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #6366f1;
        }

        .logout-btn, .theme-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            background: #6366f1;
            color: white;
            cursor: pointer;
        }

        .main-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .login-card {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            width: 400px;
        }

        body.light-theme .login-card {
            background: white;
            border: 2px solid #6366f1;
        }

        .login-title {
            font-size: 32px;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-big-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 5px;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .login-options {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .login-option-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 3px;
            background: #2a2a4a;
            color: white;
            cursor: pointer;
        }

        body.light-theme .login-option-btn {
            background: #e0e0e0;
            color: #333;
        }

        .login-option-btn.active {
            background: #6366f1;
            color: white;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        body.light-theme .modal-content {
            background: white;
            border: 2px solid #6366f1;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #6366f1;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #6366f1;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 3px;
            border: 1px solid #6366f1;
            background: rgba(0,0,0,0.2);
            color: white;
        }

        body.light-theme .form-group input,
        body.light-theme .form-group select {
            background: white;
            color: #333;
        }

        .submit-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 3px;
            width: 100%;
            cursor: pointer;
        }

        .close-btn {
            margin-top: 10px;
            background: transparent;
            border: 1px solid #6366f1;
            color: #6366f1;
            padding: 10px;
            border-radius: 3px;
            width: 100%;
            cursor: pointer;
        }

        .test-accounts {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 5px;
            font-size: 12px;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .subject-card {
            background: rgba(99,102,241,0.1);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
        }

        .subject-card.selected {
            background: #6366f1;
            color: white;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .add-quiz-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .quiz-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 15px;
        }

        body.light-theme .quiz-card {
            background: #f9f9f9;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .quiz-badge {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
        }

        .badge-kahoot { background: #f59e0b; }
        .badge-simple { background: #10b981; }
        .badge-constructed { background: #6366f1; }
        .badge-board { background: #ef4444; }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 16px;
            cursor: pointer;
        }

        .quiz-class {
            background: #6366f1;
            display: inline-block;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            margin-bottom: 8px;
        }

        .quiz-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .quiz-actions {
            display: flex;
            gap: 5px;
            margin-top: 10px;
        }

        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: white;
        }

        .btn-teacher { background: #6366f1; }
        .btn-student { background: #10b981; }
        .btn-external { background: #f59e0b; }

        .sessions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .session-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 15px;
        }

        .session-preview {
            cursor: pointer;
        }

        .session-title {
            font-weight: bold;
            color: #6366f1;
            margin-bottom: 5px;
        }

        .session-meta {
            display: flex;
            gap: 10px;
            font-size: 11px;
            color: #888;
            margin-bottom: 5px;
        }

        .session-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
        }

        .status-active {
            background: #10b981;
            color: white;
        }

        .status-finished {
            background: #6366f1;
            color: white;
        }

        .session-details {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #6366f1;
        }

        .student-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #333;
        }

        .score-input {
            width: 60px;
            padding: 3px;
            border-radius: 3px;
            border: 1px solid #6366f1;
            background: rgba(0,0,0,0.2);
            color: white;
            text-align: center;
        }

        .finish-quiz-btn, .save-scores-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 3px;
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        .quiz-form {
            background: #16213e;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }

        body.light-theme .quiz-form {
            background: #f9f9f9;
        }

        .quiz-form.visible {
            display: block;
        }

        .radio-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }

        .radio-option {
            flex: 1;
            padding: 10px;
            border: 1px solid #6366f1;
            border-radius: 3px;
            text-align: center;
            cursor: pointer;
        }

        .radio-option.selected {
            background: #6366f1;
            color: white;
        }

        .question-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .remove-question {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 18px;
            cursor: pointer;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 5px 0;
            padding: 5px;
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
        }

        .add-question-btn {
            background: transparent;
            border: 2px dashed #6366f1;
            color: #6366f1;
            padding: 10px;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
        }

        .results-container {
            background: rgba(255,255,255,0.05);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 20px;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(0,0,0,0.2);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            color: #6366f1;
        }

        .results-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .results-table th {
            background: rgba(99,102,241,0.1);
            padding: 10px;
            text-align: left;
        }

        .results-table td {
            padding: 10px;
            border-bottom: 1px solid #333;
        }

        .profile-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        .profile-sidebar, .profile-main {
            background: rgba(255,255,255,0.05);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 20px;
        }

        .profile-sidebar {
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #6366f1;
            margin: 0 auto 15px;
        }

        .profile-name {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .profile-role {
            display: inline-block;
            padding: 5px 15px;
            background: #6366f1;
            border-radius: 3px;
            margin-top: 10px;
        }

        .settings-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #6366f1;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #333;
        }

        .setting-input {
            padding: 5px;
            border-radius: 3px;
            border: 1px solid #6366f1;
            background: rgba(0,0,0,0.2);
            color: white;
            width: 200px;
        }

        .danger-zone {
            margin-top: 20px;
            padding: 20px;
            background: rgba(239,68,68,0.1);
            border: 1px solid #ef4444;
            border-radius: 5px;
            text-align: center;
        }

        .clear-stats-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            .quiz-actions {
                flex-direction: column;
            }
            .setting-item {
                flex-direction: column;
                align-items: start;
                gap: 10px;
            }
            .setting-input {
                width: 100%;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link">Профиль</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка...</div>
    </main>

    <!-- Модальные окна -->
    <div id="simpleLoginModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 400px;">
            <h2>🔑 Вход</h2>
            <div class="login-options">
                <button class="login-option-btn active" onclick="showSimpleLogin()">👤 По нику</button>
                <button class="login-option-btn" onclick="showGoogleLogin()">G Google</button>
            </div>
            <div id="googleLoginSection" style="display: none;">
                <button class="login-big-btn" onclick="signIn()">Войти через Google</button>
            </div>
            <div id="simpleLoginSection">
                <div class="form-group">
                    <input type="text" id="simpleUsername" placeholder="Никнейм">
                </div>
                <div class="form-group">
                    <input type="password" id="simplePassword" placeholder="Пароль">
                </div>
                <button class="submit-btn" onclick="simpleLogin()">Войти</button>
                <button class="close-btn" onclick="showRegisterModal()">Регистрация</button>
            </div>
            <div class="test-accounts">
                Тестовые: teacher/123, student/123, moderator/123, Илья/123
            </div>
            <button class="close-btn" onclick="closeLoginModal()">Закрыть</button>
        </div>
    </div>

    <div id="registerModal" class="modal-overlay" style="display: none;">
        <div class="modal-content" style="max-width: 450px;">
            <h2>📝 Регистрация</h2>
            <div class="form-group">
                <input type="text" id="regUsername" placeholder="Никнейм">
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="Пароль">
            </div>
            <div class="form-group">
                <input type="password" id="regPasswordConfirm" placeholder="Повторите пароль">
            </div>
            <div class="form-group">
                <select id="regRole">
                    <option value="student">Ученик</option>
                    <option value="teacher">Учитель</option>
                </select>
            </div>
            <button class="submit-btn" onclick="registerUser()">Зарегистрироваться</button>
            <button class="close-btn" onclick="closeRegisterModal()">Назад</button>
        </div>
    </div>

    <div id="roleModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Выберите роль</h2>
            <div style="display: flex; gap: 20px;">
                <div style="flex:1; padding:20px; border:1px solid #6366f1; text-align:center; cursor:pointer;" onclick="selectRole('teacher')">
                    <div style="font-size:32px;">👨‍🏫</div>
                    <h3>Учитель</h3>
                </div>
                <div style="flex:1; padding:20px; border:1px solid #6366f1; text-align:center; cursor:pointer;" onclick="selectRole('student')">
                    <div style="font-size:32px;">👨‍🎓</div>
                    <h3>Ученик</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="subjectModal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h2>Ваши предметы</h2>
            <div id="subjectsCheckboxList" style="display: grid; grid-template-columns: repeat(2,1fr); gap:10px;"></div>
            <div style="display: flex; gap: 10px; margin: 20px 0;">
                <input type="text" id="newSubjectInput" placeholder="Новый предмет" style="flex:1;">
                <button class="add-quiz-btn" onclick="addNewSubject()">➕</button>
            </div>
            <button class="submit-btn" onclick="saveTeacherSubjects()">Сохранить</button>
            <button class="close-btn" onclick="skipSubjectSelection()">Пропустить</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        function cleanDisplayName(name) {
            return name ? name.replace(/\s*\(\d+\)$/, '') : name;
        }

        function getBaseName(name) {
            return name ? name.replace(/\s*\(\d+\)$/, '').trim() : name;
        }

        function checkIfModerator(name) {
            return name ? /\s*\(\d+\)$/.test(name) : false;
        }

        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        function getCurrentSimpleUser() {
            const u = localStorage.getItem('currentSimpleUser');
            return u ? JSON.parse(u) : null;
        }

        function toggleTheme() {
            const b = document.body;
            const t = document.getElementById('themeToggle');
            if (b.classList.contains('dark-theme')) {
                b.classList.replace('dark-theme', 'light-theme');
                t.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                b.classList.replace('light-theme', 'dark-theme');
                t.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        window.showLoginModal = function() {
            document.getElementById('simpleLoginModal').style.display = 'flex';
        }

        window.closeLoginModal = function() {
            document.getElementById('simpleLoginModal').style.display = 'none';
        }

        window.showGoogleLogin = function() {
            document.getElementById('googleLoginSection').style.display = 'block';
            document.getElementById('simpleLoginSection').style.display = 'none';
        }

        window.showSimpleLogin = function() {
            document.getElementById('googleLoginSection').style.display = 'none';
            document.getElementById('simpleLoginSection').style.display = 'block';
        }

        window.showRegisterModal = function() {
            closeLoginModal();
            document.getElementById('registerModal').style.display = 'flex';
        }

        window.closeRegisterModal = function() {
            document.getElementById('registerModal').style.display = 'none';
            showLoginModal();
        }

        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('modal-overlay')) {
                e.target.style.display = 'none';
            }
        });

        let currentUser = null;
        let userRole = null;
        let userFullName = null;
        let userIsModerator = false;
        let teacherSubjects = [];
        let selectedSubject = 'all';
        let allSubjects = [];
        let quizQuestions = [];
        let constructorType = 'classic';

        const DEFAULT_AVATAR = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#6366f1"/></svg>';
        const baseSubjects = ['Русский язык','Алгебра','Геометрия','Математика','Химия','Физика','Литература','Английский язык','История','Физкультура'];

        async function loadAllSubjects() {
            const { data, error } = await supabase.from('subjects').select('name');
            if (error) console.error(error);
            allSubjects = data ? data.map(function(s) { return s.name; }) : baseSubjects;
        }

        (async function init() {
            await loadAllSubjects();
            
            const simple = getCurrentSimpleUser();
            if (simple) {
                currentUser = { id: simple.id, email: simple.username+'@local', username: simple.username };
                userRole = simple.role;
                userFullName = simple.fullName || simple.username;
                userIsModerator = simple.isModerator || false;
                updateUI();
                const saved = localStorage.getItem('selectedSubject_'+currentUser.id);
                if (saved && (saved==='all' || allSubjects.includes(saved))) {
                    selectedSubject = saved;
                } else {
                    selectedSubject = 'all';
                }
                loadContent();
            } else {

        async function loadAllQuizzes() {
            const { data: quizzes, error } = await supabase.from('quizzes').select('*');
            if (error || !quizzes) return;
            var cnt = {};
            for (var i = 0; i < allSubjects.length; i++) {
                cnt[allSubjects[i]] = 0;
            }
            for (var i = 0; i < quizzes.length; i++) {
                var q = quizzes[i];
                if (cnt.hasOwnProperty(q.subject)) {
                    cnt[q.subject]++;
                }
            }
            for (var i = 0; i < allSubjects.length; i++) {
                var s = allSubjects[i];
                var el = document.getElementById('count-' + s.replace(/\s/g,''));
                if (el) el.textContent = cnt[s];
            }
            if (userRole === 'student') {
                var el = document.getElementById('count-all');
                if (el) el.textContent = quizzes.length;
            }
            loadQuizzesBySubject(selectedSubject);
        }

        async function loadQuizzesBySubject(subject) {
            let query = supabase.from('quizzes').select('*');
            if (subject !== 'all') {
                query = query.eq('subject', subject);
            }
            const { data: quizzes, error } = await query;
            const cont = document.getElementById('quizzesList');
            if (!cont) return;
            if (!quizzes || quizzes.length === 0) {
                cont.innerHTML = '<p>Нет викторин</p>';
                return;
            }
            let html = '';
            let filt = quizzes;
            if (userRole === 'teacher' && teacherSubjects.length && subject === 'all') {
                filt = [];
                for (var i = 0; i < quizzes.length; i++) {
                    if (teacherSubjects.includes(quizzes[i].subject)) {
                        filt.push(quizzes[i]);
                    }
                }
            }
            for (var i = 0; i < filt.length; i++) {
                var q = filt[i];
                if (userRole === 'student' && q.type === 'kahoot') {
                    const { data: sessions } = await supabase.from('sessions').select('*').eq('quiz_id', q.id);
                    var active = false;
                    if (sessions) {
                        for (var j = 0; j < sessions.length; j++) {
                            if (sessions[j].status === 'active') {
                                active = true;
                                break;
                            }
                        }
                    }
                    if (!active) continue;
                }
                var badge = 'badge-simple';
                var btext = '📝';
                if (q.type === 'kahoot') {
                    badge = 'badge-kahoot';
                    btext = '🎮';
                } else if (q.type === 'constructed') {
                    if (q.constructor_type === 'board') {
                        badge = 'badge-board';
                        btext = '📝';
                    } else {
                        badge = 'badge-constructed';
                        btext = '🛠️';
                    }
                }
                html += '<div class="quiz-card"><div class="quiz-header"><span class="quiz-badge ' + badge + '">' + btext + '</span>';
                if (userRole === 'teacher' || userRole === 'developer' || userIsModerator) {
                    html += '<button class="delete-btn" onclick="deleteQuiz(\'' + q.id + '\')">🗑️</button>';
                }
                html += '</div><div class="quiz-class">' + q.class + 'кл</div><div class="quiz-title">' + q.title + '</div><div class="quiz-subject">' + q.subject + '</div><div class="quiz-actions">';
                if (userRole === 'teacher' || userRole === 'developer' || userIsModerator) {
                    if (q.type === 'kahoot') {
                        html += '<button class="btn btn-teacher" onclick="startQuiz(\'' + q.id + '\',\'' + q.link + '\',\'' + q.subject + '\',\'' + q.title + '\',' + (q.max_score || 0) + ')">▶️</button>';
                    } else if (q.type === 'constructed') {
                        html += '<button class="btn btn-teacher" onclick="startConstructedQuiz(\'' + q.id + '\',\'' + q.constructor_type + '\')">▶️</button>';
                    } else {
                        html += '<a href="' + q.link + '" target="_blank" class="btn btn-external">🌐</a>';
                    }
                } else {
                    if (q.type === 'kahoot') {
                        html += '<button class="btn btn-student" onclick="joinQuiz(\'' + q.id + '\',\'' + q.link + '\',\'' + q.subject + '\',\'' + q.title + '\',' + (q.max_score || 0) + ')">🎮</button>';
                    } else if (q.type === 'constructed' && q.constructor_type !== 'board') {
                        html += '<button class="btn btn-student" onclick="joinConstructedQuiz(\'' + q.id + '\')">🛠️</button>';
                    } else if (q.type === 'constructed' && q.constructor_type === 'board') {
                        html += '<span class="btn" style="background:#f59e0b;">👥</span>';
                    } else {
                        html += '<a href="' + q.link + '" target="_blank" class="btn btn-external">🌐</a>';
                    }
                }
                html += '</div></div>';
            }
            cont.innerHTML = html || '<p>Нет викторин</p>';
        }

        async function loadTeacherSessions() {

            if (!c) return;

                return;

            sessions.sort(function(a,b) { return (b.started_at || 0) - (a.started_at || 0); });

                var s = sessions[i];

                if (s.students) {
                    for (var k in s.students) studentsCount++;
                }
                h += '<div class="session-card"><div class="session-preview" onclick="toggleSessionDetails(\'sess-' + s.session_id + '\')"><div><div class="session-title">' + (s.quiz_subject || '?') + ' - ' + (s.quiz_title || '?') + '</div><div class="session-meta">📅 ' + d + ' 👥 ' + studentsCount + '</div></div><div><span class="session-status ' + (s.status === 'active' ? 'status-active' : 'status-finished') + '">' + (s.status === 'active' ? '🟢' : '🔵') + '</span>▼</div></div><div id="sess-' + s.session_id + '" class="session-details" style="display:none;">' + renderStudents(s.students, s.max_score, s.session_id, s.status);
                if (s.status === 'active') {
                    h += '<button class="finish-quiz-btn" onclick="finishQuiz(\'' + s.session_id + '\')">🏁 Завершить</button>';
                }
                if (s.status === 'finished') {
                    h += '<button class="save-scores-btn" onclick="saveScores(\'' + s.session_id + '\')">💾 Сохранить</button>';
                }
                h += '</div></div>';
            }
            if (userRole === 'developer') {
                h += '<div class="danger-zone"><h3>⚠️ Опасная зона</h3><button class="clear-stats-btn" onclick="clearAllStats()">🗑️ ОЧИСТИТЬ</button></div>';
            }
            c.innerHTML = h;
        }

        window.toggleSessionDetails = function(id) {
            var d = document.getElementById(id);
            if (!d) return;
            if (d.style.display === 'none') {
                d.style.display = 'block';
            } else {
                d.style.display = 'none';
            }
        };

        function renderStudents(st, ms, sid, stat) {
            if (!st) return '<p>👥 Пока нет</p>';
            var keys = Object.keys(st);
            if (!keys.length) return '<p>👥 Пока нет</p>';
            var h = '';
            for (var i = 0; i < keys.length; i++) {
                var id = keys[i];
                var student = st[id];
                h += '<div class="student-item"><span>' + student.name + '</span>';
                if (stat === 'finished') {
                    h += '<input type="number" class="score-input" id="score-' + sid + '-' + id + '" max="' + ms + '" min="0" value="' + (student.score || 0) + '">';
                } else {
                    h += '✓';
                }
                h += '</div>';
            }
            return h;
        }

        window.finishQuiz = async function(id) {
            await supabase.from('sessions').update({ status: 'finished' }).eq('id', id);
            await supabase.from('teacher_sessions').update({ status: 'finished' }).eq('session_id', id);
        };

        window.saveScores = async function(sid) {
            const { data: session } = await supabase.from('sessions').select('*').eq('id', sid).single();
            if (!session || !session.students) return alert('Нет учеников');
            var cnt = 0;
            var keys = Object.keys(session.students);
            for (var i = 0; i < keys.length; i++) {
                var uid = keys[i];
                var inp = document.getElementById('score-' + sid + '-' + uid);
                if (!inp) continue;
                var sc = parseInt(inp.value);
                if (isNaN(sc)) continue;
                await supabase.from('results').insert({
                    id: sid + '_' + uid,
                    student_id: uid,
                    student_name: session.students[uid].name,
                    quiz_subject: session.quiz_subject,
                    quiz_title: session.quiz_title,
                    score: sc,
                    max_score: session.max_score,
                    teacher_id: currentUser.id,
                    session_id: sid,
                    date: Date.now()
                });
                if (!session.students[uid].score) session.students[uid].score = 0;
                session.students[uid].score = sc;
                cnt++;
            }
            await supabase.from('teacher_sessions').update({ students: session.students }).eq('session_id', sid);
            alert('✅ Сохранено ' + cnt);
        };

        window.clearAllStats = async function() {
            if (!confirm('⚠️ Удалить ВСЕ?')) return;
            var p = prompt('Введите "УДАЛИТЬ ВСЁ"');
            if (p !== 'УДАЛИТЬ ВСЁ') return alert('Отмена');
            const { data: results } = await supabase.from('results').select('id');
            if (!results || !results.length) return alert('Нет результатов');
            for (var i = 0; i < results.length; i++) {
                await supabase.from('results').delete().eq('id', results[i].id);
            }
            alert('✅ Удалено ' + results.length);
            window.location.reload();
        };

        function loadStudentResults() {
            supabase.from('results').select('*').eq('student_id', currentUser.id).then(function(res) {
                var results = res.data;
                var c = document.getElementById('myResults');
                if (!c) return;
                if (!results || !results.length) {
                    c.innerHTML = '<p>Нет результатов</p>';
                    return;
                }
                results.sort(function(a,b) { return (b.date || 0) - (a.date || 0); });
                var h = '';
                for (var i = 0; i < results.length; i++) {
                    var r = results[i];
                    var d = r.date ? new Date(r.date).toLocaleString() : '';
                    h += '<div class="result-card"><div>' + (r.quiz_subject || '?') + '</div><div><b>' + (r.quiz_title || '?') + '</b></div><div>' + (r.score || 0) + '/' + (r.max_score || 0) + '</div><div>' + d + '</div></div>';
                }
                c.innerHTML = h;
            });
        }

        window.registerUser = async function() {
            var u = document.getElementById('regUsername') ? document.getElementById('regUsername').value.trim() : '';
            var p = document.getElementById('regPassword') ? document.getElementById('regPassword').value : '';
            var c = document.getElementById('regPasswordConfirm') ? document.getElementById('regPasswordConfirm').value : '';
            var r = document.getElementById('regRole') ? document.getElementById('regRole').value : 'student';
            if (!u || !p) return alert('Заполните поля');
            if (p !== c) return alert('Пароли не совпадают');
            if (p.length < 3) return alert('Пароль минимум 3 символа');
            const { data: existing } = await supabase.from('simple_users').select('username').ilike('username', u);
            if (existing && existing.length) return alert('Ник занят');
            var isMod = /\s*\(\d+\)$/.test(u);
            var isDev = u.toLowerCase() === 'илья' || u.toLowerCase() === 'ilya';
            var id = generateId();
            await supabase.from('simple_users').insert({
                id: id,
                username: u,
                password: hashPassword(p),
                role: isDev ? 'developer' : r,
                is_moderator: isMod,
                full_name: u,
                created_at: Date.now()
            });
            localStorage.setItem('currentSimpleUser', JSON.stringify({ id: id, username: u, role: isDev ? 'developer' : r, isModerator: isMod, fullName: u }));
            closeRegisterModal();
            window.location.reload();
        };

        window.simpleLogin = async function() {
            var u = document.getElementById('simpleUsername') ? document.getElementById('simpleUsername').value.trim() : '';
            var p = document.getElementById('simplePassword') ? document.getElementById('simplePassword').value : '';
            if (!u || !p) return alert('Введите данные');
            const { data: users } = await supabase.from('simple_users').select('*').ilike('username', u);
            var user = users && users[0] ? users[0] : null;
            if (!user) return alert('Пользователь не найден');
            if (user.password !== hashPassword(p)) return alert('Неверный пароль');
            localStorage.setItem('currentSimpleUser', JSON.stringify({
                id: user.id,
                username: user.username,
                role: user.role,
                isModerator: user.is_moderator,
                fullName: user.full_name
            }));
            closeLoginModal();
            window.location.reload();
        };

        setTimeout(async function() {
            var test = [
                { username: 'teacher', password: '123', role: 'teacher' },
                { username: 'student', password: '123', role: 'student' },
                { username: 'moderator', password: '123', role: 'student', isMod: true },
                { username: 'Илья', password: '123', role: 'developer' }
            ];
            for (var i = 0; i < test.length; i++) {
                var t = test[i];
                const { data: existing } = await supabase.from('simple_users').select('username').ilike('username', t.username);
                if (!existing || !existing.length) {
                    await supabase.from('simple_users').insert({
                        id: generateId(),
                        username: t.username,
                        password: hashPassword(t.password),
                        role: t.role,
                        is_moderator: t.isMod || false,
                        full_name: t.username,
                        created_at: Date.now()
                    });
                }
            }
            console.log('✅ Тестовые аккаунты готовы');
        }, 2000);
    </script>
</body>
