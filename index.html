<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Вход</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 50px;
            width: 500px;
            max-width: 100%;
            text-align: center;
        }

        .login-title {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: #6366f1;
            border-color: white;
            box-shadow: 0 0 20px #6366f1;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-family: 'Comfortaa', cursive;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #6366f1;
        }

        .register-link {
            margin-top: 20px;
            color: white;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.8;
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-title">ИЛЬЯКЛАСС</div>
        <div class="login-subtitle">Войдите или зарегистрируйтесь</div>
        
        <div class="role-selector">
            <button class="role-btn active" onclick="selectRole('teacher')">👨‍🏫 Учитель</button>
            <button class="role-btn" onclick="selectRole('student')">👨‍🎓 Ученик</button>
        </div>
        
        <input type="text" id="loginName" class="login-input" placeholder="Имя">
        <input type="password" id="loginPass" class="login-input" placeholder="Пароль">
        
        <button class="login-btn" onclick="doLogin()">🚀 Войти</button>
        <div class="register-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let selectedRole = 'teacher';

        async function sendToTG(msg) {
            try { await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ chat_id:TG_CHAT_ID, text:msg, parse_mode:'HTML' }) }); } catch(e) { console.error(e); }
        }

        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        window.selectRole = function(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };

        window.showRegister = function() {
            const name = prompt('Введите имя:');
            if (!name) return;
            const pass = prompt('Введите пароль (мин. 3 символа):');
            if (!pass || pass.length < 3) { alert('Пароль должен быть минимум 3 символа'); return; }
            registerUser(name, pass);
        };

        async function registerUser(name, pass) {
            try {
                const { data: existing } = await sb.from('users').select('*').eq('username', name);
                if (existing?.length) { document.getElementById('errorMsg').textContent = 'Имя занято'; return; }

                const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                
                await sb.from('users').insert({
                    id: userId, username: name, password: hashPassword(pass),
                    role: selectedRole, coins: 100, themes: ['pink'],
                    liked_quizzes: [], role_title: 'user', created_at: new Date().toISOString()
                });

                await sb.from('user_tokens').insert({
                    user_id: userId, balance: 0,
                    referral_code: 'ref_' + userId + '_' + Math.floor(Math.random() * 1000000)
                });

                localStorage.setItem('currentUser', JSON.stringify({ 
                    id: userId, username: name, role: selectedRole, coins: 100, themes: ['pink'], role_title: 'user' 
                }));
                
                sendToTG(`🆕 Новый пользователь: ${name} (${selectedRole})`);
                
                if (selectedRole === 'teacher') window.location.href = 'teacher-menu.html';
                else window.location.href = 'student-menu.html';

            } catch (error) { document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message; }
        }

        window.doLogin = async function() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!name || !pass) { document.getElementById('errorMsg').textContent = 'Введите имя и пароль'; return; }

            if (name === 'Ильяблоко' && pass === 'JojoTop1') {
                localStorage.setItem('currentUser', JSON.stringify({ 
                    id: 'owner', username: 'Ильяблоко', role: 'teacher', coins: 99999, 
                    themes: ['pink','blue','green','purple','orange','dark','gold','diamond','ruby'], 
                    role_title: 'owner' 
                }));
                sendToTG(`👑 Вход: Ильяблоко (Владелец)`);
                window.location.href = 'teacher-menu.html';
                return;
            }

            try {
                const { data: users } = await sb.from('users').select('*').eq('username', name);
                const user = users && users[0];

                if (user && user.password === hashPassword(pass)) {
                    const { data: tokens } = await sb.from('user_tokens').select('balance').eq('user_id', user.id).maybeSingle();
                    
                    localStorage.setItem('currentUser', JSON.stringify({ 
                        id: user.id, username: user.username, role: user.role, coins: user.coins || 100, 
                        themes: user.themes || ['pink'], role_title: user.role_title || 'user',
                        user_tokens: { balance: tokens?.balance || 0 }
                    }));
                    
                    sendToTG(`🔑 Вход: ${name} (${user.role_title})`);
                    
                    if (user.role === 'teacher') window.location.href = 'teacher-menu.html';
                    else window.location.href = 'student-menu.html';
                    
                } else { document.getElementById('errorMsg').textContent = 'Неверное имя или пароль'; }
            } catch (error) { document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message; }
        };
    </script>
</body>
</html>
