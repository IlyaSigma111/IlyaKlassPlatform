<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== ТЕМЫ С ЧИТАЕМЫМ ТЕКСТОМ ===== */
        body.pink-theme { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); 
            color: #2d3436; 
        }
        body.pink-theme .nav-link,
        body.pink-theme .quiz-card,
        body.pink-theme .user-card,
        body.pink-theme .logout-btn,
        body.pink-theme .create-btn,
        body.pink-theme .shop-btn,
        body.pink-theme .tab-btn,
        body.pink-theme .section-title,
        body.pink-theme .quiz-title,
        body.pink-theme .quiz-subject,
        body.pink-theme .quiz-stats,
        body.pink-theme .quiz-price,
        body.pink-theme .quiz-action-btn,
        body.pink-theme .empty-state,
        body.pink-theme .login-card,
        body.pink-theme .role-btn,
        body.pink-theme .login-input,
        body.pink-theme .login-btn,
        body.pink-theme .register-link { 
            color: #2d3436; 
        }
        body.pink-theme .nav-link,
        body.pink-theme .quiz-card,
        body.pink-theme .user-card,
        body.pink-theme .tab-btn,
        body.pink-theme .login-card,
        body.pink-theme .role-btn,
        body.pink-theme .login-input { 
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(45, 52, 54, 0.2);
        }
        body.pink-theme .quiz-action-btn.play { background: #10b981; color: white; }
        body.pink-theme .quiz-action-btn.edit { background: #f59e0b; color: white; }
        body.pink-theme .quiz-action-btn.buy { background: #ffd700; color: #2d3436; }
        
        body.blue-theme { 
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); 
            color: #1e3799; 
        }
        body.blue-theme .nav-link,
        body.blue-theme .quiz-card,
        body.blue-theme .user-card,
        body.blue-theme .tab-btn,
        body.blue-theme .login-card,
        body.blue-theme .role-btn,
        body.blue-theme .login-input { 
            color: #1e3799; 
            background: rgba(255, 255, 255, 0.4);
        }
        body.blue-theme .quiz-action-btn.play { background: #10b981; color: white; }
        body.blue-theme .quiz-action-btn.edit { background: #f59e0b; color: white; }
        
        body.green-theme { 
            background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); 
            color: #145a32; 
        }
        body.green-theme .nav-link,
        body.green-theme .quiz-card,
        body.green-theme .user-card,
        body.green-theme .tab-btn,
        body.green-theme .login-card,
        body.green-theme .role-btn,
        body.green-theme .login-input { 
            color: #145a32; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.purple-theme { 
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); 
            color: #4a235a; 
        }
        body.purple-theme .nav-link,
        body.purple-theme .quiz-card,
        body.purple-theme .user-card,
        body.purple-theme .tab-btn,
        body.purple-theme .login-card,
        body.purple-theme .role-btn,
        body.purple-theme .login-input { 
            color: #4a235a; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.orange-theme { 
            background: linear-gradient(135deg, #fddb92 0%, #d1fdff 100%); 
            color: #b45f06; 
        }
        body.orange-theme .nav-link,
        body.orange-theme .quiz-card,
        body.orange-theme .user-card,
        body.orange-theme .tab-btn,
        body.orange-theme .login-card,
        body.orange-theme .role-btn,
        body.orange-theme .login-input { 
            color: #b45f06; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.dark-theme { 
            background: linear-gradient(135deg, #141e30 0%, #243b55 100%); 
            color: white; 
        }
        body.dark-theme .nav-link,
        body.dark-theme .quiz-card,
        body.dark-theme .user-card,
        body.dark-theme .tab-btn,
        body.dark-theme .login-card,
        body.dark-theme .role-btn,
        body.dark-theme .login-input { 
            color: white; 
            background: rgba(255, 255, 255, 0.15);
        }
        
        body.sunset-theme { 
            background: linear-gradient(135deg, #ffd89b 0%, #ff9a9e 100%); 
            color: #b33939; 
        }
        body.sunset-theme .nav-link,
        body.sunset-theme .quiz-card,
        body.sunset-theme .user-card,
        body.sunset-theme .tab-btn,
        body.sunset-theme .login-card,
        body.sunset-theme .role-btn,
        body.sunset-theme .login-input { 
            color: #b33939; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.ocean-theme { 
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); 
            color: #0a3b5e; 
        }
        body.ocean-theme .nav-link,
        body.ocean-theme .quiz-card,
        body.ocean-theme .user-card,
        body.ocean-theme .tab-btn,
        body.ocean-theme .login-card,
        body.ocean-theme .role-btn,
        body.ocean-theme .login-input { 
            color: #0a3b5e; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.forest-theme { 
            background: linear-gradient(135deg, #a8e6cf 0%, #d4edda 100%); 
            color: #1d5a3c; 
        }
        body.forest-theme .nav-link,
        body.forest-theme .quiz-card,
        body.forest-theme .user-card,
        body.forest-theme .tab-btn,
        body.forest-theme .login-card,
        body.forest-theme .role-btn,
        body.forest-theme .login-input { 
            color: #1d5a3c; 
            background: rgba(255, 255, 255, 0.4);
        }
        
        body.candy-theme { 
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); 
            color: #6c3483; 
        }
        body.candy-theme .nav-link,
        body.candy-theme .quiz-card,
        body.candy-theme .user-card,
        body.candy-theme .tab-btn,
        body.candy-theme .login-card,
        body.candy-theme .role-btn,
        body.candy-theme .login-input { 
            color: #6c3483; 
            background: rgba(255, 255, 255, 0.4);
        }

        /* ===== АДАПТИВ ДЛЯ МОБИЛОК ===== */
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .header { flex-direction: column; gap: 15px; padding: 15px; }
            .logo-small { font-size: 1.5rem; text-align: center; }
            .nav-menu { width: 100%; justify-content: center; flex-wrap: wrap; gap: 8px; }
            .nav-link { padding: 8px 12px; font-size: 0.85rem; white-space: nowrap; }
            .header-right { width: 100%; }
            .user-card { width: 100%; justify-content: space-between; flex-wrap: wrap; padding: 8px; }
            .avatar { width: 35px; height: 35px; font-size: 0.9rem; }
            .logout-btn { padding: 6px 12px; font-size: 0.85rem; }
            .quizzes-section { padding: 15px; }
            .section-header { flex-direction: column; align-items: stretch; gap: 10px; }
            .section-header div { display: flex; gap: 8px; width: 100%; }
            .section-title { font-size: 1.3rem; }
            .create-btn, .shop-btn { flex: 1; padding: 10px; font-size: 0.9rem; white-space: nowrap; }
            .quiz-tabs { flex-wrap: wrap; gap: 8px; }
            .tab-btn { flex: 1; min-width: 100px; padding: 10px; font-size: 0.9rem; }
            .quizzes-grid { grid-template-columns: 1fr; max-height: none; overflow-y: visible; }
            .quiz-card { width: 100%; }
            .login-card { padding: 30px 20px; width: 95%; }
            .login-title { font-size: 2rem; }
            .role-selector { flex-direction: column; gap: 10px; }
            .role-btn { width: 100%; }
            .form-row { grid-template-columns: 1fr; }
            .answers-grid { grid-template-columns: 1fr; }
            .constructor-window { padding: 15px; max-height: 95vh; width: 98%; }
            .quiz-stats { flex-wrap: wrap; gap: 8px; }
            .quiz-actions { flex-direction: column; }
            .quiz-action-btn { width: 100%; }
        }

        @media (max-width: 480px) {
            .nav-link { width: calc(50% - 3px); text-align: center; padding: 8px 5px; font-size: 0.75rem; }
            .user-card { justify-content: center; gap: 8px; }
            .avatar { width: 30px; height: 30px; }
            .coins, .tokens { font-size: 0.9rem; }
            .logout-btn { width: 100%; text-align: center; }
            .section-title { font-size: 1.1rem; }
            .quiz-title { font-size: 1.1rem; }
            .quiz-stats { font-size: 0.8rem; }
            .tab-btn { font-size: 0.8rem; padding: 8px 5px; min-width: 70px; }
            .constructor-title { font-size: 1.3rem; }
            .form-group label { font-size: 0.9rem; }
            .question-card { padding: 12px; }
            .answer-option { flex-direction: column; align-items: flex-start; }
            .answer-option input[type="radio"] { margin-bottom: 5px; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            overflow-x: hidden;
        }

        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 50px;
            width: 500px;
            max-width: 100%;
            text-align: center;
        }

        .login-title {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle { margin-bottom: 30px; opacity: 0.8; }

        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: #6366f1;
            border-color: white;
            box-shadow: 0 0 20px #6366f1;
            color: white;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-family: 'Comfortaa', cursive;
        }

        .login-input::placeholder { color: rgba(255, 255, 255, 0.7); }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #6366f1;
        }

        .register-link {
            margin-top: 20px;
            color: white;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.8;
        }

        .main-screen { display: none; }
        .main-screen.active { display: block; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            width: 100%;
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.2); }
        .nav-link.active { background: #6366f1; color: white; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .logout-btn:hover { background: rgba(255, 255, 255, 0.3); }

        .coins { color: #ffd700; font-weight: 600; font-size: 1.1rem; }
        .tokens { color: #00ffff; font-weight: 600; font-size: 1.1rem; margin-left: 10px; }

        .quizzes-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            word-break: break-word;
        }

        .quiz-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-family: 'Comfortaa', cursive;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #6366f1;
            border-color: white;
            box-shadow: 0 0 15px #6366f1;
            color: white;
        }

        .create-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .create-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #10b981;
        }

        .shop-btn {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .shop-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #f59e0b;
        }

        .quizzes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
            width: 100%;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
            width: 100%;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .quiz-card.free { border-left: 5px solid #10b981; }
        .quiz-card.premium { border-left: 5px solid #f59e0b; }

        .quiz-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .quiz-theme-badge {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .quiz-class {
            background: rgba(255, 255, 255, 0.3);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .quiz-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .quiz-subject {
            opacity: 0.8;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .quiz-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .quiz-price {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .quiz-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .quiz-action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .quiz-action-btn.play { background: #10b981; color: white; }
        .quiz-action-btn.edit { background: #f59e0b; color: white; }
        .quiz-action-btn.buy { background: #ffd700; color: #2d3436; }

        .constructor-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .constructor-overlay.active { display: flex; }

        .constructor-window {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 3px solid #6366f1;
            border-radius: 50px;
            width: 1000px;
            max-width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            color: white;
        }

        .constructor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .constructor-title {
            font-size: 2rem;
            color: #6366f1;
            word-break: break-word;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ef4444;
            color: #ef4444;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .close-btn:hover { background: rgba(239, 68, 68, 0.2); }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #6366f1;
            font-weight: 600;
            word-break: break-word;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            color: white;
            font-family: 'Comfortaa', cursive;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            box-shadow: 0 0 15px #6366f1;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-number { color: #6366f1; font-weight: 600; }
        .remove-question { color: #ef4444; cursor: pointer; font-weight: 600; }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 10px;
        }

        .answer-option input[type="radio"] {
            accent-color: #10b981;
            flex-shrink: 0;
            width: 18px;
            height: 18px;
        }

    <script>

        async function sendToTG(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch (e) { console.error('Ошибка ТГ:', e); }
        }

        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
        }

        window.selectRole = function(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };

        window.showRegister = function() {
            const name = prompt('Введите имя:');
            if (!name) return;
            const pass = prompt('Введите пароль (мин. 3 символа):');
            if (!pass || pass.length < 3) {
                alert('Пароль должен быть минимум 3 символа');
                return;
            }
            registerUser(name, pass);
        };

        async function registerUser(name, pass) {
            try {
                const { data: existing } = await sb.from('users').select('*').eq('username', name);
                if (existing?.length) {
                    document.getElementById('errorMsg').textContent = 'Это имя уже занято';
                    return;
                }

                const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                
                await sb.from('users').insert({
                    id: userId,
                    username: name,
                    password: hashPassword(pass),
                    role: selectedRole,
                    coins: 100,
                    themes: ['pink'],
                    liked_quizzes: [],
                    role_title: 'user',
                    created_at: new Date().toISOString()
                });

                await sb.from('user_tokens').insert({
                    user_id: userId,
                    balance: 0,
                    referral_code: 'ref_' + userId + '_' + Math.floor(Math.random() * 1000000)
                });

                currentUser = { 
                    id: userId, 
                    username: name, 
                    role: selectedRole, 
                    coins: 100, 
                    themes: ['pink'],
                    liked_quizzes: [],
                    role_title: 'user'
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                sendToTG(`🆕 Новый пользователь: ${name} (${selectedRole})`);
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI();
                loadQuizzes();

                const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                applyTheme(savedTheme);

            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message;
            }
        }

        window.doLogin = async function() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!name || !pass) {
                document.getElementById('errorMsg').textContent = 'Введите имя и пароль';
                return;
            }

            // Вход для владельца (Ильяблоко)
            if (name === 'Ильяблоко' && pass === 'JojoTop1') {
                const { data: existing } = await sb.from('users').select('*').eq('username', 'Ильяблоко');
                
                if (!existing || existing.length === 0) {
                    await sb.from('users').insert({
                        id: 'owner',
                        username: 'Ильяблоко',
                        password: hashPassword('JojoTop1'),
                        role: 'teacher',
                        coins: 99999,
                        themes: allThemes.map(t => t.id),
                        role_title: 'owner'
                    });
                    
                    await sb.from('user_tokens').insert({
                        user_id: 'owner',
                        balance: 99999,
                        referral_code: 'ref_owner'
                    });
                } else {
                    await sb.from('users').update({ role_title: 'owner', coins: 99999 }).eq('username', 'Ильяблоко');
                }
                
                const { data: tokens } = await sb.from('user_tokens').select('balance').eq('user_id', 'owner').single();
                
                currentUser = { 
                    id: 'owner', 
                    username: 'Ильяблоко', 
                    role: 'teacher', 
                    coins: 99999, 
                    themes: allThemes.map(t => t.id),
                    role_title: 'owner'
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                userCoins = 99999;
                userTokens = tokens?.balance || 99999;
                userThemes = allThemes.map(t => t.id);
                
                sendToTG(`👑 Вход: Ильяблоко (Владелец)`);
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI();
                loadQuizzes();
                
                const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                applyTheme(savedTheme);
                return;
            }

            try {
                const { data: users } = await sb.from('users').select('*').eq('username', name);
                const user = users && users[0];

                if (user && user.password === hashPassword(pass)) {
                    const { data: tokens } = await sb.from('user_tokens').select('balance').eq('user_id', user.id).single();
                    
                    currentUser = { 
                        id: user.id, 
                        username: user.username, 
                        role: user.role,
                        coins: user.coins || 100,
                        themes: user.themes || ['pink'],
                        liked_quizzes: user.liked_quizzes || [],
                        role_title: user.role_title || 'user'
                    };
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    userCoins = currentUser.coins;
                    userTokens = tokens?.balance || 0;
                    userThemes = currentUser.themes;
                    
                    sendToTG(`🔑 Вход: ${name} (${user.role_title})`);
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainScreen').classList.add('active');
                    updateUI();
                    loadQuizzes();
                    
                    const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                    applyTheme(savedTheme);
                } else {
                    document.getElementById('errorMsg').textContent = 'Неверное имя или пароль';
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message;
            }

        window.logout = function() {
            if (currentUser) sendToTG(`🚪 Выход: ${currentUser.username}`);
            localStorage.removeItem('currentUser');
            window.location.reload();
        };

        function updateUI() {
            const s = document.getElementById('userSection');
            const actionDiv = document.getElementById('actionButtons');
            
            if (!s || !currentUser) return;
            
            const roleEmoji = {
                'owner': '👑',
                'mediacoord': '🎥',
                'chief': '⭐',
                'curator': '📚',
                'moderator': '🛡️',
                'user': '👤'
            }[currentUser.role_title] || '👤';
            
            const roleClass = {
                'owner': 'role-owner',
                'mediacoord': 'role-mediacoord',
                'chief': 'role-chief',
                'curator': 'role-curator',
                'moderator': 'role-moderator',
                'user': ''
            }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <span>${currentUser.username}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${currentUser.coins || 0}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
            
            if (currentUser.role === 'teacher') {
                document.getElementById('quizzesTitle').textContent = 'Мои викторины';

                    <a href="shop.html"><button class="shop-btn"><i class="fas fa-store"></i> Магазин</button></a>
                    <button class="create-btn" onclick="openConstructor()"><i class="fas fa-plus"></i> Создать</button>
                `;
            } else {
                document.getElementById('quizzesTitle').textContent = 'Доступные викторины';
                actionDiv.innerHTML = `<a href="shop.html"><button class="shop-btn"><i class="fas fa-store"></i> Магазин тем</button></a>`;
            }
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadQuizzes();
        };

        async function loadQuizzes() {
            if (!currentUser) return;
            
            try {
                let query = sb.from('quizzes').select('*');
                
                if (currentTab === 'free') query = query.eq('type', 'kahoot').eq('published', true);
                else if (currentTab === 'premium') query = query.eq('type', 'constructed').eq('published', true);
                else if (currentTab === 'my' && currentUser.role === 'teacher') query = query.eq('created_by', currentUser.id);
                
                const { data: quizzes } = await query;
                const container = document.getElementById('myQuizzesList');
                
                if (!quizzes || quizzes.length === 0) {
                    if (currentTab === 'free') container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎁</div><p>Бесплатных викторин пока нет</p></div>`;
                    else if (currentTab === 'premium') container.innerHTML = `<div class="empty-state"><div class="empty-icon">💎</div><p>Премиум викторин пока нет</p><a href="shop.html"><button class="shop-btn">В магазин</button></a></div>`;
                    else container.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><p>У вас пока нет викторин</p><button class="create-btn" onclick="openConstructor()">Создать</button></div>`;
                    return;
                }

                let html = '';
                for (let q of quizzes) {
                    const theme = allThemes.find(t => t.id === q.theme) || allThemes[0];
                    const cardClass = q.type === 'kahoot' ? 'free' : 'premium';
                    
                    html += `<div class="quiz-card ${cardClass}"><div class="quiz-card-header"><div class="quiz-theme-badge" style="background: ${theme.color};"></div><div class="quiz-class">${q.class || ''}</div></div><div class="quiz-title">${q.title}</div><div class="quiz-subject">${q.subject || ''}</div><div class="quiz-stats"><span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>${q.type === 'constructed' ? `<span class="quiz-price"><i class="fas fa-gem"></i> ${q.price_tokens || 0}</span>` : ''}</div>`;
                    
                    if (currentTab === 'premium' && currentUser.role === 'student') {
                        html += `<div class="quiz-actions"><div class="quiz-action-btn buy" onclick="buyQuiz('${q.id}', ${q.price_tokens})"><i class="fas fa-shopping-cart"></i> Купить</div></div>`;
                    } else if (currentUser.role === 'teacher' && currentTab === 'my') {
                        html += `<div class="quiz-actions"><div class="quiz-action-btn play" onclick="playQuiz('${q.id}')"><i class="fas fa-play"></i> Играть</div><div class="quiz-action-btn edit" onclick="editQuiz('${q.id}')"><i class="fas fa-edit"></i></div></div>`;
                    } else {
                        html += `<div class="quiz-actions"><div class="quiz-action-btn play" onclick="playQuiz('${q.id}')"><i class="fas fa-play"></i> Играть</div></div>`;
                    }
                    html += `</div>`;
                }
                container.innerHTML = html;
            } catch (e) { console.error(e); }
        }

        window.buyQuiz = async (quizId, price) => {
            if (!currentUser) return;
            if (userTokens < price) { alert('Недостаточно токенов!'); return; }
            if (confirm(`Купить викторину за ${price} токенов?`)) {
                const { data } = await sb.rpc('buy_quiz_with_tokens', { p_user_id: currentUser.id, p_quiz_id: quizId });
                if (data) { userTokens -= price; updateUI(); alert('✅ Викторина куплена!'); sendToTG(`💎 ${currentUser.username} купил викторину за ${price} токенов`); }
                else alert('❌ Ошибка');
            }
        };

        window.playQuiz = (quizId) => window.location.href = `teacher.html?quiz=${quizId}`;

            if (!currentUser || currentUser.role !== 'teacher') { alert('Только учителя'); return; }

            if (editId) {
                document.getElementById('constructorTitle').textContent = '✏️ Редактирование';

                document.getElementById('constructorTitle').textContent = '🛠️ Создание';

                document.getElementById('quizSubject').value = '';

                document.getElementById('quizType').value = 'kahoot';
                document.getElementById('quizPriceTokens').value = '0';
                document.getElementById('publishToStore').checked = false;
                renderQuestions();
            }
            document.getElementById('constructorOverlay').classList.add('active');
        };

        window.closeConstructor = () => {
            document.getElementById('constructorOverlay').classList.remove('active');
            editingQuizId = null;
        };

        window.addQuestion = () => {
            quizQuestions.push({ id: Date.now(), question: '', answers: ['', '', '', ''], correct: 0 });
            renderQuestions();
        };

        window.removeQuestion = (i) => {
            if (quizQuestions.length <= 1) { alert('Должен быть хотя бы один вопрос'); return; }
            quizQuestions.splice(i, 1);
            renderQuestions();
        };

        function renderQuestions() {
            let html = '', c = document.getElementById('questionsContainer');
            for (let i = 0; i < quizQuestions.length; i++) {
                let q = quizQuestions[i];
                html += `<div class="question-card"><div class="question-header"><span>Вопрос ${i+1}</span><span onclick="removeQuestion(${i})">✕</span></div><input placeholder="Вопрос" value="${q.question}" onchange="updateQuestion(${i},'question',this.value)"><div class="answers-grid">${[0,1,2,3].map(j => `<div class="answer-option"><input type="radio" name="q${q.id}" ${q.correct===j?'checked':''} onchange="updateQuestion(${i},'correct',${j})"><input placeholder="Ответ ${j+1}" value="${q.answers[j]}" onchange="updateQuestion(${i},'answer${j}',this.value)"></div>`).join('')}</div></div>`;
            }
            c.innerHTML = html;
        }

        window.updateQuestion = (i, f, v) => {
            if (f === 'question') quizQuestions[i].question = v;
            else if (f.startsWith('answer')) quizQuestions[i].answers[parseInt(f.replace('answer',''))] = v;
            else if (f === 'correct') quizQuestions[i].correct = parseInt(v);
        };

        async function loadQuizForEdit(quizId) {
            try {
                const { data: quiz } = await sb.from('quizzes').select('*').eq('id', quizId).single();
                const { data: questions } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
                
                if (quiz) {
                    document.getElementById('quizTitle').value = quiz.title || '';
                    document.getElementById('quizClass').value = quiz.class || '';
                    document.getElementById('quizSubject').value = quiz.subject || '';
                    document.getElementById('quizTheme').value = quiz.theme || 'pink';
                    document.getElementById('quizType').value = quiz.type || 'kahoot';
                    document.getElementById('quizPriceTokens').value = quiz.price_tokens || 0;
                    document.getElementById('publishToStore').checked = false;
                }
                
                quizQuestions = (questions || []).map(q => ({
                    id: q.id || Date.now() + Math.random(),
                    question: q.question,
                    answers: q.answers || ['', '', '', ''],
                    correct: q.correct || 0
                }));
                
                renderQuestions();
            } catch (error) {
                console.error('Ошибка загрузки викторины:', error);
                alert('Не удалось загрузить викторину');
            }
        }

        async function addCoins(userId, amount, reason) {
            if (!userId) return null;
            try {
                const { data: user } = await sb.from('users').select('coins').eq('id', userId).single();
                if (!user) return null;
                const newCoins = (user.coins || 0) + amount;
                await sb.from('users').update({ coins: newCoins }).eq('id', userId);
                if (currentUser && currentUser.id === userId) {
                    currentUser.coins = newCoins;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateUI();
                }
                sendToTG(`💰 ${currentUser?.username} получил ${amount} монет (${reason})`);
                return newCoins;
            } catch (error) {
                console.error('Ошибка добавления монет:', error);
                return null;
            }
        }

        window.saveQuiz = async function() {
            if (!currentUser) { alert('Ошибка: пользователь не найден'); return; }

            const title = document.getElementById('quizTitle').value.trim();
            const quizClass = document.getElementById('quizClass').value.trim();
            const subject = document.getElementById('quizSubject').value.trim();
            const theme = document.getElementById('quizTheme').value;
            const type = document.getElementById('quizType').value;
            const price = parseInt(document.getElementById('quizPriceTokens').value) || 0;
            const publish = document.getElementById('publishToStore').checked;

            if (!title) { alert('Введите название викторины'); return; }
            if (quizQuestions.length === 0) { alert('Добавьте хотя бы один вопрос'); return; }

            for (let q of quizQuestions) {
                if (!q.question || q.answers.some(a => !a)) { alert('Заполните все поля вопросов'); return; }
            }

            try {
                if (editingQuizId) {
                    await sb.from('quizzes').update({
                        title, class: quizClass, subject, theme, type, price_tokens: price,
                        question_count: quizQuestions.length, max_score: quizQuestions.length, published: publish
                    }).eq('id', editingQuizId);

                    await sb.from('questions').delete().eq('quiz_id', editingQuizId);

                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: editingQuizId, question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct
                        });
                    }

                    sendToTG(`✏️ ${currentUser.username} отредактировал викторину: ${title}`);
                    alert('✅ Викторина обновлена!');
                    
                } else {
                    const quizId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                    
                    const { error } = await sb.from('quizzes').insert({
                        id: quizId, title, class: quizClass, subject, theme, type, price_tokens: price,
                        question_count: quizQuestions.length, max_score: quizQuestions.length,
                        created_by: currentUser.id, published: publish, likes: 0, created_at: Date.now()
                    });

                    if (error) { alert('Ошибка: ' + error.message); return; }

                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: quizId, question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct
                        });
                    }

                    await addCoins(currentUser.id, 50, 'created_quiz');
                    if (publish) {
                        await addCoins(currentUser.id, 100, 'published_quiz');
                        sendToTG(`📢 ${currentUser.username} опубликовал викторину: ${title} (+100 монет)`);
                    } else {
                        sendToTG(`📝 ${currentUser.username} создал викторину: ${title} (+50 монет)`);
                    }

                    alert(publish ? '✅ Викторина опубликована! +150 монет' : '✅ Викторина сохранена! +50 монет');
                }

                closeConstructor();
                await loadQuizzes();

            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('Ошибка: ' + error.message);
            }
        };

        (function checkAuth() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                currentUser = JSON.parse(saved);
                userCoins = currentUser.coins || 100;
                userThemes = currentUser.themes || ['pink'];
                sb.from('user_tokens').select('balance').eq('user_id', currentUser.id).single().then(({ data }) => {
                    userTokens = data?.balance || 0;
                    updateUI();
                });
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI();
                loadQuizzes();
                const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                applyTheme(savedTheme);
            }
        })();
    </script>
</body>
</html>
