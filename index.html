<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== ТЕМЫ ===== */
        body.pink-theme { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); 
            color: #4a4a4a; 
        }
        body.pink-theme .nav-link,
        body.pink-theme .quiz-card,
        body.pink-theme .create-btn,
        body.pink-theme .shop-btn,
        body.pink-theme .user-card,
        body.pink-theme .logout-btn { 
            color: #4a4a4a; 
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
        }
        
        body.blue-theme { 
            background: linear-gradient(135deg, #6dd5ed 0%, #2193b0 100%); 
            color: white; 
        }
        body.blue-theme .nav-link,
        body.blue-theme .quiz-card,
        body.blue-theme .user-card { 
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        body.green-theme { 
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); 
            color: #1e3a0e; 
        }
        body.green-theme .nav-link,
        body.green-theme .quiz-card,
        body.green-theme .user-card { 
            background: rgba(255, 255, 255, 0.3);
            color: #1e3a0e;
        }
        
        body.purple-theme { 
            background: linear-gradient(135deg, #b993d6 0%, #8ca6db 100%); 
            color: #2d2d5a; 
        }
        body.purple-theme .nav-link,
        body.purple-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.2);
            color: #2d2d5a;
        }
        
        body.orange-theme { 
            background: linear-gradient(135deg, #f9d423 0%, #f83600 100%); 
            color: #4a2a1a; 
        }
        body.orange-theme .nav-link,
        body.orange-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.2);
            color: #4a2a1a;
        }
        
        body.dark-theme { 
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); 
            color: white; 
        }
        body.dark-theme .nav-link,
        body.dark-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }
        
        /* НОВЫЕ ТЕМЫ */
        body.sunset-theme { 
            background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%); 
            color: #4a2a1a; 
        }
        body.sunset-theme .nav-link,
        body.sunset-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.3);
            color: #4a2a1a;
        }
        
        body.ocean-theme { 
            background: linear-gradient(135deg, #1c92d2 0%, #f2fcfe 100%); 
            color: #0a2f44; 
        }
        body.ocean-theme .nav-link,
        body.ocean-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.3);
            color: #0a2f44;
        }
        
        body.forest-theme { 
            background: linear-gradient(135deg, #134e5e 0%, #71b280 100%); 
            color: #e0f2e9; 
        }
        body.forest-theme .nav-link,
        body.forest-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.2);
            color: #e0f2e9;
        }
        
        body.candy-theme { 
            background: linear-gradient(135deg, #f43b47 0%, #453a94 100%); 
            color: white; 
        }
        body.candy-theme .nav-link,
        body.candy-theme .quiz-card { 
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* АДАПТИВ ДЛЯ МОБИЛОК */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
                width: 100%;
                overflow-x: hidden;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
                width: 100%;
            }
            
            .logo-small {
                font-size: 1.5rem;
                text-align: center;
            }
            
            .nav-menu {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .nav-link {
                padding: 8px 12px;
                font-size: 0.85rem;
                white-space: nowrap;
            }
            
            .header-right {
                width: 100%;
            }
            
            .user-card {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                padding: 8px;
            }
            
            .avatar {
                width: 35px;
                height: 35px;
                font-size: 0.9rem;
            }
            
            .logout-btn {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            .quizzes-section {
                padding: 15px;
                width: 100%;
                overflow-x: hidden;
            }
            
            .section-header {
                flex-direction: column;
                align-items: stretch;
                gap: 10px;
            }
            
            .section-header div {
                display: flex;
                gap: 8px;
                width: 100%;
            }
            
            .section-title {
                font-size: 1.3rem;
            }
            
            .create-btn, .shop-btn {
                flex: 1;
                padding: 10px;
                font-size: 0.9rem;
                white-space: nowrap;
            }
            
            .quizzes-grid {
                grid-template-columns: 1fr;
                max-height: none;
                overflow-y: visible;
                padding: 5px 0;
                width: 100%;
            }
            
            .quiz-card {
                width: 100%;
                margin: 0;
            }
            
            .login-card {
                padding: 30px 20px;
                width: 95%;
                margin: 0 auto;
            }
            
            .login-title {
                font-size: 2rem;
            }
            
            .role-selector {
                flex-direction: column;
                gap: 10px;
            }
            
            .role-btn {
                width: 100%;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .answers-grid {
                grid-template-columns: 1fr;
            }
            
            .constructor-window {
                padding: 15px;
                max-height: 95vh;
                width: 98%;
            }
            
            .quiz-stats {
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .quiz-actions {
                flex-direction: column;
            }
            
            .quiz-action-btn {
                width: 100%;
            }
            
            .theme-color {
                width: 30px;
                height: 30px;
            }
        }

        @media (max-width: 480px) {
            .nav-menu {
                gap: 5px;
            }
            
            .nav-link {
                width: calc(50% - 3px);
                text-align: center;
                padding: 8px 5px;
                font-size: 0.75rem;
            }
            
            .user-card {
                justify-content: center;
                gap: 8px;
            }
            
            .avatar {
                width: 30px;
                height: 30px;
            }
            
            .coins {
                font-size: 0.9rem;
            }
            
            .logout-btn {
                width: 100%;
                text-align: center;
            }
            
            .section-title {
                font-size: 1.1rem;
            }
            
            .quiz-title {
                font-size: 1.1rem;
            }
            
            .quiz-stats {
                font-size: 0.8rem;
            }
            
            .constructor-title {
                font-size: 1.3rem;
            }
            
            .form-group label {
                font-size: 0.9rem;
            }
            
            .question-card {
                padding: 12px;
            }
            
            .answer-option {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .answer-option input[type="radio"] {
                margin-bottom: 5px;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            overflow-x: hidden;
        }

        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 50px;
            width: 500px;
            max-width: 100%;
            text-align: center;
        }

        .login-title {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            word-break: break-word;
        }

        .login-subtitle {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: #6366f1;
            border-color: white;
            box-shadow: 0 0 20px #6366f1;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            font-family: 'Comfortaa', cursive;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #6366f1;
        }

        .register-link {
            margin-top: 20px;
            color: white;
            cursor: pointer;
            text-decoration: underline;
            opacity: 0.8;
        }

        .main-screen {
            display: none;
        }

        .main-screen.active {
            display: block;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            width: 100%;
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-link.active {
            background: #6366f1;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .coins {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .quizzes-section {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            width: 100%;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
            word-break: break-word;
        }

        .create-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .create-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #10b981;
        }

        .shop-btn {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .shop-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #f59e0b;
        }

        .quizzes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
            width: 100%;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
            width: 100%;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .quiz-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .quiz-theme-badge {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .quiz-class {
            background: rgba(255, 255, 255, 0.3);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .quiz-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .quiz-subject {
            opacity: 0.8;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .quiz-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .quiz-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .quiz-action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .quiz-action-btn.play {
            background: #10b981;
            color: white;
        }

        .quiz-action-btn.edit {
            background: #f59e0b;
            color: white;
        }

        .constructor-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .constructor-overlay.active {
            display: flex;
        }

        .constructor-window {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 3px solid #6366f1;
            border-radius: 50px;
            width: 1000px;
            max-width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .constructor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .constructor-title {
            font-size: 2rem;
            color: #6366f1;
            word-break: break-word;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ef4444;
            color: #ef4444;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #6366f1;
            font-weight: 600;
            word-break: break-word;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            color: white;
            font-family: 'Comfortaa', cursive;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-number {
            color: #6366f1;
            font-weight: 600;
        }

        .remove-question {
            color: #ef4444;
            cursor: pointer;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 10px;
        }

        .answer-option input[type="radio"] {
            accent-color: #10b981;
            flex-shrink: 0;
        }

        .add-question-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin: 20px 0;
        }

        .save-quiz-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }

        .publish-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
            width: 100%;
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .error-msg {
            color: #ff6b6b;
            margin-top: 15px;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <!-- ЭКРАН ЛОГИНА -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-title">ИЛЬЯКЛАСС</div>
            <div class="login-subtitle">Войдите или зарегистрируйтесь</div>
            
            <div class="role-selector">
                <button class="role-btn active" onclick="selectRole('teacher')">👨‍🏫 Учитель</button>
                <button class="role-btn" onclick="selectRole('student')">👨‍🎓 Ученик</button>
            </div>
            
            <input type="text" id="loginName" class="login-input" placeholder="Имя">
            <input type="password" id="loginPass" class="login-input" placeholder="Пароль">
            
            <button class="login-btn" onclick="doLogin()">🚀 Войти</button>
            <div class="register-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
            <div id="errorMsg" class="error-msg"></div>
            
            <!-- СЕКРЕТНАЯ ССЫЛКА ДЛЯ РЕФЕРАЛОВ -->
            <div style="margin-top: 20px; font-size: 0.8rem; opacity: 0.5;">
                <span id="referralHint"></span>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div class="main-screen" id="mainScreen">
        <div class="container">
            <div class="header">
                <div class="logo-small" onclick="window.location='index.html'">
                    <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
                </div>
                <nav class="nav-menu">
                    <a href="index.html" class="nav-link active">Главная</a>
                    <a href="shop.html" class="nav-link">Магазин</a>
                    <a href="results.html" class="nav-link">Результаты</a>
                    <a href="profile.html" class="nav-link">Профиль</a>
                </nav>
                <div class="header-right" id="userSection"></div>
            </div>

            <div class="quizzes-section">

        // ===== КОНСТРУКТОР =====
        window.openConstructor = function(editId = null) {
            if (!currentUser) {
                alert('Сначала войдите в систему');
                return;
            }
            if (currentUser.role !== 'teacher') {
                alert('Только учителя могут создавать викторины');
                return;
            }
            
            editingQuizId = editId;
            
            if (editId) {
                document.getElementById('constructorTitle').textContent = '✏️ Редактирование викторины';
                loadQuizForEdit(editId);
            } else {
                document.getElementById('constructorTitle').textContent = '🛠️ Создание викторины';
                quizQuestions = [];
                document.getElementById('quizTitle').value = '';
                document.getElementById('quizClass').value = '';
                document.getElementById('quizSubject').value = '';
                document.getElementById('quizTheme').value = 'pink';
                document.getElementById('publishToStore').checked = false;
                renderQuestions();
            }
            
            document.getElementById('constructorOverlay').classList.add('active');
        };

        async function loadQuizForEdit(quizId) {
            try {
                const { data: quiz } = await sb.from('quizzes').select('*').eq('id', quizId).single();
                const { data: questions } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
                
                if (quiz) {
                    document.getElementById('quizTitle').value = quiz.title || '';
                    document.getElementById('quizClass').value = quiz.class || '';
                    document.getElementById('quizSubject').value = quiz.subject || '';
                    document.getElementById('quizTheme').value = quiz.theme || 'pink';
                    document.getElementById('publishToStore').checked = false;
                }
                
                quizQuestions = (questions || []).map(q => ({
                    id: q.id || Date.now() + Math.random(),
                    question: q.question,
                    answers: q.answers || ['', '', '', ''],
                    correct: q.correct || 0,
                    points: q.points || 1
                }));
                
                renderQuestions();
            } catch (error) {
                console.error('Ошибка загрузки викторины для редактирования:', error);
                alert('Не удалось загрузить викторину');
            }
        }

        window.closeConstructor = function() {
            document.getElementById('constructorOverlay').classList.remove('active');
            editingQuizId = null;
        };

        window.addQuestion = function() {
            quizQuestions.push({
                id: Date.now() + Math.random(),
                question: '',
                answers: ['', '', '', ''],
                correct: 0,
                points: 1
            });
            renderQuestions();
        };

        window.removeQuestion = function(index) {
            if (quizQuestions.length <= 1) {
                alert('Должен быть хотя бы один вопрос');
                return;
            }
            quizQuestions.splice(index, 1);
            renderQuestions();
        };

        window.updateQuestion = function(index, field, value) {
            if (field === 'question') {
                quizQuestions[index].question = value;
            } else if (field.startsWith('answer')) {
                let ai = parseInt(field.replace('answer', ''));
                quizQuestions[index].answers[ai] = value;
            } else if (field === 'correct') {
                quizQuestions[index].correct = parseInt(value);
            }
        };

        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            if (!container) return;
            
            if (quizQuestions.length === 0) {
                container.innerHTML = '<p style="text-align: center; opacity: 0.7;">Добавьте первый вопрос</p>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < quizQuestions.length; i++) {
                let q = quizQuestions[i];
                html += `
                    <div class="question-card">
                        <div class="question-header">
                            <span class="question-number">Вопрос ${i+1}</span>
                            <span class="remove-question" onclick="removeQuestion(${i})">✕</span>
                        </div>
                        <input type="text" placeholder="Текст вопроса" value="${(q.question || '').replace(/"/g, '&quot;')}" 
                               onchange="updateQuestion(${i}, 'question', this.value)" style="width:100%; padding:10px; margin-bottom:10px;">
                        <div class="answers-grid">
                            ${[0,1,2,3].map(j => `
                                <div class="answer-option">
                                    <input type="radio" name="correct-${q.id || i}" value="${j}" ${q.correct === j ? 'checked' : ''} 
                                           onchange="updateQuestion(${i}, 'correct', this.value)">
                                    <input type="text" placeholder="Ответ ${j+1}" value="${(q.answers[j] || '').replace(/"/g, '&quot;')}" 
                                           onchange="updateQuestion(${i}, 'answer${j}', this.value)">
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        async function addCoins(userId, amount, reason) {
            if (!userId) return null;
            
            try {
                const { data: user } = await sb.from('users').select('coins').eq('id', userId).single();
                if (!user) return null;
                
                const newCoins = (user.coins || 0) + amount;
                await sb.from('users').update({ coins: newCoins }).eq('id', userId);
                
                if (currentUser && currentUser.id === userId) {
                    currentUser.coins = newCoins;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateUI();
                }
                
                sendToTG(`💰 ${currentUser?.username} получил ${amount} монет (${reason})`);
                
                return newCoins;
            } catch (error) {
                console.error('Ошибка добавления монет:', error);
                return null;
            }
        }

        window.saveQuiz = async function() {
            if (!currentUser) {
                alert('Ошибка: пользователь не найден');
                return;
            }

            const title = document.getElementById('quizTitle').value.trim();
            const quizClass = document.getElementById('quizClass').value.trim();
            const subject = document.getElementById('quizSubject').value.trim();
            const theme = document.getElementById('quizTheme').value;
            const publish = document.getElementById('publishToStore').checked;

            if (!title) {
                alert('Введите название викторины');
                return;
            }

            if (quizQuestions.length === 0) {
                alert('Добавьте хотя бы один вопрос');
                return;
            }

            for (let i = 0; i < quizQuestions.length; i++) {
                const q = quizQuestions[i];
                
                if (!q.question || q.question.trim() === '') {
                    alert(`Заполните текст вопроса ${i+1}`);
                    return;
                }
                
                for (let j = 0; j < 4; j++) {
                    if (!q.answers[j] || q.answers[j].trim() === '') {
                        alert(`Заполните ответ ${j+1} в вопросе ${i+1}`);
                        return;
                    }
                }
                
                if (q.correct === undefined || q.correct === null) {
                    alert(`Выберите правильный ответ в вопросе ${i+1}`);
                    return;
                }
            }

            try {
                if (editingQuizId) {
                    await sb.from('quizzes').update({
                        title: title,
                        class: quizClass,
                        subject: subject,
                        theme: theme,
                        question_count: quizQuestions.length,
                        max_score: quizQuestions.reduce((sum, q) => sum + (q.points || 1), 0)
                    }).eq('id', editingQuizId);

                    await sb.from('questions').delete().eq('quiz_id', editingQuizId);

                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: editingQuizId,
                            question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct,
                            points: quizQuestions[i].points || 1
                        });
                    }

                    sendToTG(`✏️ ${currentUser.username} отредактировал викторину: ${title}`);
                    alert('✅ Викторина обновлена!');
                    
                } else {
                    const quizId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                    
                    const { error } = await sb.from('quizzes').insert({
                        id: quizId,
                        title: title,
                        class: quizClass,
                        subject: subject,
                        theme: theme,
                        question_count: quizQuestions.length,
                        max_score: quizQuestions.reduce((sum, q) => sum + (q.points || 1), 0),
                        created_by: currentUser.id,
                        is_published: publish,
                        likes: 0,
                        created_at: Date.now()
                    });

                    if (error) {
                        console.error('Ошибка при вставке викторины:', error);
                        alert('Ошибка базы данных: ' + error.message);
                        return;
                    }

                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: quizId,
                            question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct,
                            points: quizQuestions[i].points || 1
                        });
                    }

                    await addCoins(currentUser.id, 50, 'created_quiz');
                    
                    if (publish) {
                        await addCoins(currentUser.id, 100, 'published_quiz');
                        sendToTG(`📢 ${currentUser.username} опубликовал викторину в магазине: ${title} (+100 монет)`);
                    } else {
                        sendToTG(`📝 ${currentUser.username} создал викторину: ${title} (+50 монет)`);
                    }

                    alert(publish ? '✅ Викторина опубликована! +150 монет' : '✅ Викторина сохранена! +50 монет');
                }

                closeConstructor();
                await loadMyQuizzes();

            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('Ошибка: ' + error.message);
            }
        };

        window.playQuiz = function(quizId) {
            if (!quizId) return;
            
            if (currentUser.role === 'teacher') {
                window.location.href = `teacher.html?quiz=${quizId}`;
            } else {
                window.location.href = `student.html?quiz=${quizId}`;
            }
        };

        window.editQuiz = function(quizId) {
            openConstructor(quizId);
        };

        // ===== СИСТЕМА РЕФЕРАЛОВ ДЛЯ РАЗРАБА =====
        window.generateReferral = function() {
            if (!currentUser || !currentUser.is_moderator) {
                alert('Только модераторы могут создавать реферальные ссылки');
                return;
            }
            
            const refCode = 'ref_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
            const url = window.location.origin + window.location.pathname + '?ref=' + refCode;
            
            prompt('🔗 Ваша реферальная ссылка (одноразовая):', url);
            
            sendToTG(`🔗 ${currentUser.username} создал реферальную ссылку`);
        };

        // Добавляем кнопку для модераторов
        setInterval(() => {
            if (currentUser && currentUser.is_moderator && !document.getElementById('refBtn')) {
                const userSection = document.getElementById('userSection');
                if (userSection) {
                    const refBtn = document.createElement('button');
                    refBtn.id = 'refBtn';
                    refBtn.innerHTML = '🔗 Рефка';
                    refBtn.onclick = generateReferral;
                    refBtn.style.marginLeft = '10px';
                    refBtn.style.padding = '5px 10px';
                    refBtn.style.background = '#ffd700';
                    refBtn.style.border = 'none';
                    refBtn.style.borderRadius = '20px';
                    refBtn.style.cursor = 'pointer';
                    refBtn.style.color = '#4a4a4a';
                    userSection.appendChild(refBtn);
                }
            }
        }, 1000);

        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        (function checkAuth() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    userCoins = currentUser.coins || 100;
                    userThemes = currentUser.themes || ['pink'];
                    isModerator = currentUser.is_moderator || false;
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainScreen').classList.add('active');
                    updateUI();
                    loadMyQuizzes();
                    
                    const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                    applyTheme(savedTheme);
                } catch (e) {
                    console.error('Ошибка парсинга пользователя:', e);
                    localStorage.removeItem('currentUser');
                }
            }
        })();
    </script>
</body>
</html>
