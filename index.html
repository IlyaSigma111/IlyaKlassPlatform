<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Главная</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ===== ТЕМЫ С ЧЕТКИМИ ГРАНИЦАМИ ===== */
        body.pink-theme { 
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%); 
            color: #2d3436; 
        }
        body.pink-theme .nav-link,
        body.pink-theme .quiz-card,
        body.pink-theme .user-card,
        body.pink-theme .tab-btn,
        body.pink-theme .login-card,
        body.pink-theme .role-btn { 
            background: rgba(255, 255, 255, 0.9);
            color: #2d3436;
            border: 2px solid rgba(45, 52, 54, 0.2);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        body.blue-theme { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            color: #1e3799; 
        }
        body.blue-theme .nav-link,
        body.blue-theme .quiz-card,
        body.blue-theme .user-card,
        body.blue-theme .tab-btn { 
            background: rgba(255, 255, 255, 0.9);
            color: #1e3799;
            border: 2px solid rgba(30, 55, 153, 0.2);
        }
        
        body.green-theme { 
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); 
            color: #145a32; 
        }
        body.green-theme .nav-link,
        body.green-theme .quiz-card,
        body.green-theme .user-card,
        body.green-theme .tab-btn { 
            background: rgba(255, 255, 255, 0.9);
            color: #145a32;
            border: 2px solid rgba(20, 90, 50, 0.2);
        }
        
        body.purple-theme { 
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); 
            color: #4a235a; 
        }
        body.purple-theme .nav-link,
        body.purple-theme .quiz-card,
        body.purple-theme .user-card,
        body.purple-theme .tab-btn { 
            background: rgba(255, 255, 255, 0.9);
            color: #4a235a;
            border: 2px solid rgba(74, 35, 90, 0.2);
        }
        
        body.orange-theme { 
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); 
            color: #b45f06; 
        }
        body.orange-theme .nav-link,
        body.orange-theme .quiz-card,
        body.orange-theme .user-card,
        body.orange-theme .tab-btn { 
            background: rgba(255, 255, 255, 0.9);
            color: #b45f06;
            border: 2px solid rgba(180, 95, 6, 0.2);
        }
        
        body.dark-theme { 
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); 
            color: white; 
        }
        body.dark-theme .nav-link,
        body.dark-theme .quiz-card,
        body.dark-theme .user-card,
        body.dark-theme .tab-btn { 
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        /* ===== АДАПТИВ ДЛЯ МОБИЛОК ===== */
        @media (max-width: 768px) {
            .container {
                padding: 8px;
                width: 100%;
            }
            
            .header {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 8px;
                padding: 12px;
                margin-bottom: 15px;
            }
            
            .logo-small {
                font-size: 1.3rem;
                width: 100%;
                text-align: center;
                margin-bottom: 5px;
            }
            
            .nav-menu {
                width: 100%;
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 4px;
            }
            
            .nav-link {
                padding: 8px 4px;
                font-size: 0.7rem;
                text-align: center;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            
            .header-right {
                width: 100%;
            }
            
            .user-card {
                width: 100%;
                display: grid;
                grid-template-columns: auto 1fr auto auto auto;
                align-items: center;
                gap: 6px;
                padding: 6px 10px;
                font-size: 0.8rem;
            }
            
            .avatar {
                width: 28px;
                height: 28px;
                font-size: 0.8rem;
            }
            
            .logout-btn {
                padding: 4px 8px;
                font-size: 0.7rem;
            }
            
            .quizzes-section {
                padding: 12px;
                border-radius: 24px;
            }
            
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
                margin-bottom: 15px;
            }
            
            .section-header div {
                display: flex;
                gap: 8px;
                width: 100%;
            }
            
            .section-title {
                font-size: 1.1rem;
            }
            
            .create-btn, .shop-btn {
                flex: 1;
                padding: 8px 12px;
                font-size: 0.8rem;
                margin-left: 0;
            }
            
            .quiz-tabs {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                margin-bottom: 15px;
            }
            
            .tab-btn {
                padding: 10px 5px;
                font-size: 0.75rem;
                white-space: nowrap;
                border-radius: 30px;
            }
            
            .quizzes-grid {
                grid-template-columns: 1fr;
                max-height: none;
                overflow-y: visible;
                gap: 12px;
                padding: 5px 0;
            }
            
            .quiz-card {
                padding: 15px;
                border-radius: 24px;
            }
            
            .quiz-title {
                font-size: 1rem;
            }
            
            .quiz-stats {
                font-size: 0.75rem;
                gap: 8px;
            }
            
            .quiz-actions {
                flex-direction: row;
                gap: 8px;
            }
            
            .quiz-action-btn {
                padding: 8px;
                font-size: 0.75rem;
            }
            
            .login-card {
                padding: 25px 15px;
                width: 100%;
                border-radius: 30px;
            }
            
            .login-title {
                font-size: 1.8rem;
            }
            
            .role-selector {
                flex-direction: row;
                gap: 8px;
            }
            
            .role-btn {
                padding: 10px;
                font-size: 0.9rem;
            }
            
            .login-input {
                padding: 12px;
                font-size: 0.9rem;
            }
            
            .login-btn {
                padding: 12px;
                font-size: 1rem;
            }
            
            .form-row {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .answers-grid {
                grid-template-columns: 1fr;
            }
            
            .constructor-window {
                padding: 15px;
                max-height: 95vh;
                width: 100%;
                border-radius: 30px;
            }
            
            .question-card {
                padding: 12px;
            }
            
            .answer-option {
                padding: 8px;
            }
            
            .add-question-btn,
            .save-quiz-btn {
                padding: 12px;
                font-size: 0.9rem;
            }
            
            .empty-state {
                padding: 25px;
            }
            
            .empty-icon {
                font-size: 40px;
            }
        }

        @media (max-width: 480px) {
            .nav-menu {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .nav-link {
                font-size: 0.6rem;
                padding: 6px 2px;
            }
            
            .user-card {
                grid-template-columns: auto 1fr auto;
                gap: 4px;
            }
            
            .user-card .coins,
            .user-card .tokens {
                font-size: 0.7rem;
            }
            
            .quiz-tabs {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .tab-btn {
                font-size: 0.7rem;
                padding: 8px 2px;
            }
            
            .quiz-actions {
                flex-direction: column;
            }
            
            .role-selector {
                flex-direction: column;
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            padding: 50px;
            width: 500px;
            max-width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .login-title {
            font-size: 3rem;
            margin-bottom: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-subtitle { margin-bottom: 30px; opacity: 0.8; color: #2d3436; }

        .role-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .role-btn {
            flex: 1;
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #6366f1;
            border-radius: 40px;
            color: #2d3436;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .role-btn.active {
            background: #6366f1;
            color: white;
            border-color: white;
            box-shadow: 0 0 20px #6366f1;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #6366f1;
            border-radius: 40px;
            color: #2d3436;
            font-size: 1rem;
            font-family: 'Comfortaa', cursive;
        }

        .login-input::placeholder { color: #6366f1; opacity: 0.5; }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #6366f1;
        }

        .register-link {
            margin-top: 20px;
            color: #6366f1;
            cursor: pointer;
            text-decoration: underline;
        }

        .main-screen { display: none; }
        .main-screen.active { display: block; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.3); }
        .nav-link.active { background: #6366f1; color: white; }

        .header-right { display: flex; align-items: center; gap: 20px; }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .logout-btn:hover { background: rgba(255, 255, 255, 0.3); }

        .coins { color: #ffd700; font-weight: 600; }
        .tokens { color: #00ffff; font-weight: 600; margin-left: 10px; }

        .quizzes-section {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .section-title {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quiz-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            background: #6366f1;
            border-color: white;
            box-shadow: 0 0 15px #6366f1;
        }

        .create-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .shop-btn {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .quizzes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
        }

        .quiz-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .quiz-card.free { border-left: 5px solid #10b981; }
        .quiz-card.premium { border-left: 5px solid #f59e0b; }

        .quiz-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .quiz-theme-badge {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .quiz-class {
            background: rgba(255, 255, 255, 0.3);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .quiz-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .quiz-subject { opacity: 0.8; margin-bottom: 10px; }

        .quiz-stats {
            display: flex;
            gap: 15px;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .quiz-price {
            display: inline-block;
            padding: 3px 10px;
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid #ffd700;
            border-radius: 20px;
        }

        .quiz-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .quiz-action-btn {
            flex: 1;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .quiz-action-btn.play { background: #10b981; color: white; }
        .quiz-action-btn.edit { background: #f59e0b; color: white; }
        .quiz-action-btn.buy { background: #ffd700; color: #2d3436; }

        .constructor-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            padding: 20px;
        }

        .constructor-overlay.active { display: flex; }

        .constructor-window {
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(20px);
            border: 3px solid #6366f1;
            border-radius: 50px;
            width: 1000px;
            max-width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
            color: white;
        }

        .constructor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .constructor-title {
            font-size: 2rem;
            color: #6366f1;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ef4444;
            color: #ef4444;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #6366f1;
            font-weight: 600;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            color: white;
            font-family: 'Comfortaa', cursive;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 15px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .question-number { color: #6366f1; font-weight: 600; }
        .remove-question { color: #ef4444; cursor: pointer; }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #10b981;
            border-radius: 15px;
            padding: 10px;
        }

        .add-question-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
            margin: 20px 0;
        }

        .save-quiz-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }

        .publish-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.7;
        }

        .empty-icon { font-size: 60px; margin-bottom: 20px; }
        .error-msg { color: #ff6b6b; margin-top: 15px; }

        .role-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            margin-left: 5px;
        }
        .role-owner { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #2d3436; }
        .role-mediacoord { background: #c0c0c0; color: #2d3436; }
        .role-chief { background: #ffd700; color: #2d3436; }
        .role-curator { background: #cd7f32; color: white; }
        .role-moderator { background: #6366f1; color: white; }
    </style>
</head>
<body>
    <!-- ЭКРАН ЛОГИНА -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-title">ИЛЬЯКЛАСС</div>
            <div class="login-subtitle">Войдите или зарегистрируйтесь</div>
            
            <div class="role-selector">
                <button class="role-btn active" onclick="selectRole('teacher')">👨‍🏫 Учитель</button>
                <button class="role-btn" onclick="selectRole('student')">👨‍🎓 Ученик</button>
            </div>
            
            <input type="text" id="loginName" class="login-input" placeholder="Имя">
            <input type="password" id="loginPass" class="login-input" placeholder="Пароль">
            
            <button class="login-btn" onclick="doLogin()">🚀 Войти</button>
            <div class="register-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ЭКРАН -->
    <div class="main-screen" id="mainScreen">
        <div class="container">
            <div class="header">
                <div class="logo-small" onclick="window.location='index.html'">

    <script>
        // ===== SUPABASE КОНФИГ =====
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        // ===== ТГ БОТ =====
        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let currentUser = null;
        let selectedRole = 'teacher';
        let userCoins = 100;
        let userTokens = 0;
        let userThemes = ['pink'];
        let quizQuestions = [];
        let editingQuizId = null;
        let currentTab = 'free';

        // ===== РАСШИРЕННЫЙ СПИСОК ТЕМ =====
        const allThemes = [
            { id: 'pink', name: '🌸 Розовая', price: 0, color: '#ff758c' },
            { id: 'blue', name: '💙 Синяя', price: 50, color: '#4facfe' },
            { id: 'green', name: '💚 Зеленая', price: 100, color: '#43e97b' },
            { id: 'purple', name: '💜 Фиолетовая', price: 150, color: '#a18cd1' },
            { id: 'orange', name: '🧡 Оранжевая', price: 200, color: '#fa709a' },
            { id: 'candy', name: '🍭 Карамель', price: 200, color: '#fbc2eb' },
            { id: 'forest', name: '🌲 Лес', price: 225, color: '#38f9d7' },
            { id: 'sunset', name: '🌅 Закат', price: 250, color: '#fee140' },
            { id: 'ocean', name: '🌊 Океан', price: 275, color: '#00f2fe' },
            { id: 'dark', name: '🖤 Темная', price: 300, color: '#2c3e50' }
        ];

        // ===== ФУНКЦИЯ ОТПРАВКИ В ТГ =====
        async function sendToTG(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch (e) { console.error('Ошибка ТГ:', e); }
        }

        // ===== ХЕШ ПАРОЛЯ =====
        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        // ===== ФУНКЦИИ ТЕМЫ =====
        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
        }

        // ===== ФУНКЦИИ ЛОГИНА =====
        window.selectRole = function(role) {
            selectedRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };

        window.showRegister = function() {
            const name = prompt('Введите имя:');
            if (!name) return;
            const pass = prompt('Введите пароль (мин. 3 символа):');
            if (!pass || pass.length < 3) { alert('Пароль должен быть минимум 3 символа'); return; }
            registerUser(name, pass);
        };

        async function registerUser(name, pass) {
            try {
                const { data: existing } = await sb.from('users').select('*').eq('username', name);
                if (existing?.length) { document.getElementById('errorMsg').textContent = 'Имя занято'; return; }

                const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                
                await sb.from('users').insert({
                    id: userId,
                    username: name,
                    password: hashPassword(pass),
                    role: selectedRole,
                    coins: 100,
                    themes: ['pink'],
                    liked_quizzes: [],
                    role_title: 'user',
                    created_at: new Date().toISOString()
                });

                await sb.from('user_tokens').insert({
                    user_id: userId,
                    balance: 0,
                    referral_code: 'ref_' + userId + '_' + Math.floor(Math.random() * 1000000)
                });

                currentUser = { 
                    id: userId, 
                    username: name, 
                    role: selectedRole, 
                    coins: 100, 
                    themes: ['pink'],
                    liked_quizzes: [],
                    role_title: 'user'
                };
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                sendToTG(`🆕 Новый пользователь: ${name} (${selectedRole})`);
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainScreen').classList.add('active');
                updateUI(); 
                loadQuizzes();

                const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                applyTheme(savedTheme);

            } catch (error) { 
                console.error('Ошибка регистрации:', error);
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message; 
            }
        }

        window.doLogin = async function() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value.trim();

            if (!name || !pass) { 
                document.getElementById('errorMsg').textContent = 'Введите имя и пароль'; 
                return; 
            }

            // Вход для владельца
            if (name === 'Ильяблоко' && pass === 'JojoTop1') {
                try {
                    const { data: existing } = await sb.from('users').select('*').eq('username', 'Ильяблоко');
                    
                    let userId = 'owner';
                    
                    if (!existing || existing.length === 0) {
                        await sb.from('users').insert({
                            id: userId,
                            username: 'Ильяблоко',
                            password: hashPassword('JojoTop1'),
                            role: 'teacher',
                            coins: 99999,
                            themes: allThemes.map(t => t.id),
                            role_title: 'owner'
                        });
                        
                        await sb.from('user_tokens').insert({ 
                            user_id: userId, 
                            balance: 99999, 
                            referral_code: 'ref_owner' 
                        });
                    } else {
                        await sb.from('users').update({ 
                            role_title: 'owner', 
                            coins: 99999 
                        }).eq('username', 'Ильяблоко');
                        
                        userId = existing[0].id;
                    }
                    
                    const { data: tokens } = await sb.from('user_tokens')
                        .select('balance')
                        .eq('user_id', userId)
                        .single();
                    
                    currentUser = { 
                        id: userId, 
                        username: 'Ильяблоко', 
                        role: 'teacher', 
                        coins: 99999, 
                        themes: allThemes.map(t => t.id),
                        liked_quizzes: [],
                        role_title: 'owner'
                    };
                    
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    userCoins = 99999; 
                    userTokens = tokens?.balance || 99999; 
                    userThemes = allThemes.map(t => t.id);
                    
                    sendToTG(`👑 Вход: Ильяблоко (Владелец)`);
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainScreen').classList.add('active');
                    updateUI(); 
                    loadQuizzes();
                    
                    const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                    applyTheme(savedTheme);
                    
                } catch (error) {
                    console.error('Ошибка входа владельца:', error);
                    document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message;
                }
                return;
            }

            try {
                const { data: users } = await sb.from('users').select('*').eq('username', name);
                const user = users && users[0];

                if (user && user.password === hashPassword(pass)) {
                    const { data: tokens } = await sb.from('user_tokens')
                        .select('balance')
                        .eq('user_id', user.id)
                        .single();
                    
                    currentUser = { 
                        id: user.id, 
                        username: user.username, 
                        role: user.role,
                        coins: user.coins || 100, 
                        themes: user.themes || ['pink'],
                        liked_quizzes: user.liked_quizzes || [], 
                        role_title: user.role_title || 'user'
                    };
                    
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    userCoins = currentUser.coins; 
                    userTokens = tokens?.balance || 0; 
                    userThemes = currentUser.themes;
                    
                    sendToTG(`🔑 Вход: ${name} (${user.role_title})`);
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainScreen').classList.add('active');
                    updateUI(); 
                    loadQuizzes();
                    
                    const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                    applyTheme(savedTheme);
                    
                } else { 
                    document.getElementById('errorMsg').textContent = 'Неверное имя или пароль'; 
                }
            } catch (error) { 
                console.error('Ошибка входа:', error);
                document.getElementById('errorMsg').textContent = 'Ошибка: ' + error.message; 
            }
        };

        window.logout = function() {
            if (currentUser) sendToTG(`🚪 Выход: ${currentUser.username}`);
            localStorage.removeItem('currentUser');
            window.location.reload();
        };

        function updateUI() {
            const s = document.getElementById('userSection');
            const actionDiv = document.getElementById('actionButtons');
            
            if (!s || !currentUser) return;
            
            const roleEmoji = { 
                'owner': '👑', 
                'mediacoord': '🎥', 
                'chief': '⭐', 
                'curator': '📚', 
                'moderator': '🛡️', 
                'user': '👤' 
            }[currentUser.role_title] || '👤';
            
            const roleClass = { 
                'owner': 'role-owner', 
                'mediacoord': 'role-mediacoord', 
                'chief': 'role-chief', 
                'curator': 'role-curator', 
                'moderator': 'role-moderator', 
                'user': '' 
            }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <span>${currentUser.username}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${currentUser.coins || 0}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
            
            if (currentUser.role === 'teacher') {
                document.getElementById('quizzesTitle').textContent = 'Мои викторины';
                actionDiv.innerHTML = `
                    <a href="shop.html"><button class="shop-btn"><i class="fas fa-store"></i> Магазин</button></a>
                    <button class="create-btn" onclick="openConstructor()"><i class="fas fa-plus"></i> Создать</button>
                `;
            } else {
                document.getElementById('quizzesTitle').textContent = 'Доступные викторины';
                actionDiv.innerHTML = `<a href="shop.html"><button class="shop-btn"><i class="fas fa-store"></i> Магазин тем</button></a>`;
            }
        }

        window.switchTab = function(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            loadQuizzes();
        };

        async function loadQuizzes() {
            if (!currentUser) return;
            
            try {
                let query = sb.from('quizzes').select('*');
                
                if (currentTab === 'free') {
                    query = query.eq('type', 'kahoot').eq('published', true);
                } else if (currentTab === 'premium') {
                    query = query.eq('type', 'constructed').eq('published', true);
                } else if (currentTab === 'my' && currentUser.role === 'teacher') {
                    query = query.eq('created_by', currentUser.id);
                } else {
                    // Если не подходит ни одно условие, возвращаем пустой результат
                    document.getElementById('myQuizzesList').innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>Нет викторин</p></div>`;
                    return;
                }
                
                const { data: quizzes, error } = await query;
                
                if (error) {
                    console.error('Ошибка загрузки:', error);
                    return;
                }
                
                const container = document.getElementById('myQuizzesList');
                
                if (!quizzes || quizzes.length === 0) {
                    if (currentTab === 'free') {
                        container.innerHTML = `<div class="empty-state"><div class="empty-icon">🎁</div><p>Бесплатных викторин пока нет</p></div>`;
                    } else if (currentTab === 'premium') {
                        container.innerHTML = `<div class="empty-state"><div class="empty-icon">💎</div><p>Премиум викторин пока нет</p><a href="shop.html"><button class="shop-btn">В магазин</button></a></div>`;
                    } else {
                        container.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><p>У вас пока нет викторин</p><button class="create-btn" onclick="openConstructor()">Создать</button></div>`;
                    }
                    return;
                }

                let html = '';
                for (let q of quizzes) {
                    const themeColor = q.type === 'kahoot' ? '#10b981' : '#f59e0b';
                    const cardClass = q.type === 'kahoot' ? 'free' : 'premium';
                    
                    html += `<div class="quiz-card ${cardClass}">
                        <div class="quiz-card-header">
                            <div class="quiz-theme-badge" style="background: ${themeColor};"></div>
                            <div class="quiz-class">${q.class || ''}</div>
                        </div>
                        <div class="quiz-title">${q.title}</div>
                        <div class="quiz-subject">${q.subject || ''}</div>
                        <div class="quiz-stats">
                            <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                            ${q.type === 'constructed' ? `<span class="quiz-price"><i class="fas fa-gem"></i> ${q.price_tokens || 0}</span>` : ''}
                        </div>`;
                    
                    if (currentTab === 'premium' && currentUser.role === 'student') {
                        html += `<div class="quiz-actions"><div class="quiz-action-btn buy" onclick="buyQuiz('${q.id}', ${q.price_tokens})"><i class="fas fa-shopping-cart"></i> Купить</div></div>`;
                    } else if (currentUser.role === 'teacher' && currentTab === 'my') {
                        html += `<div class="quiz-actions"><div class="quiz-action-btn play" onclick="playQuiz('${q.id}')"><i class="fas fa-play"></i> Играть</div><div class="quiz-action-btn edit" onclick="editQuiz('${q.id}')"><i class="fas fa-edit"></i></div></div>`;
                    } else {
                        html += `<div class="quiz-actions"><div class="quiz-action-btn play" onclick="playQuiz('${q.id}')"><i class="fas fa-play"></i> Играть</div></div>`;
                    }
                    html += `</div>`;
                }
                container.innerHTML = html;
            } catch (e) { 
                console.error('Ошибка загрузки викторин:', e); 
            }
        }

        window.buyQuiz = async (quizId, price) => {
            if (!currentUser) return;
            if (userTokens < price) { 
                alert('Недостаточно токенов!'); 
                return; 
            }
            if (confirm(`Купить викторину за ${price} токенов?`)) {
                try {
                    const { data, error } = await sb.rpc('buy_quiz_with_tokens', { 
                        p_user_id: currentUser.id, 
                        p_quiz_id: quizId 
                    });
                    
                    if (error) throw error;
                    
                    if (data) { 
                        userTokens -= price; 
                        updateUI(); 
                        alert('✅ Викторина куплена!'); 
                        sendToTG(`💎 ${currentUser.username} купил викторину за ${price} токенов`); 
                    } else { 
                        alert('❌ Ошибка при покупке'); 
                    }
                } catch (error) {
                    console.error('Ошибка покупки:', error);
                    alert('Ошибка: ' + error.message);
                }
            }
        };

        window.playQuiz = (quizId) => window.location.href = `teacher.html?quiz=${quizId}`;
        window.editQuiz = (quizId) => openConstructor(quizId);

        window.openConstructor = function(editId = null) {
            if (!currentUser || currentUser.role !== 'teacher') { 
                alert('Только учителя могут создавать викторины'); 
                return; 
            }
            editingQuizId = editId;
            if (editId) { 
                document.getElementById('constructorTitle').textContent = '✏️ Редактирование'; 
                loadQuizForEdit(editId); 
            } else { 
                document.getElementById('constructorTitle').textContent = '🛠️ Создание'; 
                quizQuestions = []; 
                document.getElementById('quizTitle').value = ''; 
                document.getElementById('quizClass').value = ''; 
                document.getElementById('quizSubject').value = ''; 
                document.getElementById('quizTheme').value = 'pink'; 
                document.getElementById('quizType').value = 'kahoot'; 
                document.getElementById('quizPriceTokens').value = '0'; 
                document.getElementById('publishToStore').checked = false; 
                renderQuestions(); 
            }
            document.getElementById('constructorOverlay').classList.add('active');
        };

        window.closeConstructor = () => { 
            document.getElementById('constructorOverlay').classList.remove('active'); 
            editingQuizId = null; 
        };
        
        window.addQuestion = () => { 
            quizQuestions.push({ 
                id: Date.now(), 
                question: '', 
                answers: ['', '', '', ''], 
                correct: 0 
            }); 
            renderQuestions(); 
        };
        
        window.removeQuestion = (i) => { 
            if (quizQuestions.length <= 1) { 
                alert('Должен быть хотя бы один вопрос'); 
                return; 
            } 
            quizQuestions.splice(i, 1); 
            renderQuestions(); 
        };
        
        function renderQuestions() {
            let html = '', 
                c = document.getElementById('questionsContainer');
            
            if (quizQuestions.length === 0) {
                c.innerHTML = '<p style="text-align:center; opacity:0.7;">Добавьте первый вопрос</p>';
                return;
            }
            
            for (let i = 0; i < quizQuestions.length; i++) {
                let q = quizQuestions[i];
                html += `<div class="question-card">
                    <div class="question-header">
                        <span class="question-number">Вопрос ${i+1}</span>
                        <span class="remove-question" onclick="removeQuestion(${i})">✕</span>
                    </div>
                    <input type="text" placeholder="Текст вопроса" value="${(q.question || '').replace(/"/g, '&quot;')}" 
                           onchange="updateQuestion(${i}, 'question', this.value)" style="width:100%; padding:10px; margin-bottom:10px;">
                    <div class="answers-grid">`;
                
                for (let j = 0; j < 4; j++) {
                    html += `<div class="answer-option">
                        <input type="radio" name="correct-${q.id || i}" value="${j}" ${q.correct === j ? 'checked' : ''} 
                               onchange="updateQuestion(${i}, 'correct', this.value)">
                        <input type="text" placeholder="Ответ ${j+1}" value="${(q.answers[j] || '').replace(/"/g, '&quot;')}" 
                               onchange="updateQuestion(${i}, 'answer${j}', this.value)">
                    </div>`;
                }
                
                html += `</div></div>`;
            }
            c.innerHTML = html;
        }

        window.updateQuestion = (i, f, v) => {
            if (f === 'question') {
                quizQuestions[i].question = v;
            } else if (f.startsWith('answer')) {
                let ai = parseInt(f.replace('answer',''));
                quizQuestions[i].answers[ai] = v;
            } else if (f === 'correct') {
                quizQuestions[i].correct = parseInt(v);
            }
        };

        async function loadQuizForEdit(quizId) {
            try {
                const { data: quiz, error: quizError } = await sb.from('quizzes').select('*').eq('id', quizId).single();
                if (quizError) throw quizError;
                
                const { data: questions, error: questionsError } = await sb.from('questions')
                    .select('*')
                    .eq('quiz_id', quizId)
                    .order('question_index');
                    
                if (questionsError) throw questionsError;
                
                if (quiz) {
                    document.getElementById('quizTitle').value = quiz.title || '';
                    document.getElementById('quizClass').value = quiz.class || '';
                    document.getElementById('quizSubject').value = quiz.subject || '';
                    document.getElementById('quizTheme').value = 'pink'; // Значение по умолчанию
                    document.getElementById('quizType').value = quiz.type || 'kahoot';
                    document.getElementById('quizPriceTokens').value = quiz.price_tokens || 0;
                    document.getElementById('publishToStore').checked = false;
                }
                
                quizQuestions = (questions || []).map(q => ({
                    id: q.id || Date.now() + Math.random(),
                    question: q.question,
                    answers: q.answers || ['', '', '', ''],
                    correct: q.correct || 0
                }));
                
                renderQuestions();
            } catch (error) { 
                console.error('Ошибка загрузки викторины:', error); 
                alert('Не удалось загрузить викторину: ' + error.message); 
            }
        }

        async function addCoins(userId, amount, reason) {
            if (!userId) return null;
            try {
                const { data: user, error: userError } = await sb.from('users')
                    .select('coins')
                    .eq('id', userId)
                    .single();
                    
                if (userError) throw userError;
                if (!user) return null;
                
                const newCoins = (user.coins || 0) + amount;
                
                const { error: updateError } = await sb.from('users')
                    .update({ coins: newCoins })
                    .eq('id', userId);
                    
                if (updateError) throw updateError;
                
                if (currentUser && currentUser.id === userId) {
                    currentUser.coins = newCoins;
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    updateUI();
                }
                
                sendToTG(`💰 ${currentUser?.username} получил ${amount} монет (${reason})`);
                return newCoins;
                
            } catch (error) { 
                console.error('Ошибка добавления монет:', error); 
                return null; 
            }
        }

        // ===== ИСПРАВЛЕННАЯ ФУНКЦИЯ СОХРАНЕНИЯ =====
        window.saveQuiz = async function() {
            if (!currentUser) {
                alert('Ошибка: пользователь не найден');
                return;
            }

            // Проверяем, что пользователь существует в БД
            try {
                const { data: userCheck, error: userError } = await sb.from('users')
                    .select('id')
                    .eq('id', currentUser.id)
                    .single();
                    
                if (userError || !userCheck) {
                    alert('Ошибка: пользователь не найден в базе данных');
                    return;
                }
            } catch (error) {
                console.error('Ошибка проверки пользователя:', error);
                alert('Ошибка проверки пользователя: ' + error.message);
                return;
            }

            const title = document.getElementById('quizTitle').value.trim();
            const quizClass = document.getElementById('quizClass').value.trim();
            const subject = document.getElementById('quizSubject').value.trim();
            const type = document.getElementById('quizType').value;
            const price = parseInt(document.getElementById('quizPriceTokens').value) || 0;
            const publish = document.getElementById('publishToStore').checked;

            if (!title) { 
                alert('Введите название викторины'); 
                return; 
            }
            
            if (quizQuestions.length === 0) { 
                alert('Добавьте хотя бы один вопрос'); 
                return; 
            }

            for (let i = 0; i < quizQuestions.length; i++) {
                const q = quizQuestions[i];
                
                if (!q.question || q.question.trim() === '') {
                    alert(`Заполните текст вопроса ${i+1}`);
                    return;
                }
                
                for (let j = 0; j < 4; j++) {
                    if (!q.answers[j] || q.answers[j].trim() === '') {
                        alert(`Заполните ответ ${j+1} в вопросе ${i+1}`);
                        return;
                    }
                }
                
                if (q.correct === undefined || q.correct === null) {
                    alert(`Выберите правильный ответ в вопросе ${i+1}`);
                    return;
                }
            }

            try {
                if (editingQuizId) {
                    // Обновление существующей викторины
                    const { error: updateError } = await sb.from('quizzes').update({
                        title: title,
                        class: quizClass,
                        subject: subject,
                        type: type,
                        price_tokens: price,
                        question_count: quizQuestions.length,
                        max_score: quizQuestions.length,
                        published: publish
                    }).eq('id', editingQuizId);

                    if (updateError) throw updateError;

                    // Удаляем старые вопросы
                    const { error: deleteError } = await sb.from('questions')
                        .delete()
                        .eq('quiz_id', editingQuizId);
                        
                    if (deleteError) throw deleteError;

                    // Добавляем новые вопросы
                    for (let i = 0; i < quizQuestions.length; i++) {
                        const q = quizQuestions[i];
                        const { error: insertError } = await sb.from('questions').insert({
                            quiz_id: editingQuizId,
                            question_index: i,
                            question: q.question,
                            answers: q.answers,
                            correct: q.correct
                        });
                        
                        if (insertError) throw insertError;
                    }

                    sendToTG(`✏️ ${currentUser.username} отредактировал викторину: ${title}`);
                    alert('✅ Викторина обновлена!');
                    
                } else {
                    // Создание новой викторины
                    const quizId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                    
                    const quizData = {
                        id: quizId,
                        title: title,
                        class: quizClass,
                        subject: subject,
                        type: type,
                        price_tokens: price,
                        question_count: quizQuestions.length,
                        max_score: quizQuestions.length,
                        created_by: currentUser.id,
                        published: publish,
                        created_at: Date.now()
                    };
                    
                    console.log('Сохраняем викторину:', quizData);
                    
                    const { error: insertError } = await sb.from('quizzes').insert(quizData);

                    if (insertError) { 
                        console.error('Ошибка при вставке викторины:', insertError);
                        alert('Ошибка базы данных: ' + insertError.message); 
                        return; 
                    }

                    // Добавляем вопросы
                    for (let i = 0; i < quizQuestions.length; i++) {
                        const q = quizQuestions[i];
                        const { error: qError } = await sb.from('questions').insert({
                            quiz_id: quizId,
                            question_index: i,
                            question: q.question,
                            answers: q.answers,
                            correct: q.correct
                        });
                        
                        if (qError) {
                            console.error('Ошибка при добавлении вопроса:', qError);
                            throw qError;
                        }
                    }

                    // Начисляем монеты
                    await addCoins(currentUser.id, 50, 'created_quiz');
                    
                    if (publish) {
                        await addCoins(currentUser.id, 100, 'published_quiz');
                        sendToTG(`📢 ${currentUser.username} опубликовал викторину: ${title} (+100 монет)`);
                    } else {
                        sendToTG(`📝 ${currentUser.username} создал викторину: ${title} (+50 монет)`);
                    }

                    alert(publish ? '✅ Викторина опубликована! +150 монет' : '✅ Викторина сохранена! +50 монет');
                }

                closeConstructor();
                await loadQuizzes();

            } catch (error) {
                console.error('Ошибка сохранения:', error);
                alert('Ошибка: ' + error.message);
            }
        };

        // ===== ПРОВЕРКА АВТОРИЗАЦИИ =====
        (function checkAuth() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                try {
                    currentUser = JSON.parse(saved);
                    userCoins = currentUser.coins || 100;
                    userThemes = currentUser.themes || ['pink'];
                    
                    // Проверяем, что пользователь действительно существует в БД
                    sb.from('users')
                        .select('id')
                        .eq('id', currentUser.id)
                        .single()
                        .then(({ data, error }) => {
                            if (error || !data) {
                                console.error('Пользователь не найден в БД, очищаем localStorage');
                                localStorage.removeItem('currentUser');
                                window.location.reload();
                                return;
                            }
                            
                            // Загружаем токены
                            sb.from('user_tokens')
                                .select('balance')
                                .eq('user_id', currentUser.id)
                                .single()
                                .then(({ data: tokenData }) => {
                                    userTokens = tokenData?.balance || 0;
                                    updateUI();
                                })
                                .catch(err => console.error('Ошибка загрузки токенов:', err));
                        })
                        .catch(err => console.error('Ошибка проверки пользователя:', err));
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainScreen').classList.add('active');
                    updateUI();
                    loadQuizzes();
                    
                    const savedTheme = localStorage.getItem('currentTheme') || 'pink';
                    applyTheme(savedTheme);
                    
                } catch (e) {
                    console.error('Ошибка парсинга пользователя:', e);
                    localStorage.removeItem('currentUser');
                }
            }
        })();
    </script>
