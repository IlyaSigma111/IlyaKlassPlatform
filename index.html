<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --dark-bg: #0a0c14;
            --dark-card: #151823;
            --light-bg: #f3f4f6;
            --light-card: #ffffff;
        }

        body {
            background: var(--dark-bg);
            color: white;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.light-theme {
            background: var(--light-bg);
            color: #1f2937;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px #6366f1, 0 0 10px #6366f1, 0 0 15px #6366f1; }
            50% { text-shadow: 0 0 10px #f59e0b, 0 0 20px #f59e0b, 0 0 30px #f59e0b; }
            100% { text-shadow: 0 0 5px #6366f1, 0 0 10px #6366f1, 0 0 15px #6366f1; }
        }

        .glow-name {
            animation: glow 3s infinite;
            background: linear-gradient(135deg, #6366f1, #f59e0b, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .header {
            background: rgba(21, 24, 35, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--primary);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        body.light-theme .header {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 2px solid var(--primary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            cursor: pointer;
        }

        .logo-il {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-yaclass {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 18px;
            border-radius: 30px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: inherit;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(99, 102, 241, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
            border: 1px solid var(--primary);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #f59e0b);
        }

        .logout-btn, .theme-btn {
            padding: 7px 16px;
            border-radius: 30px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary);
            color: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover, .theme-btn:hover {
            background: var(--primary);
            color: white;
        }

        .main-container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .leaderboard {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        body.light-theme .leaderboard {
            background: rgba(255, 255, 255, 0.9);
        }

        .leaderboard h2 {
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
        }

        .leaderboard-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .leaderboard-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: rgba(99, 102, 241, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .leaderboard-rank {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            border-radius: 50%;
            font-weight: bold;
        }

        .leaderboard-name {
            flex: 1;
            font-weight: 600;
        }

        .leaderboard-score {
            color: var(--primary);
            font-weight: bold;
        }

        .chat {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            height: 300px;
            display: flex;
            flex-direction: column;
        }

        body.light-theme .chat {
            background: rgba(255, 255, 255, 0.9);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .chat-message {
            padding: 8px 12px;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 15px;
            border-bottom-left-radius: 5px;
            max-width: 80%;
        }

        .chat-message.own {
            align-self: flex-end;
            background: var(--primary);
            border-bottom-left-radius: 15px;
            border-bottom-right-radius: 5px;
        }

        .chat-message .author {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 3px;
        }

        .chat-message .text {
            word-break: break-word;
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 10px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            background: rgba(0,0,0,0.2);
            color: inherit;
        }

        .chat-send {
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
        }

        .content-area {
            min-height: 500px;
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .login-card {
            background: rgba(21, 24, 35, 0.9);
            backdrop-filter: blur(20px);
            border: 3px solid var(--primary);
            border-radius: 30px;
            padding: 40px;
            width: 400px;
            text-align: center;
        }

        body.light-theme .login-card {
            background: white;
        }

        .login-title {
            font-size: 48px;
            margin-bottom: 30px;
        }

        .login-subtitle {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .login-input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 30px;
            border: 2px solid var(--primary);
            background: rgba(0,0,0,0.2);
            color: inherit;
            font-size: 16px;
        }

        body.light-theme .login-input {
            background: white;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-btn:hover {
            opacity: 0.9;
        }

        .register-link {
            margin-top: 20px;
            color: var(--primary);
            cursor: pointer;
            text-decoration: underline;
        }

        .register-link:hover {
            opacity: 0.8;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .quiz-card {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
        }

        body.light-theme .quiz-card {
            background: white;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--primary-glow);
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .quiz-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .badge-kahoot { background: #f59e0b; }
        .badge-simple { background: #10b981; }
        .badge-constructed { background: #6366f1; }

        .delete-btn {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 18px;
            cursor: pointer;
        }

        .quiz-class {
            background: var(--primary);
            display: inline-block;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 11px;
            margin-bottom: 10px;
        }

        .quiz-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .quiz-actions {
            display: flex;
            gap: 8px;
            margin-top: 15px;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            flex: 1;
            text-align: center;
            text-decoration: none;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary);
            color: inherit;
        }

        .btn-teacher { background: var(--primary); color: white; }
        .btn-student { background: #10b981; color: white; }
        .btn-external { background: #f59e0b; color: white; }

        .quiz-form {
            background: rgba(21, 24, 35, 0.9);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            display: none;
        }

        .quiz-form.visible {
            display: block;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin: 15px 0;
        }

        .radio-option {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--primary);
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
        }

        .radio-option.selected {
            background: var(--primary);
            color: white;
        }

        .question-card {
            background: rgba(0,0,0,0.2);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .remove-question {
            background: none;
            border: none;
            color: var(--danger);
            font-size: 20px;
            cursor: pointer;
        }

        .answer-option {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .add-question-btn {
            background: transparent;
            border: 2px dashed var(--primary);
            color: var(--primary);
            padding: 12px;
            width: 100%;
            border-radius: 15px;
            margin: 15px 0;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .leaderboard {
                position: static;
                margin-top: 20px;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link active">Главная</a>
                <a href="results.html" class="nav-link">Результаты</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div class="content-area">
            <div id="content" class="loading">Загрузка...</div>
        </div>
        
        <div class="leaderboard" id="leaderboard">
            <h2>🏆 ЛИДЕРБОРД</h2>
            <div class="leaderboard-list" id="leaderboardList">
                <div class="loading" style="padding:20px;">Загрузка...</div>
            </div>
        </div>

        <div class="chat" id="chat">
            <h3 style="color:var(--primary); margin-bottom:10px;">💬 Чат</h3>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="chat-send" onclick="sendMessage()">→</button>
            </div>
        </div>
    </main>

    <!-- Модальное окно регистрации -->
    <div id="registerModal" class="modal-overlay" style="display: none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(5px); justify-content:center; align-items:center; z-index:2000;">
        <div style="background:var(--dark-card); border:3px solid var(--primary); border-radius:30px; padding:30px; width:400px; max-width:90%;">
            <h2 style="color:var(--primary); margin-bottom:20px; text-align:center;">📝 Регистрация</h2>
            <input type="text" id="regName" class="login-input" placeholder="Имя">
            <input type="password" id="regPass" class="login-input" placeholder="Пароль">
            <input type="password" id="regPassConfirm" class="login-input" placeholder="Повторите пароль">
            <button class="login-btn" onclick="registerUser()">Зарегистрироваться</button>
            <div class="register-link" onclick="closeRegisterModal()" style="text-align:center; margin-top:15px;">Уже есть аккаунт? Войти</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== SUPABASE КОНФИГ =====
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        // ===== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ =====
        let currentUser = null;
        let userName = '';

        // ===== ТЕМА =====
        function toggleTheme() {
            const b = document.body;
            const t = document.getElementById('themeToggle');
            if (b.classList.contains('dark-theme')) {
                b.classList.replace('dark-theme', 'light-theme');
                t.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                b.classList.replace('light-theme', 'dark-theme');
                t.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        // ===== ХЕШ ПАРОЛЯ =====
        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        // ===== МОДАЛКИ =====
        function showRegisterModal() {
            document.getElementById('registerModal').style.display = 'flex';
        }

        function closeRegisterModal() {
            document.getElementById('registerModal').style.display = 'none';
            showLoginForm();
        }

        // ===== ЛОГИН =====
        function checkLogin() {
            const saved = localStorage.getItem('currentUser');
            if (saved) {
                const user = JSON.parse(saved);
                currentUser = user;
                userName = user.name;
                updateUI();
                loadContent();
                loadLeaderboard();
                loadChat();
            } else {
                showLoginForm();
            }
        }

        function showLoginForm() {
            const c = document.getElementById('content');
            c.innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <div class="login-title">
                            <span class="logo-il">ИЛЬ</span>
                            <span class="logo-yaclass">ЯКЛАСС</span>
                        </div>
                        <div class="login-subtitle">Войдите или зарегистрируйтесь</div>
                        <input type="text" class="login-input" id="loginName" placeholder="Имя">
                        <input type="password" class="login-input" id="loginPass" placeholder="Пароль">
                        <button class="login-btn" onclick="doLogin()">⚡ Войти</button>
                        <div class="register-link" onclick="showRegisterModal()">Нет аккаунта? Зарегистрироваться</div>
                    </div>
                </div>
            `;
        }

        async function doLogin() {
            const name = document.getElementById('loginName').value.trim();
            const pass = document.getElementById('loginPass').value;
            
            if (!name || !pass) {
                alert('Введите имя и пароль');
                return;
            }

            // Специальный админ
            if (name === 'Ильяблоко' && pass === 'JojoTop1') {
                const user = { id: 'admin', name: 'Ильяблоко', isAdmin: true };
                localStorage.setItem('currentUser', JSON.stringify(user));
                currentUser = user;
                userName = name;
                updateUI();
                loadContent();
                loadLeaderboard();
                loadChat();
                return;
            }

            // Обычные пользователи
            const { data: users } = await sb.from('users').select('*').eq('name', name);
            const user = users && users[0];
            
            if (user && user.password === hashPassword(pass)) {
                const userObj = { id: user.id, name: user.name };
                localStorage.setItem('currentUser', JSON.stringify(userObj));
                currentUser = userObj;
                userName = name;
                updateUI();
                loadContent();
                loadLeaderboard();
                loadChat();
            } else {
                alert('Неверное имя или пароль');
            }
        }

        async function registerUser() {
            const name = document.getElementById('regName').value.trim();
            const pass = document.getElementById('regPass').value;
            const confirm = document.getElementById('regPassConfirm').value;

            if (!name || !pass) {
                alert('Заполните все поля');
                return;
            }

            if (pass !== confirm) {
                alert('Пароли не совпадают');
                return;
            }

            if (pass.length < 3) {
                alert('Пароль должен быть минимум 3 символа');
                return;
            }

            // Проверяем, не занято ли имя
            const { data: existing } = await sb.from('users').select('*').eq('name', name);
            if (existing && existing.length > 0) {
                alert('Это имя уже занято');
                return;
            }

            // Создаем пользователя
            const { data, error } = await sb.from('users').insert({
                name: name,
                password: hashPassword(pass),
                created_at: new Date().toISOString()
            }).select();

            if (error) {
                alert('Ошибка регистрации');
                return;
            }

            // Автоматически входим
            const user = { id: data[0].id, name: name };
            localStorage.setItem('currentUser', JSON.stringify(user));
            currentUser = user;
            userName = name;
            closeRegisterModal();
            updateUI();
            loadContent();
            loadLeaderboard();
            loadChat();
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.reload();
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            if (currentUser) {
                s.innerHTML = '<div class="user-card"><div class="avatar"></div><span class="' + (userName === 'Ильяблоко' ? 'glow-name' : '') + '">' + userName + '</span><button onclick="logout()" class="logout-btn">Выйти</button></div>';
            } else {
                s.innerHTML = '';
            }
        }

        // ===== ЛИДЕРБОРД =====
        async function loadLeaderboard() {
            const { data: results } = await sb.from('results').select('*');
            const scores = {};
            if (results) {
                for (let r of results) {
                    if (!scores[r.student_name]) scores[r.student_name] = 0;
                    scores[r.student_name] += r.score || 0;
                }
            }
            
            // Добавляем тестовые данные
            if (!scores['Ильяблоко']) scores['Ильяблоко'] = 9999;
            
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]).slice(0, 10);
            
            let html = '';
            for (let i = 0; i < sorted.length; i++) {
                let isMe = sorted[i][0] === userName;
                html += '<div class="leaderboard-item"><div class="leaderboard-rank">' + (i+1) + '</div><div class="leaderboard-name" ' + (isMe ? 'style="color:var(--primary);font-weight:bold;"' : '') + '>' + sorted[i][0] + '</div><div class="leaderboard-score">' + sorted[i][1] + '</div></div>';
            }
            document.getElementById('leaderboardList').innerHTML = html;
        }

        // ===== ЧАТ =====
        async function loadChat() {
            const { data: messages } = await sb.from('chat').select('*').order('created_at', { ascending: false }).limit(50);
            const container = document.getElementById('chatMessages');
            if (!container) return;
            
            let html = '';
            if (messages) {
                for (let i = messages.length - 1; i >= 0; i--) {
                    let m = messages[i];
                    let isMe = m.user_name === userName;
                    html += '<div class="chat-message' + (isMe ? ' own' : '') + '"><div class="author">' + (m.user_name === 'Ильяблоко' ? '<span class="glow-name">' + m.user_name + '</span>' : m.user_name) + '</div><div class="text">' + m.text + '</div></div>';
                }
            }
            container.innerHTML = html || '<div style="text-align:center;opacity:0.5;">Нет сообщений</div>';
            container.scrollTop = container.scrollHeight;
        }

        window.sendMessage = async function() {
            if (!currentUser) return;
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            await sb.from('chat').insert({
                user_name: userName,
                text: text,
                created_at: new Date().toISOString()
            });
            
            input.value = '';
            loadChat();
        };

        // Подписка на новые сообщения
        sb.channel('chat-room')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, () => loadChat())
            .subscribe();

        // ===== КОНТЕНТ =====
        function loadContent() {
            const c = document.getElementById('content');
            if (!c || !currentUser) return;

            c.innerHTML = `
                <div class="quizzes-section">
                    <div class="section-header">
                        <h2 style="color:var(--primary);">📚 Все викторины</h2>
                        <div>
                            <button class="add-quiz-btn" onclick="toggleForm()">➕ По ссылке</button>
                            <button class="add-quiz-btn" onclick="showConstructor()">🛠️ Конструктор</button>
                        </div>
                    </div>
                    <div id="quizForm" class="quiz-form"></div>
                    <div id="quizzesList" class="quiz-grid">Загрузка...</div>
                </div>
            `;
            loadAllQuizzes();
        }

        async function loadAllQuizzes() {
            const { data: quizzes } = await sb.from('quizzes').select('*');
            const container = document.getElementById('quizzesList');
            if (!container) return;
            
            if (!quizzes || quizzes.length === 0) {
                container.innerHTML = '<p>Нет викторин</p>';
                return;
            }

            let html = '';
            for (let q of quizzes) {
                let badge = 'badge-simple';
                let btext = '📝';
                if (q.type === 'kahoot') {
                    badge = 'badge-kahoot';
                    btext = '🎮';
                } else if (q.type === 'constructed') {
                    badge = 'badge-constructed';
                    btext = '🛠️';
                }

                html += '<div class="quiz-card"><div class="quiz-header"><span class="quiz-badge ' + badge + '">' + btext + '</span>';
                if (userName === 'Ильяблоко') {
                    html += '<button class="delete-btn" onclick="deleteQuiz(\'' + q.id + '\')">🗑️</button>';
                }
                html += '</div><div class="quiz-class">' + (q.class || '') + 'кл</div><div class="quiz-title">' + q.title + '</div><div class="quiz-subject">' + (q.subject || '') + '</div><div class="quiz-actions">';
                if (userName === 'Ильяблоко') {
                    if (q.type === 'kahoot') {
                        html += '<button class="btn btn-teacher" onclick="startQuiz(\'' + q.id + '\',\'' + q.link + '\')">▶️ Запустить</button>';
                    } else if (q.type === 'constructed') {
                        html += '<button class="btn btn-teacher" onclick="startConstructedQuiz(\'' + q.id + '\',\'' + q.constructor_type + '\')">▶️ Провести</button>';
                    } else {
                        html += '<a href="' + q.link + '" target="_blank" class="btn btn-external">🌐 Перейти</a>';
                    }
                } else {
                    if (q.type === 'kahoot') {
                        html += '<button class="btn btn-student" onclick="joinQuiz(\'' + q.id + '\',\'' + q.link + '\')">🎮 Играть</button>';
                    } else if (q.type === 'constructed' && q.constructor_type !== 'board') {
                        html += '<button class="btn btn-student" onclick="joinConstructedQuiz(\'' + q.id + '\')">🛠️ Играть</button>';
                    } else if (q.type === 'constructed' && q.constructor_type === 'board') {
                        html += '<span class="btn" style="background:#f59e0b;">👥</span>';
                    } else {
                        html += '<a href="' + q.link + '" target="_blank" class="btn btn-external">🌐 Перейти</a>';
                    }
                }
                html += '</div></div>';
            }
            container.innerHTML = html;
        }

        window.deleteQuiz = async function(id) {
            if (confirm('Удалить?')) {
                await sb.from('quizzes').delete().eq('id', id);
                loadAllQuizzes();
            }
        };

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        window.toggleForm = function() {
            const f = document.getElementById('quizForm');
            if (!f) return;
            f.innerHTML = '<h3 style="color:var(--primary);">➕ По ссылке</h3><div class="form-group"><label>Тип</label><div class="radio-group"><div class="radio-option selected" onclick="selectQuizType(\'kahoot\')" id="type-kahoot">🎮 Kahoot</div><div class="radio-option" onclick="selectQuizType(\'simple\')" id="type-simple">📝 Простая</div></div></div><div class="form-group"><label>Класс</label><input id="quizClass" placeholder="5 класс"></div><div class="form-group"><label>Предмет</label><input id="quizSubject" placeholder="Математика"></div><div class="form-group"><label>Название</label><input id="quizTitle" placeholder="Conditionals"></div><div class="form-group"><label>Описание</label><textarea id="quizDescription" rows="2"></textarea></div><div class="form-group"><label>Ссылка</label><input id="quizLink" placeholder="https://..."></div><div class="form-group" id="maxScoreGroup"><label>Макс. балл</label><input type="number" id="quizMaxScore" value="15"></div><button class="login-btn" onclick="saveQuiz()">💾 Сохранить</button>';
            f.classList.toggle('visible');
        };

        window.selectQuizType = function(t) {
            document.getElementById('type-kahoot')?.classList.toggle('selected', t==='kahoot');
            document.getElementById('type-simple')?.classList.toggle('selected', t==='simple');
            document.getElementById('maxScoreGroup').style.display = t==='kahoot' ? 'block' : 'none';
        };

        window.saveQuiz = async function() {
            let t = document.querySelector('.radio-option.selected')?.id === 'type-kahoot' ? 'kahoot' : 'simple';
            let id = generateId();
            let data = {
                id: id,
                type: t,
                class: document.getElementById('quizClass')?.value || '',
                subject: document.getElementById('quizSubject')?.value || '',
                title: document.getElementById('quizTitle')?.value || '',
                description: document.getElementById('quizDescription')?.value || '',
                link: document.getElementById('quizLink')?.value || '',
                created_by: currentUser.id,
                created_at: Date.now()
            };
            if (!data.title || !data.link) return alert('Заполните название и ссылку');
            if (t === 'kahoot') data.max_score = parseInt(document.getElementById('quizMaxScore')?.value) || 15;
            await sb.from('quizzes').insert(data);
            document.getElementById('quizTitle').value = '';
            document.getElementById('quizDescription').value = '';
            document.getElementById('quizLink').value = '';
            document.getElementById('quizMaxScore').value = '15';
            document.getElementById('quizForm')?.classList.remove('visible');
            loadAllQuizzes();
        };

        window.startQuiz = async function(id,link) {
            let sessionId = generateId();
            await sb.from('sessions').insert({
                id: sessionId,
                quiz_id: id,
                teacher_id: currentUser.id,
                teacher_name: userName,
                status: 'active',
                started_at: Date.now(),
                students: {}
            });
            window.open(link, '_blank');
        };

        window.joinQuiz = async function(id,link) {
            if (!currentUser) return;
            let { data: sessions } = await sb.from('sessions').select('*').eq('quiz_id', id);
            let active = sessions?.find(s => s.status === 'active');
            if (!active) return alert('Нет активной викторины');
            
            if (!active.students) active.students = {};
            active.students[currentUser.id] = { name: userName, joined_at: Date.now() };
            await sb.from('sessions').update({ students: active.students }).eq('id', active.id);
            
            try { 
                let u = new URL(link); 
                u.searchParams.append('session', active.id); 
                u.searchParams.append('student', currentUser.id); 
                u.searchParams.append('name', userName); 
                window.open(u, '_blank'); 
            } catch(e) { 
                let sep = link.includes('?') ? '&' : '?';
                window.open(link + sep + 'session=' + active.id + '&student=' + currentUser.id + '&name=' + encodeURIComponent(userName), '_blank'); 
            }
        };

        window.showConstructor = function() {
            const f = document.getElementById('quizForm');
            if (!f) return;
            f.innerHTML = '<h3 style="color:var(--primary);">🛠️ Конструктор</h3><div class="form-group"><label>Тип</label><div class="radio-group"><div class="radio-option selected" onclick="selectConstructorType(\'classic\')" id="type-classic">📱 С телефонами</div><div class="radio-option" onclick="selectConstructorType(\'board\')" id="type-board">📝 С доски</div></div></div><div class="form-group"><label>Название</label><input id="quizTitle" placeholder="Conditionals"></div><div class="form-group"><label>Класс</label><input id="quizClass" placeholder="5 класс"></div><div class="form-group"><label>Предмет</label><input id="quizSubject" placeholder="Математика"></div><div class="form-group"><label>Вопросов</label><div><input type="number" id="questionCount" value="5" min="1"><button class="add-quiz-btn" onclick="generateQuestions()">Создать</button></div></div><div id="questionsContainer"></div><button class="add-question-btn" id="addQuestionBtn" style="display:none" onclick="addQuestion()">➕ Добавить вопрос</button><button class="login-btn" id="saveQuizBtn" style="display:none" onclick="saveQuizWithQuestions()">💾 Сохранить</button>';
            f.classList.add('visible');
        };

        let quizQuestions = [];
        let constructorType = 'classic';

        window.selectConstructorType = function(t) {
            document.getElementById('type-classic')?.classList.toggle('selected', t==='classic');
            document.getElementById('type-board')?.classList.toggle('selected', t==='board');
            constructorType = t;
        };

        window.generateQuestions = function() {
            let cnt = parseInt(document.getElementById('questionCount')?.value) || 5;
            quizQuestions = [];
            for (let i = 0; i < cnt; i++) {
                quizQuestions.push({ id: Date.now() + i, question: '', answers: ['','','',''], correct: 0 });
            }
            renderQuestions();
            document.getElementById('addQuestionBtn').style.display = 'block';
            document.getElementById('saveQuizBtn').style.display = 'block';
        };

        window.addQuestion = function() {
            quizQuestions.push({ id: Date.now(), question: '', answers: ['','','',''], correct: 0 });
            renderQuestions();
        };

        window.removeQuestion = function(idx) {
            quizQuestions.splice(idx, 1);
            renderQuestions();
            if (!quizQuestions.length) {
                document.getElementById('addQuestionBtn').style.display = 'none';
                document.getElementById('saveQuizBtn').style.display = 'none';
            }
        };

        window.updateQuestion = function(idx, f, v) {
            if (f === 'question') {
                quizQuestions[idx].question = v;
            } else if (f.startsWith('answer')) {
                let ai = parseInt(f.replace('answer',''));
                quizQuestions[idx].answers[ai] = v;
            } else if (f === 'correct') {
                quizQuestions[idx].correct = parseInt(v);
            }
        };

        function renderQuestions() {
            let c = document.getElementById('questionsContainer');
            if (!c) return;
            let h = '';
            for (let i = 0; i < quizQuestions.length; i++) {
                let q = quizQuestions[i];
                h += '<div class="question-card"><div class="question-header"><span>Вопрос ' + (i+1) + '</span><button class="remove-question" onclick="removeQuestion(' + i + ')">×</button></div><div class="form-group"><input value="' + q.question + '" onchange="updateQuestion(' + i + ',\'question\',this.value)" placeholder="Вопрос"></div>';
                for (let j = 0; j < 4; j++) {
                    h += '<div class="answer-option"><input type="radio" name="correct-' + q.id + '" value="' + j + '" ' + (q.correct === j ? 'checked' : '') + ' onchange="updateQuestion(' + i + ',\'correct\',this.value)"><input type="text" value="' + q.answers[j] + '" placeholder="Ответ ' + (j+1) + '" onchange="updateQuestion(' + i + ',\'answer' + j + '\',this.value)">' + (q.correct === j ? '✓' : '') + '</div>';
                }
                h += '</div>';
            }
            c.innerHTML = h;
        }

        window.saveQuizWithQuestions = async function() {
            let t = document.getElementById('type-classic')?.classList.contains('selected') ? 'classic' : 'board';
            let title = document.getElementById('quizTitle')?.value;
            let quizClass = document.getElementById('quizClass')?.value;
            let subject = document.getElementById('quizSubject')?.value;
            if (!title) return alert('Введите название');
            for (let i = 0; i < quizQuestions.length; i++) {
                if (!quizQuestions[i].question) return alert('Заполните вопрос ' + (i+1));
                let hasAnswer = false;
                for (let j = 0; j < quizQuestions[i].answers.length; j++) {
                    if (quizQuestions[i].answers[j]) hasAnswer = true;
                }
                if (!hasAnswer) return alert('Добавьте ответы к вопросу ' + (i+1));
            }
            let quizId = generateId();
            await sb.from('quizzes').insert({
                id: quizId,
                type: 'constructed',
                constructor_type: t,
                class: quizClass,
                subject: subject,
                title: title,
                question_count: quizQuestions.length,
                max_score: quizQuestions.length,
                created_by: currentUser.id,
                created_at: Date.now()
            });
            for (let i = 0; i < quizQuestions.length; i++) {
                await sb.from('questions').insert({
                    quiz_id: quizId,
                    question_index: i,
                    question: quizQuestions[i].question,
                    answers: quizQuestions[i].answers,
                    correct: quizQuestions[i].correct
                });
            }
            alert('✅ Викторина создана');
            document.getElementById('quizForm').classList.remove('visible');
            quizQuestions = [];
            loadAllQuizzes();
        };

        window.startConstructedQuiz = async function(id, type) {
            let { data: questions } = await sb.from('questions').select('*').eq('quiz_id', id);
            if (!questions || !questions.length) return alert('Ошибка');
            if (type === 'board') {
                window.open('teacher-board.html?quiz=' + id, '_blank');
                return;
            }
            let sessionId = generateId();
            await sb.from('sessions').insert({
                id: sessionId,
                quiz_id: id,
                max_score: questions.length,
                teacher_id: currentUser.id,
                teacher_name: userName,
                status: 'active',
                started_at: Date.now(),
                students: {}
            });
            window.open('teacher-constructed.html?session=' + sessionId + '&quiz=' + id, '_blank');
        };

        window.joinConstructedQuiz = async function(id) {
            if (!currentUser) return;
            let { data: sessions } = await sb.from('sessions').select('*').eq('quiz_id', id);
            let active = sessions?.find(s => s.status === 'active');
            if (!active) return alert('Нет активной');
            if (!active.students) active.students = {};
            active.students[currentUser.id] = { name: userName, joined_at: Date.now() };
            await sb.from('sessions').update({ students: active.students }).eq('id', active.id);
            window.open('student-constructed.html?session=' + active.id + '&quiz=' + id + '&student=' + currentUser.id + '&name=' + encodeURIComponent(userName), '_blank');
        };

        // ===== ЗАПУСК =====
        checkLogin();

        // Обновление лидерборда каждые 30 секунд
        setInterval(loadLeaderboard, 30000);
    </script>
</body>
</html>
