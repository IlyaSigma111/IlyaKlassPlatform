<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель учителя</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 8px 16px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .quiz-item { background: #f9f9f9; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; }
        .header { background: #4CAF50; color: white; padding: 15px; margin-bottom: 20px; display: flex; gap: 20px; }
        .header a { color: white; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 ПАНЕЛЬ УЧИТЕЛЯ</h1>
            <div style="flex:1"></div>
            <a href="index.html">Главная</a>
            <a href="teacher.html">Создать</a>
            <a href="student.html">Ученик</a>
        </div>

        <h2>Мои викторины</h2>
        <div id="quizzesList"></div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        async function loadQuizzes() {
            const { data: quizzes } = await sb.from('quizzes').select('*').order('created_at', { ascending: false });
            if (!quizzes?.length) {
                document.getElementById('quizzesList').innerHTML = '<p>Нет викторин. <a href="teacher.html">Создать</a></p>';
                return;
            }
            document.getElementById('quizzesList').innerHTML = quizzes.map(q => `
                <div class="quiz-item">
                    <div><b>${escapeHtml(q.title)}</b><br><small>${escapeHtml(q.category)} | ${q.question_count} вопросов</small></div>
                    <div>
                        <button onclick="playQuiz('${q.id}')">Играть</button>
                        <button onclick="deleteQuiz('${q.id}')" style="background:#dc3545">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        window.playQuiz = function(quizId) {
            window.location.href = `play.html?quiz=${quizId}`;
        };

        window.deleteQuiz = async function(quizId) {
            if (!confirm('Удалить викторину?')) return;
            await sb.from('quizzes').delete().eq('id', quizId);
            await sb.from('questions').delete().eq('quiz_id', quizId);
            await sb.from('results').delete().eq('quiz_id', quizId);
            loadQuizzes();
        };

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        loadQuizzes();
    </script>
</body>
</html>
