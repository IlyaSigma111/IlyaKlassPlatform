            const roleEmoji = { 'owner': '👑', 'mediacoord': '🎥', 'chief': '⭐', 'curator': '📚', 'moderator': '🛡️', 'user': '👤' }[currentUser.role_title] || '👤';
            const roleClass = { 'owner': 'role-owner', 'mediacoord': 'role-mediacoord', 'chief': 'role-chief', 'curator': 'role-curator', 'moderator': 'role-moderator', 'user': '' }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${currentUser.username.charAt(0).toUpperCase()}</div>
                    <span>${currentUser.username}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${currentUser.coins || 0}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadQuizzes() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }
            
            currentUser = user;
            userCoins = user.coins || 100;
            userThemes = user.themes || ['pink'];
            
            const { data: tokens } = await sb.from('user_tokens').select('balance').eq('user_id', user.id).maybeSingle();
            userTokens = tokens?.balance || 0;
            
            updateUI();
            
            const { data: quizzes } = await sb.from('quizzes').select('*').eq('created_by', user.id);
            allQuizzes = quizzes || [];
            
            const container = document.getElementById('quizzesList');
            
            if (!allQuizzes.length) {
                container.innerHTML = `<div class="empty-state"><div class="empty-icon">📚</div><p>У вас пока нет викторин</p><button class="create-btn" onclick="openConstructor()">Создать первую</button></div>`;
                return;
            }

            let html = '';
            for (let q of allQuizzes) {
                const theme = allThemes.find(t => t.id === q.theme) || allThemes[0];
                html += `
                    <div class="quiz-card ${q.type === 'kahoot' ? 'free' : 'premium'}">
                        <div class="quiz-card-header">
                            <div class="quiz-theme-badge" style="background: ${theme.color};"></div>
                            <div class="quiz-class">${q.class || ''}</div>
                        </div>
                        <div class="quiz-title">${q.title}</div>
                        <div class="quiz-subject">${q.subject || ''}</div>
                        <div class="quiz-stats">
                            <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                            ${q.type === 'constructed' ? `<span class="quiz-price"><i class="fas fa-gem"></i> ${q.price_tokens || 0}</span>` : ''}
                        </div>
                        <div class="quiz-actions">
                            <div class="quiz-action-btn play" onclick="playQuiz('${q.id}')"><i class="fas fa-play"></i> Играть</div>
                            <div class="quiz-action-btn edit" onclick="editQuiz('${q.id}')"><i class="fas fa-edit"></i></div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);
        }

        window.filterQuizzes = function(type) {
            const container = document.getElementById('quizzesList');
            let filtered = allQuizzes;
            if (type !== 'all') {
                filtered = allQuizzes.filter(q => q.type === (type === 'free' ? 'kahoot' : 'constructed'));
            }
            
            let html = '';
            for (let q of filtered) {
                const theme = allThemes.find(t => t.id === q.theme) || allThemes[0];
                html += `
                    <div class="quiz-card ${q.type === 'kahoot' ? 'free' : 'premium'}">
                        <div class="quiz-card-header">
                            <div class="quiz-theme-badge" style="background: ${theme.color};"></div>
                            <div class="quiz-class">${q.class || ''}</div>
                        </div>
                        <div class="quiz-title">${q.title}</div>
                        <div class="quiz-subject">${q.subject || ''}</div>
                        <div class="quiz-stats">
                            <span><i class="far fa-question-circle"></i> ${q.question_count || 0}</span>
                            ${q.type === 'constructed' ? `<span class="quiz-price"><i class="fas fa-gem"></i> ${q.price_tokens || 0}</span>` : ''}
                        </div>
                        <div class="quiz-actions">
                            <div class="quiz-action-btn play" onclick="playQuiz('${q.id}')"><i class="fas fa-play"></i> Играть</div>
                            <div class="quiz-action-btn edit" onclick="editQuiz('${q.id}')"><i class="fas fa-edit"></i></div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        };

        window.playQuiz = (quizId) => {
            window.location.href = `teacher.html?quiz=${quizId}`;
        };

        window.editQuiz = (quizId) => {
            editingQuizId = quizId;
            openConstructor(quizId);
        };

        window.openConstructor = function(editId = null) {
            editingQuizId = editId;
            document.getElementById('constructorTitle').textContent = editId ? '✏️ Редактирование' : '🛠️ Создание';
            if (!editId) {
                quizQuestions = [];
                document.getElementById('quizTitle').value = '';
                document.getElementById('quizClass').value = '';
                document.getElementById('quizSubject').value = '';
                document.getElementById('quizTheme').value = 'pink';
                document.getElementById('quizType').value = 'kahoot';
                document.getElementById('quizPriceTokens').value = '0';
                document.getElementById('publishToStore').checked = false;
                renderQuestions();
            } else {
                loadQuizForEdit(editId);
            }
            document.getElementById('constructorOverlay').classList.add('active');
        };

        window.closeConstructor = () => {
            document.getElementById('constructorOverlay').classList.remove('active');
            editingQuizId = null;
        };

        window.addQuestion = () => {
            quizQuestions.push({ id: Date.now(), question: '', answers: ['', '', '', ''], correct: 0 });
            renderQuestions();
        };

        window.removeQuestion = (i) => {
            if (quizQuestions.length <= 1) { alert('Должен быть хотя бы один вопрос'); return; }
            quizQuestions.splice(i, 1);
            renderQuestions();
        };

        function renderQuestions() {
            let html = '', c = document.getElementById('questionsContainer');
            if (quizQuestions.length === 0) {
                c.innerHTML = '<p style="text-align:center;">Добавьте первый вопрос</p>';
                return;
            }
            for (let i = 0; i < quizQuestions.length; i++) {
                let q = quizQuestions[i];
                html += `<div class="question-card">
                    <div class="question-header">
                        <span class="question-number">Вопрос ${i+1}</span>
                        <span class="remove-question" onclick="removeQuestion(${i})">✕</span>
                    </div>
                    <input placeholder="Вопрос" value="${q.question}" onchange="updateQuestion(${i},'question',this.value)">
                    <div class="answers-grid">${[0,1,2,3].map(j => `
                        <div class="answer-option">
                            <input type="radio" name="q${q.id}" ${q.correct===j?'checked':''} onchange="updateQuestion(${i},'correct',${j})">
                            <input placeholder="Ответ ${j+1}" value="${q.answers[j]}" onchange="updateQuestion(${i},'answer${j}',this.value)">
                        </div>`).join('')}
                    </div>
                </div>`;
            }
            c.innerHTML = html;
        }

        window.updateQuestion = (i, f, v) => {
            if (f === 'question') quizQuestions[i].question = v;
            else if (f.startsWith('answer')) quizQuestions[i].answers[parseInt(f.replace('answer',''))] = v;
            else if (f === 'correct') quizQuestions[i].correct = parseInt(v);
        };

        async function loadQuizForEdit(quizId) {
            const { data: quiz } = await sb.from('quizzes').select('*').eq('id', quizId).single();
            const { data: questions } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            
            if (quiz) {
                document.getElementById('quizTitle').value = quiz.title || '';
                document.getElementById('quizClass').value = quiz.class || '';
                document.getElementById('quizSubject').value = quiz.subject || '';
                document.getElementById('quizTheme').value = quiz.theme || 'pink';
                document.getElementById('quizType').value = quiz.type || 'kahoot';
                document.getElementById('quizPriceTokens').value = quiz.price_tokens || 0;
            }
            
            quizQuestions = (questions || []).map(q => ({
                id: q.id || Date.now() + Math.random(),
                question: q.question,
                answers: q.answers || ['', '', '', ''],
                correct: q.correct || 0
            }));
            
            renderQuestions();
        }

        window.saveQuiz = async function() {
            const title = document.getElementById('quizTitle').value.trim();
            const quizClass = document.getElementById('quizClass').value.trim();
            const subject = document.getElementById('quizSubject').value.trim();
            const theme = document.getElementById('quizTheme').value;
            const type = document.getElementById('quizType').value;
            const price = parseInt(document.getElementById('quizPriceTokens').value) || 0;
            const publish = document.getElementById('publishToStore').checked;

            if (!title || quizQuestions.length === 0) { alert('Заполните название и вопросы'); return; }
            for (let q of quizQuestions) {
                if (!q.question || q.answers.some(a => !a)) { alert('Заполните все поля'); return; }
            }

            try {
                if (editingQuizId) {
                    await sb.from('quizzes').update({
                        title, class: quizClass, subject, theme, type, price_tokens: price,
                        question_count: quizQuestions.length, max_score: quizQuestions.length, published: publish
                    }).eq('id', editingQuizId);

                    await sb.from('questions').delete().eq('quiz_id', editingQuizId);

                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: editingQuizId, question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct
                        });
                    }

                    sendToTG(`✏️ ${currentUser.username} отредактировал викторину: ${title}`);
                    alert('✅ Викторина обновлена!');
                    
                } else {
                    const quizId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substring(2, 7);
                    
                    await sb.from('quizzes').insert({
                        id: quizId, title, class: quizClass, subject, theme, type, price_tokens: price,
                        question_count: quizQuestions.length, max_score: quizQuestions.length,
                        created_by: currentUser.id, published: publish, created_at: Date.now()
                    });

                    for (let i = 0; i < quizQuestions.length; i++) {
                        await sb.from('questions').insert({
                            quiz_id: quizId, question_index: i,
                            question: quizQuestions[i].question,
                            answers: quizQuestions[i].answers,
                            correct: quizQuestions[i].correct
                        });
                    }

                    if (publish) sendToTG(`📢 ${currentUser.username} опубликовал викторину: ${title} (+100 монет)`);
                    else sendToTG(`📝 ${currentUser.username} создал викторину: ${title} (+50 монет)`);

                    alert(publish ? '✅ Викторина опубликована! +150 монет' : '✅ Викторина сохранена! +50 монет');
                }

                closeConstructor();
                loadQuizzes();

            } catch (error) { alert('Ошибка: ' + error.message); }
        };

        loadQuizzes();
    </script>
</body>
</html>
