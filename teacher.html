<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>👩‍🏫 Игра | ИЛЬЯКЛАСС</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.3s ease;
        }

        /* ===== 20 ТЕМ ===== */
        body.pink-theme { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
        body.blue-theme { background: linear-gradient(135deg, #00c6fb 0%, #005bea 100%); }
        body.green-theme { background: linear-gradient(135deg, #00b09b 0%, #96c93d 100%); }
        body.purple-theme { background: linear-gradient(135deg, #8e2de2 0%, #4a00e0 100%); }
        body.orange-theme { background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); }
        body.dark-theme { background: linear-gradient(135deg, #141e30 0%, #243b55 100%); }
        body.sunset-theme { background: linear-gradient(135deg, #f83600 0%, #f9d423 100%); }
        body.ocean-theme { background: linear-gradient(135deg, #1c92d2 0%, #0f2027 100%); }
        body.forest-theme { background: linear-gradient(135deg, #134e5e 0%, #71b280 100%); }
        body.candy-theme { background: linear-gradient(135deg, #f43b47 0%, #6a3093 100%); }
        body.gold-theme { background: linear-gradient(135deg, #b8860b 0%, #ffd700 100%); color: #2d3436; }
        body.diamond-theme { background: linear-gradient(135deg, #00ffff 0%, #4169e1 100%); }
        body.ruby-theme { background: linear-gradient(135deg, #e0115f 0%, #8b0000 100%); }
        body.emerald-theme { background: linear-gradient(135deg, #50c878 0%, #006400 100%); }
        body.sapphire-theme { background: linear-gradient(135deg, #0f52ba 0%, #191970 100%); }
        body.amethyst-theme { background: linear-gradient(135deg, #9966cc 0%, #4b0082 100%); }
        body.rose-theme { background: linear-gradient(135deg, #ff66b2 0%, #8b008b 100%); }
        body.neon-theme { background: linear-gradient(135deg, #39ff14 0%, #00ffff 100%); color: #2d3436; }
        body.galaxy-theme { background: linear-gradient(135deg, #000000 0%, #4b0082 100%); }
        body.lava-theme { background: linear-gradient(135deg, #ff4500 0%, #8b0000 100%); }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
                padding: 10px;
                overflow-y: auto;
                height: auto;
            }
            .left-column, .right-column { width: 100%; }
            .big-code { font-size: 2.5rem; }
            .link-container { flex-direction: column; }
            .copy-btn { width: 100%; }
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

        .header {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }

        .code-display {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #10b981;
            border-radius: 40px;
            padding: 10px 25px;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #10b981;
        }

        .main-content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        .left-column { width: 35%; display: flex; flex-direction: column; gap: 20px; }
        .right-column { width: 65%; display: flex; flex-direction: column; gap: 20px; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .big-code {
            font-size: 4rem;
            font-weight: 800;
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 40px;
            margin: 20px 0;
            border: 3px solid #10b981;
            text-align: center;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            overflow-y: auto;
            max-height: 300px;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 15px;
            text-align: center;
        }

        .player-avatar {
            width: 50px;
            height: 50px;
            background: #6366f1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
            font-size: 1.5rem;
            color: white;
        }

        .player-score { color: #ffd700; font-weight: 600; }

        .start-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }

        .control-buttons {
            display: grid;
            gap: 10px;
            margin: 15px 0;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 15px;
            cursor: pointer;
            font-weight: 600;
            color: inherit;
        }

        .control-btn.primary { background: #10b981; color: white; }

        .questions-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            overflow-y: auto;
            max-height: 400px;
        }

        .question-item {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }

        .question-item.active { border-color: #10b981; border-width: 3px; }

        .link-container {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #6366f1;
            border-radius: 40px;
            padding: 5px 5px 5px 20px;
            align-items: center;
        }

        .link-input {
            flex: 1;
            background: transparent;
            border: none;
            color: inherit;
            font-family: 'Comfortaa', cursive;
            padding: 10px 0;
        }

        .copy-btn {
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 35px;
            padding: 12px 25px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        .presentation-mode {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: 1000;
            display: none;
            flex-direction: column;
        }

        .presentation-mode.active { display: flex; }

        .presentation-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .presentation-question {
            max-width: 900px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(20px);
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 60px;
            padding: 50px;
        }

        .presentation-question h2 {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .correct-answer {
            color: #10b981;
            font-size: 2rem;
            text-align: center;
            margin-top: 30px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 25px;
            border-radius: 40px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="toast" id="toast">Ссылка скопирована!</div>

    <div class="container" id="mainInterface">
        <header class="header">
            <a href="teacher-menu.html" class="back-btn">← В меню</a>
            <div id="codeDisplay" class="code-display" style="display: none;">----</div>
        </header>

        <div class="main-content" id="dynamicContent">
            <!-- Содержимое загружается динамически -->
        </div>
    </div>

    <div class="presentation-mode" id="presentationMode">
        <div class="presentation-header" style="padding:20px; background:rgba(255,255,255,0.2); display:flex; justify-content:space-between;">
            <span>🎯 РЕЖИМ ПРЕЗЕНТАЦИИ</span>
            <span id="presentationCounter">Вопрос 1/0</span>
        </div>
        <div class="presentation-content">
            <div id="presentationQuestion" class="presentation-question"><h2>Вопрос появится здесь</h2></div>
        </div>
        <div style="padding:20px; text-align:center;">
            <button onclick="exitPresentation()" class="control-btn">← Назад</button>
            <button onclick="showAnswer()" class="control-btn primary">✅ Ответ</button>
            <button onclick="nextQuestion()" class="control-btn">⏩ Далее</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);
        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let currentLobby = null;
        let quizData = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let lobbyCode = null;

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('quiz');
        const lobbyId = urlParams.get('lobby');

        async function sendToTG(msg) {
            try { await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ chat_id:TG_CHAT_ID, text:msg, parse_mode:'HTML' }) }); } catch(e) { console.error(e); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
        }

        async function init() {
            const saved = localStorage.getItem('currentUser');
            if (!saved) { window.location.href = 'index.html'; return; }
            
            currentUser = JSON.parse(saved);
            if (currentUser.role !== 'teacher') { window.location.href = 'student-menu.html'; return; }

            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            if (lobbyId) await loadGame(lobbyId);
            else if (quizId) await createLobby(quizId);
            else window.location.href = 'teacher-menu.html';
        }

        async function createLobby(quizId) {
            const { data: quiz } = await sb.from('quizzes').select('*').eq('id', quizId).single();
            if (!quiz) { window.location.href = 'teacher-menu.html'; return; }

            quizData = quiz;
            lobbyCode = Math.floor(10000000 + Math.random() * 90000000).toString();
            const newLobbyId = 'lobby_' + Date.now() + '_' + Math.random().toString(36).substring(2,7);

            await sb.from('lobbies').insert({
                id: newLobbyId, quiz_id: quizId, teacher_id: currentUser.id,
                teacher_name: currentUser.username, code: lobbyCode, status: 'waiting',
                created_at: Date.now(), players: {}, current_question: 0
            });

            currentLobby = { id: newLobbyId, quiz_id: quizId, code: lobbyCode };
            const { data: qs } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            questions = qs || [];

            sendToTG(`🎮 ${currentUser.username} создал лобби для "${quiz.title}" (код:${lobbyCode})`);

            showLobbyUI();
            listenToLobby(newLobbyId);
        }

        function showLobbyUI() {
            document.getElementById('codeDisplay').style.display = 'block';
            document.getElementById('codeDisplay').textContent = lobbyCode;
            const studentLink = window.location.origin + '/student.html?lobby=' + currentLobby.id;

            document.getElementById('dynamicContent').innerHTML = `
                <div class="left-column">
                    <div class="glass-panel">
                        <h2>ℹ️ ИНФОРМАЦИЯ</h2>
                        <div class="lobby-info">
                            <div class="quiz-title">${quizData.title}</div>
                            <div>${questions.length} вопросов</div>
                            <div class="big-code">${lobbyCode}</div>
                            <div style="margin:30px 0;">
                                <h3 style="color:#6366f1;">🔗 Ссылка для учеников</h3>
                                <div class="link-container">
                                    <input type="text" class="link-input" id="studentLink" value="${studentLink}" readonly>
                                    <button class="copy-btn" onclick="copyStudentLink()">Копировать</button>
                                </div>
                            </div>
                            <button class="start-btn" onclick="startGame()" id="startGameBtn" disabled>🚀 НАЧАТЬ</button>
                        </div>
                    </div>
                </div>
                <div class="right-column">
                    <div class="glass-panel"><h2>👥 УЧАСТНИКИ</h2><div id="playersList" class="players-grid"></div></div>
                </div>`;
        }

        window.copyStudentLink = () => {
            document.getElementById('studentLink').select();
            document.execCommand('copy');
            showToast('🔗 Ссылка скопирована!');
        };

        async function loadGame(lobbyId) {
            const { data: lobby } = await sb.from('lobbies').select('*').eq('id', lobbyId).single();
            if (!lobby) return;

            currentLobby = lobby;
            lobbyCode = lobby.code;
            const { data: quiz } = await sb.from('quizzes').select('*').eq('id', lobby.quiz_id).single();
            const { data: qs } = await sb.from('questions').select('*').eq('quiz_id', lobby.quiz_id).order('question_index');
            
            quizData = quiz;
            questions = qs || [];

            document.getElementById('codeDisplay').style.display = 'block';
            document.getElementById('codeDisplay').textContent = lobbyCode;
            showGameUI();
            listenToLobby(lobbyId);
            sendToTG(`▶️ ${currentUser.username} загрузил игру (код:${lobbyCode})`);
        }

        function showGameUI() {
            document.getElementById('dynamicContent').innerHTML = `
                <div class="left-column">
                    <div class="glass-panel">
                        <h2>🎮 УПРАВЛЕНИЕ</h2>
                        <div class="control-buttons">
                            <button onclick="startNextQuestion()" class="control-btn primary">📢 ПОКАЗАТЬ ВОПРОС</button>
                            <button onclick="nextQuestion()" class="control-btn">⏩ СЛЕДУЮЩИЙ</button>
                        </div>
                        <div>Текущий: <span id="currentQ">${currentQuestionIndex}/${questions.length}</span><br>Игроков: <span id="playerCount">0</span></div>
                    </div>
                    <div class="glass-panel"><h2>👥 УЧАСТНИКИ</h2><div id="playersList" class="players-grid"></div></div>
                </div>
                <div class="right-column">
                    <div class="glass-panel"><h2>📋 ВОПРОСЫ</h2><div id="questionsList" class="questions-list"></div></div>
                </div>`;
            renderQuestionsList();
        }

        function listenToLobby(id) {
            sb.channel('lobby-'+id).on('postgres_changes', { event:'*', schema:'public', table:'lobbies', filter:`id=eq.${id}` }, payload => {
                if (payload.new) { updatePlayersList(payload.new.players); currentLobby = payload.new; }
            }).subscribe();

            sb.from('lobbies').select('*').eq('id', id).then(({data}) => {
                if (data?.[0]) updatePlayersList(data[0].players);
            });
        }

        function updatePlayersList(players) {
            const c = document.getElementById('playersList'), pc = document.getElementById('playerCount'), sb = document.getElementById('startGameBtn');
            if (!players || !Object.keys(players).length) {
                if (c) c.innerHTML = '<div class="empty-state">Ожидание игроков...</div>';
                if (pc) pc.textContent = '0';
                if (sb) sb.disabled = true;
                return;
            }
            const arr = Object.entries(players).map(([id,d]) => d);
            if (pc) pc.textContent = arr.length;
            if (sb) sb.disabled = false;
            if (c) c.innerHTML = arr.map(p => `<div class="player-card"><div class="player-avatar">${p.name[0].toUpperCase()}</div><div>${p.name}</div><div>🎯 ${p.score||0}</div></div>`).join('');
        }

        function renderQuestionsList() {
            const c = document.getElementById('questionsList');
            if (!c) return;
            c.innerHTML = questions.map((q,i) => `<div class="question-item ${i===currentQuestionIndex?'active': i<currentQuestionIndex?'completed':''}" onclick="jumpToQuestion(${i})"><div>${i+1}</div></div>`).join('');
        }

        window.startGame = () => window.location.href = `teacher.html?lobby=${currentLobby.id}`;

        window.startNextQuestion = () => {
            if (currentQuestionIndex >= questions.length) { alert('Викторина завершена!'); return; }
            document.getElementById('presentationMode').classList.add('active');
            document.getElementById('presentationCounter').textContent = `Вопрос ${currentQuestionIndex+1}/${questions.length}`;
            document.getElementById('presentationQuestion').innerHTML = `<h2>${questions[currentQuestionIndex].question}</h2>`;
            sb.from('lobbies').update({ current_question:currentQuestionIndex, status:'active' }).eq('id', currentLobby.id);
            renderQuestionsList();
            sendToTG(`❓ ${currentUser.username} показал вопрос ${currentQuestionIndex+1}`);
        };

        window.showAnswer = () => {
            const q = questions[currentQuestionIndex];
            if (!q) return;
            const el = document.getElementById('presentationQuestion');
            el.innerHTML += `<div class="correct-answer">✅ ${q.answers[q.correct]}</div>`;
            sendToTG(`🔓 ${currentUser.username} показал ответ на вопрос ${currentQuestionIndex+1}`);
        };

        window.nextQuestion = () => {
            if (currentQuestionIndex < questions.length-1) {
                currentQuestionIndex++;
                exitPresentation();
                renderQuestionsList();
            } else {
                sb.from('lobbies').update({ status:'finished' }).eq('id', currentLobby.id);
                exitPresentation();
                alert('🎉 Викторина завершена!');
                sendToTG(`🏁 ${currentUser.username} завершил викторину`);
            }
        };

        window.exitPresentation = () => document.getElementById('presentationMode').classList.remove('active');
        window.jumpToQuestion = (i) => { if (i < currentQuestionIndex && confirm('Перейти к пройденному вопросу?')) { currentQuestionIndex = i; renderQuestionsList(); } };

        init();
    </script>
</body>
</html>
