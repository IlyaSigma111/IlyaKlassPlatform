<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учитель - Викторины</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        input, select { padding: 8px; width: 100%; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .question { background: #f9f9f9; padding: 15px; margin: 10px 0; border: 1px solid #ddd; }
        .answers { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .quiz-card { background: #f9f9f9; padding: 10px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; }
        .header { background: #4CAF50; color: white; padding: 15px; margin-bottom: 20px; display: flex; gap: 20px; }
        .header a { color: white; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👨‍🏫 УЧИТЕЛЬ</h1>
            <div style="flex:1"></div>
            <a href="index.html">Главная</a>
            <a href="student.html">Ученик</a>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="showTab('list')">📋 Мои викторины</button>
            <button onclick="showTab('create')">✏️ Создать</button>
        </div>

        <div id="listTab">
            <div id="myQuizzes"></div>
        </div>

        <div id="createTab" style="display:none">
            <h2>Создать викторину</h2>
            <input type="text" id="quizTitle" placeholder="Название">
            <input type="text" id="quizCategory" placeholder="Категория">
            <div id="questionsList"></div>
            <button onclick="addQuestion()">+ Добавить вопрос</button>
            <button onclick="saveQuiz()" style="background:#2196F3">💾 Сохранить</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let questionsData = [];

        async function loadMyQuizzes() {
            const { data: quizzes } = await sb.from('quizzes').select('*').order('created_at', { ascending: false });
            if (!quizzes?.length) {
                document.getElementById('myQuizzes').innerHTML = '<p>Нет викторин. Создайте первую!</p>';
                return;
            }
            document.getElementById('myQuizzes').innerHTML = quizzes.map(q => `
                <div class="quiz-card">
                    <div><b>${escapeHtml(q.title)}</b><br><small>${escapeHtml(q.category)} | ${q.question_count} вопросов</small></div>
                    <div>
                        <button onclick="playQuiz('${q.id}')" style="background:#2196F3">Играть</button>
                        <button onclick="deleteQuiz('${q.id}')" style="background:#dc3545">Удалить</button>
                    </div>
                </div>
            `).join('');
        }

        window.playQuiz = function(quizId) {
            window.location.href = `play.html?quiz=${quizId}`;
        };

        window.deleteQuiz = async function(quizId) {
            if (!confirm('Удалить викторину?')) return;
            await sb.from('quizzes').delete().eq('id', quizId);
            await sb.from('questions').delete().eq('quiz_id', quizId);
            await sb.from('results').delete().eq('quiz_id', quizId);
            loadMyQuizzes();
        };

        function addQuestion() {
            questionsData.push({ id: Date.now(), text: '', answers: ['','','',''], correct: 0 });
            renderQuestions();
        }
        function removeQuestion(i) { questionsData.splice(i,1); renderQuestions(); }
        function updateQuestion(i, field, val) {
            if (field === 'text') questionsData[i].text = val;
            else if (field.startsWith('ans')) questionsData[i].answers[parseInt(field.slice(3))] = val;
            else if (field === 'correct') questionsData[i].correct = parseInt(val);
        }
        function renderQuestions() {
            const container = document.getElementById('questionsList');
            if (!questionsData.length) { container.innerHTML = '<p>Нажмите "Добавить вопрос"</p>'; return; }
            container.innerHTML = questionsData.map((q, idx) => `
                <div class="question">
                    <div style="display:flex; justify-content:space-between">
                        <b>Вопрос ${idx+1}</b>
                        <span style="color:red; cursor:pointer" onclick="removeQuestion(${idx})">Удалить</span>
                    </div>
                    <input type="text" placeholder="Текст вопроса" value="${escapeHtml(q.text)}" onchange="updateQuestion(${idx}, 'text', this.value)">
                    <div class="answers">
                        ${[0,1,2,3].map(opt => `
                            <div>
                                <input type="radio" name="correct_${idx}" ${q.correct === opt ? 'checked' : ''} onchange="updateQuestion(${idx}, 'correct', ${opt})">
                                <input type="text" placeholder="Вариант ${opt+1}" value="${escapeHtml(q.answers[opt])}" onchange="updateQuestion(${idx}, 'ans${opt}', this.value)" style="width:80%">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        window.saveQuiz = async function() {
            const title = document.getElementById('quizTitle').value.trim();
            const category = document.getElementById('quizCategory').value.trim() || 'Общая';
            if (!title) { alert('Введите название'); return; }
            if (!questionsData.length) { alert('Добавьте вопросы'); return; }
            for (let q of questionsData) {
                if (!q.text.trim()) { alert('Заполните текст вопроса'); return; }
                for (let a of q.answers) if (!a.trim()) { alert('Заполните все варианты'); return; }
            }
            
            const quizId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substring(2,7);
            try {
                await sb.from('quizzes').insert({ id: quizId, title, category, question_count: questionsData.length, created_at: new Date().toISOString() });
                for (let i = 0; i < questionsData.length; i++) {
                    await sb.from('questions').insert({ quiz_id: quizId, question_index: i, question: questionsData[i].text, answers: questionsData[i].answers, correct: questionsData[i].correct });
                }
                alert('✅ Викторина создана!');
                document.getElementById('quizTitle').value = '';
                document.getElementById('quizCategory').value = '';
                questionsData = [];
                renderQuestions();
                loadMyQuizzes();
                showTab('list');
            } catch(e) { alert('Ошибка: ' + e.message); }
        };

        function showTab(tab) {
            document.getElementById('listTab').style.display = tab === 'list' ? 'block' : 'none';
            document.getElementById('createTab').style.display = tab === 'create' ? 'block' : 'none';
            if (tab === 'list') loadMyQuizzes();
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        loadMyQuizzes();
    </script>
</body>
</html>
