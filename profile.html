<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
            --dark-bg: #0a0c14;
            --dark-card: #151823;
            --light-bg: #f3f4f6;
            --light-card: #ffffff;
        }

        body {
            background: var(--dark-bg);
            color: white;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        body.light-theme {
            background: var(--light-bg);
            color: #1f2937;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px #6366f1, 0 0 10px #6366f1, 0 0 15px #6366f1; }
            50% { text-shadow: 0 0 10px #f59e0b, 0 0 20px #f59e0b, 0 0 30px #f59e0b; }
            100% { text-shadow: 0 0 5px #6366f1, 0 0 10px #6366f1, 0 0 15px #6366f1; }
        }

        .glow-name {
            animation: glow 3s infinite;
            background: linear-gradient(135deg, #6366f1, #f59e0b, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .header {
            background: rgba(21, 24, 35, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--primary);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        body.light-theme .header {
            background: rgba(255, 255, 255, 0.8);
            border-bottom: 2px solid var(--primary);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 32px;
            font-weight: 800;
            cursor: pointer;
        }

        .logo-il {
            background: linear-gradient(135deg, #6366f1, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-yaclass {
            background: linear-gradient(135deg, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nav-menu {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 8px 18px;
            border-radius: 30px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            color: inherit;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(99, 102, 241, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
            border: 1px solid var(--primary);
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #f59e0b);
        }

        .logout-btn, .theme-btn {
            padding: 7px 16px;
            border-radius: 30px;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary);
            color: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover, .theme-btn:hover {
            background: var(--primary);
            color: white;
        }

        .main-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            margin-top: 20px;
        }

        .profile-sidebar {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
        }

        body.light-theme .profile-sidebar {
            background: rgba(255, 255, 255, 0.9);
        }

        .profile-main {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
        }

        body.light-theme .profile-main {
            background: rgba(255, 255, 255, 0.9);
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #f59e0b);
            margin: 0 auto 15px;
        }

        .profile-name {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .profile-email {
            opacity: 0.7;
            margin-bottom: 15px;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            color: var(--primary);
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
        }

        .settings-section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(99, 102, 241, 0.3);
        }

        .settings-title {
            color: var(--primary);
            font-size: 20px;
            margin-bottom: 15px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-label {
            font-weight: 500;
        }

        .setting-input {
            padding: 8px 12px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            background: rgba(0,0,0,0.2);
            color: inherit;
            width: 200px;
        }

        body.light-theme .setting-input {
            background: white;
        }

        .save-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: var(--primary);
        }

        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            .setting-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .setting-input {
                width: 100%;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Главная</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка профиля...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let userName = '';

        function toggleTheme() {
            const b = document.body;
            const t = document.getElementById('themeToggle');
            if (b.classList.contains('dark-theme')) {
                b.classList.replace('dark-theme', 'light-theme');
                t.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                b.classList.replace('light-theme', 'dark-theme');
                t.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            if (currentUser) {
                s.innerHTML = '<div class="user-card"><div class="avatar"></div><span class="' + (userName === 'Ильяблоко' ? 'glow-name' : '') + '">' + userName + '</span><button onclick="logout()" class="logout-btn">Выйти</button></div>';
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadProfile() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            currentUser = user;
            userName = user.name;
            updateUI();

            const c = document.getElementById('content');
            
            // Загружаем статистику пользователя
            const { data: results } = await sb.from('results').select('*').eq('student_id', currentUser.id);
            const { data: createdQuizzes } = await sb.from('quizzes').select('*').eq('created_by', currentUser.id);
            
            let totalScore = 0;
            let totalQuizzes = results ? results.length : 0;
            for (let r of results || []) {
                totalScore += r.score || 0;
            }
            let avgScore = totalQuizzes ? (totalScore / totalQuizzes).toFixed(1) : 0;

            c.innerHTML = `
                <div class="profile-container">
                    <div class="profile-sidebar">
                        <div class="profile-avatar"></div>
                        <div class="profile-name ${userName === 'Ильяблоко' ? 'glow-name' : ''}">${userName}</div>
                        <div class="profile-email">ID: ${currentUser.id}</div>
                        
                        <div class="profile-stats">
                            <div class="stat-box">
                                <div class="stat-value">${totalQuizzes}</div>
                                <div class="stat-label">Пройдено</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value">${totalScore}</div>
                                <div class="stat-label">Баллов</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value">${avgScore}</div>
                                <div class="stat-label">Средний</div>
                            </div>
                            <div class="stat-box">
                                <div class="stat-value">${createdQuizzes?.length || 0}</div>
                                <div class="stat-label">Создано</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="profile-main">
                        <div class="settings-section">
                            <h2 class="settings-title">⚙️ Настройки профиля</h2>
                            
                            <div class="setting-item">
                                <span class="setting-label">Имя пользователя</span>
                                <input type="text" id="userNameInput" class="setting-input" value="${userName}">
                            </div>
                            
                            <button class="save-btn" onclick="saveName()">💾 Сохранить имя</button>
                        </div>

                        <div class="settings-section">
                            <h2 class="settings-title">🔐 Безопасность</h2>
                            
                            <div class="setting-item">
                                <span class="setting-label">Новый пароль</span>
                                <input type="password" id="newPass" class="setting-input" placeholder="******">
                            </div>
                            
                            <div class="setting-item">
                                <span class="setting-label">Повторите пароль</span>
                                <input type="password" id="newPassConfirm" class="setting-input" placeholder="******">
                            </div>
                            
                            <button class="save-btn" onclick="changePassword()">🔑 Сменить пароль</button>
                        </div>

                        ${userName === 'Ильяблоко' ? `
                        <div class="settings-section">
                            <h2 class="settings-title" style="color: var(--danger);">👑 Админ-панель</h2>
                            
                            <div class="setting-item">
                                <span class="setting-label">Всего пользователей</span>
                                <span class="stat-value" id="totalUsers">...</span>
                            </div>
                            
                            <div class="setting-item">
                                <span class="setting-label">Всего викторин</span>
                                <span class="stat-value" id="totalQuizzes">...</span>
                            </div>
                            
                            <div class="setting-item">
                                <span class="setting-label">Всего результатов</span>
                                <span class="stat-value" id="totalResults">...</span>
                            </div>
                            
                            <button class="save-btn" style="background: var(--danger);" onclick="clearAllData()">⚠️ ОЧИСТИТЬ ВСЁ</button>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `;

            if (userName === 'Ильяблоко') {
                loadAdminStats();
            }
        }

        async function saveName() {
            const newName = document.getElementById('userNameInput').value.trim();
            if (!newName) return alert('Введите имя');
            
            // Проверяем, не занято ли имя
            const { data: existing } = await sb.from('users').select('*').eq('name', newName);
            if (existing && existing.length > 0 && newName !== userName) {
                return alert('Это имя уже занято');
            }

            await sb.from('users').update({ name: newName }).eq('id', currentUser.id);
            
            currentUser.name = newName;
            userName = newName;
            localStorage.setItem('currentUser', JSON.stringify(currentUser));
            
            alert('Имя сохранено!');
            window.location.reload();
        }

        async function changePassword() {
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('newPassConfirm').value;
            
            if (!newPass) return alert('Введите пароль');
            if (newPass !== confirm) return alert('Пароли не совпадают');
            if (newPass.length < 3) return alert('Пароль должен быть минимум 3 символа');
            
            function hashPassword(p) {
                let h = 0;
                for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
                return h.toString(16);
            }

            await sb.from('users').update({ password: hashPassword(newPass) }).eq('id', currentUser.id);
            alert('Пароль изменен!');
        }

        async function loadAdminStats() {
            const { count: users } = await sb.from('users').select('*', { count: 'exact', head: true });
            const { count: quizzes } = await sb.from('quizzes').select('*', { count: 'exact', head: true });
            const { count: results } = await sb.from('results').select('*', { count: 'exact', head: true });
            
            document.getElementById('totalUsers').textContent = users || 0;
            document.getElementById('totalQuizzes').textContent = quizzes || 0;
            document.getElementById('totalResults').textContent = results || 0;
        }

        async function clearAllData() {
            if (!confirm('⚠️ ТОЧНО УДАЛИТЬ ВСЁ?')) return;
            if (!confirm('⚠️ ЭТО НЕОБРАТИМО!')) return;
            
            const password = prompt('Введите "УДАЛИТЬ ВСЁ" для подтверждения');
            if (password !== 'УДАЛИТЬ ВСЁ') return alert('Отмена');
            
            await sb.from('results').delete().neq('id', '0');
            await sb.from('sessions').delete().neq('id', '0');
            await sb.from('quizzes').delete().neq('id', '0');
            
            alert('✅ База данных очищена');
            window.location.reload();
        }

        loadProfile();
    </script>
</body>
</html>
