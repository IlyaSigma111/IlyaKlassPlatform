<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        input { padding: 10px; width: 100%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat { flex: 1; background: #f9f9f9; padding: 15px; text-align: center; border-radius: 8px; }
        .stat-number { font-size: 28px; font-weight: bold; color: #4CAF50; }
        .result-item { background: #f9f9f9; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; }
        .header { background: #4CAF50; color: white; padding: 15px; margin-bottom: 20px; display: flex; gap: 20px; }
        .header a { color: white; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 ПРОФИЛЬ</h1>
            <div style="flex:1"></div>
            <a href="index.html">Главная</a>
            <a href="results.html">Результаты</a>
        </div>

        <input type="text" id="playerName" placeholder="Ваше имя">
        <button onclick="saveName()">Сохранить имя</button>

        <div id="stats" class="stats"></div>
        <h3>Мои результаты</h3>
        <div id="myResults"></div>
    </div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let playerName = localStorage.getItem('playerName') || '';
        document.getElementById('playerName').value = playerName;
        if (playerName) loadStats();

        function saveName() {
            playerName = document.getElementById('playerName').value.trim();
            if (!playerName) { alert('Введите имя'); return; }
            localStorage.setItem('playerName', playerName);
            loadStats();
            alert('Имя сохранено');
        }

        async function loadStats() {
            if (!playerName) return;
            const { data: results } = await sb.from('results').select('*, quizzes(title)').eq('player_name', playerName).order('played_at', { ascending: false });
            const totalGames = results?.length || 0;
            const totalScore = results?.reduce((s,r) => s + r.score, 0) || 0;
            const avgScore = totalGames ? (totalScore / totalGames).toFixed(1) : 0;
            
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-number">${totalGames}</div><div>Игр</div></div>
                <div class="stat"><div class="stat-number">${totalScore}</div><div>Очков</div></div>
                <div class="stat"><div class="stat-number">${avgScore}</div><div>Средний</div></div>
            `;
            
            const container = document.getElementById('myResults');
            if (!results?.length) {
                container.innerHTML = '<p>Нет результатов</p>';
                return;
            }
            container.innerHTML = results.map(r => `
                <div class="result-item">
                    <span><b>${escapeHtml(r.quizzes?.title)}</b></span>
                    <span>${r.score}/${r.max_score}</span>
                    <span style="font-size:12px">${new Date(r.played_at).toLocaleDateString()}</span>
                </div>
            `).join('');
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    </script>
</body>
</html>
