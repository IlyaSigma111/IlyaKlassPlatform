        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            width: 100%;
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 600;
        }

        .nav-link:hover { background: rgba(255, 255, 255, 0.3); }
        .nav-link.active { background: #6366f1; color: white; }

        .header-right { display: flex; align-items: center; gap: 20px; }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: white;
        }

        .logout-btn:hover { background: rgba(255, 255, 255, 0.3); }

        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            width: 100%;
        }

        .profile-sidebar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px;
            border: 3px solid white;
            color: white;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .profile-role {
            display: inline-block;
            padding: 5px 15px;
            background: #6366f1;
            border-radius: 30px;
            margin: 10px 0;
            font-size: 0.9rem;
            color: white;
        }

        .role-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 30px;
            margin: 5px 0;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .role-owner { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #2d3436; }
        .role-mediacoord { background: #c0c0c0; color: #2d3436; }
        .role-chief { background: #ffd700; color: #2d3436; }
        .role-curator { background: #cd7f32; color: white; }
        .role-moderator { background: #6366f1; color: white; }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #6366f1;
        }

        .profile-main {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            width: 100%;
        }

        .settings-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .settings-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .settings-title {
            font-size: 1.3rem;
            color: #6366f1;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            word-break: break-word;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setting-item:last-child { border-bottom: none; }

        .setting-input {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid #6366f1;
            border-radius: 30px;
            color: white;
            width: 200px;
            font-family: 'Comfortaa', cursive;
        }

        .setting-input:focus {
            outline: none;
            box-shadow: 0 0 10px #6366f1;
        }

        .save-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .save-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #6366f1;
        }

        .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .delete-btn:hover {
            background: #dc2626;
            transform: scale(1.02);
            box-shadow: 0 0 20px #ef4444;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin: 15px 0;
            width: 100%;
        }

        .theme-item {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            word-break: break-word;
        }

        .theme-item:hover {
            transform: scale(1.05);
            background: rgba(99, 102, 241, 0.2);
        }

        .theme-item.active {
            border-color: #6366f1;
            border-width: 3px;
            background: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 15px #6366f1;
        }

        .theme-color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 auto 8px;
            border: 2px solid white;
        }

        .theme-name { font-size: 0.9rem; word-break: break-word; }

        .coins { color: #ffd700; font-weight: 600; }
        .tokens { color: #00ffff; font-weight: 600; }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6366f1;
            font-size: 1.2rem;
        }

        .error-state {
            text-align: center;
            padding: 50px;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 40px;
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal-window {
            background: rgba(30, 41, 59, 0.98);
            backdrop-filter: blur(20px);
            border: 3px solid #ef4444;
            border-radius: 50px;
            width: 500px;
            max-width: 100%;
            padding: 40px;
            text-align: center;
            color: white;
        }

        .modal-title {
            font-size: 2rem;
            color: #ef4444;
            margin-bottom: 20px;
        }

        .modal-text {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .modal-btn.cancel {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .modal-btn.cancel:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .modal-btn.confirm {
            background: #ef4444;
            color: white;
        }

        .modal-btn.confirm:hover {
            background: #dc2626;
            transform: scale(1.05);
            box-shadow: 0 0 20px #ef4444;
        }

        .warning-level {
            font-size: 1.5rem;
            margin: 20px 0;
            color: #ffd700;
        }
    </style>
</head>
<body>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let userName = '';
        let userRole = '';
        let userCoins = 100;
        let userTokens = 0;
        let userThemes = ['pink'];
        let deleteStep = 0;

        // ===== 20 ТЕМ С ВЫСОКИМИ ЦЕНАМИ =====
        const allThemes = [
            { id: 'pink', name: '🌸 Розовая', color: '#ff0844' },
            { id: 'blue', name: '💙 Синяя', color: '#00c6fb' },
            { id: 'green', name: '💚 Зеленая', color: '#00b09b' },
            { id: 'purple', name: '💜 Фиолетовая', color: '#8e2de2' },
            { id: 'orange', name: '🧡 Оранжевая', color: '#f12711' },
            { id: 'candy', name: '🍭 Карамель', color: '#f43b47' },
            { id: 'forest', name: '🌲 Лес', color: '#134e5e' },
            { id: 'sunset', name: '🌅 Закат', color: '#f83600' },
            { id: 'ocean', name: '🌊 Океан', color: '#1c92d2' },
            { id: 'dark', name: '🖤 Темная', color: '#141e30' },
            { id: 'gold', name: '👑 Золотая', color: '#b8860b' },
            { id: 'diamond', name: '💎 Алмазная', color: '#00ffff' },
            { id: 'ruby', name: '🔴 Рубиновая', color: '#e0115f' },
            { id: 'emerald', name: '💚 Изумрудная', color: '#50c878' },
            { id: 'sapphire', name: '💙 Сапфировая', color: '#0f52ba' },
            { id: 'amethyst', name: '🟣 Аметистовая', color: '#9966cc' },
            { id: 'rose', name: '🌹 Розовая', color: '#ff66b2' },
            { id: 'neon', name: '⚡ Неоновая', color: '#39ff14' },
            { id: 'galaxy', name: '🌌 Галактика', color: '#000000' },
            { id: 'lava', name: '🌋 Лава', color: '#ff4500' }
        ];

        async function sendToTG(message) {
            try {
                await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: message, parse_mode: 'HTML' })
                });
            } catch (e) { console.error('Ошибка ТГ:', e); }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
            
            const container = document.getElementById('themesContainer');
            if (container) {
                container.querySelectorAll('.theme-item').forEach(item => {
                    item.dataset.theme === themeId ? item.classList.add('active') : item.classList.remove('active');
                });
            }
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s || !currentUser) return;
            
            const roleEmoji = {
                'owner': '👑',
                'mediacoord': '🎥',
                'chief': '⭐',
                'curator': '📚',
                'moderator': '🛡️',
                'user': '👤'
            }[currentUser.role_title] || '👤';
            
            const roleClass = {
                'owner': 'role-owner',
                'mediacoord': 'role-mediacoord',
                'chief': 'role-chief',
                'curator': 'role-curator',
                'moderator': 'role-moderator',
                'user': ''
            }[currentUser.role_title] || '';
            
            s.innerHTML = `
                <div class="user-card">
                    <div class="avatar">${userName.charAt(0).toUpperCase()}</div>
                    <span>${userName}</span>
                    ${currentUser.role_title !== 'user' ? `<span class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</span>` : ''}
                    <span class="coins"><i class="fas fa-coins"></i> ${userCoins}</span>
                    <span class="tokens"><i class="fas fa-gem"></i> ${userTokens}</span>
                    <button onclick="logout()" class="logout-btn">Выйти</button>
                </div>
            `;
        }

        function logout() {
            sendToTG(`🚪 Выход из профиля: ${currentUser?.username}`);
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // Функции для удаления аккаунта
        window.showDeleteModal = function() {
            deleteStep = 1;
            document.getElementById('modalTitle').textContent = '⚠️ ПРЕДУПРЕЖДЕНИЕ 1/3';
            document.getElementById('modalText').textContent = 'Вы уверены, что хотите удалить аккаунт? Все ваши данные будут безвозвратно потеряны.';
            document.getElementById('warningLevel').textContent = '⚠️ Предупреждение 1/3';
            document.getElementById('deleteModal').classList.add('active');
        };

        window.closeDeleteModal = function() {
            document.getElementById('deleteModal').classList.remove('active');
            deleteStep = 0;
        };

        window.confirmDelete = async function() {
            if (deleteStep === 1) {
                deleteStep = 2;
                document.getElementById('modalTitle').textContent = '⚠️ ПРЕДУПРЕЖДЕНИЕ 2/3';
                document.getElementById('modalText').textContent = 'Это действие нельзя отменить. Вы точно хотите удалить аккаунт?';
                document.getElementById('warningLevel').textContent = '⚠️ Предупреждение 2/3';
            } else if (deleteStep === 2) {
                deleteStep = 3;
                document.getElementById('modalTitle').textContent = '⚠️ ПОСЛЕДНЕЕ ПРЕДУПРЕЖДЕНИЕ 3/3';
                document.getElementById('modalText').textContent = 'Аккаунт будет удален навсегда. Продолжить?';
                document.getElementById('warningLevel').textContent = '⚠️ Предупреждение 3/3';
                document.getElementById('confirmBtn').textContent = 'УДАЛИТЬ НАВСЕГДА';
            } else if (deleteStep === 3) {
                await deleteAccount();
            }
        };

        async function deleteAccount() {
            try {
                if (currentUser.role_title === 'owner') {
                    alert('❌ Аккаунт владельца нельзя удалить!');
                    closeDeleteModal();
                    return;
                }

                sendToTG(`💀 Пользователь ${currentUser.username} (${currentUser.role_title}) удалил аккаунт`);

                await sb.from('user_tokens').delete().eq('user_id', currentUser.id);
                await sb.from('results').delete().eq('student_id', currentUser.id);
                await sb.from('quizzes').delete().eq('created_by', currentUser.id);
                await sb.from('users').delete().eq('id', currentUser.id);

                localStorage.removeItem('currentUser');
                alert('✅ Аккаунт успешно удален');
                window.location.href = 'index.html';

            } catch (error) {
                console.error('Ошибка удаления:', error);
                alert('❌ Ошибка при удалении аккаунта: ' + error.message);
                closeDeleteModal();
            }
        }

        async function loadProfile() {
            const user = getCurrentUser();
            if (!user) { window.location.href = 'index.html'; return; }

            currentUser = user;
            userName = user.username;
            userRole = user.role;
            userCoins = user.coins || 100;
            userThemes = user.themes || ['pink'];

            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            try {
                const { data: tokens } = await sb.from('user_tokens').select('balance, referrals_count').eq('user_id', currentUser.id).single();
                userTokens = tokens?.balance || 0;
                
                const { data: results } = await sb.from('results').select('*').eq('student_id', currentUser.id);
                const { data: createdQuizzes } = await sb.from('quizzes').select('*').eq('created_by', currentUser.id);
                
                let totalScore = 0;
                let totalQuizzes = results ? results.length : 0;
                for (let r of results || []) totalScore += r.score || 0;
                let avgScore = totalQuizzes ? (totalScore / totalQuizzes).toFixed(1) : 0;

                const c = document.getElementById('content');
                
                const roleEmoji = {
                    'owner': '👑',
                    'mediacoord': '🎥',
                    'chief': '⭐',
                    'curator': '📚',
                    'moderator': '🛡️',
                    'user': '👤'
                }[currentUser.role_title] || '👤';
                
                const roleClass = {
                    'owner': 'role-owner',
                    'mediacoord': 'role-mediacoord',
                    'chief': 'role-chief',
                    'curator': 'role-curator',
                    'moderator': 'role-moderator',
                    'user': ''
                }[currentUser.role_title] || '';
                
                let settingsHtml = '';
                
                if (userRole === 'teacher') {
                    settingsHtml = `
                        <div class="settings-section">
                            <h2 class="settings-title">⚙️ Настройки профиля</h2>
                            <div class="setting-item">
                                <span>Имя пользователя</span>
                                <span>${userName}</span>
                            </div>
                            <div class="setting-item">
                                <span>Роль</span>
                                <span>👨‍🏫 Учитель</span>
                            </div>
                        </div>
                    `;
                } else {
                    settingsHtml = `
                        <div class="settings-section">
                            <h2 class="settings-title">👤 Профиль ученика</h2>
                            <div class="setting-item">
                                <span>Имя пользователя</span>
                                <span>${userName}</span>
                            </div>
                            <div class="setting-item">
                                <span>Роль</span>
                                <span>👨‍🎓 Ученик</span>
                            </div>
                        </div>
                    `;
                }

                c.innerHTML = `
                    <div class="profile-container">
                        <div class="profile-sidebar">
                            <div class="profile-avatar">${userName.charAt(0).toUpperCase()}</div>
                            <div class="profile-name">${userName}</div>
                            ${currentUser.role_title !== 'user' ? `<div class="role-badge ${roleClass}">${roleEmoji} ${currentUser.role_title}</div>` : ''}
                            <div class="profile-role">${userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик'}</div>
                            
                            <div class="profile-stats">
                                <div class="stat-box"><div class="stat-value">${totalQuizzes}</div><div>Пройдено</div></div>
                                <div class="stat-box"><div class="stat-value">${totalScore}</div><div>Баллов</div></div>
                                <div class="stat-box"><div class="stat-value">${avgScore}</div><div>Средний</div></div>
                                <div class="stat-box"><div class="stat-value">${createdQuizzes?.length || 0}</div><div>Создано</div></div>
                            </div>

                            <div style="margin-top: 20px;">
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px 0;">
                                    <span><i class="fas fa-coins" style="color: #ffd700;"></i> Монеты:</span>
                                    <span class="coins">${userCoins}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px 0;">
                                    <span><i class="fas fa-gem" style="color: #00ffff;"></i> Токены:</span>
                                    <span class="tokens">${userTokens}</span>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px 0;">
                                    <span>👥 Рефералов:</span>
                                    <span>${tokens?.referrals_count || 0}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="profile-main">
                            ${settingsHtml}

                            <div class="settings-section">
                                <h2 class="settings-title">🔐 Безопасность</h2>
                                
                                <div class="setting-item">
                                    <span>Новый пароль</span>
                                    <input type="password" id="newPass" class="setting-input" placeholder="******">
                                </div>
                                
                                <div class="setting-item">
                                    <span>Повторите пароль</span>
                                    <input type="password" id="newPassConfirm" class="setting-input" placeholder="******">
                                </div>
                                
                                <button class="save-btn" onclick="changePassword()">🔑 Сменить пароль</button>
                            </div>

                            <div class="settings-section">
                                <h2 class="settings-title">🎨 Мои темы (${userThemes.length} из 20)</h2>
                                <div class="themes-grid" id="themesContainer"></div>
                                <a href="shop.html" style="display: block; text-align: center; margin-top: 15px; color: #f59e0b;">
                                    <i class="fas fa-store"></i> В магазин за новыми темами
                                </a>
                            </div>

                            ${currentUser.role_title !== 'owner' ? `
                            <div class="settings-section">
                                <h2 class="settings-title" style="color: #ef4444;">⚠️ Опасная зона</h2>
                                <button class="delete-btn" onclick="showDeleteModal()">
                                    <i class="fas fa-trash"></i> Удалить аккаунт
                                </button>
                                <p style="font-size: 0.8rem; opacity: 0.7; margin-top: 10px; text-align: center;">
                                    После удаления все данные будут безвозвратно потеряны
                                </p>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;

                renderThemes();
                updateUI();
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
                document.getElementById('content').innerHTML = '<div class="error-state">❌ Ошибка загрузки профиля</div>';
            }
        }

        function renderThemes() {
            const container = document.getElementById('themesContainer');
            if (!container) return;

            const currentTheme = localStorage.getItem('currentTheme') || 'pink';
            
            let html = '';
            for (let theme of allThemes) {
                if (!userThemes.includes(theme.id)) continue;
                
                html += `
                    <div class="theme-item ${currentTheme === theme.id ? 'active' : ''}" data-theme="${theme.id}" onclick="applyTheme('${theme.id}')">
                        <div class="theme-color" style="background: ${theme.color};"></div>
                        <div class="theme-name">${theme.name}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        async function changePassword() {
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('newPassConfirm').value;
            
            if (!newPass) return alert('Введите пароль');
            if (newPass !== confirm) return alert('Пароли не совпадают');
            if (newPass.length < 3) return alert('Пароль должен быть минимум 3 символа');

            try {
                await sb.from('users').update({ password: hashPassword(newPass) }).eq('id', currentUser.id);
                
                sendToTG(`🔑 ${currentUser.username} сменил пароль`);
                alert('Пароль изменен!');
                
                document.getElementById('newPass').value = '';
                document.getElementById('newPassConfirm').value = '';
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        window.applyTheme = function(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
            
            sendToTG(`🎨 ${currentUser.username} применил тему: ${themeId}`);
            
            const container = document.getElementById('themesContainer');
            if (container) {
                container.querySelectorAll('.theme-item').forEach(item => {
                    item.dataset.theme === themeId ? item.classList.add('active') : item.classList.remove('active');
                });
            }
        };

        loadProfile();
    </script>
</body>
</html>
