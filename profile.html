<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        /* ТЕМЫ */
        body.pink-theme { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); color: #4a4a4a; }
        body.blue-theme { background: linear-gradient(135deg, #6dd5ed 0%, #2193b0 100%); color: white; }
        body.green-theme { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); color: #1e3a0e; }
        body.purple-theme { background: linear-gradient(135deg, #b993d6 0%, #8ca6db 100%); color: #2d2d5a; }
        body.orange-theme { background: linear-gradient(135deg, #f9d423 0%, #f83600 100%); color: #4a2a1a; }
        body.dark-theme { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; }
        body.sunset-theme { background: linear-gradient(135deg, #ff7e5f 0%, #feb47b 100%); color: #4a2a1a; }
        body.ocean-theme { background: linear-gradient(135deg, #1c92d2 0%, #f2fcfe 100%); color: #0a2f44; }
        body.forest-theme { background: linear-gradient(135deg, #134e5e 0%, #71b280 100%); color: #e0f2e9; }
        body.candy-theme { background: linear-gradient(135deg, #f43b47 0%, #453a94 100%); color: white; }

        /* АДАПТИВ ДЛЯ МОБИЛОК */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            
            .nav-menu {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
            }
            
            .nav-link {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
            
            .user-card {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
            }
            
            .profile-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .profile-sidebar {
                padding: 20px;
            }
            
            .profile-main {
                padding: 20px;
            }
            
            .setting-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .setting-input {
                width: 100%;
            }
            
            .themes-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .stat-box {
                padding: 10px;
            }
            
            .stat-value {
                font-size: 1.5rem;
            }
            
            .theme-item {
                word-break: break-word;
            }
        }

        @media (max-width: 480px) {
            .nav-menu {
                gap: 5px;
            }
            
            .nav-link {
                width: calc(50% - 3px);
                text-align: center;
                padding: 8px 5px;
                font-size: 0.75rem;
            }
            
            .profile-stats {
                grid-template-columns: 1fr;
            }
            
            .themes-grid {
                grid-template-columns: 1fr;
            }
            
            .user-card {
                justify-content: center;
            }
            
            .avatar {
                width: 35px;
                height: 35px;
            }
            
            .logout-btn {
                width: 100%;
                text-align: center;
            }
            
            .settings-title {
                font-size: 1.1rem;
            }
            
            .theme-name {
                font-size: 0.9rem;
                word-break: break-word;
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            overflow-x: hidden;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            width: 100%;
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-link.active {
            background: #6366f1;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            color: inherit;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
            width: 100%;
        }

        .profile-sidebar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px;
            border: 3px solid white;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-word;
        }

        .profile-role {
            display: inline-block;
            padding: 5px 15px;
            background: #6366f1;
            border-radius: 30px;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .moderator-badge {
            display: inline-block;
            padding: 5px 15px;
            background: #ffd700;
            color: #4a4a4a;
            border-radius: 30px;
            margin: 5px 0;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #6366f1;
        }

        .profile-main {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            width: 100%;
        }

        .settings-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .settings-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .settings-title {
            font-size: 1.3rem;
            color: #6366f1;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            word-break: break-word;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-input {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 30px;
            color: white;
            width: 200px;
            font-family: 'Comfortaa', cursive;
        }

        .setting-input:focus {
            outline: none;
            box-shadow: 0 0 10px #6366f1;
        }

        .save-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .save-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #6366f1;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin: 15px 0;
            width: 100%;
        }

        .theme-item {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            word-break: break-word;
        }

        .theme-item:hover {
            transform: scale(1.05);
            background: rgba(99, 102, 241, 0.2);
        }

        .theme-item.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 15px #6366f1;
        }

        .theme-color {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 auto 8px;
            border: 2px solid white;
        }

        .theme-name {
            font-size: 0.9rem;
            word-break: break-word;
        }

        .coins {
            color: #ffd700;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6366f1;
            font-size: 1.2rem;
        }

        .error-state {
            text-align: center;
            padding: 50px;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 40px;
        }

        .ref-link-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid #ffd700;
            border-radius: 30px;
        }

        .ref-link-title {
            color: #ffd700;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .ref-link-btn {
            background: #ffd700;
            color: #4a4a4a;
            border: none;
            padding: 10px;
            border-radius: 30px;
            width: 100%;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-small" onclick="window.location='index.html'">
            <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="shop.html" class="nav-link">Магазин</a>
            <a href="results.html" class="nav-link">Результаты</a>
            <a href="profile.html" class="nav-link active">Профиль</a>
        </nav>
        <div class="header-right" id="userSection"></div>
    </header>

    <main class="container">
        <div id="content" class="loading">Загрузка профиля...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        // ТГ БОТ
        const TG_BOT_TOKEN = '8601731421:AAH9bkz4eG34G5JDShFZCjwlZBNzUfeiMN4';
        const TG_CHAT_ID = '1474901393';

        let currentUser = null;
        let userName = '';
        let userRole = '';
        let userCoins = 100;
        let userThemes = ['pink'];
        let isModerator = false;

        const allThemes = [
            { id: 'pink', name: '🌸 Розовая', color: '#ff9a9e' },
            { id: 'blue', name: '💙 Синяя', color: '#6dd5ed' },
            { id: 'green', name: '💚 Зеленая', color: '#a8e063' },
            { id: 'purple', name: '💜 Фиолетовая', color: '#b993d6' },
            { id: 'orange', name: '🧡 Оранжевая', color: '#f9d423' },
            { id: 'dark', name: '🖤 Темная', color: '#2c3e50' },
            { id: 'sunset', name: '🌅 Закат', color: '#ff7e5f' },
            { id: 'ocean', name: '🌊 Океан', color: '#1c92d2' },
            { id: 'forest', name: '🌲 Лес', color: '#134e5e' },
            { id: 'candy', name: '🍭 Карамель', color: '#f43b47' }
        ];

        async function sendToTG(message) {
            try {
                const url = `https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`;
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TG_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });
            } catch (e) {
                console.error('Ошибка отправки в ТГ:', e);
            }
        }

        function applyTheme(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
            
            const container = document.getElementById('themesContainer');
            if (container) {
                const items = container.querySelectorAll('.theme-item');
                items.forEach(item => {
                    if (item.dataset.theme === themeId) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            if (currentUser) {
                s.innerHTML = `
                    <div class="user-card">
                        <div class="avatar">${userName.charAt(0).toUpperCase()}</div>
                        <span>${userName}</span>
                        ${isModerator ? '<span style="color: #ffd700;">👑</span>' : ''}
                        <span class="coins"><i class="fas fa-coins"></i> ${userCoins}</span>
                        <button onclick="logout()" class="logout-btn">Выйти</button>
                    </div>
                `;
            }
        }

        function logout() {
            if (currentUser) {
                sendToTG(`🚪 Выход из профиля: ${currentUser.username}`);
            }
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadProfile() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            userName = user.username;
            userRole = user.role;
            userCoins = user.coins || 100;
            userThemes = user.themes || ['pink'];
            isModerator = user.is_moderator || false;

            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            try {
                const { data: results } = await sb.from('results').select('*').eq('student_id', currentUser.id);
                const { data: createdQuizzes } = await sb.from('quizzes').select('*').eq('created_by', currentUser.id);
                
                let totalScore = 0;
                let totalQuizzes = results ? results.length : 0;
                for (let r of results || []) {
                    totalScore += r.score || 0;
                }
                let avgScore = totalQuizzes ? (totalScore / totalQuizzes).toFixed(1) : 0;

                const c = document.getElementById('content');
                
                let settingsHtml = '';
                
                if (userRole === 'teacher') {
                    settingsHtml = `
                        <div class="settings-section">
                            <h2 class="settings-title">⚙️ Настройки профиля</h2>
                            
                            <div class="setting-item">
                                <span>Имя пользователя</span>
                                <input type="text" id="userNameInput" class="setting-input" value="${userName}">
                            </div>
                            
                            <button class="save-btn" onclick="saveName()">💾 Сохранить имя</button>
                        </div>

                        <div class="settings-section">
                            <h2 class="settings-title">🔐 Безопасность</h2>
                            
                            <div class="setting-item">
                                <span>Новый пароль</span>
                                <input type="password" id="newPass" class="setting-input" placeholder="******">
                            </div>
                            
                            <div class="setting-item">
                                <span>Повторите пароль</span>
                                <input type="password" id="newPassConfirm" class="setting-input" placeholder="******">
                            </div>
                            
                            <button class="save-btn" onclick="changePassword()">🔑 Сменить пароль</button>
                        </div>
                    `;
                } else {
                    settingsHtml = `
                        <div class="settings-section">
                            <h2 class="settings-title">👤 Профиль ученика</h2>
                            
                            <div class="setting-item">
                                <span>Имя пользователя</span>
                                <span>${userName}</span>
                            </div>
                            
                            <div class="setting-item">
                                <span>Роль</span>
                                <span>👨‍🎓 Ученик</span>
                            </div>
                            
                            <div class="setting-item">
                                <span>Монет</span>
                                <span class="coins">${userCoins}</span>
                            </div>
                        </div>

                        <div class="settings-section">
                            <h2 class="settings-title">🔐 Безопасность</h2>
                            
                            <div class="setting-item">
                                <span>Новый пароль</span>
                                <input type="password" id="newPass" class="setting-input" placeholder="******">
                            </div>
                            
                            <div class="setting-item">
                                <span>Повторите пароль</span>
                                <input type="password" id="newPassConfirm" class="setting-input" placeholder="******">
                            </div>
                            
                            <button class="save-btn" onclick="changePassword()">🔑 Сменить пароль</button>
                        </div>
                    `;
                }

                if (isModerator) {
                    settingsHtml += `
                        <div class="settings-section">
                            <h2 class="settings-title">🔗 Реферальные ссылки</h2>
                            <div class="ref-link-section">
                                <div class="ref-link-title">👑 Панель модератора</div>
                                <p style="margin-bottom: 15px; opacity: 0.8;">Создавайте одноразовые ссылки для приглашения модераторов</p>
                                <button class="ref-link-btn" onclick="generateReferral()">
                                    🔗 Сгенерировать ссылку
                                </button>
                            </div>
                        </div>
                    `;
                }

                c.innerHTML = `
                    <div class="profile-container">
                        <div class="profile-sidebar">
                            <div class="profile-avatar">${userName.charAt(0).toUpperCase()}</div>
                            <div class="profile-name">${userName}</div>
                            ${isModerator ? '<div class="moderator-badge">👑 МОДЕРАТОР</div>' : ''}
                            <div class="profile-role">${userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик'}</div>
                            
                            <div class="profile-stats">
                                <div class="stat-box">
                                    <div class="stat-value">${totalQuizzes}</div>
                                    <div>Пройдено</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${totalScore}</div>
                                    <div>Баллов</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${avgScore}</div>
                                    <div>Средний</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${createdQuizzes?.length || 0}</div>
                                    <div>Создано</div>
                                </div>
                            </div>

                            <div style="margin-top: 20px;">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span><i class="fas fa-coins" style="color: #ffd700;"></i> Баланс:</span>
                                    <span class="coins">${userCoins}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="profile-main">
                            ${settingsHtml}

                            <div class="settings-section">
                                <h2 class="settings-title">🎨 Мои темы (${userThemes.length})</h2>
                                <div class="themes-grid" id="themesContainer"></div>
                                <a href="shop.html" style="display: block; text-align: center; margin-top: 15px; color: #f59e0b;">
                                    <i class="fas fa-store"></i> В магазин за новыми темами
                                </a>
                            </div>
                        </div>
                    </div>
                `;

                renderThemes();
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
                document.getElementById('content').innerHTML = '<div class="error-state">❌ Ошибка загрузки профиля</div>';
            }
        }

        function renderThemes() {
            const container = document.getElementById('themesContainer');
            if (!container) return;

            const currentTheme = localStorage.getItem('currentTheme') || 'pink';
            
            let html = '';
            for (let theme of allThemes) {
                const owned = userThemes.includes(theme.id);
                if (!owned) continue;
                
                html += `
                    <div class="theme-item ${currentTheme === theme.id ? 'active' : ''}" data-theme="${theme.id}" onclick="applyTheme('${theme.id}')">
                        <div class="theme-color" style="background: ${theme.color};"></div>
                        <div class="theme-name">${theme.name}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        async function saveName() {
            const newName = document.getElementById('userNameInput').value.trim();
            if (!newName) return alert('Введите имя');
            
            try {
                const { data: existing } = await sb.from('users').select('*').eq('username', newName);
                if (existing && existing.length > 0 && newName !== userName) {
                    return alert('Это имя уже занято');
                }

                await sb.from('users').update({ username: newName }).eq('id', currentUser.id);
                
                sendToTG(`✏️ ${currentUser.username} сменил имя на ${newName}`);
                
                currentUser.username = newName;
                userName = newName;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                alert('Имя сохранено!');
                window.location.reload();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function changePassword() {
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('newPassConfirm').value;
            
            if (!newPass) return alert('Введите пароль');
            if (newPass !== confirm) return alert('Пароли не совпадают');
            if (newPass.length < 3) return alert('Пароль должен быть минимум 3 символа');

            try {
                await sb.from('users').update({ password: hashPassword(newPass) }).eq('id', currentUser.id);
                
                sendToTG(`🔑 ${currentUser.username} сменил пароль`);
                alert('Пароль изменен!');
                
                document.getElementById('newPass').value = '';
                document.getElementById('newPassConfirm').value = '';
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        window.generateReferral = function() {
            if (!currentUser || !currentUser.is_moderator) {
                alert('Только модераторы могут создавать реферальные ссылки');
                return;
            }
            
            const refCode = 'ref_' + Date.now() + '_' + Math.random().toString(36).substring(2, 10);
            const url = window.location.origin + window.location.pathname.replace('profile.html', 'index.html') + '?ref=' + refCode;
            
            const refLinks = JSON.parse(localStorage.getItem('moderatorRefs') || '[]');
            refLinks.push({
                code: refCode,
                url: url,
                created: new Date().toISOString(),
                used: false
            });
            localStorage.setItem('moderatorRefs', JSON.stringify(refLinks));
            
            sendToTG(`🔗 ${currentUser.username} создал реферальную ссылку`);
            prompt('🔗 Одноразовая реферальная ссылка (скопируйте и отправьте):', url);
        };

        window.applyTheme = function(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
            
            sendToTG(`🎨 ${currentUser.username} применил тему: ${themeId}`);
            
            const container = document.getElementById('themesContainer');
            if (container) {
                const items = container.querySelectorAll('.theme-item');
                items.forEach(item => {
                    if (item.dataset.theme === themeId) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
        };

        loadProfile();
    </script>
</body>
</html>
