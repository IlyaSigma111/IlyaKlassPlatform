<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comfortaa', cursive;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            transition: background 0.3s ease;
        }

        body.pink-theme { background: linear-gradient(135deg, #fbc7d1 0%, #f8cdda 100%); color: #4a4a4a; }
        body.blue-theme { background: linear-gradient(135deg, #6dd5ed 0%, #2193b0 100%); color: white; }
        body.green-theme { background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%); color: #2d4a1e; }
        body.purple-theme { background: linear-gradient(135deg, #b993d6 0%, #8ca6db 100%); color: #2d2d5a; }
        body.orange-theme { background: linear-gradient(135deg, #f9d423 0%, #f83600 100%); color: #4a2a1a; }
        body.dark-theme { background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%); color: white; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            margin-bottom: 30px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .logo-small {
            font-size: 1.8rem;
            font-weight: 700;
            cursor: pointer;
        }

        .nav-menu {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-link {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .nav-link.active {
            background: #6366f1;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .logout-btn {
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            cursor: pointer;
        }

        .profile-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 25px;
        }

        .profile-sidebar {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
            text-align: center;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 15px;
            border: 3px solid white;
        }

        .profile-name {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-role {
            display: inline-block;
            padding: 5px 15px;
            background: #6366f1;
            border-radius: 30px;
            margin: 10px 0;
            font-size: 0.9rem;
        }

        .profile-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #6366f1;
        }

        .profile-main {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 30px;
        }

        .settings-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
        }

        .settings-title {
            font-size: 1.3rem;
            color: #6366f1;
            margin-bottom: 20px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-input {
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #6366f1;
            border-radius: 30px;
            color: white;
            width: 200px;
        }

        .save-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            margin-top: 10px;
        }

        .themes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin: 15px 0;
        }

        .theme-item {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-item:hover {
            transform: scale(1.05);
            background: rgba(99, 102, 241, 0.2);
        }

        .theme-item.active {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.3);
        }

        .theme-color {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin: 0 auto 5px;
        }

        .coins {
            color: #ffd700;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #6366f1;
        }

        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            .setting-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            .setting-input {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-small" onclick="window.location='index.html'">
            <span style="color: #6366f1;">ИЛЬ</span><span style="color: #f59e0b;">ЯКЛАСС</span>
        </div>
        <nav class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="shop.html" class="nav-link">Магазин</a>
            <a href="results.html" class="nav-link">Результаты</a>
            <a href="profile.html" class="nav-link active">Профиль</a>
        </nav>
        <div class="header-right" id="userSection"></div>
    </header>

    <main class="container">
        <div id="content" class="loading">Загрузка профиля...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        let currentUser = null;
        let userName = '';
        let userRole = '';
        let userCoins = 100;
        let userThemes = ['pink'];

        const allThemes = [
            { id: 'pink', name: 'Розовая', color: '#fbc7d1' },
            { id: 'blue', name: 'Синяя', color: '#6dd5ed' },
            { id: 'green', name: 'Зеленая', color: '#a8e063' },
            { id: 'purple', name: 'Фиолетовая', color: '#b993d6' },
            { id: 'orange', name: 'Оранжевая', color: '#f9d423' },
            { id: 'dark', name: 'Темная', color: '#2c3e50' }
        ];

        // Функция применения темы (НЕТ РЕКУРСИИ!)
        function applyTheme(themeId) {
            // Просто меняем класс body
            document.body.className = themeId + '-theme';
            // Сохраняем в localStorage
            localStorage.setItem('currentTheme', themeId);
            
            // Обновляем подсветку активной темы (если есть контейнер)
            const container = document.getElementById('themesContainer');
            if (container) {
                const items = container.querySelectorAll('.theme-item');
                items.forEach(item => {
                    if (item.dataset.theme === themeId) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
        }

        function getCurrentUser() {
            const saved = localStorage.getItem('currentUser');
            return saved ? JSON.parse(saved) : null;
        }

        function hashPassword(p) {
            let h = 0;
            for (let i = 0; i < p.length; i++) h = ((h << 5) - h) + p.charCodeAt(i);
            return h.toString(16);
        }

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            if (currentUser) {
                s.innerHTML = `
                    <div class="user-card">
                        <div class="avatar">${userName.charAt(0).toUpperCase()}</div>
                        <span>${userName}</span>
                        <span class="coins"><i class="fas fa-coins"></i> ${userCoins}</span>
                        <button onclick="logout()" class="logout-btn">Выйти</button>
                    </div>
                `;
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        async function loadProfile() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            currentUser = user;
            userName = user.username;
            userRole = user.role;
            userCoins = user.coins || 100;
            userThemes = user.themes || ['pink'];

            // Применяем сохраненную тему
            const savedTheme = localStorage.getItem('currentTheme') || 'pink';
            applyTheme(savedTheme);

            try {
                // Загружаем статистику
                const { data: results } = await sb.from('results').select('*').eq('student_id', currentUser.id);
                const { data: createdQuizzes } = await sb.from('quizzes').select('*').eq('created_by', currentUser.id);
                
                let totalScore = 0;
                let totalQuizzes = results ? results.length : 0;
                for (let r of results || []) {
                    totalScore += r.score || 0;
                }
                let avgScore = totalQuizzes ? (totalScore / totalQuizzes).toFixed(1) : 0;

                const c = document.getElementById('content');
                c.innerHTML = `
                    <div class="profile-container">
                        <div class="profile-sidebar">
                            <div class="profile-avatar">${userName.charAt(0).toUpperCase()}</div>
                            <div class="profile-name">${userName}</div>
                            <div class="profile-role">${userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик'}</div>
                            
                            <div class="profile-stats">
                                <div class="stat-box">
                                    <div class="stat-value">${totalQuizzes}</div>
                                    <div>Пройдено</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${totalScore}</div>
                                    <div>Баллов</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${avgScore}</div>
                                    <div>Средний</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-value">${createdQuizzes?.length || 0}</div>
                                    <div>Создано</div>
                                </div>
                            </div>

                            <div style="margin-top: 20px;">
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span><i class="fas fa-coins" style="color: #ffd700;"></i> Баланс:</span>
                                    <span class="coins">${userCoins}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="profile-main">
                            <div class="settings-section">
                                <h2 class="settings-title">⚙️ Настройки профиля</h2>
                                
                                <div class="setting-item">
                                    <span>Имя пользователя</span>
                                    <input type="text" id="userNameInput" class="setting-input" value="${userName}">
                                </div>
                                
                                <button class="save-btn" onclick="saveName()">💾 Сохранить имя</button>
                            </div>

                            <div class="settings-section">
                                <h2 class="settings-title">🔐 Безопасность</h2>
                                
                                <div class="setting-item">
                                    <span>Новый пароль</span>
                                    <input type="password" id="newPass" class="setting-input" placeholder="******">
                                </div>
                                
                                <div class="setting-item">
                                    <span>Повторите пароль</span>
                                    <input type="password" id="newPassConfirm" class="setting-input" placeholder="******">
                                </div>
                                
                                <button class="save-btn" onclick="changePassword()">🔑 Сменить пароль</button>
                            </div>

                            <div class="settings-section">
                                <h2 class="settings-title">🎨 Мои темы</h2>
                                <div class="themes-grid" id="themesContainer"></div>
                                <a href="shop.html" style="display: block; text-align: center; margin-top: 15px; color: #f59e0b;">
                                    <i class="fas fa-store"></i> В магазин за новыми темами
                                </a>
                            </div>
                        </div>
                    </div>
                `;

                renderThemes();
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
                document.getElementById('content').innerHTML = '<div class="error-state">Ошибка загрузки профиля</div>';
            }
        }

        function renderThemes() {
            const container = document.getElementById('themesContainer');
            if (!container) return;

            const currentTheme = localStorage.getItem('currentTheme') || 'pink';
            
            let html = '';
            for (let theme of allThemes) {
                const owned = userThemes.includes(theme.id);
                if (!owned) continue;
                
                html += `
                    <div class="theme-item ${currentTheme === theme.id ? 'active' : ''}" data-theme="${theme.id}" onclick="applyTheme('${theme.id}')">
                        <div class="theme-color" style="background: ${theme.color};"></div>
                        <div>${theme.name}</div>
                    </div>
                `;
            }
            container.innerHTML = html;
        }

        async function saveName() {
            const newName = document.getElementById('userNameInput').value.trim();
            if (!newName) return alert('Введите имя');
            
            try {
                const { data: existing } = await sb.from('users').select('*').eq('username', newName);
                if (existing && existing.length > 0 && newName !== userName) {
                    return alert('Это имя уже занято');
                }

                await sb.from('users').update({ username: newName }).eq('id', currentUser.id);
                
                currentUser.username = newName;
                userName = newName;
                localStorage.setItem('currentUser', JSON.stringify(currentUser));
                
                alert('Имя сохранено!');
                window.location.reload();
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        async function changePassword() {
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('newPassConfirm').value;
            
            if (!newPass) return alert('Введите пароль');
            if (newPass !== confirm) return alert('Пароли не совпадают');
            if (newPass.length < 3) return alert('Пароль должен быть минимум 3 символа');

            try {
                await sb.from('users').update({ password: hashPassword(newPass) }).eq('id', currentUser.id);
                alert('Пароль изменен!');
            } catch (error) {
                alert('Ошибка: ' + error.message);
            }
        }

        // Глобальная функция для применения темы (без рекурсии)
        window.applyTheme = function(themeId) {
            document.body.className = themeId + '-theme';
            localStorage.setItem('currentTheme', themeId);
            
            // Обновляем подсветку
            const container = document.getElementById('themesContainer');
            if (container) {
                const items = container.querySelectorAll('.theme-item');
                items.forEach(item => {
                    if (item.dataset.theme === themeId) {
                        item.classList.add('active');
                    } else {
                        item.classList.remove('active');
                    }
                });
            }
        };

        loadProfile();
    </script>
</body>
</html>
