<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Профиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
        }

        body.light-theme {
            background: #f0f0f0;
            color: #333;
        }

        .header {
            background: #16213e;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        body.light-theme .header {
            background: #fff;
            border-bottom: 2px solid #6366f1;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .logo-il { color: #6366f1; }
        .logo-yaclass { color: #f59e0b; }

        .nav-menu {
            display: flex;
            gap: 10px;
        }

        .nav-link {
            padding: 8px 15px;
            border-radius: 5px;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
        }

        body.light-theme .nav-link {
            background: #e0e0e0;
            color: #333;
        }

        .nav-link.active {
            background: #6366f1;
            color: white;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.1);
            padding: 5px 10px;
            border-radius: 5px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #6366f1;
        }

        .logout-btn, .theme-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 3px;
            background: #6366f1;
            color: white;
            cursor: pointer;
        }

        .main-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .profile-container {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .profile-sidebar {
            background: rgba(255,255,255,0.05);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 20px;
            text-align: center;
        }

        .profile-main {
            background: rgba(255,255,255,0.05);
            border: 1px solid #6366f1;
            border-radius: 5px;
            padding: 20px;
        }

        body.light-theme .profile-sidebar,
        body.light-theme .profile-main {
            background: white;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #6366f1;
            margin: 0 auto 15px;
        }

        .profile-name {
            font-size: 20px;
            margin-bottom: 5px;
        }

        .profile-email {
            opacity: 0.7;
            margin-bottom: 10px;
        }

        .profile-role {
            display: inline-block;
            padding: 5px 15px;
            background: #6366f1;
            border-radius: 3px;
            margin-bottom: 20px;
        }

        .profile-role.developer { background: #ef4444; }
        .profile-role.moderator { background: #f59e0b; }

        .settings-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #6366f1;
        }

        .settings-section:last-child {
            border-bottom: none;
        }

        .settings-title {
            font-size: 18px;
            color: #6366f1;
            margin-bottom: 15px;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #333;
            flex-wrap: wrap;
            gap: 10px;
        }

        body.light-theme .setting-item {
            border-bottom-color: #ddd;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-label {
            font-weight: bold;
        }

        .setting-description {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 2px;
        }

        .setting-input {
            padding: 8px;
            border-radius: 3px;
            border: 1px solid #6366f1;
            background: rgba(0,0,0,0.2);
            color: white;
            width: 200px;
        }

        body.light-theme .setting-input {
            background: white;
            color: #333;
        }

        .setting-value {
            color: #6366f1;
            font-weight: bold;
            font-size: 18px;
        }

        .submit-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 3px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .subject-checkbox {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            cursor: pointer;
        }

        body.light-theme .subject-checkbox {
            background: #f0f0f0;
        }

        .add-quiz-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 3px;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 50px;
        }

        @media (max-width: 768px) {
            .profile-container {
                grid-template-columns: 1fr;
            }
            .setting-item {
                flex-direction: column;
                align-items: flex-start;
            }
            .setting-input {
                width: 100%;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <header class="header">
        <div class="header-left">
            <div class="logo" onclick="window.location='index.html'">
                <span class="logo-il">ИЛЬ</span>
                <span class="logo-yaclass">ЯКЛАСС</span>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-link">Викторины</a>
                <a href="results.html" class="nav-link">Результаты</a>
                <a href="profile.html" class="nav-link active">Профиль</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">☀️ Светлая</button>
            <div id="userSection"></div>
        </div>
    </header>

    <main class="main-container">
        <div id="content" class="loading">Загрузка профиля...</div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substring(2);
        }

        function cleanDisplayName(name) {
            return name ? name.replace(/\s*\(\d+\)$/, '') : name;
        }

        function getCurrentSimpleUser() {
            const u = localStorage.getItem('currentSimpleUser');
            return u ? JSON.parse(u) : null;
        }

        const DEFAULT_AVATAR = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#6366f1"/></svg>';

        let currentUser = null;
        let userRole = null;
        let userFullName = null;
        let userIsModerator = false;
        let teacherSubjects = [];
        let profileSubjects = [];

        function toggleTheme() {
            const b = document.body;
            const t = document.getElementById('themeToggle');
            if (b.classList.contains('dark-theme')) {
                b.classList.replace('dark-theme', 'light-theme');
                t.textContent = '🌙 Темная';
                localStorage.setItem('theme', 'light');
            } else {
                b.classList.replace('light-theme', 'dark-theme');
                t.textContent = '☀️ Светлая';
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.body.className = savedTheme + '-theme';
        document.getElementById('themeToggle').textContent = savedTheme === 'dark' ? '☀️ Светлая' : '🌙 Темная';

        const baseSubjects = ['Русский язык','Алгебра','Геометрия','Математика','Химия','Физика','Литература','Английский язык','История','Физкультура'];

        async function loadProfileSubjects() {
            const { data, error } = await supabase.from('subjects').select('name');
            if (error) console.error(error);
            profileSubjects = data ? data.map(s => s.name) : baseSubjects;
        }

        (async function init() {
            await loadProfileSubjects();
            const simple = getCurrentSimpleUser();
            if (simple) {
                currentUser = { id: simple.id, email: simple.username+'@local', username: simple.username };
                userRole = simple.role;
                userFullName = simple.fullName || simple.username;
                userIsModerator = simple.isModerator || false;
                if (userRole === 'teacher' && simple.subjects) {
                    teacherSubjects = simple.subjects;
                }
                updateUI();
                loadProfile(simple);
            } else {
                window.location.href = 'index.html';
            }
        })();

        function updateUI() {
            const s = document.getElementById('userSection');
            if (!s) return;
            const dn = cleanDisplayName(userFullName || currentUser.username);
            let rt = '';
            if (userRole === 'developer') rt = '👑 Разработчик';
            else if (userIsModerator) rt = '🛡️ Модератор';
            else rt = userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик';
            s.innerHTML = '<div class="user-card"><div class="avatar" style="background:#6366f1;"></div><span>' + dn + '</span><span>' + rt + '</span><button onclick="signOut()" class="logout-btn">Выйти</button></div>';
        }

        function signOut() {
            localStorage.removeItem('currentSimpleUser');
            window.location.href = 'index.html';
        }

        function loadProfile(user) {
            const c = document.getElementById('content');
            const isDev = userRole === 'developer';
            let rt = '';
            let rc = '';
            if (isDev) { rt = '👑 Разработчик'; rc = 'developer'; }
            else if (userIsModerator) { rt = '🛡️ Модератор'; rc = 'moderator'; }
            else rt = userRole === 'teacher' ? '👨‍🏫 Учитель' : '👨‍🎓 Ученик';

            c.innerHTML = '<div class="profile-container"><div class="profile-sidebar"><div class="profile-avatar"></div><div class="profile-name">' + cleanDisplayName(userFullName) + '</div><div class="profile-email">' + currentUser.email + '</div><div class="profile-role ' + rc + '">' + rt + '</div>' + (userRole === 'teacher' || isDev || userIsModerator ? '<div style="margin-top:20px;"><h3 style="color:#6366f1;">➕ Управление</h3><button class="submit-btn" onclick="window.location.href=\'index.html#addQuiz\'">➕ Добавить викторину</button></div>' : '') + '</div><div class="profile-main"><h2 class="settings-title">⚙️ Настройки</h2><div class="settings-section"><div class="setting-item"><div><div class="setting-label">Имя</div><div class="setting-description">Как вас видят</div></div><input type="text" id="fullNameInput" class="setting-input" value="' + cleanDisplayName(userFullName) + '"></div><button class="submit-btn" onclick="saveFullName()">Сохранить</button></div>' + (userRole === 'teacher' ? '<div class="settings-section"><h3 class="settings-title">📚 Мои предметы</h3><div id="subjectsList" style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:15px;"></div><div style="display:flex;gap:10px;"><input type="text" id="newSubjectInput" placeholder="Новый предмет" class="setting-input" style="flex:1;"><button class="add-quiz-btn" onclick="addNewSubject()">➕</button></div><button class="submit-btn" onclick="saveTeacherSubjects()">💾 Сохранить</button></div>' : '') + (userRole === 'student' ? '<div class="settings-section"><h3 class="settings-title">📊 Статистика</h3><div class="setting-item"><span>Пройдено:</span><span class="setting-value" id="totalQuizzes">0</span></div><div class="setting-item"><span>Баллов:</span><span class="setting-value" id="totalScore">0</span></div><div class="setting-item"><span>Средний:</span><span class="setting-value" id="avgScore">0</span></div></div>' : '') + '</div></div>';

            if (userRole === 'teacher') {
                renderSubjectCheckboxes();
            }
            if (userRole === 'student') {
                loadStudentStats();
            }
        }

        function renderSubjectCheckboxes() {
            const container = document.getElementById('subjectsList');
            if (!container) return;
            let html = '';
            for (let i = 0; i < profileSubjects.length; i++) {
                let s = profileSubjects[i];
                let checked = teacherSubjects.includes(s) ? 'checked' : '';
                html += '<label class="subject-checkbox"><input type="checkbox" value="' + s + '" ' + checked + '> ' + s + '</label>';
            }
            container.innerHTML = html;
        }

        async function addNewSubject() {
            const n = document.getElementById('newSubjectInput') ? document.getElementById('newSubjectInput').value.trim() : '';
            if (!n) return alert('Введите предмет');
            const f = n[0].toUpperCase() + n.slice(1);
            if (profileSubjects.includes(f)) return alert('Уже есть');
            await supabase.from('subjects').insert({ name: f });
            profileSubjects.push(f);
            renderSubjectCheckboxes();
            document.getElementById('newSubjectInput').value = '';
        }

        async function saveTeacherSubjects() {
            const checkboxes = document.querySelectorAll('#subjectsList input:checked');
            let subs = [];
            for (let i = 0; i < checkboxes.length; i++) {
                subs.push(checkboxes[i].value);
            }
            teacherSubjects = subs;
            const simple = getCurrentSimpleUser();
            if (simple) {
                await supabase.from('simple_users').update({ subjects: subs }).eq('id', simple.id);
            }
            alert('Предметы сохранены');
        }

        async function loadStudentStats() {
            const { data: results } = await supabase.from('results').select('*').eq('student_id', currentUser.id);
            let t = 0, c = 0;
            if (results) {
                for (let i = 0; i < results.length; i++) {
                    t += results[i].score || 0;
                    c++;
                }
            }
            let avg = c ? (t / c).toFixed(1) : 0;
            document.getElementById('totalQuizzes').textContent = c;
            document.getElementById('totalScore').textContent = t;
            document.getElementById('avgScore').textContent = avg;
        }

        async function saveFullName() {
            const n = document.getElementById('fullNameInput') ? document.getElementById('fullNameInput').value : '';
            if (!n) return alert('Введите имя');
            const simple = getCurrentSimpleUser();
            if (simple) {
                await supabase.from('simple_users').update({ full_name: n, username: n }).eq('id', simple.id);
                simple.fullName = n;
                simple.username = n;
                localStorage.setItem('currentSimpleUser', JSON.stringify(simple));
            }
            alert('Сохранено');
            window.location.reload();
        }
    </script>
</body>
</html>
