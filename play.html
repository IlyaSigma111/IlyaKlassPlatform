<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Игра - Викторина</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; margin: 20px; background: #f0f0f0; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        button { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .option { background: #f9f9f9; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; }
        .option:hover { background: #e0e0e0; }
        .correct { background: #d4edda; border-color: #28a745; }
        .wrong { background: #f8d7da; border-color: #dc3545; }
        .disabled { pointer-events: none; opacity: 0.6; }
        input { padding: 10px; width: 100%; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .score { font-size: 20px; font-weight: bold; color: #4CAF50; }
        .question { font-size: 22px; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('quiz');

        let quiz, questions, currentIndex = 0, score = 0, playerName = localStorage.getItem('playerName') || '';

        async function init() {
            if (!quizId) { window.location.href = 'index.html'; return; }
            const { data: quizData } = await sb.from('quizzes').select('*').eq('id', quizId).single();
            const { data: qs } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            quiz = quizData;
            questions = qs || [];
            if (!quiz || !questions.length) {
                document.getElementById('app').innerHTML = '<h2>❌ Викторина не найдена</h2><a href="index.html"><button>На главную</button></a>';
                return;
            }
            showNameScreen();
        }

        function showNameScreen() {
            document.getElementById('app').innerHTML = `
                <h2>${escapeHtml(quiz.title)}</h2>
                <p>${questions.length} вопросов</p>
                <input type="text" id="playerName" placeholder="Ваше имя" value="${escapeHtml(playerName)}">
                <button onclick="startGame()">Начать игру</button>
                <br><a href="index.html"><button style="background:#666">На главную</button></a>
            `;
        }

        window.startGame = function() {
            playerName = document.getElementById('playerName').value.trim();
            if (!playerName) { alert('Введите имя'); return; }
            localStorage.setItem('playerName', playerName);
            currentIndex = 0;
            score = 0;
            showQuestion();
        };

        function showQuestion() {
            if (currentIndex >= questions.length) { finishQuiz(); return; }
            const q = questions[currentIndex];
            const opts = [...q.answers];
            for (let i = opts.length-1; i>0; i--) {
                const j = Math.floor(Math.random()*(i+1));
                [opts[i], opts[j]] = [opts[j], opts[i]];
            }
            const correctIdx = opts.indexOf(q.answers[q.correct]);
            
            document.getElementById('app').innerHTML = `
                <div style="display:flex; justify-content:space-between">
                    <a href="index.html"><button style="background:#666">Выход</button></a>
                    <div class="score">⭐ ${score}/${questions.length}</div>
                </div>
                <div class="question">${escapeHtml(q.question)}</div>
                <div id="options">
                    ${opts.map((opt, i) => `
                        <div class="option" onclick="selectAnswer(${i}, ${correctIdx})">
                            <b>${String.fromCharCode(65+i)}.</b> ${escapeHtml(opt)}
                        </div>
                    `).join('')}
                </div>
                <div id="status"></div>
                <button id="nextBtn" style="display:none" onclick="nextQuestion()">Следующий вопрос →</button>
            `;
        }

        window.selectAnswer = function(selected, correct) {
            if (document.getElementById('nextBtn').style.display === 'block') return;
            const isCorrect = selected === correct;
            if (isCorrect) score++;
            
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = isCorrect ? '✅ Правильно! +1 очко' : '❌ Неправильно!';
            statusDiv.style.color = isCorrect ? 'green' : 'red';
            
            document.querySelectorAll('.option').forEach(opt => opt.classList.add('disabled'));
            document.getElementById('nextBtn').style.display = 'block';
        };

        window.nextQuestion = function() {
            currentIndex++;
            showQuestion();
        };

        async function finishQuiz() {
            await sb.from('results').insert({
                quiz_id: quizId,
                player_name: playerName,
                score: score,
                max_score: questions.length,
                played_at: new Date().toISOString()
            });
            
            document.getElementById('app').innerHTML = `
                <div style="text-align:center">
                    <h2>🎉 Викторина завершена!</h2>
                    <div style="font-size:48px; margin:20px">${score}/${questions.length}</div>
                    <p>${score === questions.length ? '🏆 Идеально!' : score >= questions.length/2 ? '👍 Хорошо!' : '📚 В следующий раз получится!'}</p>
                    <a href="index.html"><button>На главную</button></a>
                    <a href="profile.html"><button>Мой профиль</button></a>
                </div>
            `;
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        init();
    </script>
</body>
</html>
