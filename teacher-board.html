<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Викторина с доски</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #1a1a2e;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 28px;
            color: #6366f1;
            margin-bottom: 10px;
        }

        .counter {
            text-align: center;
            color: #6366f1;
            margin-bottom: 20px;
        }

        .question-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #6366f1;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 24px;
            margin-bottom: 20px;
            text-align: center;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .answer-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #10b981;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .answer-card:hover {
            background: rgba(16,185,129,0.1);
        }

        .answer-card.correct {
            background: #10b981;
        }

        .answer-card.incorrect {
            background: #ef4444;
            opacity: 0.7;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .nav-btn {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            cursor: pointer;
        }

        .nav-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title" id="quizTitle">Загрузка...</h1>
            <div>Викторина с доски</div>
        </div>

        <div class="counter" id="counter">Вопрос 1/0</div>

        <div class="question-card">
            <div class="question-text" id="questionText">Загрузка...</div>
            <div class="answers-grid" id="answersGrid"></div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="prevQuestion()">◀ Назад</button>
            <button class="nav-btn" onclick="nextQuestion()">Вперед ▶</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('quiz');

        let questions = [];
        let currentQuestion = 0;

        async function loadQuiz() {
            const { data: quiz } = await supabase.from('quizzes').select('title').eq('id', quizId).single();
            if (quiz) document.getElementById('quizTitle').textContent = quiz.title;

            const { data: qs } = await supabase.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            questions = qs || [];
            updateCounter();
            displayQuestion();
        }

        function updateCounter() {
            document.getElementById('counter').textContent = 'Вопрос ' + (currentQuestion+1) + '/' + questions.length;
        }

        function displayQuestion() {
            if (!questions.length) return;
            let q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            
            let html = '';
            for (let i = 0; i < q.answers.length; i++) {
                html += '<div class="answer-card" onclick="showAnswer(' + i + ')" id="answer-' + i + '">' + q.answers[i] + '</div>';
            }
            document.getElementById('answersGrid').innerHTML = html;
        }

        window.showAnswer = function(index) {
            let correct = questions[currentQuestion].correct;
            for (let i = 0; i < 4; i++) {
                let el = document.getElementById('answer-' + i);
                if (el) {
                    el.classList.remove('correct', 'incorrect');
                }
            }
            document.getElementById('answer-' + correct).classList.add('correct');
            if (index !== correct) {
                document.getElementById('answer-' + index).classList.add('incorrect');
            }
        };

        window.prevQuestion = function() {
            if (currentQuestion > 0) {
                currentQuestion--;
                updateCounter();
                displayQuestion();
            }
        };

        window.nextQuestion = function() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                updateCounter();
                displayQuestion();
            }
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') nextQuestion();
            else if (e.key === 'ArrowLeft') prevQuestion();
            else if (e.key >= '1' && e.key <= '4') showAnswer(parseInt(e.key) - 1);
        });

        loadQuiz();
    </script>
</body>
</html>
