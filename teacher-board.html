<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Викторина с доски</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --accent: #f59e0b;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            background: linear-gradient(145deg, #0a0c14, #151823);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--primary-glow);
        }

        .counter {
            text-align: center;
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 20px;
        }

        .question-card {
            background: rgba(21, 24, 35, 0.7);
            backdrop-filter: blur(12px);
            border: 3px solid var(--primary);
            border-radius: 30px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 28px;
            margin-bottom: 30px;
            color: var(--primary);
            text-align: center;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .answer-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--success);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .answer-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px var(--success);
        }

        .answer-card.correct {
            background: var(--success);
            border-color: var(--primary);
        }

        .answer-card.incorrect {
            background: var(--danger);
            border-color: var(--primary);
            opacity: 0.7;
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .nav-btn {
            background: rgba(99, 102, 241, 0.2);
            border: 2px solid var(--primary);
            color: var(--primary);
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-btn:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title" id="quizTitle">Загрузка...</h1>
            <div>Викторина с доски - ученики отвечают устно</div>
        </div>

        <div class="counter" id="counter">Вопрос 1/0</div>

        <div class="question-card">
            <div class="question-text" id="questionText">Загрузка...</div>
            <div class="answers-grid" id="answersGrid"></div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="prevQuestion()">◀ Назад</button>
            <button class="nav-btn" onclick="nextQuestion()">Вперед ▶</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SB_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SB_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const sb = window.supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('quiz');

        let questions = [];
        let currentQuestion = 0;

        async function loadQuiz() {
            const { data: quiz } = await sb.from('quizzes').select('title').eq('id', quizId).single();
            document.getElementById('quizTitle').textContent = quiz?.title || 'Викторина';

            const { data: qs } = await sb.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            questions = qs || [];
            updateCounter();
            displayQuestion();
        }

        function updateCounter() {
            document.getElementById('counter').textContent = `Вопрос ${currentQuestion + 1}/${questions.length}`;
        }

        function displayQuestion() {
            if (!questions.length) return;
            let q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            
            let html = '';
            for (let i = 0; i < q.answers.length; i++) {
                html += `<div class="answer-card" onclick="showAnswer(${i})" id="answer-${i}">${q.answers[i]}</div>`;
            }
            document.getElementById('answersGrid').innerHTML = html;
        }

        window.showAnswer = function(index) {
            let correct = questions[currentQuestion].correct;
            for (let i = 0; i < 4; i++) {
                let el = document.getElementById('answer-' + i);
                if (el) el.classList.remove('correct', 'incorrect');
            }
            document.getElementById('answer-' + correct).classList.add('correct');
            if (index !== correct) {
                document.getElementById('answer-' + index).classList.add('incorrect');
            }
        };

        window.prevQuestion = function() {
            if (currentQuestion > 0) {
                currentQuestion--;
                updateCounter();
                displayQuestion();
            }
        };

        window.nextQuestion = function() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                updateCounter();
                displayQuestion();
            }
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowRight') nextQuestion();
            else if (e.key === 'ArrowLeft') prevQuestion();
            else if (e.key >= '1' && e.key <= '4') showAnswer(parseInt(e.key) - 1);
        });

        loadQuiz();
    </script>
</body>
</html>
