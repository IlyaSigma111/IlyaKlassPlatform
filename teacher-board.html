<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИЛЬЯКЛАСС - Викторина с доски</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .title {
            font-size: 32px;
            color: #6366f1;
            margin-bottom: 10px;
        }

        .question-card {
            background: rgba(255,255,255,0.03);
            border: 2px solid #6366f1;
            border-radius: 40px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .question-text {
            font-size: 32px;
            margin-bottom: 30px;
            color: #818cf8;
            text-align: center;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .answer-card {
            background: rgba(255,255,255,0.05);
            border: 2px solid #10b981;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        .answer-card:hover {
            background: rgba(16,185,129,0.1);
        }

        .answer-card.correct {
            background: #10b981;
            border-color: #6366f1;
        }

        .answer-card.incorrect {
            background: #ef4444;
            border-color: #6366f1;
            opacity: 0.7;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .nav-btn {
            background: rgba(99,102,241,0.1);
            border: 2px solid #6366f1;
            color: #818cf8;
            padding: 15px 40px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
        }

        .nav-btn:hover {
            background: #6366f1;
            color: white;
        }

        .counter {
            text-align: center;
            font-size: 18px;
            color: #818cf8;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title" id="quizTitle">Загрузка...</h1>
            <div>Викторина с доски - ученики отвечают устно</div>
        </div>

        <div class="counter" id="counter">Вопрос 1/0</div>

        <div class="question-card">
            <div class="question-text" id="questionText">Загрузка...</div>
            <div class="answers-grid" id="answersGrid"></div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="prevQuestion()">◀ Назад</button>
            <button class="nav-btn" onclick="nextQuestion()">Вперед ▶</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== ТВОЙ SUPABASE КОНФИГ =====
        const SUPABASE_URL = 'https://sekiunglzxycjkgraudd.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_k5F_fZwKqsbwpO-itXvT9Q_UhRc6svh';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get('quiz');

        let questions = [];
        let currentQuestion = 0;

        async function loadQuiz() {
            const { data: quiz } = await supabase.from('quizzes').select('title').eq('id', quizId).single();
            document.getElementById('quizTitle').textContent = quiz?.title || 'Викторина';

            const { data: qs } = await supabase.from('questions').select('*').eq('quiz_id', quizId).order('question_index');
            questions = qs || [];
            updateCounter();
            displayQuestion();
        }

        function updateCounter() {
            document.getElementById('counter').textContent = `Вопрос ${currentQuestion+1}/${questions.length}`;
        }

        function displayQuestion() {
            if (!questions.length) return;
            const q = questions[currentQuestion];
            document.getElementById('questionText').textContent = q.question;
            
            let html = '';
            q.answers.forEach((answer, i) => {
                html += `<div class="answer-card" onclick="showAnswer(${i})" id="answer-${i}">${answer}</div>`;
            });
            document.getElementById('answersGrid').innerHTML = html;
        }

        window.showAnswer = (index) => {
            const correct = questions[currentQuestion].correct;
            for (let i=0; i<4; i++) {
                const el = document.getElementById(`answer-${i}`);
                if (el) el.classList.remove('correct','incorrect');
            }
            document.getElementById(`answer-${correct}`).classList.add('correct');
            if (index !== correct) {
                document.getElementById(`answer-${index}`).classList.add('incorrect');
            }
        };

        window.prevQuestion = () => {
            if (currentQuestion > 0) {
                currentQuestion--;
                updateCounter();
                displayQuestion();
            }
        };

        window.nextQuestion = () => {
            if (currentQuestion < questions.length-1) {
                currentQuestion++;
                updateCounter();
                displayQuestion();
            }
        };

        document.addEventListener('keydown', (e) => {
            if (e.key==='ArrowRight') nextQuestion();
            else if (e.key==='ArrowLeft') prevQuestion();
            else if (e.key>='1' && e.key<='4') showAnswer(parseInt(e.key)-1);
        });

        loadQuiz();
    </script>
</body>
</html>
